<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>베타과학 - 학원 관리 시스템</title>
<style>
  /* 스타일은 원장님 기존 디자인을 100% 유지합니다 */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --primary: #2563eb; --primary-light: #eff6ff; --primary-dark: #1d4ed8;
    --sidebar-width: 220px; --max-width: 1200px; --bg: #f5f6fa;
    --white: #ffffff; --text: #1e293b; --text-muted: #64748b;
    --border: #e2e8f0; --success: #10b981; --warning: #f59e0b;
    --danger: #ef4444; --radius: 10px;
  }
  body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .app-wrapper { max-width: var(--max-width); margin: 0 auto; display: flex; flex-direction: column; min-height: 100vh; }
  .topbar { background: var(--white); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; gap: 32px; height: 56px; position: sticky; top: 0; z-index: 100; }
  .logo-area { display: flex; flex-direction: column; align-items: center; line-height: 1.1; }
  .logo-area .brand { font-size: 15px; font-weight: 800; color: var(--primary); }
  .logo-area .brand-sub { font-size: 10px; font-weight: 600; color: var(--primary); }
  .nav-tabs { display: flex; gap: 2px; list-style: none; }
  .nav-tabs a { display: block; padding: 8px 14px; font-size: 14px; color: var(--text-muted); text-decoration: none; border-radius: 6px; }
  .nav-tabs a.active { background: var(--primary-light); color: var(--primary); font-weight: 600; }
  .main-content { padding: 28px 24px; flex: 1; }
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
  .stat-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
  .stat-value { font-size: 28px; font-weight: 700; color: var(--text); }
  .section-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 24px; }
  table { width: 100%; border-collapse: collapse; }
  thead th { font-size: 13px; color: var(--text-muted); text-align: left; padding: 10px; border-bottom: 1px solid var(--border); background: #f8fafc; }
  tbody td { font-size: 14px; padding: 14px 10px; border-bottom: 1px solid var(--border); }
  .grade-badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; background: #10b981; color: white; }
  .test-count-badge { background: #ef4444; color: white; font-size: 12px; padding: 2px 8px; border-radius: 20px; margin-left: 8px; }
  .btn-create { background: var(--primary); color: white; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-size: 13px; }
</style>
</head>
<body>

<div class="app-wrapper">
  <header class="topbar">
    <div class="logo-area"><span class="brand">BETA</span><span class="brand-sub">SCIENCE</span></div>
    <div class="topbar-divider"></div>
    <nav>
      <ul class="nav-tabs">
        <li><a href="dashboard.html" class="active">대시보드</a></li>
        <li><a href="students.html">학생 관리</a></li>
        <li><a href="test-create.html">테스트 생성</a></li>
        <li><a href="test-manage.html">테스트 관리</a></li>
        <li><a href="grades.html">성적 조회</a></li>
        <li><a href="special.html">특별관리</a></li>
      </ul>
    </nav>
  </header>

  <main class="main-content">
    <div class="page-header"><h1>대시보드</h1><p>학생 성적 및 과제 현황을 실시간으로 확인하세요</p></div>

    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">등록 학생 수</div><div class="stat-value" id="stat-students">0</div></div>
      <div class="stat-card"><div class="stat-label">제출된 테스트</div><div class="stat-value" id="stat-tests">0</div></div>
      <div class="stat-card"><div class="stat-label">전체 평균</div><div class="stat-value" id="stat-avg">0</div></div>
      <div class="stat-card"><div class="stat-label">집중 관리 필요</div><div class="stat-value" id="stat-special">0</div></div>
    </div>

    <div class="section-card">
      <div class="section-header"><span class="section-title">최근 테스트 결과</span></div>
      <table id="recent-results-table">
        <thead><tr><th>학생</th><th>테스트</th><th>점수</th><th>제출일</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="section-card">
      <div class="section-header">
        <span class="section-title">등록된 테스트 관리 <span class="test-count-badge" id="test-list-count">0개</span></span>
        <a href="test-create.html" class="btn-create">테스트 생성</a>
      </div>
      <table id="test-manage-table">
        <thead><tr><th>ID</th><th>단원명</th><th>과목</th><th>학년</th><th>관리</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </main>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, onSnapshot, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  // [중요] 원장님의 설정값을 여기에 붙여넣으세요
  const firebaseConfig = {
    apiKey: "여기에_입력",
    authDomain: "여기에_입력",
    projectId: "여기에_입력",
    storageBucket: "여기에_입력",
    messagingSenderId: "여기에_입력",
    appId: "여기에_입력"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // 실행 시 모든 표의 가짜 데이터 즉시 삭제
  document.querySelectorAll('tbody').forEach(tbody => tbody.innerHTML = '<tr><td colspan="10" style="text-align:center; padding:40px; color:#64748b;">데이터를 불러오는 중...</td></tr>');

  // 1. 상단 통계 연동
  function syncStats() {
    onSnapshot(collection(db, "students"), snap => document.getElementById('stat-students').textContent = snap.size);
    onSnapshot(collection(db, "tests"), snap => {
        document.getElementById('stat-tests').textContent = snap.size;
        document.getElementById('test-list-count').textContent = snap.size + '개';
    });
    onSnapshot(collection(db, "grades"), snap => {
      let total = 0;
      snap.forEach(doc => total += Number(doc.data().score || 0));
      document.getElementById('stat-avg').textContent = snap.size > 0 ? (total / snap.size).toFixed(1) : "0";
    });
    onSnapshot(collection(db, "specialManagement"), snap => {
      const pending = snap.docs.filter(d => !d.data().done).length;
      document.getElementById('stat-special').textContent = pending;
    });
  }

  // 2. 최근 성적 표 연동 (최근 5건)
  function syncRecentResults() {
    const tbody = document.querySelector('#recent-results-table tbody');
    onSnapshot(query(collection(db, "grades"), orderBy("date", "desc"), limit(5)), snap => {
      tbody.innerHTML = snap.empty ? '<tr><td colspan="4" style="text-align:center; padding:20px;">제출된 성적이 없습니다.</td></tr>' : 
      snap.docs.map(doc => {
        const d = doc.data();
        return `<tr><td>${d.studentName}</td><td>${d.testTitle}</td><td>${d.score}점</td><td>${d.date}</td></tr>`;
      }).join('');
    });
  }

  // 3. 테스트 관리 목록 연동 (최근 10건)
  function syncTestList() {
    const tbody = document.querySelector('#test-manage-table tbody');
    onSnapshot(query(collection(db, "tests"), orderBy("regDate", "desc"), limit(10)), snap => {
      tbody.innerHTML = snap.empty ? '<tr><td colspan="5" style="text-align:center; padding:20px;">등록된 테스트가 없습니다.</td></tr>' :
      snap.docs.map(doc => {
        const t = doc.data();
        return `<tr>
          <td style="font-size:11px; color:gray;">${t.testId}</td>
          <td style="font-weight:bold;">${t.unitName}</td>
          <td>${t.subject}</td>
          <td><span class="grade-badge">${t.grade}</span></td>
          <td><button style="cursor:pointer; border:none; background:none;">✏️</button> <button style="cursor:pointer; border:none; background:none;">🗑️</button></td>
        </tr>`;
      }).join('');
    });
  }

  syncStats();
  syncRecentResults();
  syncTestList();
</script>
</body>
</html>

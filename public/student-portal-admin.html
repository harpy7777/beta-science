<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>학생 포털 관리 - 베타과학학원</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --pink:#ec4899;--pink-lt:#fdf2f8;--pink-dk:#be185d;
  --bg:#fef7fb;--wh:#fff;--tx:#1e293b;--mt:#94a3b8;--bd:#f0e4ec;
  --r:12px;--ok:#10b981;--ng:#ef4444;
  --safe-top:env(safe-area-inset-top);
  --safe-bot:env(safe-area-inset-bottom);
}
html{-webkit-text-size-adjust:100%}
body{font-family:'Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;visibility:hidden}

/* ══ 탑바 ══ */
.topbar{
  background:var(--wh);border-bottom:1px solid var(--bd);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;height:54px;
  position:sticky;top:0;z-index:100;
  box-shadow:0 2px 12px rgba(236,72,153,.06);
}
.topbar-left{display:flex;align-items:center;gap:10px}
.logo-icon{width:30px;height:30px;background:linear-gradient(135deg,#f472b6,#db2777);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-name{font-size:15px;font-weight:700;color:var(--tx)}
.topbar-right{display:flex;align-items:center;gap:10px}
.btn-back{display:flex;align-items:center;gap:6px;padding:7px 16px;background:var(--pink-lt);border:1px solid #fbcfe8;border-radius:20px;font-family:inherit;font-size:13px;font-weight:700;color:var(--pink);cursor:pointer;text-decoration:none;white-space:nowrap}
.btn-back:hover{background:#fce7f3}
.btn-logout{padding:7px 16px;background:transparent;border:1.5px solid #fbcfe8;border-radius:20px;font-family:inherit;font-size:13px;font-weight:700;color:var(--pink);cursor:pointer;white-space:nowrap}
.btn-logout:hover{background:var(--pink-lt)}

/* ══ 메인 레이아웃 ══ */
.main{padding:28px 32px;max-width:1200px;margin:0 auto}

/* ══ 페이지 헤더 ══ */
.page-header{
  background:linear-gradient(135deg,var(--pink-lt),#fce7f3);
  border:1px solid #fbcfe8;border-radius:16px;
  padding:24px 28px;margin-bottom:20px;
  display:flex;align-items:center;justify-content:space-between;gap:16px;
}
.page-header-text h1{font-size:22px;font-weight:700;margin-bottom:5px}
.page-header-text p{font-size:13px;color:var(--mt);line-height:1.6}
.page-header-stat{
  display:flex;gap:16px;flex-shrink:0;
}
.hstat{text-align:center;background:var(--wh);border:1px solid #fbcfe8;border-radius:12px;padding:12px 20px}
.hstat-num{font-size:24px;font-weight:700;color:var(--pink);line-height:1}
.hstat-lbl{font-size:11px;color:var(--mt);margin-top:3px}

/* ══ 안내 박스 ══ */
.guide-box{background:var(--wh);border:1px solid #fbcfe8;border-radius:var(--r);padding:16px 20px;margin-bottom:20px;display:flex;align-items:flex-start;gap:12px}
.guide-icon{font-size:20px;flex-shrink:0;margin-top:1px}
.guide-txt{font-size:13px;color:var(--tx);line-height:1.9}
.guide-txt strong{color:var(--pink)}
.guide-url{display:inline-block;margin-top:6px;background:var(--pink-lt);border:1px solid #fbcfe8;border-radius:8px;padding:6px 12px;font-size:12px;font-family:monospace;color:var(--pink-dk);word-break:break-all}

/* ══ 필터 행 ══ */
.filter-row{display:flex;gap:10px;margin-bottom:16px;align-items:center;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:200px}
.search-wrap svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--mt)}
.search-input{width:100%;padding:11px 13px 11px 40px;border:1px solid var(--bd);border-radius:10px;font-size:14px;color:var(--tx);background:var(--wh);outline:none;font-family:inherit}
.search-input:focus{border-color:var(--pink)}
.filter-select{padding:11px 13px;border:1px solid var(--bd);border-radius:10px;font-size:14px;color:var(--tx);background:var(--wh);cursor:pointer;outline:none;font-family:inherit;min-width:120px}
.filter-select:focus{border-color:var(--pink)}
.count-txt{font-size:13px;color:var(--mt);white-space:nowrap}
.count-txt strong{color:var(--tx);font-weight:700}
.bulk-btn{display:flex;align-items:center;gap:7px;padding:10px 18px;background:var(--pink);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
.bulk-btn:hover{background:var(--pink-dk)}

/* ══ 카드 그리드 (핵심: 반응형) ══ */
.card-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr); /* 데스크탑: 3열 */
  gap:14px;
}

/* ══ 학생 카드 ══ */
.portal-card{background:var(--wh);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;transition:box-shadow .15s,border-color .15s}
.portal-card:hover{box-shadow:0 4px 16px rgba(236,72,153,.1);border-color:#fbcfe8}
.card-head{padding:16px;border-bottom:1px solid #fdf2f8;display:flex;align-items:center;gap:12px}
.avatar{width:44px;height:44px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,#fce7f3,#fbcfe8);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--pink)}
.s-name{font-size:15px;font-weight:700;margin-bottom:4px}
.s-meta{display:flex;gap:5px;flex-wrap:wrap}
.grade-chip{font-size:11px;font-weight:700;padding:2px 8px;border-radius:5px}
.grade-mid1{background:#ede9fe;color:#6d28d9}.grade-mid2{background:#dbeafe;color:#1d4ed8}.grade-mid3{background:#d1fae5;color:#065f46}
.grade-high1{background:#fef3c7;color:#92400e}.grade-high2{background:#fee2e2;color:#991b1b}.grade-high3{background:#fce7f3;color:#9d174d}
.id-chip{font-size:11px;color:var(--mt);font-family:monospace;background:#f8f9fa;border:1px solid var(--bd);border-radius:4px;padding:1px 6px}
.card-body{padding:14px 16px}
.url-row{display:flex;align-items:center;gap:8px;background:var(--pink-lt);border:1px solid #fbcfe8;border-radius:10px;padding:10px 12px;margin-bottom:10px}
.url-txt{flex:1;font-size:11px;font-family:monospace;color:var(--pink-dk);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.btn-copy{display:flex;align-items:center;gap:4px;padding:7px 13px;background:var(--pink);color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0;white-space:nowrap}
.btn-copy:hover{background:var(--pink-dk)}
.btn-copy.copied{background:var(--ok)}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn-preview{display:flex;align-items:center;justify-content:center;gap:5px;padding:10px;background:var(--pink-lt);color:var(--pink);border:1px solid #fbcfe8;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;font-family:inherit}
.btn-preview:hover{background:#fce7f3}
.btn-kakao{display:flex;align-items:center;justify-content:center;gap:5px;padding:10px;background:#FEE500;color:#3A1D1D;border:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-kakao:hover{background:#FFD900}

/* ══ 빈 상태 ══ */
.empty-state{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--mt);font-size:14px}

/* ══ 로딩 ══ */
.spinner{width:36px;height:36px;border:3px solid var(--bd);border-top-color:var(--pink);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-center{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--mt)}

/* ══ 토스트 ══ */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:#1e293b;color:#fff;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:700;z-index:500;transition:transform .3s ease;pointer-events:none;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ══ 반응형: 태블릿 ══ */
@media(max-width:1024px){
  .card-grid{grid-template-columns:repeat(2,1fr)}
  .main{padding:20px 24px}
}

/* ══ 반응형: 모바일 ══ */
@media(max-width:640px){
  .topbar{padding:0 16px;height:calc(50px + env(safe-area-inset-top));padding-top:env(safe-area-inset-top)}
  .main{padding:14px 14px calc(14px + env(safe-area-inset-bottom))}
  .page-header{flex-direction:column;align-items:flex-start;padding:16px}
  .page-header-stat{display:none}
  .page-header-text h1{font-size:18px}
  .card-grid{grid-template-columns:1fr}
  .filter-row{flex-wrap:wrap}
  .search-wrap{min-width:100%;order:1}
  .filter-select{flex:1;order:2}
  .bulk-btn{order:3}
  .count-txt{order:4;width:100%}
  .btn-copy{padding:9px 13px;min-height:40px}
  .btn-preview,.btn-kakao{padding:12px 10px;min-height:48px}
}
</style>
</head>
<body>

<header class="topbar">
 <div class="topbar-left">
  <a href="index.html" style="display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit">
  <div class="logo-icon">
    <svg width="16" height="16" viewBox="0 0 18 18" fill="none">
      <circle cx="9" cy="7" r="3" fill="rgba(255,255,255,0.9)"/>
      <path d="M3.5 16c0-3 2.5-5.5 5.5-5.5s5.5 2.5 5.5 5.5" stroke="rgba(255,255,255,0.9)" stroke-width="1.4" stroke-linecap="round" fill="none"/>
    </svg>
  </div>
  <span class="logo-name">베타과학학원</span>
  </a>
</div>
      <svg width="16" height="16" viewBox="0 0 18 18" fill="none">
        <circle cx="9" cy="7" r="3" fill="rgba(255,255,255,0.9)"/>
        <path d="M3.5 16c0-3 2.5-5.5 5.5-5.5s5.5 2.5 5.5 5.5" stroke="rgba(255,255,255,0.9)" stroke-width="1.4" stroke-linecap="round" fill="none"/>
      </svg>
    </div>
    <span class="logo-name">베타과학학원 · 학생 포털 관리</span>
  </div>
  <div class="topbar-right">
    <a class="btn-back" href="index.html">← 홈으로</a>
    <button class="btn-logout" onclick="doLogout()">로그아웃</button>
  </div>
</header>

<main class="main">

  <div class="page-header">
    <div class="page-header-text">
      <h1>🔗 학생 포털 관리</h1>
      <p>링크를 복사해 카카오톡으로 학부모님께 공유하세요. 로그인 없이 바로 열립니다.</p>
    </div>
    <div class="page-header-stat">
      <div class="hstat"><div class="hstat-num" id="statTotal">—</div><div class="hstat-lbl">전체 학생</div></div>
      <div class="hstat"><div class="hstat-num" id="statFiltered">—</div><div class="hstat-lbl">표시 중</div></div>
    </div>
  </div>

  <div class="guide-box">
    <div class="guide-icon">💡</div>
    <div class="guide-txt">
      <strong>보기 전용 · 로그인 불필요 · 수업기록·테스트 자동 연동</strong><br>
      학생마다 고유 링크가 생성됩니다. 복사 후 카카오톡으로 전송하세요.
      <span class="guide-url" id="baseUrlDisplay">불러오는 중...</span>
    </div>
  </div>

  <div class="filter-row">
    <div class="search-wrap">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="search-input" type="text" id="searchInput" placeholder="이름 또는 ID 검색..." oninput="filterStudents()">
    </div>
    <select class="filter-select" id="gradeFilter" onchange="filterStudents()">
      <option value="">전체 학년</option>
      <option value="중등1학년">중등1학년</option>
      <option value="중등2학년">중등2학년</option>
      <option value="중등3학년">중등3학년</option>
      <option value="고등1학년">고등1학년</option>
      <option value="고등2학년">고등2학년</option>
      <option value="고등3학년">고등3학년</option>
    </select>
    <span class="count-txt">총 <strong id="countDisplay">0</strong>명</span>
    <button class="bulk-btn" onclick="copyAllLinks()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      전체 링크 복사
    </button>
  </div>

  <div class="card-grid" id="cardGrid">
    <div class="loading-center">
      <div class="spinner"></div>
      <p>학생 목록을 불러오는 중...</p>
    </div>
  </div>

</main>

<div class="toast" id="toast"></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getAuth,onAuthStateChanged,signOut}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import{getFirestore,doc,getDoc,collection,query,orderBy,getDocs}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const fc={apiKey:"AIzaSyD5MQx_rXO_xRYelyKxK090TaKa3Gg2D3k",authDomain:"beta-science.firebaseapp.com",projectId:"beta-science",storageBucket:"beta-science.firebasestorage.app",messagingSenderId:"650652155367",appId:"1:650652155367:web:41d2958e675cb4edd4d142"};
const app=initializeApp(fc);const auth=getAuth(app);const db=getFirestore(app);
const BASE_URL=window.location.origin+'/student-portal.html?id=';
document.getElementById('baseUrlDisplay').textContent=BASE_URL+'학생ID';

let allStudents=[];let filtered=[];

onAuthStateChanged(auth,async u=>{
  if(!u){window.location.replace('/login.html');return;}
  try{
    const s=await getDoc(doc(db,'users',u.uid));
    if(!s.exists()||s.data().status!=='approved'){await signOut(auth);window.location.replace('/login.html');return;}
    document.body.style.visibility='visible';
    loadStudents();
  }catch(e){window.location.replace('/login.html');}
});
window.doLogout=async()=>{await signOut(auth);window.location.replace('/login.html');};

async function loadStudents(){
  try{
    const snap=await getDocs(query(collection(db,'students'),orderBy('regDate','desc')));
    allStudents=snap.docs.map(d=>({fireId:d.id,...d.data()}));
    document.getElementById('statTotal').textContent=allStudents.length;
    filterStudents();
  }catch(err){
    document.getElementById('cardGrid').innerHTML='<div class="empty-state">학생 정보를 불러오지 못했습니다.</div>';
  }
}

window.filterStudents=function(){
  const kw=document.getElementById('searchInput').value.trim().toLowerCase();
  const gr=document.getElementById('gradeFilter').value;
  filtered=allStudents.filter(s=>(!kw||(s.name||'').toLowerCase().includes(kw)||(s.id||'').toLowerCase().includes(kw))&&(!gr||s.grade===gr));
  document.getElementById('countDisplay').textContent=filtered.length;
  document.getElementById('statFiltered').textContent=filtered.length;
  renderGrid();
};

function renderGrid(){
  const grid=document.getElementById('cardGrid');
  if(!filtered.length){grid.innerHTML='<div class="empty-state">검색 결과가 없습니다.</div>';return;}
  grid.innerHTML=filtered.map(s=>renderCard(s)).join('');
}

function renderCard(s){
  const url=BASE_URL+(s.id||s.fireId);
  const grade=s.grade||'';
  const gradeCls={'중등1학년':'grade-mid1','중등2학년':'grade-mid2','중등3학년':'grade-mid3','고등1학년':'grade-high1','고등2학년':'grade-high2','고등3학년':'grade-high3'}[grade]||'grade-mid1';
  const initial=(s.name||'?').charAt(0);
  const shortUrl=url.length>38?url.substring(0,38)+'…':url;
  const fid=e(s.fireId);const safeUrl=e(url);const safeName=e(s.name||'');
  return`<div class="portal-card">
    <div class="card-head">
      <div class="avatar">${e(initial)}</div>
      <div>
        <div class="s-name">${safeName}</div>
        <div class="s-meta">
  <span class="grade-chip ${gradeCls}">${e(grade)}</span>
  ${s.subject?`<span class="id-chip" style="background:#f0fdf4;border-color:#bbf7d0;color:#166534">${e(s.subject)}</span>`:''}
  <span class="id-chip">${e(s.id||'-')}</span>
</div>
      </div>
    </div>
    <div class="card-body">
      <div class="url-row">
        <span class="url-txt" title="${safeUrl}">${e(shortUrl)}</span>
        <button class="btn-copy" id="btn-${fid}" onclick="copyLink('${safeUrl}','${fid}')">📋 복사</button>
      </div>
      <div class="btn-row">
        <a class="btn-preview" href="${safeUrl}" target="_blank" rel="noopener">👁 미리보기</a>
        <button class="btn-kakao" onclick="shareKakao('${safeName}','${safeUrl}')">💬 카카오 공유</button>
      </div>
    </div>
  </div>`;
}

window.copyLink=async function(url,fireId){
  try{await navigator.clipboard.writeText(url);}
  catch(err){const ta=document.createElement('textarea');ta.value=url;ta.style.cssText='position:fixed;opacity:0';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);}
  const btn=document.getElementById('btn-'+fireId);
  if(btn){btn.classList.add('copied');btn.textContent='✓ 완료';setTimeout(()=>{btn.classList.remove('copied');btn.textContent='📋 복사';},2000);}
  showToast('✅ 링크가 복사되었습니다!');
};

window.copyAllLinks=async function(){
  if(!filtered.length){showToast('⚠️ 표시된 학생이 없습니다');return;}
  const text=filtered.map(s=>`[베타과학학원] ${s.name||''}(${s.grade||''}) 학생 포털\n${BASE_URL+(s.id||s.fireId)}`).join('\n\n');
  try{await navigator.clipboard.writeText(text);}
  catch(err){const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;opacity:0';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);}
  showToast(`✅ ${filtered.length}명 링크 전체 복사 완료!`);
};

window.shareKakao=function(name,url){
  const msg=`[베타과학학원] ${name} 학생 포털 링크\n📚 수업기록 · 테스트 결과 확인\n${url}`;
  if(navigator.share){navigator.share({title:`${name} 학생 포털`,text:msg,url:url}).catch(()=>{});}
  else{
    navigator.clipboard?navigator.clipboard.writeText(msg).then(()=>showToast('✅ 카카오톡에 붙여넣기 하세요!')):
    (()=>{const ta=document.createElement('textarea');ta.value=msg;ta.style.cssText='position:fixed;opacity:0';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('✅ 카카오톡에 붙여넣기 하세요!');})();
  }
};

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600);}
function e(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
</script>
</body>
</html>

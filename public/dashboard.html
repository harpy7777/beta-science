<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>베타과학 - 학원 관리 시스템</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --primary: #1a3fc4; --primary-light: #eef2ff; --primary-dark: #1530a0;
    --sidebar-width: 220px; --max-width: 1200px; --bg: #f5f6fa;
    --white: #ffffff; --text: #1e293b; --text-muted: #64748b;
    --border: #e2e8f0; --success: #10b981; --warning: #f59e0b;
    --danger: #ef4444; --radius: 10px;
  }
  body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .app-wrapper { max-width: var(--max-width); margin: 0 auto; display: flex; flex-direction: column; min-height: 100vh; }
  .topbar { background: var(--white); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; gap: 32px; height: 56px; position: sticky; top: 0; z-index: 100; }
  .logo-area { display: flex; flex-direction: row; align-items: center; gap: 8px; text-decoration: none; cursor: pointer; flex-shrink: 0; }
  .logo-icon { width: 32px; height: 32px; background: var(--primary); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .logo-text { display: flex; flex-direction: column; align-items: flex-start; line-height: 1.1; }
  .logo-area .brand { font-size: 15px; font-weight: 800; letter-spacing: 0.08em; color: var(--primary); }
  .logo-area .brand-sub { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; color: var(--primary); text-transform: uppercase; }
  .topbar-divider { width: 1px; height: 28px; background: var(--border); flex-shrink: 0; }
  .nav-tabs { display: flex; gap: 2px; list-style: none; }
  .nav-tabs a { display: block; padding: 8px 14px; font-size: 14px; color: var(--text-muted); text-decoration: none; border-radius: 6px; white-space: nowrap; transition: background 0.15s, color 0.15s; }
  .nav-tabs a:hover { background: var(--bg); color: var(--text); }
  .nav-tabs a.active { background: var(--primary-light); color: var(--primary); font-weight: 600; }
  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  .academy-name { font-size: 13px; font-weight: 600; color: var(--text); }
  .badge-admin { font-size: 11px; padding: 2px 8px; background: #f1f5f9; border-radius: 20px; color: var(--text-muted); }
  .main-content { padding: 28px 24px; flex: 1; }
  .page-header { margin-bottom: 24px; }
  .page-header h1 { font-size: 24px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .page-header p { font-size: 14px; color: var(--text-muted); }
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
  .stat-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; display: flex; flex-direction: column; gap: 8px; }
  .stat-card-header { display: flex; align-items: center; justify-content: space-between; }
  .stat-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  .stat-icon.blue { background: #eef2ff; }
  .stat-icon.green { background: #f0fdf4; }
  .stat-icon.amber { background: #fffbeb; }
  .stat-icon.red { background: #fef2f2; }
  .stat-label { font-size: 12px; color: var(--text-muted); font-weight: 500; }
  .stat-value { font-size: 28px; font-weight: 700; color: var(--text); line-height: 1; }
  .stat-desc { font-size: 12px; color: var(--text-muted); }
  .section-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 24px; }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .section-title { font-size: 16px; font-weight: 700; color: var(--text); }
  .view-all { display: flex; align-items: center; gap: 4px; font-size: 13px; color: var(--primary); text-decoration: none; font-weight: 500; }
  .view-all:hover { text-decoration: underline; }
  table { width: 100%; border-collapse: collapse; }
  thead th { font-size: 13px; font-weight: 600; color: var(--text-muted); text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); background: #f8fafc; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #f8fafc; }
  tbody td { font-size: 14px; padding: 14px 12px; color: var(--text); }
  .score-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; color: white; }
  .score-high { background: #1a3fc4; }
  .score-mid { background: #10b981; }
  .score-low { background: #ef4444; }
  .test-count-badge { background: #ef4444; color: white; font-size: 12px; font-weight: 700; padding: 2px 8px; border-radius: 20px; margin-left: 8px; }
  .btn-create { display: flex; align-items: center; gap: 4px; padding: 7px 14px; background: var(--primary); color: white; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none; }
  .btn-create:hover { background: var(--primary-dark); }
  .grade-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; background: #10b981; color: white; }
  .grade-badge.middle { background: #8b5cf6; }
  .action-icons { display: flex; gap: 8px; }
  .action-btn { width: 30px; height: 30px; border-radius: 6px; border: 1px solid var(--border); background: var(--white); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: background 0.1s; }
  .action-btn:hover { background: #f1f5f9; }
  .action-btn.del:hover { background: #fef2f2; border-color: #fca5a5; }
  .view-more-btn { display: block; margin: 16px auto 0; padding: 10px 28px; border: 1px solid var(--border); border-radius: 8px; background: var(--white); font-size: 14px; color: var(--text); cursor: pointer; transition: background 0.1s; font-weight: 500; text-decoration: none; text-align: center; width: fit-content; }
  .view-more-btn:hover { background: #f1f5f9; }
  svg.icon { width: 18px; height: 18px; flex-shrink: 0; }
  @media (max-width: 900px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 600px) { .stats-grid { grid-template-columns: 1fr; } .nav-tabs a { padding: 8px 10px; font-size: 13px; } .main-content { padding: 16px 12px; } }
</style>
</head>
<body>

<div class="app-wrapper">
  <header class="topbar">
    <!-- 로고: 클릭하면 index.html로 이동 -->
    <a href="index.html" class="logo-area">
      <div class="logo-icon">
        <!-- 플라스크(비커) 아이콘 -->
        <svg width="18" height="18" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
          <path d="M9 3h6M9 3v7L4.5 17A2 2 0 0 0 6.4 20h11.2a2 2 0 0 0 1.9-3L15 10V3"/>
          <line x1="6.5" y1="14" x2="17.5" y2="14"/>
        </svg>
      </div>
      <div class="logo-text">
        <span class="brand">BETA</span>
        <span class="brand-sub">SCIENCE</span>
      </div>
    </a>
    <div class="topbar-divider"></div>
    <nav>
      <ul class="nav-tabs">
        <li><a href="dashboard.html" class="active">대시보드</a></li>
        <li><a href="students.html">학생 관리</a></li>
        <li><a href="test-create.html">테스트 생성</a></li>
        <li><a href="test-manage.html">테스트 관리</a></li>
        <li><a href="grades.html">성적 조회</a></li>
        <li><a href="analysis.html">학생별 분석</a></li>
        <li><a href="special.html">특별관리</a></li>
        <li><a href="sms.html">SMS설정</a></li>
      </ul>
    </nav>
    <div class="topbar-right">
      <span class="academy-name">베타과학학원</span>
      <span class="badge-admin">관리자 모드</span>
    </div>
  </header>

  <main class="main-content">
    <div class="page-header">
      <h1>대시보드</h1>
      <p>학생 성적 및 과제 현황을 확인하세요</p>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-card-header">
          <div class="stat-icon blue"><svg class="icon" fill="none" stroke="#1a3fc4" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>
          <span class="stat-label">전체</span>
        </div>
        <div class="stat-value" id="stat-total-students">0</div>
        <div class="stat-desc">등록 학생 수</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-header">
          <div class="stat-icon green"><svg class="icon" fill="none" stroke="#10b981" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg></div>
          <span class="stat-label">누적</span>
        </div>
        <div class="stat-value" id="stat-total-grades">0</div>
        <div class="stat-desc">제출된 테스트</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-header">
          <div class="stat-icon amber"><svg class="icon" fill="none" stroke="#f59e0b" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></div>
          <span class="stat-label">평균</span>
        </div>
        <div class="stat-value" id="stat-avg-score">0</div>
        <div class="stat-desc">전체 평균 점수</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-header">
          <div class="stat-icon red"><svg class="icon" fill="none" stroke="#ef4444" stroke-width="2" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
          <span class="stat-label">미완료</span>
        </div>
        <div class="stat-value" id="stat-pending-special">0</div>
        <div class="stat-desc">집중 관리 필요</div>
      </div>
    </div>

    <div class="section-card">
      <div class="section-header">
        <span class="section-title">최근 테스트 결과</span>
        <a href="grades.html" class="view-all">전체보기 ›</a>
      </div>
      <table>
        <thead>
          <tr><th>학생</th><th>테스트</th><th>점수</th><th>제출일</th></tr>
        </thead>
        <tbody id="recentGradesBody">
          <tr><td colspan="4" style="text-align:center; padding:40px; color:var(--text-muted);">데이터를 불러오는 중...</td></tr>
        </tbody>
      </table>
    </div>

    <div class="section-card">
      <div class="section-header">
        <div style="display:flex; align-items:center;">
          <span class="section-title">등록된 테스트 관리</span>
          <span class="test-count-badge" id="test-total-badge">0개</span>
        </div>
        <a href="test-create.html" class="btn-create">테스트 생성</a>
      </div>
      <table>
        <thead>
          <tr><th>테스트 ID</th><th>단원명</th><th>과목</th><th>학년</th><th>관리</th></tr>
        </thead>
        <tbody id="recentTestsBody">
          <tr><td colspan="5" style="text-align:center; padding:40px; color:var(--text-muted);">데이터를 불러오는 중...</td></tr>
        </tbody>
      </table>
      <a href="test-manage.html" class="view-more-btn">전체 테스트 보기</a>
    </div>
  </main>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, onSnapshot, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD5MQx_rXO_xRYelyKxK090TaKa3Gg2D3k",
    authDomain: "beta-science.firebaseapp.com",
    projectId: "beta-science",
    storageBucket: "beta-science.firebasestorage.app",
    messagingSenderId: "650652155367",
    appId: "1:650652155367:web:41d2958e675cb4edd4d142"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  function initStats() {
    onSnapshot(collection(db, "students"), snap => {
      document.getElementById('stat-total-students').textContent = snap.size;
    });
    onSnapshot(collection(db, "grades"), snap => {
      let total = 0;
      snap.forEach(doc => total += Number(doc.data().score || 0));
      const avg = snap.size > 0 ? (total / snap.size).toFixed(1) : 0;
      document.getElementById('stat-total-grades').textContent = snap.size;
      document.getElementById('stat-avg-score').textContent = avg;
    });
    onSnapshot(collection(db, "specialManagement"), snap => {
      const pending = snap.docs.filter(d => !d.data().done).length;
      document.getElementById('stat-pending-special').textContent = pending;
    });
  }

  function initRecentGrades() {
    const q = query(collection(db, "grades"), orderBy("date", "desc"), limit(5));
    onSnapshot(q, snap => {
      const tbody = document.getElementById('recentGradesBody');
      if (snap.empty) {
        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:40px;">등록된 데이터가 없습니다.</td></tr>';
        return;
      }
      tbody.innerHTML = snap.docs.map(doc => {
        const d = doc.data();
        const scoreClass = d.score >= 80 ? 'score-high' : d.score >= 60 ? 'score-mid' : 'score-low';
        return `<tr>
          <td>${d.studentName || '-'}</td>
          <td>${d.testName || '-'}</td>
          <td><span class="score-badge ${scoreClass}">${d.score}점</span></td>
          <td>${d.date || '-'}</td>
        </tr>`;
      }).join('');
    });
  }

  function initRecentTests() {
    const q = query(collection(db, "tests"), orderBy("regDate", "desc"), limit(5));
    onSnapshot(q, snap => {
      const tbody = document.getElementById('recentTestsBody');
      document.getElementById('test-total-badge').textContent = snap.size + '개';
      if (snap.empty) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:40px;">등록된 테스트가 없습니다.</td></tr>';
        return;
      }
      tbody.innerHTML = snap.docs.map(doc => {
        const t = doc.data();
        return `<tr>
          <td style="font-size:12px; color:var(--text-muted)">${t.testId || '-'}</td>
          <td style="font-weight:600">${t.unitName || '-'}</td>
          <td>${t.subject || '-'}</td>
          <td><span class="grade-badge">${t.grade || '-'}</span></td>
          <td><div class="action-icons"><button class="action-btn">✏️</button><button class="action-btn del">🗑️</button></div></td>
        </tr>`;
      }).join('');
    });
  }

  initStats();
  initRecentGrades();
  initRecentTests();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>베타과학 - 학원 관리 시스템</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --primary: #1a3fc4; --primary-light: #eef2ff; --primary-dark: #1530a0;
    --max-width: 1200px; --bg: #f5f6fa;
    --white: #ffffff; --text: #1e293b; --text-muted: #64748b;
    --border: #e2e8f0; --radius: 10px;
  }
  body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; visibility: hidden; }
  .app-wrapper { max-width: var(--max-width); margin: 0 auto; display: flex; flex-direction: column; min-height: 100vh; }
  .topbar { background: var(--white); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; gap: 32px; height: 56px; position: sticky; top: 0; z-index: 100; }
  .logo-area { display: flex; align-items: center; gap: 8px; text-decoration: none; cursor: pointer; flex-shrink: 0; }
  .logo-icon { width: 32px; height: 32px; background: var(--primary); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .logo-text { display: flex; flex-direction: column; align-items: flex-start; line-height: 1.1; }
  .brand { font-size: 15px; font-weight: 800; letter-spacing: 0.08em; color: var(--primary); }
  .brand-sub { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; color: var(--primary); text-transform: uppercase; }
  .topbar-divider { width: 1px; height: 28px; background: var(--border); flex-shrink: 0; }
  .nav-tabs { display: flex; gap: 2px; list-style: none; }
  .nav-tabs a { display: block; padding: 8px 14px; font-size: 14px; color: var(--text-muted); text-decoration: none; border-radius: 6px; white-space: nowrap; transition: background 0.15s, color 0.15s; }
  .nav-tabs a:hover { background: var(--bg); color: var(--text); }
  .nav-tabs a.active { background: var(--primary-light); color: var(--primary); font-weight: 600; }
  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  .badge-admin { font-size: 11px; padding: 2px 8px; background: #f1f5f9; border-radius: 20px; color: var(--text-muted); }
  .btn-logout { padding: 6px 14px; background: transparent; border: 1.5px solid #c7d2fe; border-radius: 20px; font-family: inherit; font-size: 11px; font-weight: 600; color: var(--primary); cursor: pointer; }
  .btn-logout:hover { background: var(--primary-light); }

  .main-content { padding: 28px 24px; flex: 1; }
  .page-header { margin-bottom: 24px; }
  .page-header h1 { font-size: 24px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .page-header p { font-size: 14px; color: var(--text-muted); }

  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
  .stat-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; display: flex; flex-direction: column; gap: 8px; }
  .stat-card-header { display: flex; align-items: center; justify-content: space-between; }
  .stat-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  .stat-icon.blue { background: #eef2ff; } .stat-icon.green { background: #f0fdf4; }
  .stat-icon.amber { background: #fffbeb; } .stat-icon.red { background: #fef2f2; }
  .stat-label { font-size: 12px; color: var(--text-muted); font-weight: 500; }
  .stat-value { font-size: 28px; font-weight: 700; color: var(--text); line-height: 1; }
  .stat-desc { font-size: 12px; color: var(--text-muted); }

  .section-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 24px; }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .section-title { font-size: 16px; font-weight: 700; color: var(--text); }
  .view-all { font-size: 13px; color: var(--primary); text-decoration: none; font-weight: 500; }
  .view-all:hover { text-decoration: underline; }

  table { width: 100%; border-collapse: collapse; }
  thead th { font-size: 13px; font-weight: 600; color: var(--text-muted); text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); background: #f8fafc; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #f8fafc; }
  tbody td { font-size: 14px; padding: 13px 12px; color: var(--text); }

  .score-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; color: white; }
  .score-high { background: #1a3fc4; } .score-mid { background: #10b981; } .score-low { background: #ef4444; }

  /* 학년 배지 — 두 형식 모두 지원 (중1/고1 형식 + 중등1학년/고등1학년 형식) */
  .grade-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; }
  .g-mid1 { background: #fce7f3; color: #9d174d; }
  .g-mid2 { background: #ede9fe; color: #6b21a8; }
  .g-mid3 { background: #dbeafe; color: #1e3a8a; }
  .g-high1 { background: #dcfce7; color: #14532d; }
  .g-high2 { background: #fef9c3; color: #713f12; }
  .g-high3 { background: #ffedd5; color: #9a3412; }

  .subj-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .s-naeshin  { background: #fce7f3; color: #9d174d; }
  .s-chem1    { background: #ffedd5; color: #9a3412; }
  .s-integ    { background: #dcfce7; color: #14532d; }
  .s-matter   { background: #eff6ff; color: #1e3a8a; }
  .s-reaction { background: #fef9c3; color: #713f12; }
  .s-default  { background: #f1f5f9; color: #475569; }

  .test-tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
  .test-tab-btn { padding: 10px 20px; font-size: 14px; font-weight: 600; color: var(--text-muted); background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; font-family: inherit; transition: all 0.15s; margin-bottom: -1px; white-space: nowrap; }
  .test-tab-btn:hover { color: var(--text); }
  .test-tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
  .tab-cnt { display: inline-block; background: #f1f5f9; color: var(--text-muted); font-size: 11px; font-weight: 700; padding: 1px 7px; border-radius: 20px; margin-left: 5px; }
  .test-tab-btn.active .tab-cnt { background: var(--primary-light); color: var(--primary); }
  .test-panel { display: none; }
  .test-panel.active { display: block; }

  .action-icons { display: flex; gap: 8px; }
  .action-btn { width: 30px; height: 30px; border-radius: 6px; border: 1px solid var(--border); background: var(--white); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: background 0.1s; }
  .action-btn:hover { background: #f1f5f9; }
  .action-btn.del:hover { background: #fef2f2; border-color: #fca5a5; }

  svg.icon { width: 18px; height: 18px; flex-shrink: 0; }
  @media (max-width: 900px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 600px) { .stats-grid { grid-template-columns: 1fr; } .nav-tabs a { padding: 8px 10px; font-size: 13px; } .main-content { padding: 16px 12px; } }
</style>
</head>
<body>
<div class="app-wrapper">
  <header class="topbar">
    <a href="index.html" class="logo-area">
      <div class="logo-icon">
        <svg width="18" height="18" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
          <path d="M9 3h6M9 3v7L4.5 17A2 2 0 0 0 6.4 20h11.2a2 2 0 0 0 1.9-3L15 10V3"/>
          <line x1="6.5" y1="14" x2="17.5" y2="14"/>
        </svg>
      </div>
      <div class="logo-text">
        <span class="brand">BETA</span>
        <span class="brand-sub">SCIENCE</span>
      </div>
    </a>
    <div class="topbar-divider"></div>
    <nav>
      <ul class="nav-tabs">
        <li><a href="dashboard.html" class="active">대시보드</a></li>
        <li><a href="students.html">학생 관리</a></li>
        <li><a href="special.html">특별관리</a></li>
        <li><a href="sms.html">SMS설정</a></li>
      </ul>
    </nav>
    <div class="topbar-right">
      <span class="badge-admin">관리자 모드</span>
      <button class="btn-logout" onclick="doLogout()">로그아웃</button>
    </div>
  </header>

  <main class="main-content">
    <div class="page-header">
      <h1>대시보드</h1>
      <p>학생 성적 및 과제 현황을 확인하세요</p>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-card-header">
          <div class="stat-icon blue"><svg class="icon" fill="none" stroke="#1a3fc4" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>
          <span class="stat-label">전체</span>
        </div>
        <div class="stat-value" id="stat-total-students">-</div>
        <div class="stat-desc">등록 학생 수</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-header">
          <div class="stat-icon green"><svg class="icon" fill="none" stroke="#10b981" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></div>
          <span class="stat-label">누적</span>
        </div>
        <div class="stat-value" id="stat-total-grades">-</div>
        <div class="stat-desc">제출된 테스트</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-header">
          <div class="stat-icon amber"><svg class="icon" fill="none" stroke="#f59e0b" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></div>
          <span class="stat-label">평균</span>
        </div>
        <div class="stat-value" id="stat-avg-score">-</div>
        <div class="stat-desc">전체 평균 점수</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-header">
          <div class="stat-icon red"><svg class="icon" fill="none" stroke="#ef4444" stroke-width="2" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
          <span class="stat-label">미완료</span>
        </div>
        <div class="stat-value" id="stat-pending-special">-</div>
        <div class="stat-desc">집중 관리 필요</div>
      </div>
    </div>

    <div class="section-card">
      <div class="section-header">
        <span class="section-title">최근 테스트 결과</span>
        <a href="https://beta-science.vercel.app/grade-check.html" class="view-all">전체보기 ›</a>
      </div>
      <table>
        <thead><tr><th>학생</th><th>테스트</th><th>점수</th><th>제출일</th></tr></thead>
        <tbody id="recentGradesBody">
          <tr><td colspan="4" style="text-align:center;padding:40px;color:var(--text-muted)">데이터를 불러오는 중...</td></tr>
        </tbody>
      </table>
    </div>

    <div class="section-card">
      <div class="section-header">
        <span class="section-title">등록된 테스트 관리</span>
      </div>

      <div class="test-tabs">
        <button class="test-tab-btn active" onclick="switchTab('ox',this)">
          OX퀴즈 <span class="tab-cnt" id="cnt-ox">0</span>
        </button>
        <button class="test-tab-btn" onclick="switchTab('multi',this)">
          4지선다형 <span class="tab-cnt" id="cnt-multi">0</span>
        </button>
        <button class="test-tab-btn" onclick="switchTab('master',this)">
          마스터 테스트 <span class="tab-cnt" id="cnt-master">0</span>
        </button>
      </div>

      <!-- OX퀴즈 패널 -->
      <div id="panel-ox" class="test-panel active">
        <table>
          <thead><tr><th>등록일</th><th>단원명</th><th>과목</th><th>학년</th><th>관리</th></tr></thead>
          <tbody id="tbody-ox">
            <tr><td colspan="5" style="text-align:center;padding:40px;color:var(--text-muted)">데이터를 불러오는 중...</td></tr>
          </tbody>
        </table>
      </div>

      <!-- 4지선다형 패널 -->
      <div id="panel-multi" class="test-panel">
        <table>
          <thead><tr><th>등록일</th><th>단원명</th><th>과목</th><th>학년</th><th>관리</th></tr></thead>
          <tbody id="tbody-multi">
            <tr><td colspan="5" style="text-align:center;padding:40px;color:var(--text-muted)">데이터를 불러오는 중...</td></tr>
          </tbody>
        </table>
      </div>

      <!-- 마스터 테스트 패널 -->
      <div id="panel-master" class="test-panel">
        <table>
          <thead><tr><th>등록일</th><th>단원명</th><th>과목</th><th>학년</th><th>관리</th></tr></thead>
          <tbody id="tbody-master">
            <tr><td colspan="5" style="text-align:center;padding:40px;color:var(--text-muted)">데이터를 불러오는 중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import {
    getFirestore, doc, getDoc, collection,
    onSnapshot, query, orderBy, limit, deleteDoc
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD5MQx_rXO_xRYelyKxK090TaKa3Gg2D3k",
    authDomain: "beta-science.firebaseapp.com",
    projectId: "beta-science",
    storageBucket: "beta-science.firebasestorage.app",
    messagingSenderId: "650652155367",
    appId: "1:650652155367:web:41d2958e675cb4edd4d142"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // ── 인증 가드 ──
  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.replace("/login.html"); return; }
    try {
      const snap = await getDoc(doc(db, "users", user.uid));
      if (!snap.exists() || snap.data().status !== "approved") {
        await signOut(auth); window.location.replace("/login.html"); return;
      }
      document.body.style.visibility = "visible";
      initStats();
      initRecentGrades();
      initExams();        // exams 컬렉션 → OX/4지선다 탭
      initMasterTests();  // master-tests 컬렉션 → 마스터 테스트 탭
    } catch(e) { window.location.replace("/login.html"); }
  });

  window.doLogout = async () => { await signOut(auth); window.location.replace("/login.html"); };

  // ── 통계 ──
  function initStats() {
    onSnapshot(collection(db, "students"), s => {
      document.getElementById('stat-total-students').textContent = s.size;
    });
    onSnapshot(collection(db, "grades"), s => {
      let total = 0;
      s.forEach(d => total += Number(d.data().score || 0));
      document.getElementById('stat-total-grades').textContent = s.size;
      document.getElementById('stat-avg-score').textContent = s.size > 0 ? (total / s.size).toFixed(1) : 0;
    });
    onSnapshot(collection(db, "specialManagement"), s => {
      document.getElementById('stat-pending-special').textContent = s.docs.filter(d => !d.data().done).length;
    });
  }

  // ── 최근 성적 ──
  function initRecentGrades() {
    const q = query(collection(db, "grades"), orderBy("date", "desc"), limit(5));
    onSnapshot(q, s => {
      const tbody = document.getElementById('recentGradesBody');
      if (s.empty) {
        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;padding:40px;color:var(--text-muted)">등록된 데이터가 없습니다.</td></tr>';
        return;
      }
      tbody.innerHTML = s.docs.map(d => {
        const r = d.data();
        const cls = r.score >= 80 ? 'score-high' : r.score >= 60 ? 'score-mid' : 'score-low';
        return `<tr><td>${r.studentName||'-'}</td><td>${r.testName||'-'}</td><td><span class="score-badge ${cls}">${r.score}점</span></td><td>${r.date||'-'}</td></tr>`;
      }).join('');
    });
  }

  // ── 과목 CSS 클래스 ──
  function subjCls(s) {
    if (!s) return 's-default';
    if (s.includes('내신') || s.includes('내신대비')) return 's-naeshin';
    if (s === '화학1' || s === '화학') return 's-chem1';
    if (s.includes('통합')) return 's-integ';
    if (s.includes('물질') || s.includes('에너지') || s.includes('물리')) return 's-matter';
    if (s.includes('반응')) return 's-reaction';
    return 's-default';
  }

  // ── 학년 CSS 클래스 ──
  // create/page.tsx 저장 형식: '중1','중2','중3','고1','고2','고3'
  // master-test 저장 형식: '중등1학년','중등2학년','중등3학년','고등1학년','고등2학년','고등3학년'
  function gradeCls(g) {
    if (!g) return '';
    const map = {
      '중1':'g-mid1','중등1학년':'g-mid1',
      '중2':'g-mid2','중등2학년':'g-mid2',
      '중3':'g-mid3','중등3학년':'g-mid3',
      '고1':'g-high1','고등1학년':'g-high1',
      '고2':'g-high2','고등2학년':'g-high2',
      '고3':'g-high3','고등3학년':'g-high3',
    };
    return map[g] || '';
  }

  // ── 날짜 포맷 (테스트 등록일) ──
  function fmtRegDate(regDate) {
    if (!regDate) return '-';
    let d;
    if (regDate.seconds) {
      // Firestore Timestamp 객체
      d = new Date(regDate.seconds * 1000);
    } else if (typeof regDate === 'string') {
      d = new Date(regDate);
    } else {
      return '-';
    }
    if (isNaN(d)) return '-';
    return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
  }

  // ── tests 컬렉션 → OX 퀴즈 / 4지선다형 탭으로 분리 ──
  // questions[].type === 'ox' 이면 OX탭
  // questions[].type === 'multiple' 이면 4지선다탭
  // 혼합(둘 다 있으면) OX탭에 표시
  function initExams() {
    onSnapshot(collection(db, "tests"), snap => {
      const oxList    = snap.docs.filter(d => {
        const qs = d.data().questions || [];
        const hasOx = qs.some(q => q.type === 'ox');
        const hasMc = qs.some(q => q.type === 'multiple');
        return hasOx; // OX 포함(혼합 포함) → OX탭
      });
      const multiList = snap.docs.filter(d => {
        const qs = d.data().questions || [];
        const hasOx = qs.some(q => q.type === 'ox');
        const hasMc = qs.some(q => q.type === 'multiple');
        return hasMc && !hasOx; // 4지선다만 있는 것 → 4지선다탭
      });

      document.getElementById('cnt-ox').textContent = oxList.length;
      document.getElementById('cnt-multi').textContent = multiList.length;

      function makeRow(d) {
        const t = d.data();
        const gc = gradeCls(t.grade);
        const sc = subjCls(t.subject);
        return `<tr>
          <td style="font-size:12px;color:var(--text-muted)">${fmtRegDate(t.regDate)}</td>
          <td style="font-weight:600">${t.title||'-'}</td>
          <td><span class="subj-badge ${sc}">${t.subject||'-'}</span></td>
          <td><span class="grade-badge ${gc}">${t.grade||'-'}</span></td>
          <td><div class="action-icons">
            <button class="action-btn" onclick="editExam('${d.id}')" title="수정">✏️</button>
            <button class="action-btn del" onclick="deleteExam('${d.id}')" title="삭제">🗑️</button>
          </div></td>
        </tr>`;
      }

      document.getElementById('tbody-ox').innerHTML = oxList.length === 0
        ? '<tr><td colspan="5" style="text-align:center;padding:40px;color:var(--text-muted)">등록된 테스트가 없습니다.</td></tr>'
        : oxList.map(d => makeRow(d)).join('');

      document.getElementById('tbody-multi').innerHTML = multiList.length === 0
        ? '<tr><td colspan="5" style="text-align:center;padding:40px;color:var(--text-muted)">등록된 테스트가 없습니다.</td></tr>'
        : multiList.map(d => makeRow(d)).join('');
    });
  }

  // ── master-tests 컬렉션 ──
  function initMasterTests() {
    const q = query(collection(db, "master-tests"), orderBy("regDate", "desc"));
    onSnapshot(q, snap => {
      const tbody = document.getElementById('tbody-master');
      document.getElementById('cnt-master').textContent = snap.size;

      if (snap.empty) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:40px;color:var(--text-muted)">등록된 테스트가 없습니다.</td></tr>';
        return;
      }
      tbody.innerHTML = snap.docs.map(d => {
        const t = d.data();
        const gc = gradeCls(t.grade);
        const sc = subjCls(t.subject);
        return `<tr>
          <td style="font-size:12px;color:var(--text-muted)">${fmtRegDate(t.regDate)}</td>
          <td style="font-weight:600">${t.unitName||'-'}</td>
          <td><span class="subj-badge ${sc}">${t.subject||'-'}</span></td>
          <td><span class="grade-badge ${gc}">${t.grade||'-'}</span></td>
          <td><div class="action-icons">
            <button class="action-btn del" onclick="deleteMaster('${d.id}')" title="삭제">🗑️</button>
          </div></td>
        </tr>`;
      }).join('');
    });
  }

  // ── 탭 전환 ──
  window.switchTab = (type, btn) => {
    document.querySelectorAll('.test-tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.test-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + type).classList.add('active');
  };

  // ── 수정/삭제 ──
  window.editExam = id => { window.location.href = `/teacher/create?edit=${id}`; };

  window.deleteExam = async id => {
    if (!confirm('이 테스트를 삭제하시겠습니까?')) return;
    try { await deleteDoc(doc(db, "tests", id)); }
    catch(e) { alert('삭제 오류: ' + e.message); }
  };

  window.deleteMaster = async id => {
    if (!confirm('이 마스터 테스트를 삭제하시겠습니까?')) return;
    try { await deleteDoc(doc(db, "master-tests", id)); }
    catch(e) { alert('삭제 오류: ' + e.message); }
  };
</script>
</body>
</html>

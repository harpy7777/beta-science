<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><script src="/favicon.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>개별 학습 리포트 - 인후쌤의 과학 수업 관리 시스템</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --pink:#ec4899;--pink-lt:#fdf2f8;--pink-dk:#be185d;
  --bg:#f8f4f7;--wh:#fff;--tx:#1e293b;--mt:#94a3b8;--bd:#f0e4ec;
  --r:14px;--ok:#10b981;
  --blue:#3b82f6;--blue-lt:#eff6ff;
  --green:#10b981;--green-lt:#ecfdf5;
  --safe-top:env(safe-area-inset-top);
  --safe-bot:env(safe-area-inset-bottom);
}
html{-webkit-text-size-adjust:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;min-height:100dvh}

.loading-screen,.error-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px;color:var(--mt);text-align:center;padding:24px}
.spinner{width:40px;height:40px;border:3px solid var(--bd);border-top-color:var(--pink);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-screen h2{font-size:20px;color:var(--tx);font-weight:600}
.error-screen p{font-size:14px;line-height:2}
#portalApp{display:none}

/* ══ 데스크탑 헤더 ══ */
.desktop-header{
  background:linear-gradient(135deg,#f472b6 0%,#db2777 100%);
  color:#fff;padding:28px 40px;
  display:flex;flex-direction:column;
}
.dh-top{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:14px}
.dh-bottom{margin-top:14px}
.logo-row-d{display:flex;align-items:center;gap:10px}
.logo-icon-d{width:32px;height:32px;background:rgba(255,255,255,.25);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-name-d{font-size:14px;font-weight:500;color:#fff;letter-spacing:-.01em}
.header-divider{width:100%;height:1px;background:rgba(255,255,255,.3);display:block}
.header-label-d{font-size:14px;font-weight:500;color:rgba(255,255,255,.9);white-space:nowrap}
.student-name-d{font-size:38px;font-weight:700;line-height:1;flex-shrink:0}
.name-row-d{display:flex;align-items:center;gap:20px;flex-wrap:wrap;margin-top:4px}
.student-chips-d{display:flex;gap:10px;flex-wrap:nowrap;align-items:center}
.s-chip{background:rgba(255,255,255,.2);border-radius:20px;padding:4px 14px;font-size:13px;font-weight:500;white-space:nowrap}

/* ══ 데스크탑 탭 ══ */
.desktop-tabs{
  background:var(--wh);border-bottom:2px solid var(--bd);
  display:flex;position:sticky;top:0;z-index:100;
  box-shadow:0 2px 12px rgba(0,0,0,.06);
}
.d-tab{
  flex:1;padding:16px 8px;font-size:14px;font-weight:600;
  color:var(--mt);cursor:pointer;background:none;border:none;
  font-family:inherit;border-bottom:3px solid transparent;
  margin-bottom:-2px;transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:7px;
  white-space:nowrap;
}
.d-tab.active{color:var(--pink);border-bottom-color:var(--pink)}
.d-tab:hover{color:var(--tx)}
.desktop-body{max-width:1100px;margin:0 auto;padding:32px 40px 60px}

/* ══ 모바일 헤더 ══ */
.mobile-header{
  background:linear-gradient(160deg,#f472b6 0%,#db2777 100%);
  color:#fff;padding:calc(18px + var(--safe-top)) 20px 16px;
  position:relative;overflow:hidden;
}
.mobile-header::before{content:'';position:absolute;top:-50px;right:-50px;width:200px;height:200px;background:rgba(255,255,255,.07);border-radius:50%}
.mh-inner{position:relative;z-index:1}
.mh-top-row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
.logo-row-m{display:flex;align-items:center;gap:10px}
.logo-icon-m{width:30px;height:30px;background:rgba(255,255,255,.25);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-name-m{font-size:13px;font-weight:500;color:#fff;letter-spacing:-.01em}
.header-label-m{font-size:13px;font-weight:500;color:rgba(255,255,255,.9);white-space:nowrap}
.student-name-m{font-size:26px;font-weight:700;line-height:1;flex-shrink:0}
.name-row-m{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-top:14px;padding-bottom:4px}
.student-chips-m{display:flex;gap:8px;flex-wrap:nowrap;align-items:center;overflow-x:auto}
.student-chips-m::-webkit-scrollbar{display:none}

/* ══ 모바일 탭 ══ */
.mobile-tabs{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--wh);border-top:1px solid var(--bd);
  display:flex;padding-bottom:var(--safe-bot);
  z-index:200;box-shadow:0 -2px 16px rgba(0,0,0,.08);
}
.m-tab{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:2px;padding:8px 2px 7px;
  font-family:inherit;color:var(--mt);cursor:pointer;
  background:none;border:none;transition:color .15s;min-height:54px;
}
.m-tab.active{color:var(--pink)}
.m-tab-icon{font-size:20px;line-height:1}
.m-tab-lbl{font-size:9.5px;font-weight:600;white-space:nowrap}
.mobile-body{padding:16px 16px 8px;max-width:600px;margin:0 auto}

/* ══ 공통 컴포넌트 ══ */
.section{display:none}
.section.active{display:block;animation:fadeUp .25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.stat-box{border-radius:14px;padding:16px 10px;text-align:center;border:1px solid #fbcfe8;background:var(--pink-lt)}
.stat-box.blue{background:var(--blue-lt);border-color:#bfdbfe}
.stat-box.green{background:var(--green-lt);border-color:#6ee7b7}
.stat-num{font-size:24px;font-weight:700;color:var(--pink);line-height:1}
.stat-box.blue .stat-num{color:var(--blue)}
.stat-box.green .stat-num{color:var(--green)}
.stat-lbl{font-size:12px;color:var(--mt);margin-top:4px;font-weight:500}

.sec-label{font-size:12px;font-weight:600;color:var(--mt);letter-spacing:.06em;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.sec-label::after{content:'';flex:1;height:1px;background:var(--bd)}

.info-card{background:var(--wh);border:1px solid var(--bd);border-radius:var(--r);padding:18px 22px}
.info-card p{text-align:center;font-size:14px;color:var(--mt);line-height:1.9;font-weight:400}
.info-card strong{color:var(--tx);font-weight:600}

/* ══ 수업 기록 카드 ══ */
.cc-item{background:var(--wh);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.cc-head{padding:18px;cursor:default;display:flex;align-items:flex-start;gap:14px}
.cc-head[onclick]{cursor:pointer}
.cc-head[onclick]:hover{background:#fdf2f8}
.cc-date{min-width:54px;text-align:center;background:var(--pink-lt);border:1px solid #fbcfe8;border-radius:10px;padding:8px 4px;flex-shrink:0}
.cc-date-m{font-size:11px;color:var(--pink);font-weight:600}
.cc-date-d{font-size:20px;font-weight:700;color:var(--pink-dk);line-height:1.1}
.cc-main{flex:1;min-width:0}
.cc-title-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px}
.cc-subj{font-size:16px;font-weight:700;color:#3f4854}
.cc-arrow{color:var(--mt);font-size:14px;flex-shrink:0;transition:transform .25s;margin-top:1px}
.cc-toggle-wrap{display:inline-flex;align-items:center;gap:6px;flex-shrink:0;background:var(--pink-lt);border:1px solid #fbcfe8;border-radius:999px;padding:5px 11px}
.cc-head[onclick]:hover .cc-toggle-wrap{background:#fce7f3}
.cc-toggle{font-size:12.5px;font-weight:700;color:var(--pink-dk);white-space:nowrap}
.cc-toggle::after{content:'수업 내용 보기'}
.cc-item.open .cc-toggle::after{content:'접기'}
.cc-item.open .cc-arrow{transform:rotate(180deg)}
.cc-fields{display:grid;grid-template-columns:repeat(2,1fr);gap:12px 18px}
.cc-field{display:flex;align-items:center;gap:14px;min-width:0;padding:13px 16px;background:#fbf7fa;border:1px solid #f3e8f0;border-radius:10px}
.cc-f-lbl{flex-shrink:0;font-size:12px;font-weight:600;color:var(--mt);letter-spacing:.02em}
.cc-f-val{flex:1;min-width:0;text-align:right;font-size:14.5px;font-weight:700;color:#5b6573;word-break:keep-all;line-height:1.4}
.cc-v-green{color:#059669}.cc-v-red{color:#dc2626}.cc-v-blue{color:#2563eb}.cc-v-yellow{color:#b45309}.cc-v-pink{color:var(--pink-dk)}.cc-v-gray{color:var(--mt);font-weight:600}
.cc-body{max-height:0;overflow:hidden;transition:max-height .35s ease}
.cc-item.open .cc-body{max-height:700px}
.cc-body-inner{padding:4px 18px 18px;border-top:1px solid #fce7f3}
.cc-body-lbl{font-size:11px;font-weight:600;color:#a21caf;letter-spacing:.05em;margin:12px 0 5px}
.cc-body-txt{font-size:14px;color:var(--tx);line-height:1.9;white-space:pre-wrap;word-break:break-word}

/* ══ 점수 카드 (OX / 4지선다 / 마스터 공통) ══ */
.test-item{background:var(--wh);border:1px solid var(--bd);border-radius:var(--r);padding:18px;margin-bottom:10px}
.test-head{display:flex;align-items:center;gap:16px;justify-content:space-between}
.score-circle{width:68px;height:68px;border-radius:50%;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.sc-high{background:#d1fae5;color:#065f46}.sc-mid{background:#fef9c3;color:#854d0e}.sc-low{background:#fee2e2;color:#991b1b}.sc-none{background:#f5f5f7;color:#6e6e73}
.sc-pct{font-size:20px;font-weight:800;line-height:1.05}
.test-info{flex:1;min-width:0}
.test-title{font-size:15px;font-weight:700;margin-bottom:6px;word-break:keep-all;line-height:1.4}
.test-meta{font-size:12px;color:var(--mt);display:flex;gap:10px;flex-wrap:wrap}
.sc-detail{font-size:12.5px;color:var(--mt);margin-top:8px;font-weight:500}
.sc-detail b{color:var(--tx);font-weight:700}
.sc-rows{display:flex;flex-direction:column;gap:8px}
.sc-row{display:flex;align-items:flex-start;gap:10px;font-size:13.5px;line-height:1.45}
.sc-row-lbl{flex-shrink:0;width:62px;font-size:12px;font-weight:600;color:#a8b1bd;padding-top:1px}
.sc-row-val{flex:1;min-width:0;font-weight:600;color:#5b6573;word-break:keep-all}
.sc-row-val b{font-weight:800}
.sc-row-title{margin-bottom:2px}
.sc-row-title .sc-row-lbl{padding-top:5px}
.sc-row-title .sc-row-val{font-size:11px;font-weight:700;line-height:1.4;letter-spacing:-.01em;color:#3f4854}
.sc-date{color:#aeb6c2;font-weight:600}
.sc-correct{color:#0d9488;font-weight:800}
.sc-total{color:#1d4ed8;font-weight:800}

.empty-box{background:var(--wh);border:1px solid var(--bd);border-radius:var(--r);text-align:center;padding:56px 24px;color:var(--mt);font-size:14px;line-height:2}
.empty-icon{font-size:48px;margin-bottom:14px}

.desktop-only{display:block}
.mobile-only{display:none}

/* ══ 반응형 ══ */
@media(max-width:768px){
  .desktop-only{display:none!important}
  .mobile-only{display:block!important}
  body{padding-bottom:calc(64px + var(--safe-bot))}
  .info-card p{white-space:normal}
  .stat-num{font-size:20px}
  .stat-lbl{font-size:11px}
  .section{padding-top:2px}
  .cc-fields{grid-template-columns:1fr 1fr;gap:10px}
  .cc-head{padding:14px;gap:11px}
  .cc-field{padding:9px 10px}
  .cc-title-row{flex-wrap:wrap;gap:8px}
  .cc-subj{font-size:15px}
  .cc-toggle-wrap{padding:4px 10px}
  .cc-toggle{font-size:12px}
  .test-item{padding:15px 16px}
  .test-head{gap:12px}
  .score-circle{width:58px;height:58px}
  .sc-pct{font-size:17px}
  .sc-rows{gap:7px}
  .sc-row{gap:8px;font-size:13px}
  .sc-row-lbl{width:54px;font-size:11.5px}
  .sc-row-title .sc-row-val{font-size:11px}
}
@media(max-width:380px){
  .sc-row{flex-direction:column;gap:1px}
  .sc-row-lbl{width:auto;padding-top:0}
  .sc-row-title .sc-row-val{font-size:11px}
  .score-circle{width:52px;height:52px}
  .sc-pct{font-size:15px}
}
@media(min-width:769px){
  .mobile-only{display:none!important}
  .desktop-only{display:block!important}
}
@media(min-width:769px) and (max-width:1024px){
  .desktop-body{padding:24px 28px 48px}
  .desktop-header{padding:24px 28px}
}
</style>
</head>
<body>

<div id="loadingScreen" class="loading-screen">
  <div class="spinner"></div>
  <p style="font-size:14px">정보를 불러오는 중...</p>
</div>
<div id="errorScreen" class="error-screen" style="display:none">
  <div style="font-size:52px">🔍</div>
  <h2>페이지를 찾을 수 없습니다</h2>
  <p>학원에서 보내드린 링크를<br>다시 확인해주세요.<br><br>문제가 계속되면 학원으로<br>문의해 주세요.</p>
</div>

<div id="portalApp">

  <!-- 데스크탑 -->
  <div class="desktop-only">
    <div class="desktop-header">
      <div class="dh-top">
        <div class="logo-row-d">
          <div class="logo-icon-d">
            <svg width="16" height="16" viewBox="0 0 18 18" fill="none">
              <circle cx="9" cy="7" r="3" fill="rgba(255,255,255,0.95)"/>
              <path d="M3.5 16c0-3 2.5-5.5 5.5-5.5s5.5 2.5 5.5 5.5" stroke="rgba(255,255,255,0.95)" stroke-width="1.4" stroke-linecap="round" fill="none"/>
            </svg>
          </div>
          <span class="logo-name-d">인후쌤의 과학 수업 관리 시스템</span>

      <div class="dh-bottom">
        <div class="name-row-d">
          <div class="student-name-d" id="hNameD">—</div>
          <div class="student-chips-d">
            <span class="s-chip" id="hGradeD" style="display:none"></span>

          </div>

    </div>

      <button class="d-tab" onclick="switchTab(1)">⭕ OX 퀴즈</button>
      <button class="d-tab" onclick="switchTab(2)">📝 4지선다</button>
      <button class="d-tab" onclick="switchTab(3)">🎯 마스터테스트</button>
    </nav>
    <div class="desktop-body" id="desktopContent"></div>
  </div>

  <!-- 모바일 -->
  <div class="mobile-only">
    <div class="mobile-header">
      <div class="mh-inner">
        <div class="mh-top-row">
          <div class="logo-row-m">
            <div class="logo-icon-m">
              <svg width="15" height="15" viewBox="0 0 18 18" fill="none">
                <circle cx="9" cy="7" r="3" fill="rgba(255,255,255,0.95)"/>
                <path d="M3.5 16c0-3 2.5-5.5 5.5-5.5s5.5 2.5 5.5 5.5" stroke="rgba(255,255,255,0.95)" stroke-width="1.4" stroke-linecap="round" fill="none"/>
              </svg>
            </div>
            <span class="logo-name-m">인후쌤의 과학 수업 관리 시스템</span>
          </div>
          <div class="header-label-m">학생 개별 학습 리포트</div>
        </div>
        <div class="header-divider"></div>
        <div class="name-row-m">
          <div class="student-name-m" id="hNameM">—</div>
          <div class="student-chips-m">
            <span class="s-chip" id="hGradeM" style="display:none"></span>
            <span class="s-chip" id="hSubjectM" style="display:none"></span>
          </div>
        </div>
      </div>
    </div>
    <div class="mobile-body" id="mobileContent"></div>
    <nav class="mobile-tabs">
      <button class="m-tab active" onclick="switchTab(0)"><span class="m-tab-icon">📖</span><span class="m-tab-lbl">수업기록</span></button>

    </nav>
  </div>

</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getFirestore,collection,query,where,getDocs}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const params=new URLSearchParams(window.location.search);

if(!studentId){showError();}else{loadPortal(studentId);}

function buildSections(){
  return`
  <div class="section active" id="sec0">
    <br>
    <div class="stat-row">
      <div class="stat-box"><div class="stat-num" id="cs-total">—</div><div class="stat-lbl">전체 수업</div></div>
      <div class="stat-box"><div class="stat-num" id="cs-month">—</div><div class="stat-lbl">이번달</div></div>

    </div>
    <div class="sec-label">수업 기록</div>
    <div id="classCardList"><div class="empty-box"><div class="spinner" style="margin:0 auto 14px"></div>불러오는 중...</div></div>
  </div>
  <div class="section" id="sec1">
    <br>
    <div class="stat-row">
      <div class="stat-box"><div class="stat-num" id="ox-total">—</div><div class="stat-lbl">응시 횟수</div></div>
      <div class="stat-box"><div class="stat-num" id="ox-avg">—</div><div class="stat-lbl">평균 점수</div></div>
      <div class="stat-box"><div class="stat-num" id="ox-best">—</div><div class="stat-lbl">최고 점수</div></div>
    </div>
    <div class="sec-label">OX 퀴즈 결과</div>
    <div id="oxResultList"><div class="empty-box"><div class="spinner" style="margin:0 auto 14px"></div>불러오는 중...</div></div>
  </div>
  <div class="section" id="sec2">
    <br>
    <div class="stat-row">
      <div class="stat-box blue"><div class="stat-num" id="ts-total">—</div><div class="stat-lbl">응시 횟수</div></div>
      <div class="stat-box blue"><div class="stat-num" id="ts-avg">—</div><div class="stat-lbl">평균 점수</div></div>
      <div class="stat-box blue"><div class="stat-num" id="ts-best">—</div><div class="stat-lbl">최고 점수</div></div>
    </div>
    <div class="sec-label">4지선다 결과</div>
    <div id="testResultList"><div class="empty-box"><div class="spinner" style="margin:0 auto 14px"></div>불러오는 중...</div></div>
  </div>
  <div class="section" id="sec3">
    <br>
    <div class="stat-row">
      <div class="stat-box green"><div class="stat-num" id="ms-total">—</div><div class="stat-lbl">응시 횟수</div></div>
      <div class="stat-box green"><div class="stat-num" id="ms-avg">—</div><div class="stat-lbl">평균 점수</div></div>
      <div class="stat-box green"><div class="stat-num" id="ms-best">—</div><div class="stat-lbl">최고 점수</div></div>
    </div>
    <div class="sec-label">단원별 결과</div>
    <div id="masterTestList"><div class="empty-box"><div class="spinner" style="margin:0 auto 14px"></div>불러오는 중...</div></div>
  </div>`;
}

async function loadPortal(sid){
  try{
    const sq=query(collection(db,'students'),where('id','==',sid));
    const ss=await getDocs(sq);
    if(ss.empty){showError();return;}
    const sdoc=ss.docs[0];const student={fireId:sdoc.id,...sdoc.data()};
    ['hNameD','hNameM'].forEach(id=>document.getElementById(id).textContent=student.name||'학생');
    document.title=`${student.name||'학생'} 개별 학습 리포트 - 인후쌤의 과학 수업 관리 시스템`;
    if(student.grade){['hGradeD','hGradeM'].forEach(id=>{const el=document.getElementById(id);if(el){el.textContent=student.grade;el.style.display='inline';}})}
    if(student.subject&&student.subject!=='-'){['hSubjectD','hSubjectM'].forEach(id=>{const el=document.getElementById(id);if(el){el.textContent=student.subject;el.style.display='inline';}})}
    const html=buildSections();
    document.getElementById('desktopContent').innerHTML=html;
    document.getElementById('mobileContent').innerHTML=html;
    document.getElementById('loadingScreen').style.display='none';
    document.getElementById('portalApp').style.display='block';
    loadClassCards(student.fireId,sid);
    loadGrades(sid,student.fireId);
  }catch(err){showError();}
}

/* ════════════════════════════════════════════════
   수업 기록 (classCards)
════════════════════════════════════════════════ */
async function loadClassCards(fireId,sid){
  try{
    let cards=[];const ex=new Set();
    async function tryQ(field,val){
      try{const s=await getDocs(query(collection(db,'classCards'),where(field,'==',val)));s.forEach(d=>{if(!ex.has(d.id)){ex.add(d.id);cards.push({id:d.id,...d.data()});}});}catch(e){}
    }
    await tryQ('studentId',fireId);
    if(sid!==fireId)await tryQ('studentId',sid);
    cards.sort((a,b)=>(b.classDate||'').localeCompare(a.classDate||''));
    const now=new Date();const tm=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
    const mc=cards.filter(c=>(c.classDate||'').startsWith(tm)).length;
    const sc=cards.filter(c=>typeof c.score==='number'&&c.score>=0&&!c.scoreNone);
    const avg=sc.length?Math.round(sc.reduce((a,c)=>a+c.score,0)/sc.length):null;
    document.querySelectorAll('#cs-total').forEach(el=>el.textContent=cards.length+'건');
    document.querySelectorAll('#cs-month').forEach(el=>el.textContent=mc+'건');
    document.querySelectorAll('#cs-avg').forEach(el=>el.textContent=avg!==null?avg+'점':'—');
    const html=!cards.length?emptyBox('📭','아직 수업 기록이 없습니다.'):cards.map(c=>renderCC(c)).join('');
    document.querySelectorAll('#classCardList').forEach(el=>el.innerHTML=html);
  }catch(err){document.querySelectorAll('#classCardList').forEach(el=>el.innerHTML='<div class="empty-box">수업 기록을 불러오지 못했습니다.</div>');}
}

function hwColor(v){if(v==='높음')return'cc-v-green';if(v==='낮음')return'cc-v-red';return'cc-v-yellow';}
function attColor(v){if(v==='적극적')return'cc-v-blue';if(v==='산만')return'cc-v-pink';return'cc-v-yellow';}

function renderCC(c){
  const[mo,dy]=parseDate(c.classDate);
  const hasBody=!!(c.content||c.unit);
  const subj=e(c.subject||'수업');
  const teacher=c.teacher?e(c.teacher):'—';
  const teacherCls=c.teacher?'':'cc-v-gray';
  const hwTxt=(c.homework&&c.homework!=='-')?e(c.homework):'—';
  const hwCls=(c.homework&&c.homework!=='-')?hwColor(c.homework):'cc-v-gray';
  const attTxt=c.attitude?e(c.attitude):'—';
  const attCls=c.attitude?attColor(c.attitude):'cc-v-gray';
  const fields=`
    <div class="cc-field"><span class="cc-f-lbl">수강 과목</span><span class="cc-f-val">${subj}</span></div>
    <div class="cc-field"><span class="cc-f-lbl">담당 선생님</span><span class="cc-f-val ${teacherCls}">${teacher}</span></div>
    <div class="cc-field"><span class="cc-f-lbl">과제 수행</span><span class="cc-f-val ${hwCls}">${hwTxt}</span></div>
    <div class="cc-field"><span class="cc-f-lbl">수업 태도</span><span class="cc-f-val ${attCls}">${attTxt}</span></div>`;
  return`<div class="cc-item"${hasBody?` id="cci-${c.id}"`:''}>
    <div class="cc-head"${hasBody?` onclick="toggleCC('${c.id}')"`:''}>
      <div class="cc-date"><div class="cc-date-m">${mo}</div><div class="cc-date-d">${dy}</div></div>
      <div class="cc-main">
        <div class="cc-title-row"><span class="cc-subj">${subj}</span>${hasBody?'<span class="cc-toggle-wrap"><span class="cc-toggle"></span><span class="cc-arrow">▾</span></span>':''}</div>
        <div class="cc-fields">${fields}</div>
      </div>
    </div>
    ${hasBody?`<div class="cc-body"><div class="cc-body-inner">${c.unit?`<div class="cc-body-lbl">학습 단원</div><div class="cc-body-txt">${e(c.unit)}</div>`:''}${c.content?`<div class="cc-body-lbl">수업 내용</div><div class="cc-body-txt">${e(c.content)}</div>`:''}</div></div>`:''}
  </div>`;
}

/* ════════════════════════════════════════════════
   시험 기록 (grades) — 관리자 페이지와 동일 컬렉션
════════════════════════════════════════════════ */
function toNum(v){return(typeof v==='number')?v:(v!=null&&v!==''&&!isNaN(Number(v))?Number(v):null);}
function normalizeGrade(id,r){
  return{
    id,
    testName:r.testName||r.examTitle||r.unitName||'',
    subject:r.subject||r.studentSubject||'',
    grade:r.grade||'',
    /* 실제 Firestore 평면 필드 */
    oxScore:toNum(r.oxScore!=null?r.oxScore:(r.ox&&r.ox.score)),
    oxCount:toNum(r.oxCount!=null?r.oxCount:(r.ox&&r.ox.total)),
    multiScore:toNum(r.multiScore!=null?r.multiScore:(r.multiple&&r.multiple.score)),
    multiCount:toNum(r.multiCount!=null?r.multiCount:(r.multiple&&r.multiple.total)),
    masterScore:toNum(r.masterScore!=null?r.masterScore:null),
    score:toNum(r.score!=null?r.score:(r.percentage!=null?r.percentage:null)),
    totalQuestions:toNum(r.totalQuestions!=null?r.totalQuestions:(r.totalQ!=null?r.totalQ:r.total)),
    totalCorrect:toNum(r.totalCorrect!=null?r.totalCorrect:(r.correct!=null?r.correct:null)),
    testType:String(r.testType||r.category||'').toLowerCase(),
    timestamp:r.timestamp||r.submittedTimestamp||r.submittedAt||r.date||null
  };
}

/* ── 한 기록에서 섹션별 결과 추출 {score,total} 또는 null ──
   점수는 백분율(0~100)로 저장되어 있고, 화면에서는 "OO점" 으로 표기.
   한 시험에 OX·4지선다 점수 칸이 둘 다 있어도, 실제로 응시하지 않은
   0점짜리 빈 섹션(상대 섹션만 채점된 경우)은 유령 항목으로 보이지 않게 거른다. */
function isMasterRec(r){return r.testType==='master'||r.masterScore!=null;}
function oxOf(r){
  if(isMasterRec(r))return null;
  if(!(r.oxCount>0&&r.oxScore!=null))return null;
  const scoredMC=(r.multiCount>0&&r.multiScore!=null&&r.multiScore>0);
  if(!(r.oxScore>0||!scoredMC))return null;
  return{score:r.oxScore,total:r.oxCount};
}
function mcOf(r){
  if(isMasterRec(r))return null;
  if(!(r.multiCount>0&&r.multiScore!=null))return null;
  const scoredOX=(r.oxCount>0&&r.oxScore!=null&&r.oxScore>0);
  if(!(r.multiScore>0||!scoredOX))return null;
  return{score:r.multiScore,total:r.multiCount};
}
function masterOf(r){
  if(!isMasterRec(r))return null;
  let score=null,total=null,correct=null;
  if(r.totalQuestions>0&&r.totalCorrect!=null){
    total=r.totalQuestions;correct=r.totalCorrect;
    score=Math.round(r.totalCorrect/r.totalQuestions*100);
  }else if(r.masterScore!=null){
    score=r.masterScore;total=r.totalQuestions||null;
  }else if(r.score!=null){
    score=r.score;total=r.totalQuestions||null;
  }
  if(score==null)return null;
  return{score,total,correct};
}

function gradeTime(r){
  const t=r.timestamp;
  if(!t)return 0;
  if(typeof t==='object'){if(t.seconds!=null)return t.seconds*1000;if(typeof t.toMillis==='function'){try{return t.toMillis();}catch(e){}}return 0;}
  const d=new Date(t);return isNaN(d.getTime())?0:d.getTime();
}
function gradeDateStr(r){
  const t=r.timestamp;
  if(typeof t==='string'){const m=t.match(/^(\d{4})-(\d{2})-(\d{2})/);if(m)return`${m[1].slice(2)}/${m[2]}/${m[3]}`;}
  const ms=gradeTime(r);if(!ms)return'';
  const d=new Date(ms);
  return`${String(d.getFullYear()).slice(2)}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}

async function loadGrades(sid,fireId){
  try{
    let docs=[];const seen=new Set();
    async function q(field,val){
      try{const s=await getDocs(query(collection(db,'grades'),where(field,'==',val)));s.forEach(d=>{if(!seen.has(d.id)){seen.add(d.id);docs.push(normalizeGrade(d.id,d.data()));}});}catch(e){}
    }
    await q('studentId',sid);
    if(fireId&&fireId!==sid)await q('studentId',fireId);
    docs.sort((a,b)=>gradeTime(b)-gradeTime(a));
    renderOx(docs);
    renderMultiple(docs);
    renderMaster(docs);
  }catch(err){
    ['#oxResultList','#testResultList','#masterTestList'].forEach(sel=>document.querySelectorAll(sel).forEach(el=>el.innerHTML='<div class="empty-box">기록을 불러오지 못했습니다.</div>'));
  }
}

/* 평균/최고 — 백분율(%)이 아니라 점수의 평균/최고를 "OOO점" 으로 표시 */
function setStats(prefix,count,scores){
  const avg=scores.length?Math.round(scores.reduce((a,v)=>a+v,0)/scores.length):null;
  const best=scores.length?Math.max(...scores):null;
  document.querySelectorAll('#'+prefix+'-total').forEach(el=>el.textContent=count+'회');
  document.querySelectorAll('#'+prefix+'-avg').forEach(el=>el.textContent=avg!==null?avg+'점':'—');
  document.querySelectorAll('#'+prefix+'-best').forEach(el=>el.textContent=best!==null?best+'점':'—');
}

function renderOx(docs){
  const items=docs.map(r=>({r,sec:oxOf(r)})).filter(x=>x.sec);
  setStats('ox',items.length,items.map(x=>x.sec.score));
  const html=!items.length?emptyBox('⭕','아직 응시한 OX 퀴즈가 없습니다.'):items.map(x=>renderScoreCard(x.r,x.sec)).join('');
  document.querySelectorAll('#oxResultList').forEach(el=>el.innerHTML=html);
}
function renderMultiple(docs){
  const items=docs.map(r=>({r,sec:mcOf(r)})).filter(x=>x.sec);
  setStats('ts',items.length,items.map(x=>x.sec.score));
  const html=!items.length?emptyBox('📝','아직 응시한 4지선다 테스트가 없습니다.'):items.map(x=>renderScoreCard(x.r,x.sec)).join('');
  document.querySelectorAll('#testResultList').forEach(el=>el.innerHTML=html);
}
function renderMaster(docs){
  const items=docs.map(r=>({r,sec:masterOf(r)})).filter(x=>x.sec);
  setStats('ms',items.length,items.map(x=>x.sec.score));
  const html=!items.length?emptyBox('🎯','아직 응시한 마스터테스트가 없습니다.'):items.map(x=>renderScoreCard(x.r,x.sec)).join('');
  document.querySelectorAll('#masterTestList').forEach(el=>el.innerHTML=html);
}

/* OX / 4지선다 / 마스터 공통 카드 — 왼쪽 점수(OOO점) + 라벨형 정보 */
function renderScoreCard(r,sec){
  const val=sec.score;
  const cls=val>=80?'sc-high':val>=60?'sc-mid':'sc-low';
  const dt=gradeDateStr(r)||'—';
  const total=sec.total!=null?sec.total:null;
  const correct=(sec.correct!=null)?sec.correct:((total!=null)?Math.round(val/100*total):null);
  const title=e(r.testName||r.subject||'테스트');
  const rows=[];
  rows.push(`<div class="sc-row sc-row-title"><span class="sc-row-lbl">단원명</span><span class="sc-row-val">${title}</span></div>`);
  if(r.subject)rows.push(`<div class="sc-row"><span class="sc-row-lbl">과목</span><span class="sc-row-val">${e(r.subject)}</span></div>`);
  rows.push(`<div class="sc-row"><span class="sc-row-lbl">응시 날짜</span><span class="sc-row-val sc-date">${dt}</span></div>`);
  if(total!=null&&correct!=null)rows.push(`<div class="sc-row"><span class="sc-row-lbl">총 문항 수</span><span class="sc-row-val">정답 <b class="sc-correct">${correct}</b>문항 / 전체 <b class="sc-total">${total}</b>문항</span></div>`);
  return`<div class="test-item">
    <div class="test-head">
      <div class="test-info"><div class="sc-rows">${rows.join('')}</div></div>
      <div class="score-circle ${cls}"><div class="sc-pct">${val}점</div></div>
    </div>
  </div>`;
}

function emptyBox(icon,msg){return`<div class="empty-box"><div class="empty-icon">${icon}</div>${msg}</div>`;}
function parseDate(ds){if(!ds)return['—','—'];const p=ds.split('-');return p.length>=3?[p[1]+'월',parseInt(p[2])+'일']:['—','—'];}
function showError(){document.getElementById('loadingScreen').style.display='none';document.getElementById('errorScreen').style.display='flex';}
function e(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

window.switchTab=function(idx){
  document.querySelectorAll('.section').forEach((s,i)=>s.classList.toggle('active',i%4===idx));
  document.querySelectorAll('.d-tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  document.querySelectorAll('.m-tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  window.scrollTo({top:0,behavior:'smooth'});
};
window.toggleCC=function(id){
  document.querySelectorAll(`#cci-${id}`).forEach(el=>el.classList.toggle('open'));
};

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>개별 학습 리포트 - 베타과학학원</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --pink:#ec4899;--pink-lt:#fdf2f8;--pink-dk:#be185d;
  --bg:#f8f4f7;--wh:#fff;--tx:#1e293b;--mt:#94a3b8;--bd:#f0e4ec;
  --r:14px;--ok:#10b981;
  --blue:#3b82f6;--blue-lt:#eff6ff;
  --green:#10b981;--green-lt:#ecfdf5;
  --safe-top:env(safe-area-inset-top);
  --safe-bot:env(safe-area-inset-bottom);
}
html{-webkit-text-size-adjust:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;min-height:100dvh}

/* 로딩/에러 */
.loading-screen,.error-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px;color:var(--mt);text-align:center;padding:24px}
.spinner{width:40px;height:40px;border:3px solid var(--bd);border-top-color:var(--pink);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-screen h2{font-size:20px;color:var(--tx);font-weight:600}
.error-screen p{font-size:14px;line-height:2}
#portalApp{display:none}

/* ══════════════════════
   데스크탑 레이아웃
══════════════════════ */
.desktop-header{
  background:linear-gradient(135deg,#f472b6 0%,#db2777 100%);
  color:#fff;padding:28px 40px;
  display:flex;align-items:center;justify-content:space-between;gap:24px;
}
.school-badge-d{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;opacity:.9;background:rgba(255,255,255,.18);border-radius:20px;padding:4px 12px;margin-bottom:10px}
.student-name-d{font-size:38px;font-weight:700;line-height:1.1;margin-bottom:10px}
.student-chips-d{display:flex;gap:8px;flex-wrap:nowrap;align-items:center}
.s-chip{background:rgba(255,255,255,.2);border-radius:20px;padding:4px 14px;font-size:13px;font-weight:500;white-space:nowrap}

/* 데스크탑 탭 — 5개 균등 */
.desktop-tabs{
  background:var(--wh);border-bottom:2px solid var(--bd);
  display:flex;
  position:sticky;top:0;z-index:100;
  box-shadow:0 2px 12px rgba(0,0,0,.06);
  
}
.desktop-tabs::-webkit-scrollbar{display:none}
.d-tab{
  flex:1;padding:16px 8px;font-size:14px;font-weight:600;
  color:var(--mt);cursor:pointer;background:none;border:none;
  font-family:inherit;border-bottom:3px solid transparent;
  margin-bottom:-2px;transition:all .2s;display:flex;align-items:center;gap:7px;
  white-space:nowrap;justify-content:center;
}
.d-tab.active{color:var(--pink);border-bottom-color:var(--pink)}
.d-tab:hover{color:var(--tx)}

.desktop-body{max-width:1100px;margin:0 auto;padding:32px 40px 60px}

/* ══════════════════════
   모바일 레이아웃
══════════════════════ */
.mobile-header{
  background:linear-gradient(160deg,#f472b6 0%,#db2777 100%);
  color:#fff;padding:calc(18px + var(--safe-top)) 20px 0;
  position:relative;overflow:hidden;
}
.mobile-header::before{content:'';position:absolute;top:-50px;right:-50px;width:200px;height:200px;background:rgba(255,255,255,.07);border-radius:50%}
.mh-inner{position:relative;z-index:1}
.school-badge-m{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;opacity:.9;background:rgba(255,255,255,.18);border-radius:20px;padding:5px 12px;margin-bottom:12px}
.student-name-m{font-size:30px;font-weight:700;line-height:1.1;margin-bottom:10px}
.student-chips-m{display:flex;gap:8px;flex-wrap:nowrap;align-items:center;padding-bottom:18px;overflow-x:auto}
.student-chips-m::-webkit-scrollbar{display:none}

/* 모바일 탭 — 5개 */
.mobile-tabs{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--wh);border-top:1px solid var(--bd);
  display:flex;padding-bottom:var(--safe-bot);
  z-index:200;box-shadow:0 -2px 16px rgba(0,0,0,.08);
}
.m-tab{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:2px;padding:8px 2px 7px;
  font-family:inherit;color:var(--mt);cursor:pointer;
  background:none;border:none;transition:color .15s;min-height:54px;
}
.m-tab.active{color:var(--pink)}
.m-tab-icon{font-size:20px;line-height:1}
.m-tab-lbl{font-size:9.5px;font-weight:600;white-space:nowrap}

.mobile-body{padding:16px 16px 8px;max-width:600px;margin:0 auto}

/* ══════════════════════
   공통 컴포넌트
══════════════════════ */
.section{display:none}
.section.active{display:block;animation:fadeUp .25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* 통계 */
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.stat-box{border-radius:14px;padding:16px 10px;text-align:center;border:1px solid #fbcfe8;background:var(--pink-lt)}
.stat-box.blue{background:var(--blue-lt);border-color:#bfdbfe}
.stat-box.green{background:var(--green-lt);border-color:#6ee7b7}
.stat-num{font-size:24px;font-weight:700;color:var(--pink);line-height:1}
.stat-box.blue .stat-num{color:var(--blue)}
.stat-box.green .stat-num{color:var(--green)}
.stat-lbl{font-size:12px;color:var(--mt);margin-top:4px;font-weight:500}

/* 구분선 */
.sec-label{font-size:12px;font-weight:600;color:var(--mt);letter-spacing:.06em;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.sec-label::after{content:'';flex:1;height:1px;background:var(--bd)}

/* 학습 도구 그리드 — 4열 균등 */
.tool-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:14px;
  margin-bottom:20px;
}
.tool-btn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;padding:0;height:130px;
  background:var(--wh);border:1.5px solid var(--bd);border-radius:16px;
  cursor:pointer;text-decoration:none;color:var(--tx);text-align:center;
  transition:all .15s;
}
.tool-btn:hover{background:var(--pink-lt);border-color:var(--pink);transform:translateY(-2px);box-shadow:0 4px 14px rgba(236,72,153,.12)}
.tool-btn:active{transform:scale(.97)}
.tool-icon{font-size:32px;line-height:1}
.tool-label{font-size:13px;font-weight:600}
.tool-desc{font-size:11px;color:var(--mt)}

/* 안내 카드 */
.info-card{
  background:var(--wh);border:1px solid var(--bd);border-radius:var(--r);
  padding:18px 22px;
}
.info-card p{text-align:center;
  font-size:14px;color:var(--mt);line-height:1.8;
  font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.info-card strong{color:var(--tx);font-weight:600}

/* 수업 카드 */
.cc-item{background:var(--wh);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.cc-head{padding:16px;cursor:pointer;display:flex;align-items:flex-start;gap:12px}
.cc-head:hover{background:#fdf2f8}
.cc-date{min-width:52px;text-align:center;background:var(--pink-lt);border:1px solid #fbcfe8;border-radius:10px;padding:8px 4px;flex-shrink:0}
.cc-date-m{font-size:11px;color:var(--pink);font-weight:600}
.cc-date-d{font-size:20px;font-weight:700;color:var(--pink-dk);line-height:1.1}
.cc-info{flex:1;min-width:0}
.cc-subj{font-size:15px;font-weight:600;margin-bottom:6px}
.chips{display:flex;flex-wrap:wrap;gap:4px}
.chip{font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px;white-space:nowrap}
.chip-blue{background:#dbeafe;color:#1e40af}.chip-green{background:#d1fae5;color:#065f46}
.chip-red{background:#fee2e2;color:#991b1b}.chip-yellow{background:#fef9c3;color:#854d0e}
.chip-gray{background:#f5f5f7;color:#6e6e73}.chip-pink{background:var(--pink-lt);color:var(--pink-dk)}
.cc-arrow{color:var(--mt);font-size:14px;flex-shrink:0;transition:transform .25s;margin-top:2px}
.cc-item.open .cc-arrow{transform:rotate(180deg)}
.cc-body{max-height:0;overflow:hidden;transition:max-height .35s ease}
.cc-item.open .cc-body{max-height:600px}
.cc-body-inner{padding:4px 16px 16px;border-top:1px solid #fce7f3}
.cc-body-lbl{font-size:11px;font-weight:600;color:#a21caf;letter-spacing:.05em;margin:12px 0 5px}
.cc-body-txt{font-size:14px;color:var(--tx);line-height:1.9;white-space:pre-wrap;word-break:break-word}

/* 테스트 */
.test-item{background:var(--wh);border:1px solid var(--bd);border-radius:var(--r);padding:18px;margin-bottom:10px}
.test-head{display:flex;align-items:center;gap:14px;margin-bottom:12px}
.score-circle{width:60px;height:60px;border-radius:50%;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.sc-high{background:#d1fae5;color:#065f46}.sc-mid{background:#fef9c3;color:#854d0e}.sc-low{background:#fee2e2;color:#991b1b}.sc-none{background:#f5f5f7;color:#6e6e73}
.sc-pct{font-size:16px;font-weight:700;line-height:1.1}
.sc-unit{font-size:9px;opacity:.7;margin-top:1px}
.test-info{flex:1;min-width:0}
.test-title{font-size:15px;font-weight:600;margin-bottom:5px;word-break:keep-all;line-height:1.4}
.test-meta{font-size:12px;color:var(--mt);display:flex;gap:10px;flex-wrap:wrap}
.test-bar-bg{background:#eff6ff;border-radius:6px;height:8px;overflow:hidden}
.test-bar-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,#60a5fa,#2563eb);transition:width .9s ease}
.test-bar-info{font-size:11px;color:var(--mt);margin-top:5px;text-align:right}

/* OX 바 */
.ox-bar-bg{background:#fdf2f8;border-radius:6px;height:8px;overflow:hidden}
.ox-bar-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,#f472b6,#db2777);transition:width .9s ease}

/* 마스터테스트 */
.master-wrap{background:var(--wh);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden}
.master-item{display:flex;align-items:center;gap:14px;padding:14px 18px;border-bottom:1px solid #fdf2f8}
.master-item:last-child{border-bottom:none}
.master-rank{width:28px;height:28px;border-radius:50%;background:var(--pink-lt);border:1px solid #fbcfe8;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--pink);flex-shrink:0}
.master-name{flex:1;font-size:14px;font-weight:600;word-break:keep-all;line-height:1.4}
.master-bar-col{flex:3;min-width:100px}
.master-bar-bg{background:#fdf2f8;border-radius:4px;height:7px;overflow:hidden}
.master-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#f472b6,#db2777);transition:width .8s ease}
.master-score{font-size:15px;font-weight:700;color:var(--pink);min-width:50px;text-align:right;flex-shrink:0}

/* 빈 상태 */
.empty-box{background:var(--wh);border:1px solid var(--bd);border-radius:var(--r);text-align:center;padding:56px 24px;color:var(--mt);font-size:14px;line-height:2}
.empty-icon{font-size:48px;margin-bottom:14px}

/* 데스크탑/모바일 전환 */
.desktop-only{display:block}
.mobile-only{display:none}

/* ══════════════════════
   반응형
══════════════════════ */
@media(max-width:768px){
  .desktop-only{display:none!important}
  .mobile-only{display:block!important}
  body{padding-bottom:calc(64px + var(--safe-bot))}

  /* 도구 그리드: 2열 */
  .tool-grid{grid-template-columns:1fr 1fr;gap:12px}
  .tool-btn{height:110px;gap:8px}
  .tool-icon{font-size:28px}
  .tool-label{font-size:12px}
  .tool-desc{font-size:10px}

  /* 안내카드 한줄 — 모바일에서 줄바꿈 허용 */
  .info-card p{text-align:center;white-space:normal}

  .stat-num{font-size:20px}
  .stat-lbl{font-size:11px}
  .section{padding-top:2px}
}
@media(min-width:769px){
  .mobile-only{display:none!important}
  .desktop-only{display:block!important}
}
@media(min-width:769px) and (max-width:1024px){
  .tool-grid{grid-template-columns:repeat(4,1fr);gap:12px}
  .desktop-body{padding:24px 28px 48px}
  .desktop-header{padding:24px 28px}
  .desktop-tabs{padding:0 28px}
}
</style>
</head>

async function loadPortal(sid){
  try{
    const sq=query(collection(db,'students'),where('id','==',sid));
    const ss=await getDocs(sq);
    if(ss.empty){showError();return;}
    const sdoc=ss.docs[0];const student={fireId:sdoc.id,...sdoc.data()};

    ['hNameD','hNameM'].forEach(id=>document.getElementById(id).textContent=student.name||'학생');
    document.title=`${student.name||'학생'} 개별 학습 리포트 - 베타과학학원`;
    if(student.grade){['hGradeD','hGradeM'].forEach(id=>{const el=document.getElementById(id);if(el){el.textContent=student.grade;el.style.display='inline';}});}
    if(student.subject&&student.subject!=='-'){['hSubjectD','hSubjectM'].forEach(id=>{const el=document.getElementById(id);if(el){el.textContent=student.subject;el.style.display='inline';}});}

    const html=buildSections();
    document.getElementById('desktopContent').innerHTML=html;
    document.getElementById('mobileContent').innerHTML=html;

    document.getElementById('loadingScreen').style.display='none';
    document.getElementById('portalApp').style.display='block';

    loadClassCards(student.fireId,sid);
    loadOxResults(sid);
    loadTestResults(sid);
    loadMasterTests(sid);
  }catch(err){showError();}
}

/* ── 수업 카드 ── */
async function loadClassCards(fireId,sid){
  try{
    let cards=[];
    async function tryQ(q){try{const s=await getDocs(q);s.forEach(d=>cards.push({id:d.id,...d.data()}));}catch(e){}}
    try{await tryQ(query(collection(db,'classCards'),where('studentId','==',fireId),orderBy('classDate','desc')));}
    catch(e){await tryQ(query(collection(db,'classCards'),where('studentId','==',fireId)));}
    if(sid!==fireId){
      const ex=new Set(cards.map(c=>c.id));
      try{const s2=await getDocs(query(collection(db,'classCards'),where('studentId','==',sid),orderBy('classDate','desc')));s2.forEach(d=>{if(!ex.has(d.id))cards.push({id:d.id,...d.data()});});}
      catch(e){const s2b=await getDocs(query(collection(db,'classCards'),where('studentId','==',sid)));s2b.forEach(d=>{if(!ex.has(d.id))cards.push({id:d.id,...d.data()});});}
    }
    cards.sort((a,b)=>(b.classDate||'').localeCompare(a.classDate||''));
    const now=new Date();const tm=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
    const mc=cards.filter(c=>(c.classDate||'').startsWith(tm)).length;
    const sc=cards.filter(c=>typeof c.score==='number'&&c.score>=0&&!c.scoreNone);
    const avg=sc.length?Math.round(sc.reduce((a,c)=>a+c.score,0)/sc.length):null;
    document.querySelectorAll('#cs-total').forEach(el=>el.textContent=cards.length+'건');
    document.querySelectorAll('#cs-month').forEach(el=>el.textContent=mc+'건');
    document.querySelectorAll('#cs-avg').forEach(el=>el.textContent=avg!==null?avg+'점':'—');
    const html=!cards.length?'<div class="empty-box"><div class="empty-icon">📭</div>아직 수업 기록이 없습니다.</div>':cards.map(c=>renderCC(c)).join('');
    document.querySelectorAll('#classCardList').forEach(el=>el.innerHTML=html);
  }catch(err){document.querySelectorAll('#classCardList').forEach(el=>el.innerHTML='<div class="empty-box">수업 기록을 불러오지 못했습니다.</div>');}
}

function renderCC(c){
  const sc=typeof c.score==='number'?c.score:-1;
  const sCls=c.scoreNone?'chip-gray':(sc>=70?'chip-green':sc>=0?'chip-red':'chip-gray');
  const sTxt=c.scoreNone?'테스트없음':(sc>=0?sc+'점':'—');
  const hwCls=c.homework==='높음'?'chip-green':c.homework==='낮음'?'chip-red':'chip-yellow';
  const attCls=c.attitude==='적극적'?'chip-blue':c.attitude==='산만'?'chip-pink':'chip-yellow';
  const[mo,dy]=parseDate(c.classDate);const hasBody=!!(c.content||c.unit);
  return`<div class="cc-item"${hasBody?` id="cci-${c.id}"`:''}><div class="cc-head"${hasBody?` onclick="toggleCC('${c.id}')"`:''}><div class="cc-date"><div class="cc-date-m">${mo}</div><div class="cc-date-d">${dy}</div></div><div class="cc-info"><div class="cc-subj">${e(c.subject||'수업')}</div><div class="chips">${c.teacher?`<span class="chip chip-blue">${e(c.teacher)}</span>`:''}<span class="chip ${sCls}">${sTxt}</span>${c.homework&&c.homework!=='-'?`<span class="chip ${hwCls}">과제 ${e(c.homework)}</span>`:''} ${c.attitude?`<span class="chip ${attCls}">${e(c.attitude)}</span>`:''}</div></div>${hasBody?'<span class="cc-arrow">▾</span>':''}</div>${hasBody?`<div class="cc-body"><div class="cc-body-inner">${c.unit?`<div class="cc-body-lbl">학습 단원</div><div class="cc-body-txt">${e(c.unit)}</div>`:''} ${c.content?`<div class="cc-body-lbl">수업 내용</div><div class="cc-body-txt">${e(c.content)}</div>`:''}</div></div>`:''}</div>`;
}

/* ── OX 퀴즈 ──
   저장 필드: results 컬렉션, subType:'ox'
─────────────────────────────── */
async function loadOxResults(sid){
  try{
    let results=[];
    // 전체 results 한 번 조회 후 클라이언트에서 필터 (복합 인덱스 불필요)
    const s=await getDocs(query(collection(db,'results'),where('studentId','==',sid)));
    s.forEach(d=>{
      const data={id:d.id,...d.data()};
      // subType:'ox' 또는 examType:'ox' 모두 허용
      const sub=(data.subType||'').toLowerCase();
      const ext=(data.examType||'').toLowerCase();
      if(sub==='ox'||ext==='ox') results.push(data);
    });
    // 최신순 정렬
    results.sort((a,b)=>(b.startedAt||'').localeCompare(a.startedAt||''));
    // 완료된 것만 통계 (score가 null이 아닌 것)
    const completed=results.filter(r=>typeof r.score==='number'&&r.score!==null);
    const pcts=completed.map(r=>r.totalQuestions>0?Math.round((r.score/r.totalQuestions)*100):r.score);
    const avg=pcts.length?Math.round(pcts.reduce((a,v)=>a+v,0)/pcts.length):null;
    const best=pcts.length?Math.max(...pcts):null;
    document.querySelectorAll('#ox-total').forEach(el=>el.textContent=results.length+'회');
    document.querySelectorAll('#ox-avg').forEach(el=>el.textContent=avg!==null?avg+'%':'—');
    document.querySelectorAll('#ox-best').forEach(el=>el.textContent=best!==null?best+'%':'—');
    const html=!results.length
      ?'<div class="empty-box"><div class="empty-icon">⭕</div>아직 응시한 OX 퀴즈가 없습니다.</div>'
      :results.map(r=>renderTestItem(r,'ox')).join('');
    document.querySelectorAll('#oxResultList').forEach(el=>el.innerHTML=html);
  }catch(err){document.querySelectorAll('#oxResultList').forEach(el=>el.innerHTML='<div class="empty-box">OX 퀴즈 결과를 불러오지 못했습니다.</div>');}
}

/* ── 4지선다 ──
   저장 필드: results 컬렉션, subType:'multiple'
─────────────────────────────── */
async function loadTestResults(sid){
  try{
    let results=[];
    const s=await getDocs(query(collection(db,'results'),where('studentId','==',sid)));
    s.forEach(d=>{
      const data={id:d.id,...d.data()};
      const sub=(data.subType||'').toLowerCase();
      const ext=(data.examType||'').toLowerCase();
      // subType:'multiple' 또는 examType:'multiple',
      // 또는 둘 다 없는 경우(ox가 아닌 것)도 4지선다로 분류
      if(sub==='multiple'||ext==='multiple'||(sub!=='ox'&&ext!=='ox')) results.push(data);
    });
    results.sort((a,b)=>(b.startedAt||'').localeCompare(a.startedAt||''));
    const completed=results.filter(r=>typeof r.score==='number'&&r.score!==null);
    const pcts=completed.map(r=>r.totalQuestions>0?Math.round((r.score/r.totalQuestions)*100):r.score);
    const avg=pcts.length?Math.round(pcts.reduce((a,v)=>a+v,0)/pcts.length):null;
    const best=pcts.length?Math.max(...pcts):null;
    document.querySelectorAll('#ts-total').forEach(el=>el.textContent=results.length+'회');
    document.querySelectorAll('#ts-avg').forEach(el=>el.textContent=avg!==null?avg+'%':'—');
    document.querySelectorAll('#ts-best').forEach(el=>el.textContent=best!==null?best+'%':'—');
    const html=!results.length
      ?'<div class="empty-box"><div class="empty-icon">📝</div>아직 응시한 4지선다 테스트가 없습니다.</div>'
      :results.map(r=>renderTestItem(r,'multiple')).join('');
    document.querySelectorAll('#testResultList').forEach(el=>el.innerHTML=html);
  }catch(err){document.querySelectorAll('#testResultList').forEach(el=>el.innerHTML='<div class="empty-box">테스트 결과를 불러오지 못했습니다.</div>');}
}

function renderTestItem(r,type){
  const hasScore=typeof r.score==='number'&&r.score!==null;
  const pct=hasScore&&r.totalQuestions>0?Math.round((r.score/r.totalQuestions)*100):(hasScore?r.score:-1);
  const cls=!hasScore?'sc-none':pct>=80?'sc-high':pct>=60?'sc-mid':'sc-low';
  const disp=!hasScore?'응시중':(pct+'%');
  const dt=r.startedAt?r.startedAt.substring(0,10):'';
  const wrong=typeof r.wrongCount==='number'&&r.wrongCount!==null?r.wrongCount:null;
  const barClass=type==='ox'?'ox-bar-bg':'test-bar-bg';
  const fillClass=type==='ox'?'ox-bar-fill':'test-bar-fill';
  return`<div class="test-item"><div class="test-head"><div class="score-circle ${cls}"><div class="sc-pct">${disp}</div>${hasScore&&r.totalQuestions?`<div class="sc-unit">${r.score}/${r.totalQuestions}</div>`:''}</div><div class="test-info"><div class="test-title">${e(r.examTitle||'테스트')}</div><div class="test-meta">${r.subject?`<span>${e(r.subject)}</span>`:''} ${dt?`<span>${dt}</span>`:''} ${wrong!==null?`<span>❌ 오답 ${wrong}개</span>`:''}</div></div></div>${hasScore&&r.totalQuestions>0?`<div class="${barClass}"><div class="${fillClass}" style="width:${pct}%"></div></div><div class="test-bar-info">${r.score}문항 정답 / 전체 ${r.totalQuestions}문항</div>`:''}</div>`;
}

/* ── 마스터테스트 ──
   저장 컬렉션: 'answers' (student-omr.html이 여기에 저장)
   score 필드: 이미 퍼센트(0~100) 값
   필드: testType:'master', studentId, score, total, correct, wrong,
          examTitle, unitName, subject, submittedAt
─────────────────────────────── */
async function loadMasterTests(sid){
  try{
    let tests=[];
    // answers 컬렉션에서 testType:'master' + studentId 필터
    try{
      const s=await getDocs(query(
        collection(db,'answers'),
        where('studentId','==',sid),
        where('testType','==','master')
      ));
      s.forEach(d=>tests.push({id:d.id,...d.data()}));
    }catch(e){
      // 복합 인덱스 없을 경우 전체 조회 후 필터
      const s=await getDocs(query(collection(db,'answers'),where('studentId','==',sid)));
      s.forEach(d=>{const data={id:d.id,...d.data()};if(data.testType==='master')tests.push(data);});
    }
    // 최신순 (submittedAt 기준)
    tests.sort((a,b)=>{
      const ta=a.submittedAt?.seconds||0;
      const tb=b.submittedAt?.seconds||0;
      return tb-ta;
    });
    if(!tests.length)return;

    // score는 이미 퍼센트(0~100)
    const withScore=tests.filter(t=>typeof t.score==='number'&&t.score!==null);
    const scores=withScore.map(t=>t.score);
    const avg=scores.length?Math.round(scores.reduce((a,v)=>a+v,0)/scores.length):null;
    const best=scores.length?Math.max(...scores):null;
    document.querySelectorAll('#ms-total').forEach(el=>el.textContent=tests.length+'회');
    document.querySelectorAll('#ms-avg').forEach(el=>el.textContent=avg!==null?avg+'%':'—');
    document.querySelectorAll('#ms-best').forEach(el=>el.textContent=best!==null?best+'%':'—');

    const html=`<div class="master-wrap">${tests.map((t,i)=>{
      const pct=typeof t.score==='number'?t.score:0;
      const name=e(t.unitName||t.examTitle||t.subject||'단원테스트');
      const sub=t.subject?`<span style="font-size:11px;color:var(--mt);font-weight:400"> · ${e(t.subject)}</span>`:'';
      const wrongTxt=typeof t.wrong==='number'?`<span style="font-size:11px;color:#ef4444;margin-left:8px">❌ ${t.wrong}개</span>`:'';
      return`<div class="master-item">
        <div class="master-rank">${i+1}</div>
        <div class="master-name">${name}${sub}${wrongTxt}</div>
        <div class="master-bar-col">
          <div class="master-bar-bg">
            <div class="master-bar-fill" style="width:${pct}%"></div>
          </div>
        </div>
        <div class="master-score">${pct}%</div>
      </div>`;
    }).join('')}</div>`;
    document.querySelectorAll('#masterTestList').forEach(el=>el.innerHTML=html);
  }catch(err){
    document.querySelectorAll('#masterTestList').forEach(el=>
      el.innerHTML='<div class="empty-box">마스터테스트 결과를 불러오지 못했습니다.</div>'
    );
  }
}

/* ── 유틸 ── */
function parseDate(ds){if(!ds)return['—','—'];const p=ds.split('-');return p.length>=3?[p[1]+'월',parseInt(p[2])+'일']:['—','—'];}
function showError(){document.getElementById('loadingScreen').style.display='none';document.getElementById('errorScreen').style.display='flex';}
function e(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

window.switchTab=function(idx){
  document.querySelectorAll('.section').forEach((s,i)=>s.classList.toggle('active',i===idx));
  document.querySelectorAll('.d-tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  document.querySelectorAll('.m-tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  window.scrollTo({top:0,behavior:'smooth'});
};
window.toggleCC=function(id){
  document.querySelectorAll(`#cci-${id}`).forEach(el=>el.classList.toggle('open'));
};

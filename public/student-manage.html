<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><script src="/favicon.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>학생 관리 · 인후쌤의 과학 수업 관리 시스템</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
  background: #fafafa; color: #1d1d1f; min-height: 100vh;
  -webkit-font-smoothing: antialiased; visibility: hidden;
  overscroll-behavior: none;
}

/* ── Header ── */
.header {
  background: #ffffff; border-bottom: 1px solid #f0e8ed;
  padding: 0 1rem 0 1rem;
  padding-left: max(1rem, env(safe-area-inset-left));
  padding-right: max(1rem, env(safe-area-inset-right));
  height: 54px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 300;
}
.header-left {
  display: flex; align-items: center; gap: 9px;
  text-decoration: none; color: inherit; cursor: pointer;
  transition: opacity 0.15s;
}
.header-left:hover { opacity: 0.75; }
.logo-mark {
  width: 30px; height: 30px;
  background: linear-gradient(135deg, #f472b6 0%, #db2777 100%) !important;
  border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.brand-name { font-size: 14px; font-weight: 600; color: #1d1d1f; letter-spacing: -0.3px; }
.header-badge {
  display: flex; align-items: center; gap: 5px;
  background: #f0fdf4; border: 1px solid #bbf7d0;
  border-radius: 20px; padding: 4px 10px;
  font-size: 10px; font-weight: 600; color: #16a34a; white-space: nowrap;
}
.dot-green { width: 5px; height: 5px; background: #22c55e; border-radius: 50%; animation: blink 2s ease-in-out infinite; flex-shrink: 0; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── Layout ── */
.wrap {
  max-width: 1100px; margin: 0 auto;
  padding: 1.2rem 0.9rem 5rem;
  padding-bottom: max(5rem, calc(4rem + env(safe-area-inset-bottom)));
  padding-left: max(0.9rem, env(safe-area-inset-left));
  padding-right: max(0.9rem, env(safe-area-inset-right));
}

/* ── Welcome ── */
.welcome-bar {
  background: linear-gradient(135deg, #fff0f7 0%, #fdf2f8 60%, #f0f9ff 100%);
  border: 1px solid #fce7f3; border-radius: 18px;
  padding: 1.2rem 1.4rem; margin-bottom: 1.4rem;
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
}
.welcome-left { display: flex; align-items: center; gap: 12px; }
.welcome-avatar {
  width: 46px; height: 46px; border-radius: 50%;
  background: linear-gradient(135deg, #f472b6, #db2777);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
  box-shadow: 0 4px 12px rgba(219,39,119,0.25);
}
.welcome-greeting { font-size: 1.05rem; font-weight: 700; color: #1d1d1f; letter-spacing: -0.03em; }
.welcome-sub { font-size: 11px; color: #6e6e73; margin-top: 3px; }
.welcome-date-box { text-align: right; }
.welcome-date { font-size: 1rem; font-weight: 700; color: #db2777; letter-spacing: -0.02em; }
.welcome-day  { font-size: 11px; color: #aeaeb2; margin-top: 3px; font-weight: 500; }

/* ── Section Nav Grid ── */
.section-heading { font-size: 11px; font-weight: 700; color: #aeaeb2; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.8rem; }
.nav-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 1.6rem; }
.nav-card {
  background: #ffffff; border: 1px solid #fce7f3; border-radius: 16px;
  padding: 1.1rem 0.9rem; cursor: pointer;
  transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
  display: flex; flex-direction: column; align-items: flex-start; gap: 7px;
  text-decoration: none; color: inherit; position: relative; overflow: hidden;
  /* 터치 활성화 */
  -webkit-user-select: none; user-select: none;
  min-height: 110px;
}
.nav-card::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
  border-radius: 0 0 16px 16px; opacity: 0; transition: opacity 0.18s;
}
.nav-card:active { transform: scale(0.97); background: #fdf2f8; }
.nav-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(219,39,119,0.12); border-color: #fbcfe8; }
.nav-card:hover::after { opacity: 1; }
.nav-icon { width: 38px; height: 38px; border-radius: 11px; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
.nav-title { font-size: 12px; font-weight: 700; color: #1d1d1f; letter-spacing: -0.02em; }
.nav-desc  { font-size: 10px; color: #aeaeb2; line-height: 1.4; }
.nav-arrow { position: absolute; top: 50%; right: 12px; transform: translateY(-50%); font-size: 13px; color: #d1d1d6; transition: color 0.15s, right 0.15s; }
.nav-card:hover .nav-arrow { color: #db2777; right: 8px; }
.nc-notice  .nav-icon { background: #fff0f7; }
.nc-notice::after     { background: linear-gradient(90deg, #f472b6, #db2777); }
.nc-task    .nav-icon { background: #eff6ff; }
.nc-task::after       { background: linear-gradient(90deg, #60a5fa, #2563eb); }
.nc-qbank   .nav-icon { background: #fef3c7; }
.nc-qbank::after      { background: linear-gradient(90deg, #fbbf24, #d97706); }
.nc-concept .nav-icon { background: #f0fdf4; }
.nc-concept::after    { background: linear-gradient(90deg, #4ade80, #16a34a); }
.nc-classcard .nav-icon { background: #fdf4ff; }
.nc-classcard::after  { background: linear-gradient(90deg, #e879f9, #a21caf); }
.nc-timetable .nav-icon { background: #fff7ed; }
.nc-timetable::after  { background: linear-gradient(90deg, #fb923c, #ea580c); }
.nc-exam    .nav-icon { background: #f0f9ff; }
.nc-exam::after       { background: linear-gradient(90deg, #38bdf8, #0284c7); }

/* ── Quick Stats ── */
.quick-stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 1.6rem; }
.qs-card { background: #ffffff; border: 1px solid #fce7f3; border-radius: 14px; padding: 0.9rem 1rem; display: flex; align-items: center; gap: 10px; }
.qs-icon { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
.qs-num  { font-size: 1.2rem; font-weight: 700; letter-spacing: -0.03em; line-height: 1; }
.qs-lbl  { font-size: 10px; color: #aeaeb2; margin-top: 3px; font-weight: 500; }

/* ── 하단 2단 ── */
.bottom-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.mini-panel { background: #ffffff; border: 1px solid #fce7f3; border-radius: 16px; padding: 1.1rem 1.2rem; }
.panel-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.9rem; }
.panel-title { font-size: 13px; font-weight: 700; color: #1d1d1f; }
.panel-link { font-size: 11px; font-weight: 600; color: #db2777; cursor: pointer; background: none; border: none; font-family: inherit; transition: opacity 0.15s; min-height: 36px; padding: 0 4px; }
.panel-link:hover { opacity: 0.7; }
.notice-preview-item { padding: 8px 10px; border-radius: 10px; background: #fafafa; border: 1px solid #f5f5f7; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; cursor: pointer; transition: background 0.15s; min-height: 40px; }
.notice-preview-item:active { background: #fdf2f8; }
.notice-preview-item:hover { background: #fdf2f8; }
.notice-tag { font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 5px; white-space: nowrap; flex-shrink: 0; }
.nt-공지  { background: #dbeafe; color: #1e40af; }
.nt-이벤트{ background: #fce7f3; color: #db2777; }
.nt-긴급  { background: #fee2e2; color: #991b1b; }
.nt-안내  { background: #d1fae5; color: #065f46; }
.notice-preview-title { font-size: 12px; color: #1d1d1f; font-weight: 500; flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
.notice-preview-date  { font-size: 10px; color: #aeaeb2; white-space: nowrap; flex-shrink: 0; }
.dday-item { padding: 8px 10px; border-radius: 10px; border: 1px solid #f5f5f7; background: #fafafa; margin-bottom: 6px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.dday-title { font-size: 12px; font-weight: 500; color: #1d1d1f; }
.dday-sub   { font-size: 10px; color: #aeaeb2; margin-top: 2px; }
.dday-badge { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 8px; white-space: nowrap; flex-shrink: 0; }
.db-near { background: #fee2e2; color: #dc2626; }
.db-mid  { background: #fef9c3; color: #854d0e; }
.db-far  { background: #d1fae5; color: #065f46; }
.db-past { background: #f5f5f7; color: #aeaeb2; }
.empty-hint { font-size: 12px; color: #aeaeb2; padding: 1.5rem; text-align: center; }

/* ── 페이지 오버레이 ── */
.page-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.35); z-index: 400; backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px); }
.page-overlay.open { display: block; }
.page-panel {
  position: fixed; top: 0; right: 0; bottom: 0;
  width: min(1000px,100vw); background: #fafafa; z-index: 500;
  overflow-y: auto; -webkit-overflow-scrolling: touch;
  transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  box-shadow: none;
  padding-bottom: env(safe-area-inset-bottom);
}
.page-panel.open { transform: translateX(0); box-shadow: -8px 0 40px rgba(0,0,0,0.12); }
.panel-bar {
  background: #ffffff; border-bottom: 1px solid #fce7f3;
  padding: 0 1.2rem;
  padding-left: max(1.2rem, env(safe-area-inset-left));
  padding-right: max(1.2rem, env(safe-area-inset-right));
  height: 52px; min-height: 52px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 10;
}
.panel-bar-title { font-size: 14px; font-weight: 700; color: #1d1d1f; }
.close-btn {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  background: #f5f5f7; border: none; cursor: pointer; font-size: 14px; color: #3c3c43;
  transition: background 0.15s;
  /* 터치 타겟 확보 */
  min-width: 44px; min-height: 44px;
}
.close-btn:hover { background: #fce7f3; color: #db2777; }
.close-btn:active { background: #fce7f3; color: #db2777; }
.panel-body {
  padding: 1.2rem;
  padding-left: max(1.2rem, env(safe-area-inset-left));
  padding-right: max(1.2rem, env(safe-area-inset-right));
}

/* ── 폼 공통 ── */
.form-row { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
.form-input, .form-select, .form-textarea {
  border: 1.5px solid #fce7f3; border-radius: 10px;
  /* iOS에서 16px 미만이면 자동 줌 발생 → 16px 고정 */
  font-size: 16px; font-family: inherit; color: #1d1d1f;
  padding: 10px 12px; outline: none; background: #fff;
  transition: border 0.15s;
  /* iOS 기본 스타일 제거 */
  -webkit-appearance: none; appearance: none;
}
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: #db2777; }
.form-input { flex: 1; min-width: 0; min-height: 44px; }
.form-select { min-width: 100px; cursor: pointer; min-height: 44px; }
.form-textarea { width: 100%; resize: vertical; min-height: 80px; line-height: 1.6; font-size: 16px; }
.btn-primary {
  padding: 10px 20px; min-height: 44px;
  background: linear-gradient(135deg, #f472b6, #db2777); border: none; border-radius: 10px;
  font-size: 14px; font-weight: 600; color: #fff; cursor: pointer; font-family: inherit;
  white-space: nowrap; transition: opacity 0.15s;
  box-shadow: 0 2px 8px rgba(219,39,119,0.25);
}
.btn-primary:hover { opacity: 0.85; }
.btn-primary:active { opacity: 0.75; transform: scale(0.98); }
.btn-secondary {
  padding: 10px 16px; min-height: 44px;
  background: #f5f5f7; border: none; border-radius: 10px;
  font-size: 14px; font-weight: 600; color: #6e6e73; cursor: pointer;
  font-family: inherit; transition: background 0.15s;
}
.btn-secondary:hover { background: #ebebec; }
.btn-secondary:active { background: #ebebec; }

/* ── 필터 칩 — 모바일 가로 스크롤 ── */
.filter-chips {
  display: flex; gap: 6px; flex-wrap: nowrap;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  margin-bottom: 8px; padding-bottom: 4px;
  scrollbar-width: none;
}
.filter-chips::-webkit-scrollbar { display: none; }
.fchip {
  padding: 7px 14px; border-radius: 20px; min-height: 34px;
  font-size: 12px; font-weight: 500;
  border: 1px solid #fce7f3; background: #fff; color: #6e6e73;
  cursor: pointer; white-space: nowrap; flex-shrink: 0;
  transition: all 0.15s;
}
.fchip:active { transform: scale(0.96); }
.fchip.on { background: #db2777; color: #fff; border-color: #db2777; }
.grade-chip-row .fchip.on { background: #5b21b6; border-color: #5b21b6; }
.grade-chip-row .fchip { border-color: #e0e7ff; }

/* ── 공지사항 ── */
.notice-list { margin-top: 14px; }
.notice-item { background: #fff; border: 1px solid #fce7f3; border-radius: 14px; margin-bottom: 8px; overflow: hidden; }
.notice-head { padding: 12px 14px; display: flex; align-items: center; gap: 8px; cursor: pointer; transition: background 0.15s; min-height: 52px; }
.notice-head:hover { background: #fdf2f8; }
.notice-head:active { background: #fdf2f8; }
.notice-content-box { padding: 0 14px; max-height: 0; overflow: hidden; transition: max-height 0.3s ease, padding 0.3s ease; }
.notice-content-box.open { max-height: 200px; padding: 0 14px 14px; }
.notice-content { font-size: 13px; color: #3c3c43; line-height: 1.7; white-space: pre-wrap; }
.notice-del { margin-left: auto; background: none; border: none; color: #aeaeb2; cursor: pointer; font-size: 14px; padding: 6px 8px; border-radius: 6px; transition: color 0.15s; min-width: 36px; min-height: 36px; display: flex; align-items: center; justify-content: center; }
.notice-del:hover { color: #dc2626; }
.notice-del:active { color: #dc2626; }

/* ── 주간업무 ── */
.week-tabs { display: flex; gap: 6px; margin-bottom: 12px; }
.wtab { padding: 8px 18px; min-height: 40px; border-radius: 20px; font-size: 13px; font-weight: 500; border: 1px solid #fce7f3; background: #fff; color: #6e6e73; cursor: pointer; font-family: inherit; transition: all 0.15s; flex: 1; }
.wtab.on { background: #db2777; color: #fff; border-color: #db2777; }
.task-list { display: flex; flex-direction: column; gap: 6px; margin-top: 4px; }
.task-item { display: flex; align-items: center; gap: 8px; padding: 12px 12px; background: #fff; border: 1px solid #fce7f3; border-radius: 12px; transition: background 0.15s; min-height: 52px; }
.task-item.done { opacity: 0.55; }
.task-check { width: 22px; height: 22px; border-radius: 6px; border: 2px solid #fce7f3; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: all 0.15s; background: #fff; min-width: 44px; min-height: 44px; margin: -11px -11px; padding: 11px; }
.task-check.checked { background: #db2777; border-color: #db2777; }
.task-text { font-size: 13px; color: #1d1d1f; flex: 1; }
.task-item.done .task-text { text-decoration: line-through; color: #aeaeb2; }
.task-pri { font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 5px; white-space: nowrap; }
.tp-high { background: #fee2e2; color: #991b1b; }
.tp-mid  { background: #fef9c3; color: #854d0e; }
.tp-low  { background: #d1fae5; color: #065f46; }
.task-del { background: none; border: none; color: #d1d1d6; cursor: pointer; font-size: 14px; padding: 8px; border-radius: 5px; transition: color 0.15s; min-width: 36px; min-height: 36px; display: flex; align-items: center; justify-content: center; }
.task-del:hover { color: #dc2626; }
.clear-btn { padding: 10px 14px; min-height: 44px; background: #f5f5f7; border: none; border-radius: 10px; font-size: 12px; font-weight: 600; color: #6e6e73; cursor: pointer; font-family: inherit; margin-top: 10px; width: 100%; transition: background 0.15s; }
.clear-btn:hover { background: #ebebec; }

/* ── 개념정리 / 폼 공통 카드 ── */
.qbank-form { background: #fff; border: 1px solid #fce7f3; border-radius: 14px; padding: 12px 14px; margin-bottom: 14px; }
.qbank-q { font-size: 13px; font-weight: 500; color: #1d1d1f; line-height: 1.5; }
.qb-chip { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 5px; white-space: nowrap; }
.qbc-subj-물리 { background: #dbeafe; color: #1e40af; }
.qbc-subj-화학 { background: #fce7f3; color: #db2777; }
.qbc-subj-생물 { background: #d1fae5; color: #065f46; }
.qbc-subj-지학 { background: #fef9c3; color: #854d0e; }
.qbc-subj-통합과학 { background: #e0f2fe; color: #0369a1; }
.qbc-subj-내신 { background: #fdf4ff; color: #7e22ce; }
.qbc-diff { background: #f5f5f7; color: #6e6e73; }
.qbc-type { background: #ede9fe; color: #5b21b6; }
.qbc-grade { background: #ede9fe; color: #5b21b6; }

/* ── 학년 뱃지 ── */
.grade-badge { font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 5px; background: #ede9fe; color: #5b21b6; white-space: nowrap; }
.cc-chip-grade { background: #ede9fe; color: #5b21b6; }

/* ── 핵심정리 카드 (개념정리 패널 내부) ── */
.summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.summary-card {
  display: flex; flex-direction: column; gap: 6px;
  background: #fff; border: 1px solid #ede9fe; border-radius: 16px;
  padding: 1.1rem 1rem; min-height: 116px;
  text-decoration: none; color: inherit; cursor: pointer;
  transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
  -webkit-user-select: none; user-select: none;
}
.summary-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(124,58,237,0.12); }
.summary-card:active { transform: scale(0.98); }
.summary-card.mid  { background: #faf5ff; border-color: #e9d5ff; }
.summary-card.mid:hover  { border-color: #c4b5fd; box-shadow: 0 8px 24px rgba(124,58,237,0.15); }
.summary-card.high { background: #f0f9ff; border-color: #bae6fd; }
.summary-card.high:hover { border-color: #7dd3fc; box-shadow: 0 8px 24px rgba(2,132,199,0.15); }
.summary-tag {
  align-self: flex-start; font-size: 10px; font-weight: 700;
  padding: 3px 9px; border-radius: 6px; white-space: nowrap; margin-bottom: 2px;
}
.tag-mid  { background: #ede9fe; color: #6d28d9; }
.tag-high { background: #e0f2fe; color: #0369a1; }
.summary-title { font-size: 14px; font-weight: 700; color: #1d1d1f; letter-spacing: -0.02em; line-height: 1.35; word-break: keep-all; }
.summary-desc  { font-size: 11px; color: #9ca3af; line-height: 1.45; }
@media (max-width: 700px) {
  .summary-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 420px) {
  .summary-grid { grid-template-columns: 1fr; }
  .summary-card { min-height: auto; padding: 1rem; }
}

/* ── 수업카드 패널 ── */
.cc-filter-bar {
  display: flex; gap: 6px; align-items: center;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  padding-bottom: 6px; margin-bottom: 10px;
  scrollbar-width: none; flex-wrap: nowrap;
}
.cc-filter-bar::-webkit-scrollbar { display: none; }
.cc-tab {
  padding: 7px 14px; min-height: 36px; border-radius: 20px; font-size: 12px; font-weight: 600;
  border: 1.5px solid #f3e8ff; background: #fff; color: #6e6e73;
  cursor: pointer; font-family: inherit; transition: all 0.15s; white-space: nowrap; flex-shrink: 0;
}
.cc-tab.on { background: #a21caf; color: #fff; border-color: #a21caf; }
.cc-search-inp {
  flex: 0 0 auto; width: 180px; padding: 8px 12px; min-height: 38px;
  border: 1.5px solid #f3e8ff; border-radius: 10px;
  font-size: 16px; font-family: inherit; color: #1d1d1f;
  outline: none; background: #fff; transition: border 0.15s;
  -webkit-appearance: none;
}
.cc-search-inp:focus { border-color: #a21caf; }
.cc-write-btn {
  padding: 9px 14px; min-height: 40px; flex-shrink: 0;
  background: linear-gradient(135deg, #e879f9, #a21caf);
  border: none; border-radius: 10px; font-size: 12px; font-weight: 700;
  color: #fff; cursor: pointer; font-family: inherit; white-space: nowrap;
  transition: opacity 0.15s; box-shadow: 0 2px 8px rgba(162,28,175,0.25);
}
.cc-write-btn:hover { opacity: 0.85; }
.cc-write-btn:active { opacity: 0.75; }

/* 수업카드 폼 */
.cc-form-box {
  background: #fff; border: 1.5px solid #f3e8ff; border-radius: 16px;
  padding: 14px; margin-bottom: 14px;
  animation: slideDown 0.2s ease;
}
@keyframes slideDown { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
.cc-form-title { font-size: 13px; font-weight: 700; color: #1d1d1f; margin-bottom: 12px; }
.cc-form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.cc-form-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.cc-label { font-size: 11px; font-weight: 700; color: #6e6e73; margin-bottom: 4px; letter-spacing: 0.05em; display: block; }
.cc-inp, .cc-sel {
  width: 100%; padding: 10px 10px; min-height: 44px;
  border: 1.5px solid #f3e8ff;
  border-radius: 9px; font-size: 16px; font-family: inherit; color: #1d1d1f;
  outline: none; background: #fff; transition: border 0.15s;
  -webkit-appearance: none; appearance: none;
}
.cc-inp:focus, .cc-sel:focus { border-color: #a21caf; }
.cc-sel { cursor: pointer; }
.cc-score-row { display: flex; align-items: center; gap: 8px; }
.cc-score-row .cc-inp { max-width: 100px; }
.cc-score-no { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #6e6e73; cursor: pointer; min-height: 44px; }
.cc-score-no input { accent-color: #a21caf; width: 18px; height: 18px; }

/* 시험 점수 입력 그리드 (OX / 4지선다 / OMR) */
.cc-score-grid { display: grid; grid-template-columns: repeat(3, 1fr) auto; gap: 8px; align-items: end; }
.cc-score-cell { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
.cc-score-cell-lbl { font-size: 10px; font-weight: 700; color: #a21caf; letter-spacing: 0.03em; }
.cc-score-mini { max-width: none; text-align: center; }
@media (max-width: 520px) {
  .cc-score-grid { grid-template-columns: 1fr 1fr 1fr; }
  .cc-score-grid .cc-score-no { grid-column: 1 / -1; }
}

/* 시험 기록에서 불러오기(picker) */
.cc-pick-box { margin-top: 10px; border: 1.5px dashed #e9d5ff; border-radius: 11px; padding: 9px 10px; background: #fdfafe; }
.cc-pick-title { font-size: 11px; font-weight: 700; color: #a21caf; margin-bottom: 7px; display: flex; align-items: center; gap: 6px; }
.cc-pick-list { display: flex; flex-direction: column; gap: 6px; max-height: 210px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.cc-pick-row { display: flex; align-items: center; gap: 10px; padding: 9px 11px; background: #fff; border: 1px solid #f3e8ff; border-radius: 9px; cursor: pointer; transition: border-color .12s, background .12s, transform .08s; }
.cc-pick-row:hover { border-color: #e879f9; background: #fdf4ff; }
.cc-pick-row:active { transform: scale(0.99); }
.cc-pick-date { font-size: 11px; font-weight: 700; color: #a21caf; min-width: 66px; flex-shrink: 0; }
.cc-pick-name { flex: 1; font-size: 12px; font-weight: 600; color: #1d1d1f; min-width: 0; word-break: keep-all; line-height: 1.35; }
.cc-pick-scores { display: flex; gap: 5px; flex-wrap: wrap; justify-content: flex-end; flex-shrink: 0; }
.cc-pick-sc { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 5px; white-space: nowrap; }
.cc-pick-sc-ox  { background: #fdf2f8; color: #be185d; }
.cc-pick-sc-mc  { background: #eff6ff; color: #2563eb; }
.cc-pick-sc-omr { background: #ecfdf5; color: #059669; }
.cc-pick-hint { font-size: 11px; color: #aeaeb2; padding: 6px 4px; text-align: center; line-height: 1.6; }

.cc-textarea {
  width: 100%; padding: 10px 12px; min-height: 44px;
  border: 1.5px solid #f3e8ff;
  border-radius: 9px; font-size: 16px; font-family: inherit;
  color: #1d1d1f; line-height: 1.6; resize: vertical;
  outline: none; background: #fff; transition: border 0.15s;
  -webkit-appearance: none;
}
.cc-textarea:focus { border-color: #a21caf; }
.cc-form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 12px; }

/* 학생 선택 학년 표시 박스 */
.student-grade-info {
  margin-top: 5px; padding: 6px 9px; border-radius: 8px;
  background: #fdf4ff; border: 1px solid #f3e8ff;
  font-size: 11px; font-weight: 600; color: #7e22ce;
  display: flex; align-items: center; gap: 5px; min-height: 28px;
}

/* 수업카드 리스트 */
.cc-stats-row { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.cc-stat-chip { padding: 6px 14px; border-radius: 10px; font-size: 11px; font-weight: 600; background: #fdf4ff; color: #a21caf; border: 1px solid #f3e8ff; display: flex; align-items: center; gap: 6px; }
.cc-stat-chip span { font-size: 14px; font-weight: 700; }
.cc-list { display: flex; flex-direction: column; gap: 8px; }
.cc-card { background: #fff; border: 1.5px solid #f3e8ff; border-radius: 14px; overflow: hidden; transition: border-color 0.15s, box-shadow 0.15s; }
.cc-card:hover { border-color: #e879f9; box-shadow: 0 4px 16px rgba(162,28,175,0.08); }
.cc-card-head { padding: 14px 16px; display: flex; align-items: flex-start; gap: 8px; cursor: pointer; transition: background 0.15s; }
.cc-card-head:hover { background: #fdf4ff; }
.cc-card-head:active { background: #fdf4ff; }
.cc-card-left { flex: 1; min-width: 0; }
.cc-card-name { font-size: 14px; font-weight: 700; color: #1d1d1f; }
.cc-card-meta { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.cc-chip { font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 5px; white-space: nowrap; }
.cc-chip-subj { background: #f3e8ff; color: #7e22ce; }
.cc-chip-teacher { background: #dbeafe; color: #1e40af; }
.cc-chip-date { background: #f5f5f7; color: #6e6e73; }
.cc-chip-score { background: #d1fae5; color: #065f46; }
.cc-chip-score-bad { background: #fee2e2; color: #991b1b; }
.cc-chip-score-none { background: #f5f5f7; color: #aeaeb2; }

/* 수업카드 — 섹션형 필드 레이아웃 */
.cc-card-title-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 12px; }
.cc-fields { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px 14px; }
.cc-field { display: flex; flex-direction: column; gap: 4px; min-width: 0; padding: 9px 11px; background: #fdfafe; border: 1px solid #f3e8ff; border-radius: 10px; }
.cc-f-lbl { font-size: 10px; font-weight: 700; color: #a21caf; letter-spacing: 0.03em; }
.cc-f-val { font-size: 13px; font-weight: 700; color: #1d1d1f; word-break: keep-all; line-height: 1.4; }
.cc-v-green { color: #059669; }
.cc-v-red   { color: #dc2626; }
.cc-v-blue  { color: #2563eb; }
.cc-v-yellow{ color: #b45309; }
.cc-v-pink  { color: #be185d; }
.cc-v-gray  { color: #aeaeb2; }
.cc-score-parts { display: flex; flex-direction: column; gap: 2px; }
.cc-score-part { font-size: 12px; font-weight: 700; color: #1d1d1f; display: flex; align-items: baseline; gap: 5px; }
.cc-score-part b { color: #a21caf; font-weight: 700; font-size: 10px; min-width: 42px; }
@media (max-width: 520px) {
  .cc-fields { grid-template-columns: 1fr 1fr; gap: 8px; }
  .cc-field { padding: 8px 10px; }
}

.cc-card-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.cc-hw-badge { font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 6px; white-space: nowrap; }
.cc-hw-high { background: #d1fae5; color: #065f46; }
.cc-hw-mid  { background: #fef9c3; color: #854d0e; }
.cc-hw-low  { background: #fee2e2; color: #991b1b; }
.cc-att-badge { font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 6px; white-space: nowrap; }
.cc-att-active { background: #dbeafe; color: #1e40af; }
.cc-att-mid    { background: #fef9c3; color: #854d0e; }
.cc-att-low    { background: #fdf2f8; color: #be185d; }
.cc-expand-icon { font-size: 12px; color: #aeaeb2; transition: transform 0.2s; flex-shrink: 0; }
.cc-card.open .cc-expand-icon { transform: rotate(180deg); }
.cc-card-body { max-height: 0; overflow: hidden; transition: max-height 0.3s ease, padding 0.3s ease; border-top: 0px solid #f3e8ff; }
.cc-card.open .cc-card-body { max-height: 500px; padding: 0 16px 14px; border-top: 1px solid #f3e8ff; }
.cc-body-section { margin-top: 10px; }
.cc-body-label { font-size: 10px; font-weight: 700; color: #a21caf; letter-spacing: 0.05em; margin-bottom: 4px; }
.cc-body-text { font-size: 12px; color: #3c3c43; line-height: 1.7; white-space: pre-wrap; }
.cc-body-row { display: flex; gap: 20px; flex-wrap: wrap; }
.cc-body-item { display: flex; flex-direction: column; gap: 2px; }
.cc-body-item-label { font-size: 10px; color: #aeaeb2; font-weight: 600; }
.cc-body-item-val { font-size: 13px; font-weight: 700; color: #1d1d1f; }
.cc-card-actions { display: flex; gap: 6px; justify-content: flex-end; margin-top: 10px; }
.cc-del-btn { padding: 8px 14px; min-height: 40px; background: #fff; border: 1.5px solid #fce7f3; border-radius: 8px; font-size: 12px; font-weight: 600; color: #dc2626; cursor: pointer; font-family: inherit; transition: all 0.15s; }
.cc-del-btn:hover { background: #fee2e2; border-color: #fca5a5; }

/* 수업카드 통계 */
.cc-mini-stats { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; margin-bottom: 12px; }
.cc-mini-stat { background: #fff; border: 1.5px solid #f3e8ff; border-radius: 12px; padding: 10px 12px; text-align: center; }
.cc-mini-stat-num { font-size: 1.2rem; font-weight: 700; color: #a21caf; letter-spacing: -0.03em; }
.cc-mini-stat-lbl { font-size: 10px; color: #aeaeb2; font-weight: 500; margin-top: 2px; }

/* ── 시간표 ── */
.timetable-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
.timetable { border-collapse: collapse; width: 100%; min-width: 400px; font-size: 11px; }
.timetable th { padding: 6px 4px; text-align: center; font-weight: 700; color: #6e6e73; font-size: 10px; border-bottom: 2px solid #fce7f3; }
.timetable td { padding: 4px; border: 1px solid #fdf2f8; height: 40px; vertical-align: top; min-width: 55px; }
.timetable td.time-col { color: #aeaeb2; font-size: 10px; text-align: center; vertical-align: middle; font-weight: 600; min-width: 40px; }
.tt-cell { min-height: 32px; border-radius: 6px; padding: 4px 6px; font-size: 10px; font-weight: 600; line-height: 1.3; cursor: pointer; transition: opacity 0.15s; position: relative; }
.tt-cell:hover { opacity: 0.8; }
.tt-del { position: absolute; top: 2px; right: 3px; font-size: 9px; opacity: 0.6; }
.tt-add { width: 100%; height: 32px; background: transparent; border: 1px dashed #fce7f3; border-radius: 6px; cursor: pointer; font-size: 18px; color: #fce7f3; transition: all 0.15s; display: flex; align-items: center; justify-content: center; }
.tt-add:hover { border-color: #db2777; color: #db2777; background: #fdf2f8; }
.tt-add:active { border-color: #db2777; color: #db2777; background: #fdf2f8; }

/* ── 시험 캘린더 ── */
.cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.cal-nav { background: none; border: none; cursor: pointer; padding: 8px 12px; min-width: 44px; min-height: 44px; border-radius: 8px; font-size: 18px; color: #6e6e73; transition: background 0.15s; display: flex; align-items: center; justify-content: center; }
.cal-nav:hover { background: #fdf2f8; }
.cal-month { font-size: 14px; font-weight: 700; color: #1d1d1f; }
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; }
.cal-dow { text-align: center; font-size: 10px; font-weight: 700; color: #aeaeb2; padding: 6px 0; }
.cal-day {
  aspect-ratio: 1; border-radius: 8px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 500; cursor: pointer;
  transition: background 0.15s; position: relative; color: #3c3c43;
  min-height: 36px;
}
.cal-day:hover { background: #fdf2f8; }
.cal-day.today { background: #db2777; color: #fff !important; font-weight: 700; }
.cal-day.has-exam::after { content: ''; position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; border-radius: 50%; background: #db2777; }
.cal-day.today.has-exam::after { background: #fff; }
.cal-day.other-month { color: #d1d1d6; }
.cal-day.sun { color: #dc2626; }
.cal-day.sat { color: #2563eb; }
.exam-list-section { margin-top: 14px; }
.exam-item { background: #fff; border: 1px solid #f0f9ff; border-left: 3px solid #0284c7; border-radius: 12px; padding: 12px 12px; margin-bottom: 6px; display: flex; align-items: center; justify-content: space-between; gap: 8px; min-height: 56px; }
.exam-title { font-size: 13px; font-weight: 600; color: #1d1d1f; }
.exam-date  { font-size: 11px; color: #aeaeb2; margin-top: 2px; }

/* ── 모달 ── */
.modal-bg { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 600; align-items: flex-end; justify-content: center; }
.modal-bg.open { display: flex; }
.modal-box {
  background: #fff; border-radius: 24px 24px 0 0; padding: 1.6rem;
  width: 100%; max-width: 500px;
  box-shadow: 0 -8px 40px rgba(0,0,0,0.18);
  padding-bottom: max(1.6rem, calc(1rem + env(safe-area-inset-bottom)));
}
.modal-title { font-size: 15px; font-weight: 700; margin-bottom: 14px; }
.modal-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
.color-opts { display: flex; gap: 10px; flex-wrap: wrap; margin: 10px 0; }
.color-opt { width: 30px; height: 30px; border-radius: 8px; cursor: pointer; border: 2px solid transparent; transition: border-color 0.15s; }
.color-opt.sel { border-color: #1d1d1f; }

/* ── 반응형 ── */
@media (max-width: 900px) {
  .nav-grid { grid-template-columns: repeat(4, 1fr); }
}
@media (max-width: 700px) {
  .nav-grid { grid-template-columns: repeat(4, 1fr); gap: 7px; }
  .quick-stats { grid-template-columns: repeat(2, 1fr); }
  .bottom-row { grid-template-columns: 1fr; }
  .cc-form-grid { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 520px) {
  .wrap { padding: 1rem 0.75rem 5rem; }

  /* 헤더 조정 */
  .brand-name { font-size: 13px; }
  .header-badge { font-size: 9px; padding: 3px 8px; }
  .header-badge .dot-green { display: none; }

  /* 환영 바 세로 정렬 */
  .welcome-bar { flex-direction: column; align-items: flex-start; gap: 8px; padding: 1rem 1.1rem; }
  .welcome-date-box { text-align: left; }
  .welcome-date { font-size: 1.2rem; }
  .welcome-left { gap: 10px; }
  .welcome-avatar { width: 42px; height: 42px; font-size: 18px; }
  .welcome-greeting { font-size: 1rem; }

  /* 메뉴 그리드 — 모바일 2열 */
  .nav-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .nav-card { min-height: 100px; padding: 1rem 0.9rem; }
  .nav-title { font-size: 13px; }
  .nav-desc { font-size: 10px; display: none; }  /* 설명 숨김으로 카드 높이 절약 */
  .nav-icon { width: 36px; height: 36px; font-size: 17px; }
  .nav-arrow { right: 10px; }

  /* 통계 */
  .quick-stats { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .qs-num { font-size: 1.1rem; }
  .qs-card { padding: 0.8rem; gap: 8px; }

  /* 패널 풀스크린 */
  .page-panel { width: 100vw !important; border-radius: 0; }

  /* 폼 세로 배치 */
  .cc-form-grid { grid-template-columns: 1fr; }
  .cc-form-grid2 { grid-template-columns: 1fr; }

  /* 수업카드 검색 */
  .cc-search-inp { width: 140px; }

  /* 모달 */
  .modal-box { border-radius: 20px 20px 0 0; }

  /* 시험 */
  .form-row { flex-direction: column; }
  .form-row .form-input,
  .form-row .form-select,
  .form-row .btn-primary { width: 100%; }

  /* 주간업무 */
  .week-tabs { gap: 4px; }
  .wtab { font-size: 12px; padding: 8px 12px; }

  /* 미니패널 */
  .mini-panel { padding: 1rem; }
  .notice-preview-title { font-size: 11px; }

  /* 통계 칩 */
  .cc-mini-stats { gap: 6px; }
  .cc-mini-stat-num { font-size: 1.1rem; }
}

@media (max-width: 360px) {
  .nav-grid { gap: 6px; }
  .nav-card { padding: 0.85rem 0.75rem; min-height: 90px; }
  .nav-title { font-size: 12px; }
  .qs-card { flex-direction: column; text-align: center; gap: 4px; padding: 0.7rem 0.5rem; }
  .qs-num { font-size: 1rem; }
}

/* 기타 유틸 */
.divider { height: 1px; background: #fce7f3; margin: 14px 0; }
.section-label { font-size: 10px; font-weight: 700; color: #aeaeb2; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
.cc-loading { text-align: center; padding: 2rem; color: #aeaeb2; font-size: 12px; }

/* 로그아웃 버튼 */
.logout-btn {
  padding: 7px 14px; min-height: 36px;
  background: transparent; border: 1.5px solid #f4c8d4;
  border-radius: 20px; font-family: inherit; font-size: 12px; font-weight: 600;
  color: #e8375a; cursor: pointer; white-space: nowrap;
  transition: background 0.15s;
}
.logout-btn:hover, .logout-btn:active { background: #fceef2; }

/* ── 학생 관리 전용 추가 스타일 ── */
.sm-toolbar { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:0.9rem; }
.sm-search { flex:0 1 440px; max-width:440px; min-width:150px; }

/* 학년 필터 버튼 — 균등 분할 그리드 (양옆 균형) */
.grade-filter-row { display:grid; grid-template-columns:repeat(6,1fr); gap:8px; margin-bottom:1.1rem; }
.gf-btn {
  padding:11px 0; min-height:44px;
  border:1.5px solid #fce7f3; background:#fff; color:#6e6e73;
  border-radius:12px; font-size:13px; font-weight:600; font-family:inherit;
  cursor:pointer; white-space:nowrap;
  transition:transform .12s, background .15s, border-color .15s, box-shadow .15s;

}
.gf-btn:hover { border-color:#fbcfe8; background:#fdf2f8; }
.gf-btn:active { transform:scale(0.97); }
.gf-btn.on {

  border-color:#db2777; color:#fff;
  box-shadow:0 3px 10px rgba(219,39,119,0.25);
}

.sm-count { font-size:11px; color:#aeaeb2; margin-bottom:0.8rem; }
.sm-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:12px; }
.sm-card { background:#fff; border:1px solid #fce7f3; border-radius:16px; padding:1.1rem 1.2rem; transition:transform .18s, box-shadow .18s, border-color .18s; }
.sm-card:hover { transform:translateY(-3px); box-shadow:0 8px 24px rgba(219,39,119,0.1); border-color:#fbcfe8; }
.sm-card-top { display:flex; align-items:center; gap:11px; margin-bottom:0.8rem; }
.sm-av { width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; flex-shrink:0; }
.sm-name { font-size:15px; font-weight:700; color:#1d1d1f; letter-spacing:-0.02em; }
.sm-id { font-size:11px; color:#aeaeb2; margin-top:2px; }
.sm-subjects { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:0.7rem; min-height:21px; }
.sm-subj { font-size:10px; color:#7c3aed; background:#ede9fe; padding:3px 8px; border-radius:6px; }
.sm-subj.none { color:#aeaeb2; background:#f5f5f7; }
.sm-meta { font-size:11.5px; color:#3c3c43; line-height:1.7; margin-bottom:0.85rem; }
.sm-meta .ml { color:#aeaeb2; display:inline-block; width:34px; }
.sm-actions { display:flex; gap:6px; }
.sm-btn { flex:1; text-align:center; font-size:12px; font-weight:600; padding:9px 0; border-radius:9px; border:1.5px solid #fce7f3; background:#fff; color:#6e6e73; cursor:pointer; font-family:inherit; text-decoration:none; min-height:40px; display:flex; align-items:center; justify-content:center; gap:4px; transition:all .15s; }
.sm-btn:hover { border-color:#fbcfe8; }
.sm-btn.primary { border-color:#db2777; color:#db2777; background:#fdf2f8; }
.sm-btn.primary:hover { background:#fce7f3; }
.sm-btn.danger { color:#dc2626; border-color:#fca5a5; flex:0 0 auto; padding:9px 12px; }
.sm-btn.danger:hover { background:#fef2f2; }
.sm-empty { padding:3rem 1rem; text-align:center; color:#aeaeb2; font-size:13px; background:#fff; border:1px solid #fce7f3; border-radius:16px; grid-column:1/-1; }

/* 등록/수정 모달 */
.sm-modal-bg { display:none; position:fixed; inset:0; background:rgba(29,29,31,0.42); z-index:600; align-items:center; justify-content:center; padding:1rem; }
.sm-modal-bg.open { display:flex; }
.sm-modal { background:#fff; border-radius:20px; width:100%; max-width:460px; max-height:88vh; overflow-y:auto; -webkit-overflow-scrolling:touch; box-shadow:0 20px 60px rgba(0,0,0,0.18); padding:1.5rem 1.4rem; padding-bottom:max(1.5rem,env(safe-area-inset-bottom)); }
.sm-modal-title { font-size:1.05rem; font-weight:700; color:#1d1d1f; margin-bottom:1.2rem; letter-spacing:-0.02em; }
.sm-field { margin-bottom:0.9rem; }
.sm-field .req { color:#dc2626; }
.sm-modal .cc-inp, .sm-modal .cc-sel { font-size:16px; }
.sm-subj-checks { display:flex; flex-wrap:wrap; gap:7px; }
.sm-subj-label { display:inline-flex; align-items:center; gap:6px; padding:9px 13px; border:1.5px solid #fce7f3; border-radius:10px; font-size:13px; color:#3c3c43; cursor:pointer; -webkit-user-select:none; user-select:none; min-height:42px; transition:all .15s; }
.sm-subj-label input { display:none; }
.sm-subj-label.checked { border-color:#db2777; background:#fdf2f8; color:#db2777; font-weight:600; }
.sm-modal-footer { display:flex; gap:8px; margin-top:1.3rem; }
.sm-modal-footer button { flex:1; min-height:46px; }
@media (max-width:600px) {
  .sm-search { flex:1 1 100%; max-width:none; }
  .grade-filter-row { grid-template-columns:repeat(3,1fr); }
  .sm-grid { grid-template-columns:1fr; }
  .sm-modal { border-radius:18px; padding:1.2rem 1.1rem; }
}
@media (max-width:360px) {
  .gf-btn { font-size:12px; padding:10px 0; }
}
</style>
</head>
<body>

<header class="header">
  <a href="index.html" class="header-left">
    <div class="logo-mark">
      <svg width="16" height="16" viewBox="0 0 18 18" fill="none">
        <circle cx="9" cy="7" r="3" fill="rgba(255,255,255,0.9)"/>
        <path d="M3.5 16c0-3 2.5-5.5 5.5-5.5s5.5 2.5 5.5 5.5" stroke="rgba(255,255,255,0.9)" stroke-width="1.4" stroke-linecap="round" fill="none"/>
      </svg>
    </div>
    <span class="brand-name" style="font-size:clamp(11px,3vw,14px);line-height:1.15">인후쌤의 과학 수업 관리 시스템</span>
  </a>
  <div style="display:flex;align-items:center;gap:8px;">
    <div class="header-badge"><span class="dot-green"></span>ONLINE</div>
    <button class="logout-btn" onclick="doLogout()">로그아웃</button>
  </div>
</header>

<div class="wrap">
  <div class="welcome-bar">
    <div class="welcome-left">
      <div class="welcome-avatar">👩‍🎓</div>
      <div>
        <div class="welcome-greeting">학생 관리</div>
        <div class="welcome-sub">신규 학생을 등록하고 재학생을 관리하세요</div>
      </div>
    </div>
    <button class="cc-write-btn" onclick="openAdd()">+ 신규 학생 등록</button>
  </div>

  <div class="section-heading">학생 명단</div>
  <div class="sm-toolbar">
    <input class="cc-inp sm-search" id="sm-search" type="text" placeholder="학생 이름 또는 ID로 검색..." oninput="renderCards()" autocomplete="off">
  </div>
  <div class="grade-filter-row" id="grade-filter-row">
    <button class="gf-btn on" data-grade="" onclick="setGradeFilter(this,'')">전체</button>
    <button class="gf-btn" data-grade="중등1학년" onclick="setGradeFilter(this,'중등1학년')">중1</button>
    <button class="gf-btn" data-grade="중등2학년" onclick="setGradeFilter(this,'중등2학년')">중2</button>
    <button class="gf-btn" data-grade="중등3학년" onclick="setGradeFilter(this,'중등3학년')">중3</button>
    <button class="gf-btn" data-grade="고등1학년" onclick="setGradeFilter(this,'고등1학년')">고1</button>
    <button class="gf-btn" data-grade="고등2학년" onclick="setGradeFilter(this,'고등2학년')">고2</button>
  </div>
  <div class="sm-count" id="sm-count">불러오는 중...</div>
  <div class="sm-grid" id="sm-grid"><div class="sm-empty">학생 데이터를 불러오는 중입니다...</div></div>
</div>

<!-- 등록/수정 모달 -->
<div class="sm-modal-bg" id="sm-modal-bg">
  <div class="sm-modal">
    <div class="sm-modal-title" id="sm-modal-title">신규 학생 등록</div>
    <div class="sm-field">
      <span class="cc-label">학생 ID</span>
      <input class="cc-inp" id="sm-id" type="text" placeholder="예: m01010 (비우면 자동 생성)" autocomplete="off">
    </div>
    <div class="sm-field">
      <span class="cc-label">이름 <span class="req">*</span></span>
      <input class="cc-inp" id="sm-name" type="text" placeholder="학생 이름" autocomplete="off">
    </div>
    <div class="sm-field">
      <span class="cc-label">학년 <span class="req">*</span></span>
      <select class="cc-sel" id="sm-grade">
        <option value="">선택</option>
        <option value="중등1학년">중등1학년</option><option value="중등2학년">중등2학년</option><option value="중등3학년">중등3학년</option>
        <option value="고등1학년">고등1학년</option><option value="고등2학년">고등2학년</option><option value="고등3학년">고등3학년</option>
      </select>
    </div>
    <div class="sm-field">
      <span class="cc-label">담당 선생님</span>
      <input class="cc-inp" id="sm-teacher" type="text" placeholder="선생님 이름" autocomplete="off">
    </div>
    <div class="sm-field">
      <span class="cc-label">수강 과목</span>
      <div class="sm-subj-checks" id="sm-subj-checks">
        <label class="sm-subj-label"><input type="checkbox" class="sm-subj-chk" value="내신"><span>내신</span></label>
        <label class="sm-subj-label"><input type="checkbox" class="sm-subj-chk" value="통합과학"><span>통합과학</span></label>
        <label class="sm-subj-label"><input type="checkbox" class="sm-subj-chk" value="화학"><span>화학</span></label>
        <label class="sm-subj-label"><input type="checkbox" class="sm-subj-chk" value="물질과 에너지"><span>물질과 에너지</span></label>
        <label class="sm-subj-label"><input type="checkbox" class="sm-subj-chk" value="화학 반응의 세계"><span>화학 반응의 세계</span></label>
      </div>
    </div>
    <div class="sm-field">
      <span class="cc-label">학부모 전화번호</span>
      <input class="cc-inp" id="sm-phone" type="tel" placeholder="010-0000-0000" autocomplete="off">
    </div>
    <div class="sm-modal-footer">
      <button class="btn-secondary" onclick="closeModal()">취소</button>
      <button class="cc-write-btn" id="sm-save-btn" onclick="saveStudent()">저장</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, collection, addDoc, updateDoc, deleteDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const cfg = {
  apiKey:"AIzaSyD5MQx_rXO_xRYelyKxK090TaKa3Gg2D3k",
  authDomain:"beta-science.firebaseapp.com",
  projectId:"beta-science",
  storageBucket:"beta-science.firebasestorage.app",
  messagingSenderId:"650652155367",
  appId:"1:650652155367:web:41d2958e675cb4edd4d142"
};
const app = initializeApp(cfg);
const auth = getAuth(app);
const db = getFirestore(app);

const GBG    = {'중등1학년':'#eff6ff','중등2학년':'#f0fdf4','중등3학년':'#fefce8','고등1학년':'#fdf4ff','고등2학년':'#fff7ed','고등3학년':'#fdf2f8'};
const GCOL   = {'중등1학년':'#1d4ed8','중등2학년':'#15803d','중등3학년':'#a16207','고등1학년':'#7e22ce','고등2학년':'#c2410c','고등3학년':'#db2777'};
const GSHORT = {'중등1학년':'중1','중등2학년':'중2','중등3학년':'중3','고등1학년':'고1','고등2학년':'고2','고등3학년':'고3'};

let students = [];
let editId = null;          // 수정 중인 학생의 Firestore 문서 id (null이면 신규)
let editPhotoUrl = '';      // 수정 시 기존 사진 url 보존
let gradeFilter = '';       // 현재 선택된 학년 필터 ('' = 전체)

// 인증
onAuthStateChanged(auth, async u => {
  if (!u) { location.replace('/login.html'); return; }
  try {
    const s = await getDoc(doc(db,'users',u.uid));
    if (!s.exists() || s.data().status !== 'approved') { await signOut(auth); location.replace('/login.html'); return; }
    document.body.style.visibility = 'visible';
    initStudents();
  } catch (e) { location.replace('/login.html'); }
});
window.doLogout = async () => { await signOut(auth); location.replace('/login.html'); };

// 학생 실시간 로드
function initStudents() {
  onSnapshot(query(collection(db,'students'), orderBy('regDate','desc')), snap => {
    students = snap.docs.map(d => ({ fireId:d.id, ...d.data() }));
    renderCards();
  }, err => {
    document.getElementById('sm-grid').innerHTML = `<div class="sm-empty">불러오기 오류: ${esc(err.message)}</div>`;
  });
}

// 학년 필터 버튼
window.setGradeFilter = function(btn, val) {
  gradeFilter = val;
  document.querySelectorAll('.gf-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  renderCards();
};

// 카드 렌더 (검색 + 학년 필터)
window.renderCards = function() {
  const kw = (document.getElementById('sm-search').value || '').trim().toLowerCase();
  const gf = gradeFilter;
  const list = students.filter(s =>
    (!kw || (s.name && s.name.toLowerCase().includes(kw)) || (s.id && String(s.id).toLowerCase().includes(kw))) &&
    (!gf || (s.grade || '') === gf)
  );
  document.getElementById('sm-count').textContent = gf ? `${gf} · ${list.length}명` : `전체 ${students.length}명`;
  const grid = document.getElementById('sm-grid');
  if (!list.length) { grid.innerHTML = '<div class="sm-empty">해당하는 학생이 없습니다.</div>'; return; }
  grid.innerHTML = list.map(s => {
    const name = s.name || '이름없음';
    const grade = s.grade || '';
    const bg = GBG[grade] || '#f5f5f7', col = GCOL[grade] || '#6e6e73', short = GSHORT[grade] || (grade || '—');
    const sid = s.id || '';
    const subs = (s.subject && s.subject !== '-') ? String(s.subject).split(',').map(x => x.trim()).filter(Boolean) : [];
    const subHtml = subs.length ? subs.map(x => `<span class="sm-subj">${esc(x)}</span>`).join('') : '<span class="sm-subj none">과목 미등록</span>';
    const teacher = (s.teacher && s.teacher !== '-') ? s.teacher : '미배정';
    const phone = (s.phone && s.phone !== '-') ? s.phone : '-';
    const gradeBtn = sid
      ? `<a class="sm-btn primary" href="student-detail.html?id=${encodeURIComponent(sid)}">📊 성적</a>`
      : `<button class="sm-btn" disabled style="opacity:0.5;">📊 성적</button>`;
    return `<div class="sm-card">
      <div class="sm-card-top">
        <div class="sm-av" style="background:${bg};color:${col};">${esc(short)}</div>
        <div style="min-width:0;">
          <div class="sm-name">${esc(name)}</div>
          <div class="sm-id">${esc(grade || '학년 미등록')}${sid ? ' · ' + esc(sid) : ''}</div>
        </div>
      </div>
      <div class="sm-subjects">${subHtml}</div>
      <div class="sm-meta"><span class="ml">선생님</span> ${esc(teacher)}<br><span class="ml">연락처</span> ${esc(phone)}</div>
      <div class="sm-actions">
        ${gradeBtn}
        <button class="sm-btn" onclick="openEdit('${esc(s.fireId)}')">✏️ 수정</button>
        <button class="sm-btn danger" onclick="delStudent('${esc(s.fireId)}','${esc(name)}')">🗑</button>
      </div>
    </div>`;
  }).join('');
};

// 모달 열기/닫기
function setSubjChecks(values) {
  document.querySelectorAll('.sm-subj-chk').forEach(cb => {
    const on = values.includes(cb.value);
    cb.checked = on;
    cb.closest('.sm-subj-label').classList.toggle('checked', on);
  });
}
window.openAdd = function() {
  editId = null; editPhotoUrl = '';
  document.getElementById('sm-modal-title').textContent = '신규 학생 등록';
  document.getElementById('sm-id').value = '';
  document.getElementById('sm-id').disabled = false;
  ['sm-name','sm-teacher','sm-phone'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('sm-grade').value = '';
  setSubjChecks([]);
  document.getElementById('sm-modal-bg').classList.add('open');
};
window.openEdit = function(fireId) {
  const s = students.find(x => x.fireId === fireId);
  if (!s) return;
  editId = fireId; editPhotoUrl = s.photoUrl || '';
  document.getElementById('sm-modal-title').textContent = '학생 정보 수정';
  document.getElementById('sm-id').value = s.id || '';
  document.getElementById('sm-id').disabled = true;   // ID는 수정 불가 (기록 연결 유지)
  document.getElementById('sm-name').value = s.name || '';
  document.getElementById('sm-grade').value = s.grade || '';
  document.getElementById('sm-teacher').value = (s.teacher && s.teacher !== '-') ? s.teacher : '';
  document.getElementById('sm-phone').value = (s.phone && s.phone !== '-') ? s.phone : '';
  const subs = (s.subject && s.subject !== '-') ? String(s.subject).split(',').map(x => x.trim()) : [];
  setSubjChecks(subs);
  document.getElementById('sm-modal-bg').classList.add('open');
};
window.closeModal = function() { document.getElementById('sm-modal-bg').classList.remove('open'); };

// 과목 라벨 토글
document.querySelectorAll('.sm-subj-chk').forEach(cb => {
  cb.addEventListener('change', () => cb.closest('.sm-subj-label').classList.toggle('checked', cb.checked));
});

// 저장 (신규=addDoc / 수정=updateDoc) — students.html 과 동일 스키마
window.saveStudent = async function() {
  const name = document.getElementById('sm-name').value.trim();
  const grade = document.getElementById('sm-grade').value;
  const id = document.getElementById('sm-id').value.trim() || ('s' + Date.now());
  const teacher = document.getElementById('sm-teacher').value.trim() || '-';
  const phone = document.getElementById('sm-phone').value.trim() || '-';
  const checked = [...document.querySelectorAll('.sm-subj-chk:checked')].map(c => c.value);
  const subject = checked.length ? checked.join(',') : '-';
  if (!name || !grade) { alert('이름과 학년을 입력해주세요.'); return; }
  const btn = document.getElementById('sm-save-btn');
  btn.disabled = true; btn.textContent = '저장 중...';
  try {
    if (!editId) {
      const t = new Date();
      await addDoc(collection(db,'students'), {
        id, name, grade, subject, phone, teacher,
        photoUrl: '',
        regDate: `${t.getFullYear()}. ${t.getMonth()+1}. ${t.getDate()}.`
      });
    } else {
      await updateDoc(doc(db,'students',editId), {
        name, grade, subject, phone, teacher,
        photoUrl: editPhotoUrl || ''
      });
    }
    closeModal();
  } catch (e) {
    alert('저장 오류: ' + e.message);
  } finally {
    btn.disabled = false; btn.textContent = '저장';
  }
};

// 삭제
window.delStudent = async function(fireId, name) {
  if (!confirm(`"${name}" 학생을 삭제하시겠습니까?\n삭제하면 되돌릴 수 없습니다.`)) return;
  try { await deleteDoc(doc(db,'students',fireId)); }
  catch (e) { alert('삭제 오류: ' + e.message); }
};

// 배경 클릭 / ESC 로 닫기
document.getElementById('sm-modal-bg').addEventListener('click', ev => { if (ev.target === ev.currentTarget) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
</script>
</body>
</html>

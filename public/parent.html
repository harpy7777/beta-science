<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;

.header {

.logo-mark {

  max-width: 1000px; margin: 0 auto;

  padding-right: max(1rem, env(safe-area-inset-right));

#loadingBox { padding: 4rem 1rem; text-align: center; color: #aeaeb2; font-size: 14px; }
#errorBox { display: none; padding: 3.5rem 1.4rem; text-align: center; background: #fff; border: 1px solid #fce7f3; border-radius: 16px; }

.profile-card {
  background: #fff; border: 1px solid #fce7f3; border-radius: 16px;
  padding: 1.1rem 1.3rem; display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap;
}
.p-av { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
.p-name { font-size: 1.05rem; font-weight: 700; color: #1d1d1f; }
.p-meta { font-size: 11px; color: #aeaeb2; margin-top: 3px; }
.p-right { margin-left: auto; text-align: right; }
.p-overall-n { font-size: 1.4rem; font-weight: 700; line-height: 1; }
.p-overall-l { font-size: 10px; color: #aeaeb2; margin-top: 3px; }
.c-good{color:#0369a1} .c-avg{color:#d97706} .c-warn{color:#dc2626}
.subject-chip2 { display:inline-block; font-size:11px; color:#7c3aed; background:#ede9fe; padding:3px 9px; border-radius:6px; margin:2px 3px 2px 0; }

.sect-title { font-size:1rem; font-weight:800; color:#1d1d1f; letter-spacing:-0.02em; margin:1.6rem 0 0.9rem; display:flex; align-items:center; gap:8px; }
.sect-title .sect-ico { width:30px; height:30px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:15px; }
.sect-grade { background:#fdf2f8; } .sect-report { background:#eff6ff; }

.mini-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 1rem; }
.mini-card { background: #fff; border: 1px solid #fce7f3; border-radius: 12px; padding: 0.9rem 0.6rem; text-align: center; }

.chart-card { background: #fff; border: 1px solid #fce7f3; border-radius: 16px; padding: 1.1rem 1.2rem; margin-bottom: 1rem; }
.chart-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; flex-wrap: wrap; gap: 6px; }
.chart-title { font-size: 13px; font-weight: 600; color: #1d1d1f; }

.result-section { margin-bottom: 1rem; }
.result-section-title { font-size: 13px; font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.rs-dot { width: 8px; height: 8px; border-radius: 50%; }
.result-table { background: #fff; border: 1px solid #fce7f3; border-radius: 14px; overflow: hidden; }
.rt-head { display: grid; padding: 0.6rem 1rem; background: #fdf2f8; border-bottom: 1px solid #fce7f3; font-size: 10px; font-weight: 700; color: #c9a8bc; letter-spacing: 0.1em; text-transform: uppercase; }
.rt-row { display: grid; padding: 0.7rem 1rem; border-bottom: 1px solid #fdf2f8; align-items: center; }
.rt-row:last-child { border-bottom: none; }
.gt-base { grid-template-columns: minmax(150px,1.6fr) 110px 96px 96px minmax(90px,1fr); }
.rt-head > div, .rt-row > div { display: flex; align-items: center; }
.cell-name { font-size: 12px; font-weight: 500; color: #1d1d1f; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cell-date { font-size: 11px; color: #aeaeb2; white-space: nowrap; }
.cell-attempt { gap: 5px; white-space: nowrap; }
.cell-attempt .cnt { font-size: 10px; color: #aeaeb2; white-space: nowrap; }

.cs-ox{color:#1e40af} .cs-mc{color:#5b21b6} .cs-ms{color:#db2777}
.bar-wrap { display: flex; align-items: center; gap: 6px; width: 100%; }
.bar-track { flex: 1; height: 5px; background: #f5f5f7; border-radius: 3px; overflow: hidden; min-width: 40px; }
.bar-fill { height: 100%; border-radius: 3px; }

.fb-chip { display: inline-flex; font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 6px; white-space: nowrap; }
.fb-g{background:#dcfce7;color:#166534} .fb-a{background:#fef9c3;color:#854d0e} .fb-w{background:#fee2e2;color:#991b1b}

.fb-wrap { background: #fff; border: 1px solid #fce7f3; border-radius: 14px; padding: 1rem 1.2rem; margin-top: 1rem; }

.fb-na { color: #aeaeb2; font-style: italic; }

.q-section { background: #fff; border: 1px solid #fce7f3; border-radius: 16px; padding: 1.1rem 1.2rem; margin-bottom: 1rem; }
.q-section-title { font-size: 13px; font-weight: 600; color: #db2777; margin-bottom: 1rem; display: flex; align-items: center; gap: 6px; }
.q-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(34px, 1fr)); gap: 5px; }
.q-bubble { aspect-ratio: 1; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; }
.q-o{background:#dcfce7;color:#166534} .q-x{background:#fee2e2;color:#991b1b}
.q-stat { margin-top: 10px; font-size: 12px; color: #3c3c43; display: flex; gap: 12px; flex-wrap: wrap; }
.q-stat b { color: #db2777; }
.empty-state { padding: 2.2rem; text-align: center; font-size: 13px; color: #aeaeb2; }
.foot-note { text-align:center; font-size:11px; color:#c9c9cf; margin-top:2rem; line-height:1.7; }

@media (max-width: 600px) {
  .mini-grid { grid-template-columns: repeat(2,1fr); gap: 7px; }
  .p-right { margin-left: 0; text-align: left; width: 100%; }
  .result-table { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .rt-head, .rt-row { min-width: 545px; }
  .gt-base { grid-template-columns: minmax(140px,1.5fr) 104px 92px 90px minmax(84px,1fr); }
  .cell-name { font-size: 11px; }
}
</style>

<body>

<header class="header">
  <div class="logo-mark">
    <svg width="16" height="16" viewBox="0 0 18 18" fill="none">

      <path d="M3.5 16c0-3 2.5-5.5 5.5-5.5s5.5 2.5 5.5 5.5" stroke="rgba(255,255,255,0.9)" stroke-width="1.4" stroke-linecap="round" fill="none"/>
    </svg>

  <span class="brand-name" style="font-size:clamp(11px,3vw,14px);line-height:1.15">인후쌤의 과학 수업 관리 시스템</span>

<div class="wrap">
  <div id="loadingBox">성적 정보를 불러오는 중입니다...</div>

  <div id="errorBox">
    <div class="e-emoji">🔒</div>

      <div class="mini-card"><div class="mini-n" id="d-ox" style="color:#1e40af;">—</div><div class="mini-l">OX 평균</div></div>
      <div class="mini-card"><div class="mini-n" id="d-mc" style="color:#5b21b6;">—</div><div class="mini-l">4지선다</div></div>
      <div class="mini-card"><div class="mini-n" id="d-ms" style="color:#db2777;">—</div><div class="mini-l">마스터</div></div>

          <div class="leg"><div class="leg-dot" style="background:#1e40af;"></div>OX</div>
          <div class="leg"><div class="leg-dot" style="background:#5b21b6;"></div>4지선다</div>
          <div class="leg"><div class="leg-dot" style="background:#db2777;"></div>마스터</div>

    <div class="foot-note" id="d-updated"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, getDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const cfg = {
  apiKey:"AIzaSyD5MQx_rXO_xRYelyKxK090TaKa3Gg2D3k",
  authDomain:"beta-science.firebaseapp.com",
  projectId:"beta-science",
  storageBucket:"beta-science.firebasestorage.app",
  messagingSenderId:"650652155367",
  appId:"1:650652155367:web:41d2958e675cb4edd4d142"
};
const app=initializeApp(cfg), db=getFirestore(app);

const GRADE_BG={'중등1학년':'#eff6ff','중등2학년':'#f0fdf4','중등3학년':'#fefce8','고등1학년':'#fdf4ff','고등2학년':'#fff7ed','고등3학년':'#fdf2f8'};
const GRADE_COL={'중등1학년':'#1d4ed8','중등2학년':'#15803d','중등3학년':'#a16207','고등1학년':'#7e22ce','고등2학년':'#c2410c','고등3학년':'#db2777'};
const GRADE_SHORT={'중등1학년':'중1','중등2학년':'중2','중등3학년':'중3','고등1학년':'고1','고등2학년':'고2','고등3학년':'고3'};
const DAY_KO=['일','월','화','수','목','금','토'];

const token=new URLSearchParams(location.search).get('t');
let records=[];

init();
async function init(){
  if(!token){ showError(); return; }
  let data=null;
  try {
    const s=await getDoc(doc(db,'shares',token));
    if(s.exists()) data=s.data();
  } catch(e){ /* 권한/네트워크 오류 */ }
  if(!data){ showError(); return; }

  records=(Array.isArray(data.records)?data.records:[]).slice()
    .sort((a,b)=>(a.ts||0)-(b.ts||0));

  document.getElementById('loadingBox').style.display='none';
  document.getElementById('content').style.display='block';
  render(data);
}
function showError(){
  document.getElementById('loadingBox').style.display='none';
  document.getElementById('errorBox').style.display='block';
}

function render(data){
  const name=data.studentName||'이름없음', grade=data.grade||'—';
  const bg=GRADE_BG[grade]||'#f5f5f7', col=GRADE_COL[grade]||'#6e6e73', short=GRADE_SHORT[grade]||grade;
  const av=document.getElementById('d-av'); av.textContent=short; av.style.background=bg; av.style.color=col;
  setTxt('d-name',name); setTxt('d-meta',`${grade} · 종합 성적 분석`);
  document.title=`${name} 성적 · 인후쌤의 과학 수업 관리 시스템`;
  const subs=(data.subject&&data.subject!=='-')?String(data.subject).split(',').map(x=>x.trim()).filter(Boolean):[];
  document.getElementById('d-subjects').innerHTML=subs.length?subs.map(x=>`<span class="subject-chip2">${esc(x)}</span>`).join(''):'';

  // 첫 응시 기준 평균 (선생님 화면의 종합평가와 동일 기준)
  const ai=attemptInfo(records);
  const firstOnly=records.filter(r=>{ const i=ai.get(r.id); return !i||i.index===0; });
  const ox=firstOnly.filter(r=>typeOf(r)==='ox'), mc=firstOnly.filter(r=>typeOf(r)==='mc'), ms=firstOnly.filter(r=>typeOf(r)==='master');
  const avg=arr=>arr.length?Math.round(arr.map(scoreOf).reduce((a,v)=>a+v,0)/arr.length):null;
  const oxA=avg(ox), mcA=avg(mc), msA=avg(ms);

  setTxt('d-cnt',records.length);
  setTxt('d-ox',oxA!==null?oxA+'점':'—');
  setTxt('d-mc',mcA!==null?mcA+'점':'—');
  setTxt('d-ms',msA!==null?msA+'점':'—');

  const vals=[oxA,mcA,msA].filter(v=>v!==null);
  const total=vals.length?Math.round(vals.reduce((a,v)=>a+v,0)/vals.length):null;
  const oel=document.getElementById('d-overall');
  if(total!==null){
    if(total>=80){ oel.textContent=`양호 (${total}점)`; oel.className='p-overall-n c-good'; }
    else if(total>=60){ oel.textContent=`보통 (${total}점)`; oel.className='p-overall-n c-avg'; }
    else { oel.textContent=`주의 (${total}점)`; oel.className='p-overall-n c-warn'; }
  } else { oel.textContent='—'; oel.className='p-overall-n'; }

  drawTrend();
  renderResults(ai);
  renderQAnalysis(ms);

  const fb=document.getElementById('d-fb');
  const txt=data.feedback||'';
  fb.innerHTML=txt?esc(txt).replace(/\n/g,'<br>'):'<span class="fb-na">아직 작성된 피드백이 없습니다.</span>';

  if(data.updatedAt){
    setTxt('d-updated',`이 리포트는 ${fmtFull(data.updatedAt)} 기준입니다.`);
  }
}

function drawTrend(){
  const ctx=document.getElementById('d-trend').getContext('2d');
  const oxR=records.filter(r=>typeOf(r)==='ox'), mcR=records.filter(r=>typeOf(r)==='mc'), msR=records.filter(r=>typeOf(r)==='master');
  const allDates=[...new Set(records.map(r=>fmtDate(r.ts)))].sort();
  const byDate=(recs,dates)=>dates.map(d=>{ const dr=recs.filter(r=>fmtDate(r.ts)===d); return dr.length?Math.round(dr.map(scoreOf).reduce((a,v)=>a+v,0)/dr.length):null; });
  new Chart(ctx,{type:'line',data:{labels:allDates,datasets:[
    {label:'OX',data:byDate(oxR,allDates),borderColor:'#1e40af',backgroundColor:'rgba(30,64,175,0.06)',tension:0.35,spanGaps:true,pointRadius:4,pointBackgroundColor:'#1e40af'},
    {label:'4지선다',data:byDate(mcR,allDates),borderColor:'#5b21b6',backgroundColor:'rgba(91,33,182,0.06)',tension:0.35,spanGaps:true,pointRadius:4,pointBackgroundColor:'#5b21b6'},
    {label:'마스터',data:byDate(msR,allDates),borderColor:'#db2777',backgroundColor:'rgba(219,39,119,0.06)',tension:0.35,spanGaps:true,pointRadius:4,pointBackgroundColor:'#db2777'}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{
    y:{min:0,max:100,ticks:{stepSize:25,font:{size:10},color:'#aeaeb2'},grid:{color:'#f5f5f7'}},
    x:{ticks:{font:{size:10},color:'#aeaeb2'},grid:{display:false}}
  }}});
}

function attemptInfo(recs){
  const gm=new Map();
  recs.forEach(r=>{ const k=r.testName||r.examTitle||r.id; if(!gm.has(k)) gm.set(k,[]); gm.get(k).push(r); });
  const im=new Map();
  gm.forEach(arr=>arr.forEach((r,i)=>im.set(r.id,{index:i,total:arr.length})));
  return im;
}
function attemptBadge(info){
  if(!info) return '';
  if(info.index===0) return `<span class="attempt-badge ab-first">첫시험</span>`;
  const cls=info.index===1?'ab-retry1':info.index===2?'ab-retry2':'ab-retry';
  return `<span class="attempt-badge ${cls}">재시험${info.index}</span>`;
}

function renderResults(ai){
  const wrap=document.getElementById('d-results');
  const oxR=records.filter(r=>typeOf(r)==='ox'), mcR=records.filter(r=>typeOf(r)==='mc'), msR=records.filter(r=>typeOf(r)==='master');
  let html='';

  function rows(recs,scClass,barColor,withChip){
    return recs.map(r=>{
      const sc=scoreOf(r), info=ai.get(r.id), attempts=info?info.total:1;
      const chip=withChip ? (sc>=80?`<span class="fb-chip fb-g">양호</span>`:sc>=60?`<span class="fb-chip fb-a">보통</span>`:`<span class="fb-chip fb-w">주의</span>`) : '';
      return `<div class="rt-row gt-base">
        <div class="cell-name">${esc(r.testName||r.examTitle||'—')}</div>
        <div class="cell-date">${fmtDateShort(r.ts)}</div>
        <div class="cell-attempt">${attemptBadge(info)}${attempts>1?`<span class="cnt">총 ${attempts}회</span>`:''}</div>
        <div class="cell-score ${scClass}">${sc}점${chip}</div>
        <div class="bar-wrap"><div class="bar-track"><div class="bar-fill" style="width:${Math.max(0,Math.min(100,sc))}%;background:${barColor};"></div></div></div>
      </div>`;
    }).join('');
  }
  function section(title,color,recs,scClass,withChip){
    if(!recs.length) return '';
    return `<div class="result-section">
      <div class="result-section-title"><span class="rs-dot" style="background:${color};"></span><span style="color:${color};">${title}</span><span style="font-size:11px;color:#aeaeb2;font-weight:400;">(${recs.length}회)</span></div>
      <div class="result-table">
        <div class="rt-head gt-base"><div>단원명</div><div>시험일</div><div>응시횟수</div><div>점수</div><div>점수 바</div></div>
        ${rows(recs,scClass,color,withChip)}
      </div>
    </div>`;
  }
  html+=section('OX 문제','#1e40af',oxR,'cs-ox',false);
  html+=section('4지선다','#5b21b6',mcR,'cs-mc',false);
  html+=section('마스터테스트','#db2777',msR,'cs-ms',true);
  wrap.innerHTML=html||`<div class="result-table"><div class="empty-state">아직 응시한 시험 기록이 없습니다.</div></div>`;
}

function renderQAnalysis(msRecs){
  const sec=document.getElementById('d-q-section');
  if(!msRecs.length){ sec.style.display='none'; return; }
  const latest=msRecs[msRecs.length-1], answers=Array.isArray(latest.answers)?latest.answers:[];
  if(!answers.length){ sec.style.display='none'; return; }
  sec.style.display='block';
  document.getElementById('d-q-grid').innerHTML=answers.map((a,i)=>{
    const ok=!!a.isCorrect;
    return `<div class="q-bubble ${ok?'q-o':'q-x'}">${i+1}</div>`;
  }).join('');
  const correct=answers.filter(a=>!!a.isCorrect).length;
  document.getElementById('d-q-stat').innerHTML=`총 <b>${answers.length}</b>문항 &nbsp;|&nbsp; 정답 <b style="color:#166534;">${correct}</b>개 &nbsp;|&nbsp; 오답 <b style="color:#991b1b;">${answers.length-correct}</b>개 &nbsp;|&nbsp; 정답률 <b>${Math.round(correct/answers.length*100)}%</b>`;
}

/* 유틸 */
function typeOf(r){ return r.testType||'mc'; }
function scoreOf(r){ return typeof r.score==='number'?r.score:(r.percentage||0); }
function toDate(ms){ return new Date(typeof ms==='number'?ms:0); }
function fmtDateShort(ms){ const d=toDate(ms); if(!ms||d.getTime()===0) return ''; const yy=String(d.getFullYear()).slice(2),mm=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0'),day=DAY_KO[d.getDay()]; return `${yy}.${mm}.${dd}(${day})`; }
function fmtDate(ms){ const d=toDate(ms); return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`; }
function fmtFull(ms){ const d=toDate(ms); return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`; }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function setTxt(id,txt){ const e=document.getElementById(id); if(e) e.textContent=txt; }
</script>

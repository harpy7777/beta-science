<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학생 관리 - 베타과학</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --primary: #1a3fc4; --primary-light: #eef2ff; --primary-dark: #1530a0;
    --max-width: 1200px; --bg: #f5f6fa; --white: #ffffff;
    --text: #1e293b; --text-muted: #64748b; --border: #e2e8f0;
    --success: #10b981; --danger: #ef4444; --radius: 10px;
  }
  body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; visibility: hidden; }
  .app-wrapper { max-width: var(--max-width); margin: 0 auto; display: flex; flex-direction: column; min-height: 100vh; }
  .topbar { background: var(--white); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; gap: 32px; height: 56px; position: sticky; top: 0; z-index: 100; }
  .logo-area { display: flex; flex-direction: row; align-items: center; gap: 8px; text-decoration: none; cursor: pointer; flex-shrink: 0; }
  .logo-icon { width: 32px; height: 32px; background: var(--primary); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .logo-text { display: flex; flex-direction: column; align-items: flex-start; line-height: 1.1; }
  .logo-area .brand { font-size: 15px; font-weight: 800; letter-spacing: 0.08em; color: var(--primary); }
  .logo-area .brand-sub { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; color: var(--primary); text-transform: uppercase; }
  .topbar-divider { width: 1px; height: 28px; background: var(--border); flex-shrink: 0; }
  .nav-tabs { display: flex; gap: 25px; list-style: none; margin-left: 60px; }
  .nav-tabs a { display: block; padding: 8px 18px; font-size: 14px; color: var(--text-muted); text-decoration: none; border-radius: 6px; white-space: nowrap; transition: background 0.15s, color 0.15s; }
  .nav-tabs a:hover { background: var(--bg); color: var(--text); }
  .nav-tabs a.active { background: var(--primary-light); color: var(--primary); font-weight: 600; }
  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  .badge-admin { font-size: 11px; padding: 2px 8px; background: #f1f5f9; border-radius: 20px; color: var(--text-muted); }
  .btn-logout { padding: 6px 14px; background: transparent; border: 1.5px solid #c7d2fe; border-radius: 20px; font-family: inherit; font-size: 11px; font-weight: 600; color: var(--primary); cursor: pointer; transition: all 0.18s; white-space: nowrap; }
  .btn-logout:hover { background: var(--primary-light); }
  .main-content { padding: 28px 24px; flex: 1; }
  .page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; }
  .page-header h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
  .page-header p { font-size: 14px; color: var(--text-muted); }
  .btn-primary { display: flex; align-items: center; gap: 6px; padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: background 0.15s; font-family: inherit; }
  .btn-primary:hover { background: var(--primary-dark); }
  .search-filter-row { display: flex; gap: 12px; margin-bottom: 16px; align-items: center; }
  .search-box { position: relative; flex: 1; max-width: 400px; }
  .search-box svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--text-muted); }
  .search-box input { width: 100%; padding: 10px 12px 10px 38px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; color: var(--text); background: var(--white); outline: none; transition: border 0.15s; }
  .search-box input:focus { border-color: var(--primary); }
  .search-box input::placeholder { color: var(--text-muted); }
  .filter-select { padding: 9px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; color: var(--text); background: var(--white); cursor: pointer; min-width: 120px; outline: none; }
  .student-count { margin-left: auto; font-size: 13px; color: var(--text-muted); }
  .student-count strong { color: var(--text); font-weight: 600; }
  .table-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead th { font-size: 13px; font-weight: 600; color: var(--text-muted); text-align: left; padding: 12px 16px; border-bottom: 1px solid var(--border); background: #f8fafc; white-space: nowrap; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #f8fafc; }
  tbody td { font-size: 14px; padding: 14px 16px; color: var(--text); }
  .student-id { font-size: 13px; color: var(--text-muted); font-family: monospace; }
  .grade-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; white-space: nowrap; }
  .grade-mid1{background:#ede9fe;color:#6d28d9} .grade-mid2{background:#dbeafe;color:#1d4ed8}
  .grade-mid3{background:#d1fae5;color:#065f46} .grade-high1{background:#fef3c7;color:#92400e}
  .grade-high2{background:#fee2e2;color:#991b1b} .grade-high3{background:#fce7f3;color:#9d174d}
  .subject-tag { display: inline-block; padding: 2px 8px; background: #f1f5f9; border-radius: 4px; font-size: 12px; color: var(--text-muted); margin: 2px; }
  .action-icons { display: flex; gap: 6px; align-items: center; }
  .action-btn { width: 32px; height: 32px; border-radius: 6px; border: 1px solid var(--border); background: var(--white); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.1s, border-color 0.1s; color: var(--text-muted); }
  .action-btn:hover { background: #f1f5f9; color: var(--text); }
  .action-btn.del:hover { background: #fef2f2; border-color: #fca5a5; color: var(--danger); }
  .card-btn { display: inline-flex; align-items: center; gap: 4px; padding: 5px 10px; border-radius: 6px; background: var(--primary-light); border: 1px solid #c7d2fe; color: var(--primary); font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: background 0.15s; }
  .card-btn:hover { background: #dde4ff; }
  .card-btn.has-card { background: #ecfdf5; border-color: #6ee7b7; color: #065f46; }
  .card-btn.has-card:hover { background: #d1fae5; }
  .teacher-name { font-size: 13px; color: var(--text-muted); }
  .teacher-name.assigned { color: var(--text); font-weight: 500; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--white); border-radius: 14px; padding: 28px; width: 100%; max-width: 480px; margin: 16px; max-height: 90vh; overflow-y: auto; }
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .modal-header h2 { font-size: 18px; font-weight: 700; }
  .modal-close { width: 32px; height: 32px; border: none; background: #f1f5f9; border-radius: 6px; cursor: pointer; font-size: 16px; color: var(--text-muted); display: flex; align-items: center; justify-content: center; }
  .modal-close:hover { background: #e2e8f0; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .form-group input, .form-group select { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; color: var(--text); outline: none; transition: border 0.15s; background: var(--white); font-family: inherit; }
  .form-group input:focus, .form-group select:focus { border-color: var(--primary); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border); }
  .btn-secondary { padding: 10px 20px; border: 1px solid var(--border); border-radius: 8px; background: var(--white); font-size: 14px; color: var(--text); cursor: pointer; font-family: inherit; }
  .btn-secondary:hover { background: #f1f5f9; }
  .pagination { display: flex; align-items: center; justify-content: center; gap: 4px; padding: 20px 0 4px; }
  .page-btn { width: 34px; height: 34px; border: 1px solid var(--border); border-radius: 6px; background: var(--white); font-size: 13px; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.1s; }
  .page-btn:hover { background: #f1f5f9; color: var(--text); }
  .page-btn.active { background: var(--primary); color: white; border-color: var(--primary); font-weight: 600; }
  .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
  .empty-state p { font-size: 15px; margin-top: 12px; }

  /* ── 수업카드 모달 ── */
  .cc-modal { background: var(--white); border-radius: 14px; width: 100%; max-width: 640px; margin: 16px; max-height: 92vh; overflow: hidden; display: flex; flex-direction: column; }
  .cc-modal-header { padding: 22px 24px 0; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .cc-modal-header h2 { font-size: 18px; font-weight: 700; }
  .cc-stat-bar { display: flex; gap: 8px; padding: 16px 24px 0; flex-shrink: 0; }
  .cc-stat-chip { flex: 1; padding: 10px 8px; border-radius: 10px; border: 1px solid var(--border); background: #f8fafc; text-align: center; }
  .cc-stat-chip .num { font-size: 20px; font-weight: 700; color: var(--primary); }
  .cc-stat-chip .lbl { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .cc-list-scroll { flex: 1; overflow-y: auto; padding: 14px 24px 8px; }
  .cc-item { border: 1.5px solid #f3e8ff; border-radius: 12px; overflow: hidden; margin-bottom: 8px; background: var(--white); transition: border-color 0.15s, box-shadow 0.15s; }
  .cc-item:hover { border-color: #e879f9; box-shadow: 0 2px 8px rgba(162,28,175,0.07); }
  .cc-item-head { padding: 12px 14px; display: flex; align-items: center; gap: 8px; cursor: pointer; }
  .cc-item-head:hover { background: #fdf4ff; }
  .cc-item-meta { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 5px; align-items: center; }
  .cc-chip { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 5px; white-space: nowrap; }
  .cc-chip-subj    { background: #f3e8ff; color: #7e22ce; }
  .cc-chip-teacher { background: #dbeafe; color: #1e40af; }
  .cc-chip-date    { background: #f5f5f7; color: #6e6e73; }
  .cc-chip-good    { background: #d1fae5; color: #065f46; }
  .cc-chip-bad     { background: #fee2e2; color: #991b1b; }
  .cc-chip-none    { background: #f5f5f7; color: #aeaeb2; }
  .cc-hw-badge { font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 6px; white-space: nowrap; }
  .hw-high { background: #d1fae5; color: #065f46; }
  .hw-mid  { background: #fef9c3; color: #854d0e; }
  .hw-low  { background: #fee2e2; color: #991b1b; }
  .att-badge { font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 6px; white-space: nowrap; }
  .att-active { background: #dbeafe; color: #1e40af; }
  .att-mid    { background: #fef9c3; color: #854d0e; }
  .att-low    { background: #fdf2f8; color: #be185d; }
  .cc-expand { font-size: 12px; color: #aeaeb2; margin-left: auto; transition: transform 0.2s; flex-shrink: 0; }
  .cc-item.open .cc-expand { transform: rotate(180deg); }
  .cc-item-body { max-height: 0; overflow: hidden; transition: max-height 0.3s ease, padding 0.3s ease; }
  .cc-item.open .cc-item-body { max-height: 400px; padding: 0 14px 14px; border-top: 1px solid #f3e8ff; }
  .cc-body-section { margin-top: 10px; }
  .cc-body-label { font-size: 10px; font-weight: 700; color: #a21caf; letter-spacing: 0.05em; margin-bottom: 4px; }
  .cc-body-text  { font-size: 13px; color: var(--text); line-height: 1.7; white-space: pre-wrap; word-break: break-word; }
  .cc-body-row   { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 10px; }
  .cc-body-item  { display: flex; flex-direction: column; gap: 2px; }
  .cc-body-item-lbl { font-size: 10px; color: var(--text-muted); font-weight: 600; }
  .cc-body-item-val { font-size: 13px; font-weight: 700; color: var(--text); }
  .cc-empty   { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 14px; line-height: 1.8; }
  .cc-loading { text-align: center; padding: 32px; color: var(--text-muted); font-size: 13px; }
  .cc-modal-footer { padding: 14px 24px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; gap: 8px; }
  .cc-write-link { font-size: 12px; color: #a21caf; font-weight: 600; cursor: pointer; padding: 7px 14px; border: 1.5px solid #f3e8ff; border-radius: 8px; background: none; font-family: inherit; transition: background 0.15s; white-space: nowrap; }
  .cc-write-link:hover { background: #fdf4ff; }
</style>
</head>
<body>
<div class="app-wrapper">
  <header class="topbar">
    <a href="index.html" class="logo-area">
      <div class="logo-icon">
        <svg width="18" height="18" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
          <path d="M9 3h6M9 3v7L4.5 17A2 2 0 0 0 6.4 20h11.2a2 2 0 0 0 1.9-3L15 10V3"/>
          <line x1="6.5" y1="14" x2="17.5" y2="14"/>
        </svg>
      </div>
      <div class="logo-text"><span class="brand">BETA</span><span class="brand-sub">SCIENCE</span></div>
    </a>
    <div class="topbar-divider"></div>
    <nav>
      <ul class="nav-tabs">
        <li><a href="dashboard.html">대시보드</a></li>
        <li><a href="students.html" class="active">학생 관리</a></li>
        <li><a href="special.html">특별관리</a></li>
        <li><a href="sms.html">SMS설정</a></li>
        <li><a href="management.html">학원관리</a></li>
        <li><a href="teacher-board.html">선생님 게시판</a></li>
      </ul>
    </nav>
    <div class="topbar-right">
      <span class="badge-admin">관리자 모드</span>
      <button class="btn-logout" onclick="doLogout()">로그아웃</button>
    </div>
  </header>

  <main class="main-content">
    <div class="page-header">
      <div><h1>학생 관리</h1><p>학생 정보를 추가, 수정, 삭제할 수 있습니다</p></div>
      <button class="btn-primary" onclick="openAddModal()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        학생 추가
      </button>
    </div>
    <div class="search-filter-row">
      <div class="search-box">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="searchInput" placeholder="학생 이름 또는 ID로 검색..." oninput="filterStudents()">
      </div>
      <select class="filter-select" id="gradeFilter" onchange="filterStudents()">
        <option value="">전체 학년</option>
        <option value="중등1학년">중등1학년</option>
        <option value="중등2학년">중등2학년</option>
        <option value="중등3학년">중등3학년</option>
        <option value="고등1학년">고등1학년</option>
        <option value="고등2학년">고등2학년</option>
        <option value="고등3학년">고등3학년</option>
      </select>
      <span class="student-count">총 <strong id="countDisplay">0</strong>명</span>
    </div>
    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th>학생 ID</th><th>이름</th><th>학년</th><th>수강 과목</th>
            <th>담당선생님</th><th>학부모 전화번호</th><th>등록일</th>
            <th>수업카드</th><th>수정/삭제</th>
          </tr>
        </thead>
        <tbody id="studentTableBody">
          <tr><td colspan="9" style="text-align:center;padding:40px;color:var(--text-muted);">데이터를 불러오는 중...</td></tr>
        </tbody>
      </table>
      <div id="emptyState" class="empty-state" style="display:none;">
        <svg width="40" height="40" fill="none" stroke="#cbd5e1" stroke-width="1.5" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        <p>등록된 학생이 없습니다</p>
      </div>
    </div>
    <div class="pagination" id="pagination"></div>
  </main>
</div>

<!-- 학생 추가/수정 모달 -->
<div class="modal-overlay" id="studentModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">학생 추가</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="form-row">
      <div class="form-group"><label>학생 ID</label><input type="text" id="inputId" placeholder="예: m01010"></div>
      <div class="form-group"><label>이름 <span style="color:var(--danger)">*</span></label><input type="text" id="inputName" placeholder="학생 이름"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>학년 <span style="color:var(--danger)">*</span></label>
        <select id="inputGrade">
          <option value="">선택</option>
          <option value="중등1학년">중등1학년</option><option value="중등2학년">중등2학년</option><option value="중등3학년">중등3학년</option>
          <option value="고등1학년">고등1학년</option><option value="고등2학년">고등2학년</option><option value="고등3학년">고등3학년</option>
        </select>
      </div>
      <div class="form-group"><label>수강 과목</label><input type="text" id="inputSubject" placeholder="예: 통합과학, 물리"></div>
    </div>
    <div class="form-group"><label>학부모 전화번호</label><input type="tel" id="inputPhone" placeholder="010-0000-0000"></div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal()">취소</button>
      <button class="btn-primary" onclick="saveStudent()">저장</button>
    </div>
  </div>
</div>

<!-- 수업카드 조회 모달 -->
<div class="modal-overlay" id="classCardModal">
  <div class="cc-modal">
    <div class="cc-modal-header">
      <h2 id="ccModalTitle">수업카드</h2>
      <button class="modal-close" onclick="closeClassCardModal()">✕</button>
    </div>
    <div class="cc-stat-bar">
      <div class="cc-stat-chip"><div class="num" id="cc-total">—</div><div class="lbl">전체 수업카드</div></div>
      <div class="cc-stat-chip"><div class="num" id="cc-month">—</div><div class="lbl">이번달</div></div>
      <div class="cc-stat-chip"><div class="num" id="cc-avg">—</div><div class="lbl">평균 테스트 점수</div></div>
    </div>
    <div class="cc-list-scroll" id="ccListScroll">
      <div class="cc-loading">불러오는 중...</div>
    </div>
    <div class="cc-modal-footer">
      <button class="cc-write-link" onclick="window.location.href='teacher-board.html'">
        🗂️ 선생님 게시판에서 수업카드 작성하기 →
      </button>
      <button class="btn-secondary" onclick="closeClassCardModal()">닫기</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import {
    getFirestore, doc, getDoc, collection, addDoc, updateDoc, deleteDoc,
    query, orderBy, onSnapshot, getDocs, where
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD5MQx_rXO_xRYelyKxK090TaKa3Gg2D3k",
    authDomain: "beta-science.firebaseapp.com",
    projectId: "beta-science",
    storageBucket: "beta-science.firebasestorage.app",
    messagingSenderId: "650652155367",
    appId: "1:650652155367:web:41d2958e675cb4edd4d142"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.replace("/login.html"); return; }
    try {
      const snap = await getDoc(doc(db, "users", user.uid));
      if (!snap.exists() || snap.data().status !== "approved") {
        await signOut(auth); window.location.replace("/login.html"); return;
      }
      document.body.style.visibility = "visible";
      initStudents();
    } catch(e) { window.location.replace("/login.html"); }
  });

  window.doLogout = async () => { await signOut(auth); window.location.replace("/login.html"); };

  const ITEMS_PER_PAGE = 10;
  let currentPage = 1, editingId = null;
  let students = [], filtered = [];

  // ★ ccCache: fireId → { count, teacher }  +  studentIdMap: 학번(id) → fireId
  let ccCache = {};       // key: fireId
  let ccByStudentId = {}; // key: 학번(s.id) → 이 경우도 처리 (기존 데이터 호환)
  let studentIdToFireId = {}; // 학번 → fireId 매핑

  function gradeBadgeClass(g) {
    return {'중등1학년':'grade-mid1','중등2학년':'grade-mid2','중등3학년':'grade-mid3',
      '고등1학년':'grade-high1','고등2학년':'grade-high2','고등3학년':'grade-high3'}[g]||'grade-mid1';
  }

  async function initStudents() {
    // ── 1단계: 학생 목록 먼저 로드해서 fireId ↔ 학번 매핑 구성 ──
    try {
      const studentSnap = await getDocs(collection(db, "students"));
      studentSnap.forEach(d => {
        const sid = d.data().id; // 학번 (h01001 등)
        if (sid) studentIdToFireId[sid] = d.id; // fireId
      });
    } catch(e) { console.warn("학생 목록 사전 로드 실패:", e.message); }

    // ── 2단계: classCards 전체 집계 ──
    // classCards.studentId 에는 fireId 또는 학번이 저장될 수 있음
    // 양쪽 모두 처리해서 ccCache에 fireId 기준으로 통합
    try {
      const ccSnap = await getDocs(query(collection(db, "classCards"), orderBy("classDate", "desc")));
      const seenFireId = new Set();
      const seenStudentId = new Set();

      ccSnap.forEach(d => {
        const c = d.data();
        const sid = c.studentId; // fireId 또는 학번
        if (!sid) return;

        // fireId인지 학번인지 판단:
        // studentIdToFireId에 값으로 존재하면 fireId, 키로 존재하면 학번
        let resolvedFireId = null;

        // studentIdToFireId 의 values 중에 sid가 있으면 → sid가 fireId
        const isFireId = Object.values(studentIdToFireId).includes(sid);
        const isStudentId = Object.prototype.hasOwnProperty.call(studentIdToFireId, sid);

        if (isFireId) {
          resolvedFireId = sid;
        } else if (isStudentId) {
          resolvedFireId = studentIdToFireId[sid];
        } else {
          // 매핑 불명확 → sid 그대로 키로 사용 (fireId로 간주)
          resolvedFireId = sid;
        }

        if (!resolvedFireId) return;

        if (!ccCache[resolvedFireId]) ccCache[resolvedFireId] = { count: 0, teacher: '' };
        ccCache[resolvedFireId].count++;

        // 가장 최근(오름차순 정렬이므로 첫 번째) teacher 저장
        if (!seenFireId.has(resolvedFireId)) {
          ccCache[resolvedFireId].teacher = c.teacher || '';
          seenFireId.add(resolvedFireId);
        }
      });
    } catch(e) { console.warn("classCards 집계 실패:", e.message); }

    // ── 3단계: 학생 목록 실시간 감시 ──
    onSnapshot(
      query(collection(db, "students"), orderBy("regDate", "desc")),
      (snapshot) => {
        // 새로운 학생이 추가될 때마다 매핑 업데이트
        snapshot.docs.forEach(d => {
          const sid = d.data().id;
          if (sid) studentIdToFireId[sid] = d.id;
        });
        students = snapshot.docs.map(d => ({ fireId: d.id, ...d.data() }));
        filterStudents();
      },
      (error) => {
        document.getElementById('studentTableBody').innerHTML =
          `<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--danger);">오류: ${error.message}</td></tr>`;
      }
    );
  }

  window.renderTable = function() {
    const tbody = document.getElementById('studentTableBody');
    const empty = document.getElementById('emptyState');
    const start = (currentPage - 1) * ITEMS_PER_PAGE;
    const pageData = filtered.slice(start, start + ITEMS_PER_PAGE);
    document.getElementById('countDisplay').textContent = filtered.length;

    if (!filtered.length) { tbody.innerHTML = ''; empty.style.display = 'block'; return; }
    empty.style.display = 'none';

    tbody.innerHTML = pageData.map(s => {
      const subs = s.subject && s.subject !== '-'
        ? s.subject.split(',').map(x => `<span class="subject-tag">${x.trim()}</span>`).join('')
        : '<span style="color:var(--text-muted)">-</span>';

      // ★ fireId 기준으로 수업카드 조회
      const info    = ccCache[s.fireId] || { count: 0, teacher: '' };
      const hasCard = info.count > 0;
      const teacher = info.teacher || '-';
      const safeName = (s.name||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");

      return `<tr>
        <td class="student-id">${s.id||'-'}</td>
        <td style="font-weight:500">${s.name||'-'}</td>
        <td><span class="grade-badge ${gradeBadgeClass(s.grade)}">${s.grade||'-'}</span></td>
        <td>${subs}</td>
        <td class="teacher-name${teacher !== '-' ? ' assigned' : ''}">${esc(teacher)}</td>
        <td>${s.phone||'-'}</td>
        <td style="color:var(--text-muted);font-size:13px">${s.regDate||'-'}</td>
        <td>
          <button class="card-btn${hasCard?' has-card':''}"
            onclick="openClassCardModal('${s.fireId}','${safeName}','${(s.id||'').replace(/'/g,"\\'")}')">
            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
            ${hasCard ? `수업카드 보기 (${info.count}건)` : '수업카드 없음'}
          </button>
        </td>
        <td><div class="action-icons">
          <button class="action-btn" onclick="openEditModal('${s.fireId}')">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="action-btn del" onclick="deleteStudent('${s.fireId}','${safeName}')">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
          </button>
        </div></td>
      </tr>`;
    }).join('');
    renderPagination();
  }

  window.filterStudents = function() {
    const search = document.getElementById('searchInput').value.trim().toLowerCase();
    const grade  = document.getElementById('gradeFilter').value;
    filtered = students.filter(s =>
      (!search || (s.name&&s.name.toLowerCase().includes(search)) || (s.id&&s.id.toLowerCase().includes(search))) &&
      (!grade  || s.grade === grade)
    );
    currentPage = 1; renderTable();
  }

  window.renderPagination = function() {
    const total = Math.ceil(filtered.length / ITEMS_PER_PAGE);
    const pg = document.getElementById('pagination');
    if (total <= 1) { pg.innerHTML = ''; return; }
    let h = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
    for (let i=1;i<=total;i++) h+=`<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
    h += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===total?'disabled':''}>›</button>`;
    pg.innerHTML = h;
  }

  window.goPage = function(p) {
    const t = Math.ceil(filtered.length / ITEMS_PER_PAGE);
    if (p < 1 || p > t) return;
    currentPage = p; renderTable();
  }

  window.openAddModal = function() {
    editingId = null;
    document.getElementById('modalTitle').textContent = '학생 추가';
    ['inputId','inputName','inputSubject','inputPhone'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('inputGrade').value = '';
    document.getElementById('inputId').disabled = false;
    document.getElementById('studentModal').classList.add('open');
  }

  window.openEditModal = function(fireId) {
    editingId = fireId;
    const s = students.find(x => x.fireId === fireId);
    if (!s) return;
    document.getElementById('modalTitle').textContent = '학생 정보 수정';
    document.getElementById('inputId').value      = s.id || '';
    document.getElementById('inputId').disabled   = true;
    document.getElementById('inputName').value    = s.name || '';
    document.getElementById('inputGrade').value   = s.grade || '';
    document.getElementById('inputSubject').value = s.subject === '-' ? '' : (s.subject||'');
    document.getElementById('inputPhone').value   = s.phone || '';
    document.getElementById('studentModal').classList.add('open');
  }

  window.closeModal = () => document.getElementById('studentModal').classList.remove('open');

  window.saveStudent = async function() {
    const name    = document.getElementById('inputName').value.trim();
    const grade   = document.getElementById('inputGrade').value;
    const id      = document.getElementById('inputId').value.trim() || `s${Date.now()}`;
    const subject = document.getElementById('inputSubject').value.trim() || '-';
    const phone   = document.getElementById('inputPhone').value.trim() || '-';
    if (!name || !grade) { alert('이름과 학년을 입력해주세요.'); return; }
    try {
      if (!editingId) {
        const today = new Date();
        await addDoc(collection(db,"students"), { id, name, grade, subject, phone, regDate: `${today.getFullYear()}. ${today.getMonth()+1}. ${today.getDate()}.` });
      } else {
        await updateDoc(doc(db,"students",editingId), { name, grade, subject, phone });
      }
      closeModal();
    } catch(e) { alert("저장 오류: " + e.message); }
  }

  window.deleteStudent = async function(fireId, name) {
    if (!confirm(`"${name}" 학생을 삭제하시겠습니까?`)) return;
    try { await deleteDoc(doc(db,"students",fireId)); }
    catch(e) { alert("삭제 오류: " + e.message); }
  }

  // ── ★ 수업카드 조회 모달 (fireId + 학번 양쪽 쿼리) ──
  window.openClassCardModal = async function(fireId, name, studentId) {
    document.getElementById('ccModalTitle').textContent = `${name} · 수업카드`;
    document.getElementById('cc-total').textContent = '—';
    document.getElementById('cc-month').textContent = '—';
    document.getElementById('cc-avg').textContent   = '—';
    document.getElementById('ccListScroll').innerHTML = '<div class="cc-loading">불러오는 중...</div>';
    document.getElementById('classCardModal').classList.add('open');

    try {
      // ★ fireId로 먼저 쿼리
      const snap1 = await getDocs(query(
        collection(db, "classCards"),
        where("studentId", "==", fireId),
        orderBy("classDate", "desc")
      ));
      let cards = snap1.docs.map(d => ({ id: d.id, ...d.data() }));

      // ★ 학번(studentId)으로도 추가 쿼리 (기존 데이터 호환)
      if (studentId && studentId !== fireId) {
        try {
          const snap2 = await getDocs(query(
            collection(db, "classCards"),
            where("studentId", "==", studentId),
            orderBy("classDate", "desc")
          ));
          const cards2 = snap2.docs.map(d => ({ id: d.id, ...d.data() }));
          // 중복 제거 후 병합
          const existingIds = new Set(cards.map(c => c.id));
          cards2.forEach(c => { if (!existingIds.has(c.id)) cards.push(c); });
          // 날짜 내림차순 재정렬
          cards.sort((a, b) => (b.classDate || '').localeCompare(a.classDate || ''));
        } catch(e2) {
          // 학번 쿼리 실패해도 fireId 결과 사용
          console.warn("학번 classCards 쿼리 실패:", e2.message);
        }
      }

      renderCCStats(cards);
      renderCCList(cards);
    } catch(e) {
      document.getElementById('ccListScroll').innerHTML =
        `<div class="cc-empty">로드 실패: ${e.message}</div>`;
    }
  }

  function renderCCStats(cards) {
    document.getElementById('cc-total').textContent = cards.length + '건';
    const now = new Date();
    const ms = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
    document.getElementById('cc-month').textContent = cards.filter(c=>(c.classDate||'').startsWith(ms)).length + '건';
    const scored = cards.filter(c => typeof c.score === 'number' && c.score >= 0 && !c.scoreNone);
    document.getElementById('cc-avg').textContent = scored.length
      ? Math.round(scored.reduce((a,c)=>a+c.score,0)/scored.length) + '점' : '—';
  }

  function renderCCList(cards) {
    const wrap = document.getElementById('ccListScroll');
    if (!cards.length) {
      wrap.innerHTML = `<div class="cc-empty">
        <svg width="40" height="40" fill="none" stroke="#cbd5e1" stroke-width="1.5" viewBox="0 0 24 24" style="margin-bottom:12px;"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
        <p>아직 작성된 수업카드가 없습니다.<br>선생님 게시판에서 수업카드를 작성해주세요.</p>
      </div>`;
      return;
    }

    wrap.innerHTML = cards.map(c => {
      const sc  = typeof c.score === 'number' ? c.score : -1;
      const scCls = c.scoreNone ? 'cc-chip-none' : (sc >= 70 ? 'cc-chip-good' : sc >= 0 ? 'cc-chip-bad' : 'cc-chip-none');
      const scTxt = c.scoreNone ? '테스트없음' : (sc >= 0 ? sc+'점' : '—');
      const hwCls = c.homework==='높음' ? 'hw-high' : c.homework==='낮음' ? 'hw-low' : 'hw-mid';
      const attCls = c.attitude==='적극적' ? 'att-active' : c.attitude==='산만' ? 'att-low' : 'att-mid';

      return `<div class="cc-item" id="cci-${c.id}">
        <div class="cc-item-head" onclick="toggleCC('${c.id}')">
          <div style="flex:1;min-width:0;">
            <div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px;">
              <span class="cc-chip cc-chip-subj" style="margin-right:4px;">${esc(c.subject||'—')}</span> 수업
            </div>
            <div class="cc-item-meta">
              <span class="cc-chip cc-chip-teacher">${esc(c.teacher||'—')}</span>
              <span class="cc-chip cc-chip-date">${c.classDate||'—'}</span>
              <span class="cc-chip ${scCls}">${scTxt}</span>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:6px;flex-shrink:0;">
            ${c.homework && c.homework!=='-' ? `<span class="cc-hw-badge ${hwCls}">과제 ${esc(c.homework)}</span>` : ''}
            ${c.attitude ? `<span class="att-badge ${attCls}">${esc(c.attitude)}</span>` : ''}
            <span class="cc-expand">▾</span>
          </div>
        </div>
        <div class="cc-item-body">
          ${c.content ? `<div class="cc-body-section"><div class="cc-body-label">수업 내용</div><div class="cc-body-text">${esc(c.content)}</div></div>` : ''}
          ${c.homeworkContent ? `<div class="cc-body-section"><div class="cc-body-label">과제 내용</div><div class="cc-body-text">${esc(c.homeworkContent)}</div></div>` : ''}
          <div class="cc-body-row">
            ${c.homeworkDone && c.homeworkDone!=='-' ? `<div class="cc-body-item"><div class="cc-body-item-lbl">숙제 완료</div><div class="cc-body-item-val">${esc(c.homeworkDone)}</div></div>` : ''}
          </div>
        </div>
      </div>`;
    }).join('');
  }

  window.toggleCC = id => { document.getElementById('cci-'+id)?.classList.toggle('open'); }

  window.closeClassCardModal = function() {
    document.getElementById('classCardModal').classList.remove('open');
  }

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  document.getElementById('studentModal').addEventListener('click', e => { if(e.target===e.currentTarget) closeModal(); });
  document.getElementById('classCardModal').addEventListener('click', e => { if(e.target===e.currentTarget) closeClassCardModal(); });
</script>
</body>
</html>

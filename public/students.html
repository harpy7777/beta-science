<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학생 관리 - 베타과학학원</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--pink:#ec4899;--pink-lt:#fdf2f8;--pink-dk:#be185d;--mw:1200px;--bg:#fef7fb;--wh:#fff;--tx:#1e293b;--mt:#94a3b8;--bd:#f0e4ec;--r:12px;--ok:#10b981;--ng:#ef4444}
body{font-family:'Noto Sans KR',-apple-system,sans-serif;font-weight:400;font-size:13px;background:var(--bg);color:var(--tx);min-height:100vh;visibility:hidden;overflow-x:hidden}
.app-wrapper{max-width:var(--mw);margin:0 auto;display:flex;flex-direction:column;min-height:100vh}

/* ══ 탑바 ══ */
.topbar{background:var(--wh);border-bottom:1px solid var(--bd);padding:0 28px;display:flex;align-items:center;gap:12px;height:52px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(236,72,153,.06);flex-wrap:nowrap}
.logo-area{display:flex;align-items:center;gap:9px;text-decoration:none;flex-shrink:0}
.logo-icon{width:28px;height:28px;background:linear-gradient(135deg,#f472b6 0%,#db2777 100%);border-radius:8px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(244,114,182,.35);flex-shrink:0}
.logo-name{font-size:14px;font-weight:500;color:var(--tx);letter-spacing:-.01em}
.topbar-divider{width:1px;height:20px;background:var(--bd);flex-shrink:0}
.topbar nav{flex:1;display:flex;align-items:center;min-width:0;overflow:hidden}
.nav-tabs{display:flex;list-style:none;width:100%;justify-content:space-evenly;align-items:center}
.nav-tabs li{flex:1;text-align:center}
.nav-tabs a{display:block;padding:7px 6px;font-size:12px;font-weight:500;color:var(--mt);text-decoration:none;border-radius:20px;white-space:nowrap;transition:all .15s;text-align:center}
.nav-tabs a:hover{background:var(--pink-lt);color:var(--tx)}
.nav-tabs a.active{background:#fce7f3;color:var(--pink);font-weight:700}
.topbar-right{flex-shrink:0;display:flex;align-items:center;gap:8px}
.badge-admin{font-size:11px;padding:3px 10px;background:var(--pink-lt);border:1px solid #fbcfe8;border-radius:20px;color:var(--pink);font-weight:700;white-space:nowrap}
.btn-logout{padding:5px 14px;background:transparent;border:1.5px solid #fbcfe8;border-radius:20px;font-family:inherit;font-size:11px;font-weight:700;color:var(--pink);cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-logout:hover{background:var(--pink-lt)}

/* ══ 모바일 전용 네비 바 ══ */
.mobile-nav-bar{display:none;background:var(--wh);border-bottom:1px solid var(--bd);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;position:sticky;top:50px;z-index:99}
.mobile-nav-bar::-webkit-scrollbar{display:none}
.mobile-nav-inner{display:flex;padding:0 8px;gap:2px;min-width:max-content}
.mobile-nav-bar a{display:block;padding:9px 13px;font-size:12px;font-weight:500;color:var(--mt);text-decoration:none;white-space:nowrap;border-bottom:2px solid transparent;transition:all .15s}
.mobile-nav-bar a.active{color:var(--pink);border-bottom-color:var(--pink);font-weight:700}
.mobile-nav-bar a:hover{color:var(--tx)}

/* ══ 레이아웃 ══ */
.main-content{padding:24px 28px;flex:1}
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;background:linear-gradient(135deg,#fdf2f8,#fce7f3);border-radius:14px;padding:16px 18px;border:1px solid #fbcfe8;gap:12px}
.page-header h1{font-size:18px;font-weight:700;margin-bottom:3px}
.page-header p{font-size:12px;color:var(--mt)}
.btn-primary{display:flex;align-items:center;gap:6px;padding:9px 16px;background:var(--pink);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:background .15s;font-family:inherit;box-shadow:0 2px 8px rgba(236,72,153,.25);flex-shrink:0}
.btn-primary:hover{background:var(--pink-dk)}

/* ══ 검색 ══ */
.search-filter-row{display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap}
.search-box{position:relative;flex:1;min-width:160px}
.search-box svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--mt)}
.search-box input{width:100%;padding:9px 11px 9px 34px;border:1px solid var(--bd);border-radius:8px;font-size:12px;color:var(--tx);background:var(--wh);outline:none;transition:border .15s;font-family:inherit}
.search-box input:focus{border-color:var(--pink)}
.search-box input::placeholder{color:var(--mt)}
.filter-select{padding:8px 11px;border:1px solid var(--bd);border-radius:8px;font-size:12px;color:var(--tx);background:var(--wh);cursor:pointer;min-width:100px;outline:none;font-family:inherit}
.filter-select:focus{border-color:var(--pink)}
.student-count{font-size:12px;color:var(--mt);white-space:nowrap}
.student-count strong{color:var(--tx);font-weight:700}

/* ══ 테이블 ══ */
.table-card{background:var(--wh);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden}
.table-card:hover{border-color:#fbcfe8}
.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:700px}
thead th{font-size:11px;font-weight:700;color:var(--mt);text-align:center;padding:10px 12px;border-bottom:1px solid var(--bd);background:#fdf2f8;white-space:nowrap}
tbody tr{border-bottom:1px solid var(--bd);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#fdf2f8}
tbody td{font-size:12px;padding:11px 12px;color:var(--tx);text-align:center;vertical-align:middle}
.student-id{font-size:11px;color:var(--mt);font-family:monospace}
.grade-badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.grade-mid1{background:#ede9fe;color:#6d28d9}.grade-mid2{background:#dbeafe;color:#1d4ed8}.grade-mid3{background:#d1fae5;color:#065f46}
.grade-high1{background:#fef3c7;color:#92400e}.grade-high2{background:#fee2e2;color:#991b1b}.grade-high3{background:#fce7f3;color:#9d174d}
.subject-tag{display:inline-block;padding:2px 7px;background:var(--pink-lt);border-radius:4px;font-size:11px;color:var(--mt);margin:1px}
.action-icons{display:flex;gap:5px;align-items:center;justify-content:center}
.action-btn{width:30px;height:30px;border-radius:6px;border:1px solid var(--bd);background:var(--wh);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .1s;color:var(--mt)}
.action-btn:hover{background:var(--pink-lt);color:var(--tx)}
.action-btn.del:hover{background:#fef2f2;border-color:#fca5a5;color:var(--ng)}
.card-btn{display:inline-flex;align-items:center;gap:4px;padding:5px 9px;border-radius:6px;background:var(--pink-lt);border:1px solid #fbcfe8;color:var(--pink);font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;transition:background .15s;font-family:inherit}
.card-btn:hover{background:#fce7f3}
.card-btn.has-card{background:#ecfdf5;border-color:#6ee7b7;color:#065f46}
.card-btn.has-card:hover{background:#d1fae5}
.teacher-name{font-size:12px;color:var(--mt)}
.teacher-name.assigned{color:var(--tx);font-weight:500}

/* ══ 모바일 카드 ══ */
.mobile-card-list{display:none;flex-direction:column;gap:0}
.m-card{border-bottom:1px solid var(--bd);padding:14px 16px;background:var(--wh);transition:background .1s}
.m-card:last-child{border-bottom:none}
.m-card:hover{background:#fdf2f8}
.m-card-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.m-card-info{flex:1;min-width:0}
.m-card-name{font-size:14px;font-weight:700;margin-bottom:3px}
.m-card-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.m-card-id{font-size:11px;color:var(--mt);font-family:monospace}
.m-card-subjects{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:8px}
.m-card-bottom{display:flex;align-items:center;justify-content:space-between;gap:8px}

/* ══ 페이지네이션 ══ */
.pagination{display:flex;align-items:center;justify-content:center;gap:4px;padding:16px 0 4px}
.page-btn{width:32px;height:32px;border:1px solid var(--bd);border-radius:6px;background:var(--wh);font-size:12px;color:var(--mt);cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit}
.page-btn:hover{background:var(--pink-lt);color:var(--tx)}
.page-btn.active{background:var(--pink);color:#fff;border-color:var(--pink);font-weight:700}
.page-btn:disabled{opacity:.4;cursor:not-allowed}
.empty-state{text-align:center;padding:48px 20px;color:var(--mt)}
.empty-state p{font-size:14px;margin-top:10px}

/* ══ 모달 ══ */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--wh);border-radius:14px;padding:24px 20px;width:100%;max-width:480px;margin:16px;max-height:90vh;overflow-y:auto}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-header h2{font-size:16px;font-weight:700}
.modal-close{width:30px;height:30px;border:none;background:var(--pink-lt);border-radius:6px;cursor:pointer;font-size:14px;color:var(--mt);display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:#fce7f3}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;font-weight:700;color:var(--tx);margin-bottom:5px}
.form-group input,.form-group select{width:100%;padding:10px 12px;border:1px solid var(--bd);border-radius:8px;font-size:13px;color:var(--tx);outline:none;transition:border .15s;background:var(--wh);font-family:inherit}
.form-group input:focus,.form-group select:focus{border-color:var(--pink)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid #fce7f3}
.btn-secondary{padding:8px 16px;border:1px solid var(--bd);border-radius:8px;background:var(--wh);font-size:12px;color:var(--tx);cursor:pointer;font-family:inherit;font-weight:500}
.btn-secondary:hover{background:var(--pink-lt)}

/* ══ 수업카드 모달 ══ */
.cc-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}
.cc-modal-overlay.open{display:flex}
.cc-modal{background:var(--wh);border-radius:16px;width:100%;max-width:640px;margin:16px;max-height:92vh;overflow:hidden;display:flex;flex-direction:column}
.cc-modal-header{padding:18px 18px 0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.cc-modal-header h2{font-size:15px;font-weight:700}
.cc-stat-bar{display:flex;gap:8px;padding:12px 18px 0;flex-shrink:0}
.cc-stat-chip{flex:1;padding:10px 8px;border-radius:10px;border:1px solid #fce7f3;background:var(--pink-lt);text-align:center}
.cc-stat-chip .num{font-size:18px;font-weight:700;color:var(--pink)}
.cc-stat-chip .lbl{font-size:10px;color:var(--mt);margin-top:2px}
.cc-list-scroll{flex:1;overflow-y:auto;padding:10px 18px 8px}
.cc-item{border:1.5px solid #f3e8ff;border-radius:10px;overflow:hidden;margin-bottom:8px;background:var(--wh)}
.cc-item-head{padding:11px 13px;display:flex;align-items:center;gap:8px;cursor:pointer}
.cc-item-head:hover{background:#fdf4ff}
.cc-item-meta{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;align-items:center}
.cc-chip{font-size:10px;font-weight:700;padding:2px 6px;border-radius:5px;white-space:nowrap}
.cc-chip-subj{background:#f3e8ff;color:#7e22ce}.cc-chip-teacher{background:#dbeafe;color:#1e40af}
.cc-chip-date{background:#f5f5f7;color:#6e6e73}.cc-chip-good{background:#d1fae5;color:#065f46}
.cc-chip-bad{background:#fee2e2;color:#991b1b}.cc-chip-none{background:#f5f5f7;color:#aeaeb2}
.cc-hw-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;white-space:nowrap}
.hw-high{background:#d1fae5;color:#065f46}.hw-mid{background:#fef9c3;color:#854d0e}.hw-low{background:#fee2e2;color:#991b1b}
.att-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;white-space:nowrap}
.att-active{background:#dbeafe;color:#1e40af}.att-mid{background:#fef9c3;color:#854d0e}.att-low{background:var(--pink-lt);color:var(--pink-dk)}
.cc-expand{font-size:11px;color:#aeaeb2;margin-left:auto;transition:transform .2s;flex-shrink:0}
.cc-item.open .cc-expand{transform:rotate(180deg)}
.cc-item-body{max-height:0;overflow:hidden;transition:max-height .3s ease,padding .3s ease}
.cc-item.open .cc-item-body{max-height:400px;padding:0 13px 13px;border-top:1px solid #f3e8ff}
.cc-body-section{margin-top:10px}
.cc-body-label{font-size:10px;font-weight:700;color:#a21caf;letter-spacing:.05em;margin-bottom:4px}
.cc-body-text{font-size:12px;color:var(--tx);line-height:1.7;white-space:pre-wrap;word-break:break-word}
.cc-empty{text-align:center;padding:36px 20px;color:var(--mt);font-size:12px;line-height:1.8}
.cc-loading{text-align:center;padding:28px;color:var(--mt);font-size:12px}
.cc-modal-footer{padding:12px 18px;border-top:1px solid #fce7f3;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;gap:8px}
.cc-write-link{font-size:12px;color:#a21caf;font-weight:700;cursor:pointer;padding:6px 12px;border:1.5px solid #f3e8ff;border-radius:8px;background:none;font-family:inherit;transition:background .15s;white-space:nowrap}
.cc-write-link:hover{background:#fdf4ff}

/* ══ 모바일 (600px 이하) ══ */
@media(max-width:600px){
  .topbar{padding:0 14px;height:50px}
  .topbar-divider{display:none}
  .topbar nav{display:none}
  .badge-admin{display:none}
  .mobile-nav-bar{display:block;top:50px}
  .main-content{padding:14px 12px}
  .page-header{padding:14px 16px;border-radius:10px}
  .page-header h1{font-size:16px}
  .table-card .table-desktop{display:none}
  .mobile-card-list{display:flex}
  .search-filter-row{flex-wrap:wrap}
  .search-box{min-width:100%;order:1}
  .filter-select{flex:1;order:2}
  .student-count{order:3;width:100%;text-align:right}
  .modal-overlay{align-items:flex-end}
  .modal{border-radius:16px 16px 0 0;margin:0;max-width:100%}
  .cc-modal-overlay{align-items:flex-end}
  .cc-modal{border-radius:16px 16px 0 0;margin:0;max-width:100%}
}
@media(min-width:601px){
  .table-desktop{display:block}
  .mobile-card-list{display:none!important}
}
</style>
</head>
<body>
<div class="app-wrapper">

<header class="topbar">
  <a href="index.html" class="logo-area">
    <div class="logo-icon">
      <svg width="16" height="16" viewBox="0 0 18 18" fill="none">
        <circle cx="9" cy="7" r="3" fill="rgba(255,255,255,0.9)"/>
        <path d="M3.5 16c0-3 2.5-5.5 5.5-5.5s5.5 2.5 5.5 5.5" stroke="rgba(255,255,255,0.9)" stroke-width="1.4" stroke-linecap="round" fill="none"/>
      </svg>
    </div>
    <span class="logo-name">베타과학학원</span>
  </a>
  <div class="topbar-divider"></div>
  <nav>
    <ul class="nav-tabs">
      <li><a href="dashboard.html">대시보드</a></li>
      <li><a href="students.html" class="active">학생 관리</a></li>
      <li><a href="special.html">특별관리</a></li>
      <li><a href="sms.html">SMS설정</a></li>
      <li><a href="management.html">학원관리</a></li>
      <li><a href="teacher-board.html">선생님 게시판</a></li>
    </ul>
  </nav>
  <div class="topbar-right">
    <span class="badge-admin">관리자 모드</span>
    <button class="btn-logout" onclick="doLogout()">로그아웃</button>
  </div>
</header>

<!-- 모바일 전용 네비 바 -->
<div class="mobile-nav-bar">
  <div class="mobile-nav-inner">
    <a href="dashboard.html">대시보드</a>
    <a href="students.html" class="active">학생 관리</a>
    <a href="special.html">특별관리</a>
    <a href="sms.html">SMS설정</a>
    <a href="management.html">학원관리</a>
    <a href="teacher-board.html">선생님 게시판</a>
  </div>
</div>

<main class="main-content">
  <div class="page-header">
    <div><h1>학생 관리</h1><p>학생 정보를 추가, 수정, 삭제할 수 있습니다</p></div>
    <button class="btn-primary" onclick="openAddModal()">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      학생 추가
    </button>
  </div>

  <div class="search-filter-row">
    <div class="search-box">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="학생 이름 또는 ID로 검색..." oninput="filterStudents()">
    </div>
    <select class="filter-select" id="gradeFilter" onchange="filterStudents()">
      <option value="">전체 학년</option>
      <option value="중등1학년">중등1학년</option><option value="중등2학년">중등2학년</option><option value="중등3학년">중등3학년</option>
      <option value="고등1학년">고등1학년</option><option value="고등2학년">고등2학년</option><option value="고등3학년">고등3학년</option>
    </select>
    <span class="student-count">총 <strong id="countDisplay">0</strong>명</span>
  </div>

  <div class="table-card">
    <div class="table-desktop">
      <div class="table-scroll">
        <table>
          <thead><tr><th>학생 ID</th><th>이름</th><th>학년</th><th>수강 과목</th><th>담당선생님</th><th>학부모 전화번호</th><th>등록일</th><th>수업카드</th><th>수정/삭제</th></tr></thead>
          <tbody id="studentTableBody"><tr><td colspan="9" style="text-align:center;padding:40px;color:var(--mt)">데이터를 불러오는 중...</td></tr></tbody>
        </table>
      </div>
    </div>
    <div class="mobile-card-list" id="mobileCardList"></div>
    <div id="emptyState" class="empty-state" style="display:none">
      <svg width="36" height="36" fill="none" stroke="#cbd5e1" stroke-width="1.5" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
      <p>등록된 학생이 없습니다</p>
    </div>
  </div>
  <div class="pagination" id="pagination"></div>
</main>
</div>

<!-- 학생 모달 -->
<div class="modal-overlay" id="studentModal">
  <div class="modal">
    <div class="modal-header"><h2 id="modalTitle">학생 추가</h2><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="form-row">
      <div class="form-group"><label>학생 ID</label><input type="text" id="inputId" placeholder="예: m01010"></div>
      <div class="form-group"><label>이름 <span style="color:var(--ng)">*</span></label><input type="text" id="inputName" placeholder="학생 이름"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>학년 <span style="color:var(--ng)">*</span></label>
        <select id="inputGrade"><option value="">선택</option>
          <option value="중등1학년">중등1학년</option><option value="중등2학년">중등2학년</option><option value="중등3학년">중등3학년</option>
          <option value="고등1학년">고등1학년</option><option value="고등2학년">고등2학년</option><option value="고등3학년">고등3학년</option>
        </select>
      </div>
      <div class="form-group"><label>수강 과목</label><input type="text" id="inputSubject" placeholder="예: 통합과학, 물리"></div>
    </div>
    <div class="form-group"><label>학부모 전화번호</label><input type="tel" id="inputPhone" placeholder="010-0000-0000"></div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal()">취소</button>
      <button class="btn-primary" onclick="saveStudent()">저장</button>
    </div>
  </div>
</div>

<!-- 수업카드 모달 -->
<div class="cc-modal-overlay" id="classCardModal">
  <div class="cc-modal">
    <div class="cc-modal-header"><h2 id="ccModalTitle">수업카드</h2><button class="modal-close" onclick="closeClassCardModal()">✕</button></div>
    <div class="cc-stat-bar">
      <div class="cc-stat-chip"><div class="num" id="cc-total">—</div><div class="lbl">전체</div></div>
      <div class="cc-stat-chip"><div class="num" id="cc-month">—</div><div class="lbl">이번달</div></div>
      <div class="cc-stat-chip"><div class="num" id="cc-avg">—</div><div class="lbl">평균점수</div></div>
    </div>
    <div class="cc-list-scroll" id="ccListScroll"><div class="cc-loading">불러오는 중...</div></div>
    <div class="cc-modal-footer">
      <button class="cc-write-link" onclick="window.location.href='teacher-board.html'">🗂️ 수업카드 작성하기 →</button>
      <button class="btn-secondary" onclick="closeClassCardModal()">닫기</button>
    </div>
  </div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getAuth,onAuthStateChanged,signOut}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import{getFirestore,doc,getDoc,collection,addDoc,updateDoc,deleteDoc,query,orderBy,onSnapshot,getDocs,where}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const fc={apiKey:"AIzaSyD5MQx_rXO_xRYelyKxK090TaKa3Gg2D3k",authDomain:"beta-science.firebaseapp.com",projectId:"beta-science",storageBucket:"beta-science.firebasestorage.app",messagingSenderId:"650652155367",appId:"1:650652155367:web:41d2958e675cb4edd4d142"};
const app=initializeApp(fc),auth=getAuth(app),db=getFirestore(app);
onAuthStateChanged(auth,async u=>{if(!u){window.location.replace("/login.html");return;}try{const s=await getDoc(doc(db,"users",u.uid));if(!s.exists()||s.data().status!=="approved"){await signOut(auth);window.location.replace("/login.html");return;}document.body.style.visibility="visible";iStudents();}catch(er){window.location.replace("/login.html");}});
window.doLogout=async()=>{await signOut(auth);window.location.replace("/login.html");};
const IPP=10;let pg=1,eid=null,students=[],filtered=[],ccCache={},s2f={};
function gBC(g){return{'중등1학년':'grade-mid1','중등2학년':'grade-mid2','중등3학년':'grade-mid3','고등1학년':'grade-high1','고등2학년':'grade-high2','고등3학년':'grade-high3'}[g]||'grade-mid1';}
async function iStudents(){
  try{const ss=await getDocs(collection(db,"students"));ss.forEach(d=>{const id=d.data().id;if(id)s2f[id]=d.id;});}catch(e){}
  try{const cc=await getDocs(query(collection(db,"classCards"),orderBy("classDate","desc")));const seen=new Set();cc.forEach(d=>{const c=d.data(),sid=c.studentId;if(!sid)return;const fv=Object.values(s2f).includes(sid),fk=Object.prototype.hasOwnProperty.call(s2f,sid);let rfi=fv?sid:fk?s2f[sid]:sid;if(!rfi)return;if(!ccCache[rfi])ccCache[rfi]={count:0,teacher:''};ccCache[rfi].count++;if(!seen.has(rfi)){ccCache[rfi].teacher=c.teacher||'';seen.add(rfi);}});}catch(e){}
  onSnapshot(query(collection(db,"students"),orderBy("regDate","desc")),s=>{s.docs.forEach(d=>{const id=d.data().id;if(id)s2f[id]=d.id;});students=s.docs.map(d=>({fireId:d.id,...d.data()}));filterStudents();},err=>{document.getElementById('studentTableBody').innerHTML=`<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--ng)">오류: ${err.message}</td></tr>`;});
}
window.renderTable=function(){
  const tb=document.getElementById('studentTableBody'),em=document.getElementById('emptyState'),ml=document.getElementById('mobileCardList'),st=(pg-1)*IPP,pd=filtered.slice(st,st+IPP);
  document.getElementById('countDisplay').textContent=filtered.length;
  if(!filtered.length){tb.innerHTML='';ml.innerHTML='';em.style.display='block';return;}
  em.style.display='none';
  tb.innerHTML=pd.map(s=>{const subs=s.subject&&s.subject!=='-'?s.subject.split(',').map(x=>`<span class="subject-tag">${x.trim()}</span>`).join(''):'<span style="color:var(--mt)">-</span>';const info=ccCache[s.fireId]||{count:0,teacher:''},hc=info.count>0,tc=info.teacher||'-',sn=(s.name||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");return`<tr><td class="student-id">${s.id||'-'}</td><td style="font-weight:500">${s.name||'-'}</td><td><span class="grade-badge ${gBC(s.grade)}">${s.grade||'-'}</span></td><td>${subs}</td><td class="teacher-name${tc!=='-'?' assigned':''}">${e(tc)}</td><td>${s.phone||'-'}</td><td style="color:var(--mt);font-size:11px">${s.regDate||'-'}</td><td><button class="card-btn${hc?' has-card':''}" onclick="openClassCardModal('${s.fireId}','${sn}','${(s.id||'').replace(/'/g,"\\'")}')"><svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>${hc?`보기 (${info.count}건)`:'없음'}</button></td><td><div class="action-icons"><button class="action-btn" onclick="openEditModal('${s.fireId}')"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button><button class="action-btn del" onclick="deleteStudent('${s.fireId}','${sn}')"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg></button></div></td></tr>`;}).join('');
  ml.innerHTML=pd.map(s=>{const subs=s.subject&&s.subject!=='-'?s.subject.split(',').map(x=>`<span class="subject-tag">${x.trim()}</span>`).join(''):'';const info=ccCache[s.fireId]||{count:0,teacher:''},hc=info.count>0,tc=info.teacher||'-',sn=(s.name||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");return`<div class="m-card"><div class="m-card-top"><div class="m-card-info"><div class="m-card-name">${s.name||'-'}</div><div class="m-card-meta"><span class="grade-badge ${gBC(s.grade)}" style="font-size:10px;padding:2px 7px">${s.grade||'-'}</span><span class="m-card-id">${s.id||''}</span></div></div><div class="action-icons"><button class="action-btn" onclick="openEditModal('${s.fireId}')"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button><button class="action-btn del" onclick="deleteStudent('${s.fireId}','${sn}')"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg></button></div></div>${subs?`<div class="m-card-subjects">${subs}</div>`:''}<div class="m-card-bottom"><div><div style="font-size:11px;color:${tc!=='-'?'var(--tx)':'var(--mt)'};font-weight:${tc!=='-'?'500':'400'};margin-bottom:2px">${tc!=='-'?'👤 '+e(tc):'선생님 미배정'}</div><div style="font-size:11px;color:var(--mt)">${s.phone||'-'}</div></div><button class="card-btn${hc?' has-card':''}" onclick="openClassCardModal('${s.fireId}','${sn}','${(s.id||'').replace(/'/g,"\\'")}')"><svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>${hc?`수업카드 (${info.count})`:'수업카드 없음'}</button></div></div>`;}).join('');
  renderPagination();
};
window.filterStudents=function(){const s=document.getElementById('searchInput').value.trim().toLowerCase(),g=document.getElementById('gradeFilter').value;filtered=students.filter(st=>(!s||(st.name&&st.name.toLowerCase().includes(s))||(st.id&&st.id.toLowerCase().includes(s)))&&(!g||st.grade===g));pg=1;renderTable();};
window.renderPagination=function(){const t=Math.ceil(filtered.length/IPP),pp=document.getElementById('pagination');if(t<=1){pp.innerHTML='';return;}let h=`<button class="page-btn" onclick="goPage(${pg-1})" ${pg===1?'disabled':''}>‹</button>`;for(let i=1;i<=t;i++)h+=`<button class="page-btn ${i===pg?'active':''}" onclick="goPage(${i})">${i}</button>`;h+=`<button class="page-btn" onclick="goPage(${pg+1})" ${pg===t?'disabled':''}>›</button>`;pp.innerHTML=h;};
window.goPage=function(p){const t=Math.ceil(filtered.length/IPP);if(p<1||p>t)return;pg=p;renderTable();};
window.openAddModal=function(){eid=null;document.getElementById('modalTitle').textContent='학생 추가';['inputId','inputName','inputSubject','inputPhone'].forEach(id=>document.getElementById(id).value='');document.getElementById('inputGrade').value='';document.getElementById('inputId').disabled=false;document.getElementById('studentModal').classList.add('open');};
window.openEditModal=function(fi){eid=fi;const s=students.find(x=>x.fireId===fi);if(!s)return;document.getElementById('modalTitle').textContent='학생 정보 수정';document.getElementById('inputId').value=s.id||'';document.getElementById('inputId').disabled=true;document.getElementById('inputName').value=s.name||'';document.getElementById('inputGrade').value=s.grade||'';document.getElementById('inputSubject').value=s.subject==='-'?'':(s.subject||'');document.getElementById('inputPhone').value=s.phone||'';document.getElementById('studentModal').classList.add('open');};
window.closeModal=()=>document.getElementById('studentModal').classList.remove('open');
window.saveStudent=async function(){const nm=document.getElementById('inputName').value.trim(),gr=document.getElementById('inputGrade').value,id=document.getElementById('inputId').value.trim()||`s${Date.now()}`,sb=document.getElementById('inputSubject').value.trim()||'-',ph=document.getElementById('inputPhone').value.trim()||'-';if(!nm||!gr){alert('이름과 학년을 입력해주세요.');return;}try{if(!eid){const t=new Date();await addDoc(collection(db,"students"),{id,name:nm,grade:gr,subject:sb,phone:ph,regDate:`${t.getFullYear()}. ${t.getMonth()+1}. ${t.getDate()}.`});}else{await updateDoc(doc(db,"students",eid),{name:nm,grade:gr,subject:sb,phone:ph});}closeModal();}catch(er){alert("저장 오류: "+er.message);}};
window.deleteStudent=async function(fi,nm){if(!confirm(`"${nm}" 학생을 삭제하시겠습니까?`))return;try{await deleteDoc(doc(db,"students",fi));}catch(er){alert("삭제 오류: "+er.message);}};
window.openClassCardModal=async function(fi,nm,sid){document.getElementById('ccModalTitle').textContent=`${nm} · 수업카드`;['cc-total','cc-month','cc-avg'].forEach(id=>document.getElementById(id).textContent='—');document.getElementById('ccListScroll').innerHTML='<div class="cc-loading">불러오는 중...</div>';document.getElementById('classCardModal').classList.add('open');try{const s1=await getDocs(query(collection(db,"classCards"),where("studentId","==",fi),orderBy("classDate","desc")));let cs=s1.docs.map(d=>({id:d.id,...d.data()}));if(sid&&sid!==fi){try{const s2=await getDocs(query(collection(db,"classCards"),where("studentId","==",sid),orderBy("classDate","desc")));const ex=new Set(cs.map(c=>c.id));s2.docs.forEach(d=>{if(!ex.has(d.id))cs.push({id:d.id,...d.data()});});cs.sort((a,b)=>(b.classDate||'').localeCompare(a.classDate||''));}catch(e2){}}rCCS(cs);rCCL(cs);}catch(er){document.getElementById('ccListScroll').innerHTML=`<div class="cc-empty">로드 실패: ${er.message}</div>`;}};
function rCCS(cs){document.getElementById('cc-total').textContent=cs.length+'건';const n=new Date(),ms=`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`;document.getElementById('cc-month').textContent=cs.filter(c=>(c.classDate||'').startsWith(ms)).length+'건';const sc=cs.filter(c=>typeof c.score==='number'&&c.score>=0&&!c.scoreNone);document.getElementById('cc-avg').textContent=sc.length?Math.round(sc.reduce((a,c)=>a+c.score,0)/sc.length)+'점':'—';}
function rCCL(cs){const w=document.getElementById('ccListScroll');if(!cs.length){w.innerHTML=`<div class="cc-empty"><p>아직 작성된 수업카드가 없습니다.</p></div>`;return;}w.innerHTML=cs.map(c=>{const sc=typeof c.score==='number'?c.score:-1,sCls=c.scoreNone?'cc-chip-none':(sc>=70?'cc-chip-good':sc>=0?'cc-chip-bad':'cc-chip-none'),sTxt=c.scoreNone?'테스트없음':(sc>=0?sc+'점':'—'),hCls=c.homework==='높음'?'hw-high':c.homework==='낮음'?'hw-low':'hw-mid',aCls=c.attitude==='적극적'?'att-active':c.attitude==='산만'?'att-low':'att-mid';return`<div class="cc-item" id="cci-${c.id}"><div class="cc-item-head" onclick="toggleCC('${c.id}')"><div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:700;color:var(--tx);margin-bottom:3px"><span class="cc-chip cc-chip-subj" style="margin-right:4px">${e(c.subject||'—')}</span>수업</div><div class="cc-item-meta"><span class="cc-chip cc-chip-teacher">${e(c.teacher||'—')}</span><span class="cc-chip cc-chip-date">${c.classDate||'—'}</span><span class="cc-chip ${sCls}">${sTxt}</span></div></div><div style="display:flex;align-items:center;gap:5px;flex-shrink:0">${c.homework&&c.homework!=='-'?`<span class="cc-hw-badge ${hCls}">과제 ${e(c.homework)}</span>`:''} ${c.attitude?`<span class="att-badge ${aCls}">${e(c.attitude)}</span>`:''}<span class="cc-expand">▾</span></div></div><div class="cc-item-body">${c.content?`<div class="cc-body-section"><div class="cc-body-label">수업 내용</div><div class="cc-body-text">${e(c.content)}</div></div>`:''}</div></div>`;}).join('');}
window.toggleCC=id=>{document.getElementById('cci-'+id)?.classList.toggle('open');};
window.closeClassCardModal=function(){document.getElementById('classCardModal').classList.remove('open');};
function e(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
document.getElementById('studentModal').addEventListener('click',ev=>{if(ev.target===ev.currentTarget)closeModal();});
document.getElementById('classCardModal').addEventListener('click',ev=>{if(ev.target===ev.currentTarget)closeClassCardModal();});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><script src="/favicon.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>학생 성적 상세 · 인후쌤의 과학 수업 관리 시스템</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
  background: #fafafa; color: #1d1d1f; min-height: 100vh;
  -webkit-font-smoothing: antialiased; visibility: hidden;
  padding-bottom: env(safe-area-inset-bottom);
}

/* ── Header ── */
.header {
  background: #ffffff; border-bottom: 1px solid #f0e8ed;
  padding: 0 1.5rem;
  padding-left: calc(1.5rem + env(safe-area-inset-left));
  padding-right: calc(1.5rem + env(safe-area-inset-right));
  height: 54px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 300;
}
.header-left {
  display: flex; align-items: center; gap: 9px;
  text-decoration: none; color: inherit; cursor: pointer;
  transition: opacity 0.15s; border-radius: 10px; padding: 4px 8px;
  min-height: 44px;
}
.header-left:hover { opacity: 0.75; background: #fdf2f8; }
.logo-mark {
  width: 30px; height: 30px;
  background: linear-gradient(135deg, #f472b6 0%, #db2777 100%);
  border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.brand-name { font-size: 14px; font-weight: 600; color: #1d1d1f; letter-spacing: -0.3px; }
.header-badge {
  display: flex; align-items: center; gap: 5px;
  background: #f0fdf4; border: 1px solid #bbf7d0;
  border-radius: 20px; padding: 4px 10px;
  font-size: 10px; font-weight: 600; color: #16a34a; white-space: nowrap;
}
.dot-green { width: 5px; height: 5px; background: #22c55e; border-radius: 50%; animation: blink 2s ease-in-out infinite; flex-shrink: 0; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── Layout ── */
.wrap {
  max-width: 1100px; margin: 0 auto;
  padding: 1.4rem 1rem 3rem;
  padding-left: max(1rem, env(safe-area-inset-left));
  padding-right: max(1rem, env(safe-area-inset-right));
}

/* ── Welcome ── */
.welcome-bar {
  background: linear-gradient(135deg, #fff0f7 0%, #fdf2f8 60%, #f0f9ff 100%);
  border: 1px solid #fce7f3; border-radius: 18px;
  padding: 1.2rem 1.4rem; margin-bottom: 1.4rem;
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
}
.welcome-left { display: flex; align-items: center; gap: 12px; }
.welcome-avatar {
  width: 44px; height: 44px; border-radius: 50%;
  background: linear-gradient(135deg, #f472b6, #db2777);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
  box-shadow: 0 4px 12px rgba(219,39,119,0.25);
}
.welcome-greeting { font-size: 1.05rem; font-weight: 700; color: #1d1d1f; letter-spacing: -0.03em; }
.welcome-sub { font-size: 11px; color: #6e6e73; margin-top: 3px; }
.welcome-date-box { text-align: right; }
.welcome-date { font-size: 1rem; font-weight: 700; color: #db2777; letter-spacing: -0.02em; }
.welcome-day  { font-size: 11px; color: #aeaeb2; margin-top: 3px; font-weight: 500; }

/* ── Section Nav Grid ── */
.section-heading { font-size: 12px; font-weight: 700; color: #6e6e73; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.8rem; }

.nav-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 1.8rem; }
.nav-card {
  background: #ffffff; border: 1px solid #fce7f3; border-radius: 16px;
  padding: 1.4rem 1.2rem; cursor: pointer;
  transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
  display: flex; flex-direction: column; align-items: flex-start; gap: 10px;
  text-decoration: none; color: inherit; position: relative; overflow: hidden;
  -webkit-user-select: none; user-select: none;
}
.nav-card::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
  border-radius: 0 0 16px 16px; opacity: 0; transition: opacity 0.18s;
}
.nav-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(219,39,119,0.12); border-color: #fbcfe8; }
.nav-card:hover::after { opacity: 1; }
.nav-card:active { transform: scale(0.98); background: #fffbfe; }
.nav-icon { width: 46px; height: 46px; border-radius: 13px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
.nav-title { font-size: 15px; font-weight: 700; color: #1d1d1f; letter-spacing: -0.02em; }
.nav-desc  { font-size: 11px; color: #aeaeb2; line-height: 1.5; }
.nav-arrow { position: absolute; top: 50%; right: 14px; transform: translateY(-50%); font-size: 18px; color: #d1d1d6; transition: color 0.15s, right 0.15s; }
.nav-card:hover .nav-arrow { color: #db2777; right: 10px; }

.nc-grade    .nav-icon { background: #fdf2f8; }
.nc-grade::after { background: linear-gradient(90deg, #f472b6, #db2777); }
.nc-report   .nav-icon { background: #eff6ff; }
.nc-report::after { background: linear-gradient(90deg, #60a5fa, #2563eb); }
.nc-master   .nav-icon { background: #fdf4ff; }
.nc-master::after { background: linear-gradient(90deg, #e879f9, #a21caf); }

/* ── Quick Stats ── */
.quick-stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 1.6rem; }
.qs-card { background: #ffffff; border: 1px solid #fce7f3; border-radius: 14px; padding: 1rem 1.1rem; display: flex; align-items: center; gap: 12px; }
.qs-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.qs-num  { font-size: 1.3rem; font-weight: 700; letter-spacing: -0.03em; line-height: 1; }
.qs-lbl  { font-size: 10px; color: #aeaeb2; margin-top: 3px; font-weight: 500; }

/* ── 페이지 오버레이 / 패널 ── */
.page-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.35); z-index: 400; backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px); }
.page-overlay.open { display: block; }
.page-panel {
  position: fixed; top: 0; right: 0; bottom: 0;
  width: min(1200px, 100vw);
  background: #fafafa; z-index: 500;
  overflow-y: auto; -webkit-overflow-scrolling: touch;
  transform: translateX(100%);
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  box-shadow: none;
  padding-bottom: env(safe-area-inset-bottom);
}
.page-panel.open { transform: translateX(0); box-shadow: -8px 0 40px rgba(0,0,0,0.12); }
.panel-bar {
  background: #ffffff; border-bottom: 1px solid #fce7f3;
  padding: 0 1.2rem;
  padding-left: max(1.2rem, env(safe-area-inset-left));
  padding-right: max(1.2rem, env(safe-area-inset-right));
  height: 52px; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 10;
}
.panel-bar-title { font-size: 14px; font-weight: 700; color: #1d1d1f; }
.close-btn {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  background: #f5f5f7; border: none; cursor: pointer; font-size: 14px; color: #3c3c43;
  transition: background 0.15s; min-width: 44px; min-height: 44px;
}
.close-btn:hover { background: #fce7f3; color: #db2777; }
.panel-body {
  padding: 1.2rem;
  padding-left: max(1.2rem, env(safe-area-inset-left));
  padding-right: max(1.2rem, env(safe-area-inset-right));
}

/* ════════════════════════════════
   공통 성적 스타일
════════════════════════════════ */
.list-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; flex-wrap: wrap; gap: 8px; }
.list-heading { font-size: 1rem; font-weight: 700; color: #1d1d1f; letter-spacing: -0.02em; }
.list-meta    { font-size: 11px; color: #aeaeb2; margin-top: 2px; }

.table-scroll-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 16px; }
.stu-table { background: #fff; border: 1px solid #fce7f3; border-radius: 16px; overflow: hidden; width: 100%; min-width: 660px; }
.stu-thead {
  display: grid;
  grid-template-columns: 1.6fr 0.6fr 0.9fr 1.1fr 1.7fr 0.8fr 1fr 0.8fr 1fr;
  padding: 0.65rem 1rem;
  background: #fdf2f8; border-bottom: 1px solid #fce7f3;
  font-size: 10px; font-weight: 700; color: #c9a8bc;
  letter-spacing: 0.08em; text-transform: uppercase;
}
.stu-thead > div { display: flex; align-items: center; justify-content: center; }
.stu-row {
  display: grid;
  grid-template-columns: 1.6fr 0.6fr 0.9fr 1.1fr 1.7fr 0.8fr 1fr 0.8fr 1fr;
  padding: 0.75rem 1rem; border-bottom: 1px solid #fdf2f8;
  align-items: center; transition: background 0.15s;
}
.stu-row > div { display: flex; align-items: center; justify-content: center; }
.stu-row:last-child { border-bottom: none; }
.stu-row:hover { background: #fffbfe; }
.stu-name-wrap { display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; min-height: 44px; }
.stu-av { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; flex-shrink: 0; }
.stu-name { font-size: 13px; font-weight: 600; color: #1d1d1f; }
.grade-tag { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 6px; display: inline-block; text-align: center; }
.g-m1{background:#eff6ff;color:#1d4ed8} .g-m2{background:#f0fdf4;color:#15803d} .g-m3{background:#fefce8;color:#a16207}
.g-h1{background:#fdf4ff;color:#7e22ce} .g-h2{background:#fff7ed;color:#c2410c} .g-h3{background:#fdf2f8;color:#db2777}
.score-pill { display: inline-flex; align-items: center; justify-content: center; min-width: 44px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
.p-ox{background:#dbeafe;color:#1e40af} .p-mc{background:#ede9fe;color:#5b21b6} .p-ms{background:#fdf2f8;color:#db2777} .p-avg{background:#fdf2f8;color:#db2777} .p-na{background:#f5f5f7;color:#aeaeb2;font-weight:500}
.subject-tag { font-size: 10px; color: #6e6e73; background: #f5f5f7; padding: 2px 7px; border-radius: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: center; max-width: 100%; display: block; }
.date-tag { font-size: 10px; color: #6e6e73; white-space: nowrap; text-align: center; }
.exam-name-tag { font-size: 10px; color: #3c3c43; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: center; max-width: 100%; display: block; }
.empty-row { padding: 2.5rem; text-align: center; font-size: 13px; color: #aeaeb2; }

/* 학생 상세 */
.back-detail {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 12px; font-weight: 600; color: #db2777;
  background: none; border: none; cursor: pointer;
  font-family: inherit; padding: 8px 0; transition: opacity 0.15s; margin-bottom: 0.8rem;
  min-height: 44px;
}
.back-detail:hover { opacity: 0.7; }
.profile-card {
  background: #fff; border: 1px solid #fce7f3; border-radius: 16px;
  padding: 1rem 1.2rem; display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap;
}
.p-av { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
.p-name { font-size: 1rem; font-weight: 700; color: #1d1d1f; }
.p-meta { font-size: 11px; color: #aeaeb2; margin-top: 3px; }
.p-right { margin-left: auto; text-align: right; }
.p-avg-n { font-size: 1.4rem; font-weight: 700; color: #db2777; line-height: 1; }
.p-avg-l { font-size: 10px; color: #aeaeb2; margin-top: 3px; }
.p-overall-n { font-size: 1.4rem; font-weight: 700; line-height: 1; }
.p-overall-l { font-size: 10px; color: #aeaeb2; margin-top: 3px; }
.c-good{color:#0369a1} .c-avg{color:#d97706} .c-warn{color:#dc2626}
.mini-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 1rem; }
.mini-card { background: #fff; border: 1px solid #fce7f3; border-radius: 12px; padding: 0.8rem 0.6rem; text-align: center; }
.mini-n { font-size: 1.1rem; font-weight: 700; }
.mini-l { font-size: 10px; color: #aeaeb2; margin-top: 3px; font-weight: 500; line-height: 1.3; }
.chart-card { background: #fff; border: 1px solid #fce7f3; border-radius: 16px; padding: 1.1rem 1.2rem; margin-bottom: 1rem; }
.chart-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; flex-wrap: wrap; gap: 6px; }
.chart-title, .card-title { font-size: 13px; font-weight: 600; color: #1d1d1f; margin-bottom: 1rem; }
.chart-head .card-title { margin-bottom: 0; }
.legend { display: flex; gap: 12px; flex-wrap: wrap; }
.leg { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #6e6e73; }
.leg-dot { width: 8px; height: 8px; border-radius: 50%; }
.chart-body { display: flex; align-items: flex-end; justify-content: space-between; height: 110px; }
.chart-col { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.chart-bars { display: flex; align-items: flex-end; gap: 3px; height: 80px; }
.cbar { width: 14px; border-radius: 3px 3px 0 0; }
.chart-wlbl { font-size: 10px; color: #aeaeb2; }
.chart-wpct { font-size: 10px; font-weight: 700; color: #db2777; }

/* 탭 공통 */
.week-tabs { display: flex; gap: 6px; justify-content: space-between; margin-bottom: 1rem; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 2px; scrollbar-width: none; }
.week-tabs::-webkit-scrollbar { display: none; }
.wtab { padding: 8px 16px; border-radius: 20px; font-size: 12px; font-weight: 500; font-family: inherit; border: 1px solid #fce7f3; background: #fff; color: #6e6e73; cursor: pointer; transition: all 0.15s; white-space: nowrap; flex-shrink: 0; min-height: 36px; }
.wtab.on { background: #db2777; color: #fff; border-color: #db2777; }
.grade-tabs { display: flex; gap: 6px; margin-bottom: 1rem; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 2px; scrollbar-width: none; }
.grade-tabs::-webkit-scrollbar { display: none; }
.gtab { padding: 8px 16px; border-radius: 20px; font-size: 12px; font-weight: 500; font-family: inherit; border: 1.5px solid #fce7f3; background: #fff; color: #6e6e73; cursor: pointer; transition: all 0.15s; white-space: nowrap; flex-shrink: 0; min-height: 36px; }
.gtab:hover { border-color: #fbcfe8; }
.gtab.on { background: #db2777; color: #fff; border-color: #db2777; font-weight: 700; }
.exam-selector { display: flex; gap: 6px; margin-bottom: 1rem; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 2px; scrollbar-width: none; }
.exam-selector::-webkit-scrollbar { display: none; }
.exam-sel-btn { padding: 8px 14px; border-radius: 20px; font-size: 12px; font-weight: 500; font-family: inherit; border: 1.5px solid #fce7f3; background: #fff; color: #6e6e73; cursor: pointer; transition: all 0.15s; white-space: nowrap; flex-shrink: 0; min-height: 36px; }
.exam-sel-btn.on { background: #7c3aed; color: #fff; border-color: #7c3aed; }
.records { display: flex; flex-direction: column; gap: 10px; }
.rec-card { background: #fff; border: 1px solid #fce7f3; border-radius: 14px; padding: 0.9rem 1.1rem; }
.rec-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; flex-wrap: wrap; gap: 6px; }
.rec-left { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.rec-right { text-align: right; }
.tbadge { font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 6px; }
.t-ox{background:#dbeafe;color:#1e40af} .t-mc{background:#ede9fe;color:#5b21b6} .t-ms{background:#fdf2f8;color:#db2777}
.rec-title { font-size: 13px; font-weight: 600; color: #1d1d1f; }
.rec-score { font-size: 1rem; font-weight: 700; }
.rec-date  { font-size: 10px; color: #aeaeb2; margin-top: 2px; }
.rec-parts { display:flex; gap:6px; flex-wrap:wrap; justify-content:flex-end; }
.rec-part { display:flex; align-items:center; gap:5px; font-size:12px; font-weight:700; }
.rec-part .rp-lbl { font-size:10px; font-weight:600; color:#6e6e73; }
.score-track { height: 5px; background: #f5f5f7; border-radius: 3px; overflow: hidden; margin-bottom: 6px; }
.score-fill  { height: 100%; border-radius: 3px; }
.rec-del-btn { margin-top: 2px; font-size: 11px; font-weight: 600; color: #dc2626; background: #fff; border: 1.5px solid #fca5a5; border-radius: 8px; padding: 7px 14px; cursor: pointer; font-family: inherit; min-height: 36px; transition: background 0.15s; }
.rec-del-btn:hover { background: #fef2f2; }
.fb-wrap { background: #fff; border: 1px solid #fce7f3; border-radius: 14px; padding: 1rem 1.1rem; margin-top: 10px; }
.fb-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.8rem; flex-wrap: wrap; gap: 8px; }
.fb-title { font-size: 13px; font-weight: 600; color: #1d1d1f; display: flex; align-items: center; gap: 6px; }
.fb-icon { width: 22px; height: 22px; background: #fdf2f8; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
.fb-edit { font-size: 11px; font-weight: 600; color: #db2777; background: #fdf2f8; border: 1px solid #fce7f3; border-radius: 8px; padding: 8px 14px; cursor: pointer; font-family: inherit; min-height: 36px; }
.fb-body { font-size: 12px; color: #3c3c43; line-height: 1.75; background: #fffbfe; border: 1px solid #fdf2f8; border-radius: 10px; padding: 0.8rem 1rem; min-height: 56px; white-space: pre-wrap; }
.fb-na { color: #aeaeb2; font-style: italic; }
.fb-ta { display: none; width: 100%; min-height: 90px; resize: vertical; border: 1px solid #fce7f3; border-radius: 10px; padding: 0.8rem 1rem; font-size: 16px; font-family: inherit; color: #1d1d1f; outline: none; margin-top: 8px; -webkit-appearance: none; appearance: none; }
.fb-ta:focus { border-color: #db2777; }
.fb-save { display: none; margin-top: 8px; padding: 10px 20px; background: #db2777; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; color: #fff; cursor: pointer; font-family: inherit; min-height: 44px; }
.fb-view-btn { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; color: #db2777; background: #fdf2f8; border: 1px solid #fce7f3; border-radius: 8px; padding: 5px 11px; cursor: pointer; font-family: inherit; }
.fb-none-tag { font-size: 11px; color: #aeaeb2; }

/* 마스터 채점 */
.ms-section { background: #fff; border: 1px solid #fce7f3; border-radius: 16px; padding: 1.2rem; margin-bottom: 1rem; }
.ms-section-title { font-size: 14px; font-weight: 700; color: #db2777; margin-bottom: 1rem; display: flex; align-items: center; gap: 6px; }
.ms-step { background: #fdf2f8; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #db2777; flex-shrink: 0; }
.ms-select { width: 100%; padding: 12px 14px; border: 1px solid #fce7f3; border-radius: 10px; font-size: 16px; font-family: inherit; color: #1d1d1f; background: #fff; outline: none; cursor: pointer; -webkit-appearance: none; appearance: none; }
.ms-select:focus { border-color: #db2777; }
.stu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; margin-top: 8px; }
.stu-chip { padding: 10px 12px; border: 1.5px solid #fce7f3; border-radius: 10px; font-size: 13px; font-weight: 500; color: #1d1d1f; background: #fff; cursor: pointer; text-align: center; transition: all 0.15s; font-family: inherit; min-height: 44px; display: flex; align-items: center; justify-content: center; }
.stu-chip:hover { border-color: #db2777; background: #fdf2f8; }
.stu-chip.sel { border-color: #db2777; background: #db2777; color: #fff; font-weight: 700; }
.ans-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 8px; }
.ans-q { display: flex; flex-direction: column; align-items: center; gap: 5px; }
.ans-qlbl { font-size: 11px; font-weight: 600; color: #6e6e73; }
.ans-qlbl span { font-size: 9px; color: #db2777; font-weight: 700; }
.ans-btns { display: flex; gap: 3px; flex-wrap: wrap; justify-content: center; }
.ans-btn { width: 32px; height: 32px; border-radius: 6px; border: 1.5px solid #fce7f3; background: #fff; font-size: 12px; font-weight: 600; color: #6e6e73; cursor: pointer; transition: all 0.15s; font-family: inherit; display: flex; align-items: center; justify-content: center; min-width: 32px; min-height: 44px; }

/* ════════════════════════════════════════════════
   기록 정규화 — 새/옛 구조를 한 형태로 통일
   (문서 1개 = 응시 1건. 그 안의 ox/multiple/category를 그대로 보존)
════════════════════════════════════════════════ */
function normalizeDoc(id, r){
  return {
    id,
    // 식별·표시
    examId: r.examId || r.testId || '',
    testId: r.testId || r.examId || '',
    testName: r.testName || r.examTitle || r.unitName || '',
    examTitle: r.examTitle || r.testName || r.unitName || '',
    subject: r.subject || r.studentSubject || '',
    grade: r.grade || r.studentGrade || '',
    // 구조 구분
    category: r.category || (r.testType==='master' ? 'master' : ''),
    ox: (r.ox && typeof r.ox==='object') ? r.ox : null,
    multiple: (r.multiple && typeof r.multiple==='object') ? r.multiple : null,
    // 점수·집계
    score: (typeof r.score==='number') ? r.score : (typeof r.percentage==='number'?r.percentage:null),
    totalQuestions: r.totalQuestions ?? r.totalQ ?? r.total ?? null,
    // 문항별 상세
    answers: Array.isArray(r.answers) ? r.answers : null,
    // 시간 (timestamp 우선, 옛 필드 폴백)
    timestamp: r.timestamp || r.submittedTimestamp || r.submittedAt || r.date || null,
    // 옛 구조 폴백용
    testType: r.testType || null
  };
}

/* 이 기록이 가진 파트별 점수 {ox, mc, master} (없으면 null) */
function partScores(r){
  if(r.category==='master' || r.testType==='master'){
    const sc=(r.multiple && r.multiple.score!=null) ? r.multiple.score : (r.score!=null ? r.score : null);
    return { ox:null, mc:null, master: sc };
  }
  const hasOx = r.ox && r.ox.total;
  const hasMc = r.multiple && r.multiple.total;
  if(hasOx || hasMc){
    return {
      ox: hasOx ? (r.ox.score!=null?r.ox.score:0) : null,
      mc: hasMc ? (r.multiple.score!=null?r.multiple.score:0) : null,
      master: null
    };
  }
  // 옛 구조 (단일 score + testType)
  const sc = r.score!=null ? r.score : 0;
  if(r.testType==='ox')     return { ox:sc, mc:null, master:null };
  if(r.testType==='master') return { ox:null, mc:null, master:sc };
  return { ox:null, mc:sc, master:null }; // 기본 4지선다
}
function hasType(r,kind){ return partScores(r)[kind]!=null; }
function typeScore(r,kind){ const v=partScores(r)[kind]; return v==null?0:v; }
/* 이 기록의 대표 타입 라벨 (혼합이면 '혼합') */
function recTypeLabel(r){
  const p=partScores(r);
  if(p.master!=null) return '마스터';
  if(p.ox!=null && p.mc!=null) return '혼합';
  if(p.ox!=null) return 'OX';
  if(p.mc!=null) return '4지선다';
  return '4지선다';
}
/* 파트별 문항 상세 추출 */
function partAnswers(r,kind){
  if(!Array.isArray(r.answers)) return null;
  if(kind==='master') return r.answers;
  if(kind==='ox')     return r.answers.filter(a=>a.type==='ox');
  return r.answers.filter(a=>a.type==='multiple' || a.type==='mc');
}

function renderProfile() {

/* ════ 성적 현황 ════ */
/* 시험(문서)별 첫 응시만 — 키는 시험 단위 */
function examKey(r){ return r.examId||r.testId||r.testName||'?'; }
function gcExamList(list){ const m=new Map(); list.forEach(r=>{ const k=examKey(r); if(!m.has(k)) m.set(k,{key:k,name:r.testName||r.examTitle||k,type:recTypeLabel(r)}); }); return Array.from(m.values()); }
function recs90(){ return recsAll.slice(); }

function gcRender() {
  gcCurWeek=-1;
  const frAll=recs90().slice().sort((a,b)=>toDate(a.timestamp)-toDate(b.timestamp));
  const fil=gcCurExamKey?frAll.filter(r=>examKey(r)===gcCurExamKey):frAll;
  const avg=(arr,kind)=>{ const v=arr.filter(r=>hasType(r,kind)); return v.length?Math.round(v.map(r=>typeScore(r,kind)).reduce((s,x)=>s+x,0)/v.length):null; };
  setTxt('d-cnt',frAll.length);
  const ox=avg(fil,'ox'), mc=avg(fil,'mc'), ms=avg(fil,'master');
  setTxt('d-ox',ox!==null?ox+'점':'—'); setTxt('d-mc',mc!==null?mc+'점':'—'); setTxt('d-ms',ms!==null?ms+'점':'—');
  gcRenderExamSelector(); gcRenderChart(frAll); gcRenderRecs(-1); gcSetWeekActive(-1);
}
function gcRenderExamSelector() {
  const list=gcExamList(recs90()), wrap=document.getElementById('exam-selector');
  if(list.length<=1){ wrap.innerHTML=''; return; }
  wrap.innerHTML=`<button class="exam-sel-btn${gcCurExamKey===null?' on':''}" onclick="window.gcSelectExam(null,this)">전체</button>`
    +list.map(e=>`<button class="exam-sel-btn${gcCurExamKey===e.key?' on':''}" onclick="window.gcSelectExam('${esc(e.key)}',this)">${esc2(e.name)} <span style="font-size:9px;opacity:0.8;">(${e.type})</span></button>`).join('');
}
window.gcSelectExam=(key,el)=>{ gcCurExamKey=key; document.querySelectorAll('.exam-sel-btn').forEach(b=>b.classList.remove('on')); if(el) el.classList.add('on'); gcRenderRecs(gcCurWeek); };
function gcRenderChart(fr) {
  const base=enrollDate();
  const chartEl=document.getElementById('d-chart');
  if(!base){ chartEl.innerHTML='<div style="width:100%;text-align:center;color:#aeaeb2;font-size:12px;padding:1rem 0;">표시할 성적 데이터가 없습니다.</div>'; return; }
  // 실제로 응시 기록이 있는 주차만 모아 가장 최근 4개 주차만 표시
  // (학생마다 입학·응시 주차가 달라 빈 주차가 섞여 그래프가 비어 보이던 문제 해결)
  const weekMap=new Map();
  fr.forEach(r=>{ const wi=enrollWeekIndex(r,base); if(wi==null) return; if(!weekMap.has(wi)) weekMap.set(wi,[]); weekMap.get(wi).push(r); });
  const weeks=[...weekMap.keys()].sort((a,b)=>a-b).slice(-4);
  if(!weeks.length){ chartEl.innerHTML='<div style="width:100%;text-align:center;color:#aeaeb2;font-size:12px;padding:1rem 0;">표시할 성적 데이터가 없습니다.</div>'; return; }
  chartEl.innerHTML=weeks.map(w=>{
    const wr=weekMap.get(w)||[];
    const avgV=(arr,kind)=>{ const v=arr.filter(r=>hasType(r,kind)); return v.length?Math.round(v.map(r=>typeScore(r,kind)).reduce((s,x)=>s+x,0)/v.length):null; };
    const oxA=avgV(wr,'ox'), mcA=avgV(wr,'mc'), msA=avgV(wr,'master');
    const segs=[oxA,mcA,msA].filter(v=>v!=null);
    const tot=segs.length?Math.round(segs.reduce((s,v)=>s+v,0)/segs.length):null;
    const barH=v=>v==null?0:Math.max(v,3); // 응시했으면 0점이라도 최소 3% 높이로 보이게
    return `<div class="chart-col"><div class="chart-wpct">${tot!=null?tot+'점':'—'}</div><div class="chart-bars"><div class="cbar" style="height:${barH(oxA)}%;background:#1e40af;"></div><div class="cbar" style="height:${barH(mcA)}%;background:#5b21b6;"></div><div class="cbar" style="height:${barH(msA)}%;background:#db2777;"></div></div><div class="chart-wlbl">${w+1}주차</div></div>`;
  }).join('');
}
function gcRenderRecs(wi) {
  const base=enrollDate();
  let wr=recs90().slice().sort((a,b)=>toDate(a.timestamp)-toDate(b.timestamp));
  if(wi===-1){ wr=wr.slice().sort((a,b)=>toDate(b.timestamp)-toDate(a.timestamp)); }
  else { wr=wr.filter(r=>enrollWeekIndex(r,base)===wi); }
  if(gcCurExamKey) wr=wr.filter(r=>examKey(r)===gcCurExamKey);
  const el=document.getElementById('d-records');
  if(!wr.length){ const msg=wi===-1?'응시한 기록이 없습니다.':'이 주차에 응시한 기록이 없습니다.'; el.innerHTML=`<div style="background:#fff;border:1px solid #fce7f3;border-radius:14px;padding:2rem;text-align:center;font-size:13px;color:#aeaeb2;">${msg}</div>`; return; }
  el.innerHTML=wr.map(r=>{
    const p=partScores(r);
    const name=esc2(r.testName||r.examTitle||'—');
    const date=fmtDateShort(r.timestamp);
    // 마스터 단일 카드

function genToken(){ const a=new Uint8Array(24); crypto.getRandomValues(a); return Array.from(a,b=>b.toString(16).padStart(2,'0')).join(''); }

function buildShareSnapshot(){
  const base=enrollDate();
  // 파트별로 펼쳐서 부모 화면이 OX/4지선다/마스터를 구분해 볼 수 있게
  const records=[];
  recsAll.forEach(r=>{
    const p=partScores(r);
    const ts=toDate(r.timestamp).getTime();
    const mk=(type,score,ans)=>({
      id:r.id, testType:type,
      testName:r.testName||'', examTitle:r.examTitle||'',
      score: score==null?0:score, ts,
      subject:r.subject||'',
      answers: Array.isArray(ans)?ans.map(a=>({isCorrect: a.isCorrect!==undefined?!!a.isCorrect:(a.correct===true)})):null
    });
    if(p.master!=null) records.push(mk('master',p.master,partAnswers(r,'master')));
    if(p.ox!=null)     records.push(mk('ox',p.ox,partAnswers(r,'ox')));
    if(p.mc!=null)     records.push(mk('mc',p.mc,partAnswers(r,'multiple')));
  });
  return {
    v:1,
    token: stu.shareToken||'',
    studentName: stu.name||stu.displayName||'이름없음',
    grade: stu.grade||stu.year||'—',
    subject: (stu.subject&&stu.subject!=='-')?String(stu.subject):'',
    enrollBase: base?base.getTime():null,
    feedback: feedbackText||'',
    records,
    updatedAt: Date.now()
  };
}

async function rpEnrichWithExamSubjects(records) {
  try { const snap=await getDocs(collection(db,'tests')); const byId=new Map(), byTitle=new Map(); snap.forEach(d=>{ const data=d.data(); byId.set(d.id,data); if(data.title) byTitle.set(data.title,data); }); return records.map(r=>{ if(r.subject) return r; const eid=r.examId||r.testId; if(eid&&byId.has(eid)){const s=byId.get(eid).subject;if(s) return{...r,subject:s};} const title=r.testName||r.examTitle; if(title&&byTitle.has(title)){const s=byTitle.get(title).subject;if(s) return{...r,subject:s};} return r; }); } catch { return records; }
}
function rpFilterByPeriod(recs,period){ if(period==='all') return recs; const base=enrollDate(); if(!base) return recs; const mm=/^m(\d+)$/.exec(period); if(mm){ const startW=(+mm[1]-1)*4, endW=startW+3; return recs.filter(r=>{ const wi=enrollWeekIndex(r,base); return wi!==null && wi>=startW && wi<=endW; }); } const m=/^(\d+)w$/.exec(period); if(m){ const wi=(+m[1])-1; return recs.filter(r=>enrollWeekIndex(r,base)===wi); } return recs; }

/* 타입별 응시 횟수/재시험 정보 (시험 단위로 시간순 인덱싱) */
function attemptInfoFor(list){
  const sorted=list.slice().sort((a,b)=>toDate(a.timestamp)-toDate(b.timestamp));
  const counts=new Map(), info=new Map();
  sorted.forEach(r=>{ const k=examKey(r); const c=counts.get(k)||0; info.set(r.id,{index:c,key:k}); counts.set(k,c+1); });
  info.forEach(v=>{ v.total=counts.get(v.key); v.isRetry=v.index>0; });
  return info;
}

  const avg=(arr,kind)=>{ const v=arr.filter(r=>hasType(r,kind)); return v.length?Math.round(v.map(r=>typeScore(r,kind)).reduce((a,x)=>a+x,0)/v.length):null; };

  rpRenderAnalysis(oxA,mcA,msA,total); rpDrawRadar(oxA,mcA,msA); rpDrawTrend(filtered); rpRenderResults(filtered,rpCurExam); rpRenderQAnalysis(filtered.filter(r=>hasType(r,'master')));

  if((examType==='all'||examType==='ox')&&oxR.length) html+=`<div class="result-section"><div class="result-section-title"><span class="rs-dot" style="background:#1e40af;"></span><span style="color:#1e40af;">OX 문제</span><span style="font-size:11px;color:#aeaeb2;font-weight:400;">(${oxR.length}회)</span></div><div class="result-table"><div class="rt-head gt-base"><div>단원명</div><div>시험일</div><div>응시횟수</div><div>점수</div><div>점수 바</div><div>삭제</div></div>${makeRows(oxR,'ox','cs-ox','#1e40af','OX 문제',aiOx)}</div></div>`;
  if((examType==='all'||examType==='mc')&&mcR.length) html+=`<div class="result-section"><div class="result-section-title"><span class="rs-dot" style="background:#5b21b6;"></span><span style="color:#5b21b6;">4지선다</span><span style="font-size:11px;color:#aeaeb2;font-weight:400;">(${mcR.length}회)</span></div><div class="result-table"><div class="rt-head gt-base"><div>단원명</div><div>시험일</div><div>응시횟수</div><div>점수</div><div>점수 바</div><div>삭제</div></div>${makeRows(mcR,'mc','cs-mc','#5b21b6','4지선다',aiMc)}</div></div>`;
  if((examType==='all'||examType==='master')&&msR.length) html+=`<div class="result-section"><div class="result-section-title"><span class="rs-dot" style="background:#db2777;"></span><span style="color:#db2777;">마스터테스트</span><span style="font-size:11px;color:#aeaeb2;font-weight:400;">(${msR.length}회)</span></div><div class="result-table"><div class="rt-head gt-base"><div>단원명</div><div>시험일</div><div>응시횟수</div><div>점수</div><div>점수 바</div><div>삭제</div></div>${msR.map(r=>{ const sc=typeScore(r,'master'),info=aiMs.get(r.id),attempts=info?info.total:1,fb=sc>=80?`<span class="fb-chip fb-g">양호</span>`:sc>=60?`<span class="fb-chip fb-a">보통</span>`:`<span class="fb-chip fb-w">주의</span>`; return `<div class="rt-row gt-base"><div class="cell-name">${esc2(r.testName||r.examTitle||'—')}</div><div class="cell-date">${fmtDateShort(r.timestamp)}</div><div style="display:flex;align-items:center;gap:4px;">${rpAttemptBadge(info)}${attempts>1?`<span style="font-size:10px;color:#aeaeb2;">총 ${attempts}회</span>`:''}</div><div class="cell-score cs-ms">${sc}점 ${fb}</div><div class="bar-wrap"><div class="bar-track"><div class="bar-fill" style="width:${sc}%;background:#db2777;"></div></div></div>${delBtn(r,'마스터테스트')}</div>`; }).join('')}</div></div>`;
  wrap.innerHTML=html||`<div class="result-table"><div class="empty-state">해당 조건의 시험 기록이 없습니다.</div></div>`;
}
function rpRenderQAnalysis(msRecs){ const sec=document.getElementById('rp-q-section'); if(!msRecs.length){sec.style.display='none';return;} const sorted=msRecs.slice().sort((a,b)=>toDate(a.timestamp)-toDate(b.timestamp)); const latest=sorted[sorted.length-1], answers=partAnswers(latest,'master')||[]; if(!answers.length){sec.style.display='none';return;} sec.style.display='block'; document.getElementById('rp-q-grid').innerHTML=answers.map((a,i)=>{ const ok=a.isCorrect!==undefined?a.isCorrect:a.correct===true; return `<div class="q-bubble ${ok?'q-o':'q-x'}">${i+1}</div>`; }).join(''); const correct=answers.filter(a=>a.isCorrect!==undefined?a.isCorrect:a.correct===true).length; document.getElementById('rp-q-stat').innerHTML=`총 <b>${answers.length}</b>문항 &nbsp;|&nbsp; 정답 <b style="color:#166534;">${correct}</b>개 &nbsp;|&nbsp; 오답 <b style="color:#991b1b;">${answers.length-correct}</b>개 &nbsp;|&nbsp; 정답률 <b>${Math.round(correct/answers.length*100)}%</b>`; }
window.rpSetPeriod=(p,el)=>{ rpCurPeriod=p; document.querySelectorAll('.ptab').forEach(t=>t.classList.remove('on')); if(el) el.classList.add('on'); rpRender(); };
window.rpPickExam=(e,el)=>{ rpCurExam=e; document.querySelectorAll('.etab').forEach(t=>t.classList.remove('on')); if(el) el.classList.add('on'); rpRenderResults(rpFilterByPeriod(recsAll,rpCurPeriod),rpCurExam); };

/* 유틸 */
function toDate(ts){if(!ts)return new Date(0);if(typeof ts==='object'&&ts.seconds)return new Date(ts.seconds*1000);if(ts&&typeof ts.toDate==='function')return ts.toDate();return new Date(ts);}
function parseRegDate(r){
  if(!r) return null;
  if(typeof r==='object'&&r.seconds) return new Date(r.seconds*1000);
  if(typeof r==='object'&&typeof r.toDate==='function') return r.toDate();
  if(typeof r==='string'){ const m=r.match(/(\d{4})\D+(\d{1,2})\D+(\d{1,2})/); if(m) return new Date(+m[1],+m[2]-1,+m[3]); const d=new Date(r); return isNaN(d)?null:d; }
  const d=new Date(r); return isNaN(d)?null:d;
}
function enrollDate(){
  const d=parseRegDate(stu&&(stu.regDate||stu.registeredAt||stu.createdAt||stu.joinDate));
  if(d){ d.setHours(0,0,0,0); return d; }
  if(recsAll.length){ const oldest=recsAll.reduce((a,r)=>{const t=toDate(r.timestamp);return t<a?t:a;},toDate(recsAll[0].timestamp)); const e=new Date(oldest); e.setHours(0,0,0,0); return e; }
  return null;
}
function enrollWeekIndex(r,base){
  if(!base) return null;
  const d=toDate(r.timestamp); if(d.getTime()===0) return null;
  const diffDays=Math.floor((d-base)/86400000);
  return diffDays<0?0:Math.floor(diffDays/7);
}
function fmtDateShort(ts){if(!ts)return '';const d=toDate(ts);if(d.getTime()===0)return '';const yy=String(d.getFullYear()).slice(2),mm=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0'),day=DAY_KO[d.getDay()];return `${yy}.${mm}.${dd}(${day})`;}
function esc(s){return String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");}
function esc2(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function setTxt(id,txt){const e=document.getElementById(id);if(e)e.textContent=txt;}
</script>

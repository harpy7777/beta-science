<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><script src="/favicon.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>학생 성적 상세 · 인후쌤의 과학 수업 관리 시스템</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
  background: #fafafa; color: #1d1d1f; min-height: 100vh;
  -webkit-font-smoothing: antialiased; visibility: hidden;
  padding-bottom: env(safe-area-inset-bottom);
}

/* ── Header ── */
.header {
  background: #ffffff; border-bottom: 1px solid #f0e8ed;
  padding: 0 1.5rem;
  padding-left: calc(1.5rem + env(safe-area-inset-left));
  padding-right: calc(1.5rem + env(safe-area-inset-right));
  height: 54px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 300;
}
.header-left {
  display: flex; align-items: center; gap: 9px;
  text-decoration: none; color: inherit; cursor: pointer;
  transition: opacity 0.15s; border-radius: 10px; padding: 4px 8px;
  min-height: 44px;
}
.header-left:hover { opacity: 0.75; background: #fdf2f8; }
.logo-mark {
  width: 30px; height: 30px;
  background: linear-gradient(135deg, #f472b6 0%, #db2777 100%);
  border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.brand-name { font-size: 14px; font-weight: 600; color: #1d1d1f; letter-spacing: -0.3px; }
.header-badge {
  display: flex; align-items: center; gap: 5px;
  background: #f0fdf4; border: 1px solid #bbf7d0;
  border-radius: 20px; padding: 4px 10px;
  font-size: 10px; font-weight: 600; color: #16a34a; white-space: nowrap;
}
.dot-green { width: 5px; height: 5px; background: #22c55e; border-radius: 50%; animation: blink 2s ease-in-out infinite; flex-shrink: 0; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── Layout ── */
.wrap {
  max-width: 1100px; margin: 0 auto;
  padding: 1.4rem 1rem 3rem;
  padding-left: max(1rem, env(safe-area-inset-left));
  padding-right: max(1rem, env(safe-area-inset-right));
}

/* ── Welcome ── */
.welcome-bar {
  background: linear-gradient(135deg, #fff0f7 0%, #fdf2f8 60%, #f0f9ff 100%);
  border: 1px solid #fce7f3; border-radius: 18px;
  padding: 1.2rem 1.4rem; margin-bottom: 1.4rem;
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
}
.welcome-left { display: flex; align-items: center; gap: 12px; }
.welcome-avatar {
  width: 44px; height: 44px; border-radius: 50%;
  background: linear-gradient(135deg, #f472b6, #db2777);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
  box-shadow: 0 4px 12px rgba(219,39,119,0.25);
}
.welcome-greeting { font-size: 1.05rem; font-weight: 700; color: #1d1d1f; letter-spacing: -0.03em; }
.welcome-sub { font-size: 11px; color: #6e6e73; margin-top: 3px; }
.welcome-date-box { text-align: right; }
.welcome-date { font-size: 1rem; font-weight: 700; color: #db2777; letter-spacing: -0.02em; }
.welcome-day  { font-size: 11px; color: #aeaeb2; margin-top: 3px; font-weight: 500; }

/* ── Section Nav Grid ── */
.section-heading { font-size: 12px; font-weight: 700; color: #6e6e73; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.8rem; }

.nav-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 1.8rem; }
.nav-card {
  background: #ffffff; border: 1px solid #fce7f3; border-radius: 16px;
  padding: 1.4rem 1.2rem; cursor: pointer;
  transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
  display: flex; flex-direction: column; align-items: flex-start; gap: 10px;
  text-decoration: none; color: inherit; position: relative; overflow: hidden;
  -webkit-user-select: none; user-select: none;
}
.nav-card::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
  border-radius: 0 0 16px 16px; opacity: 0; transition: opacity 0.18s;
}
.nav-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(219,39,119,0.12); border-color: #fbcfe8; }
.nav-card:hover::after { opacity: 1; }
.nav-card:active { transform: scale(0.98); background: #fffbfe; }
.nav-icon { width: 46px; height: 46px; border-radius: 13px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
.nav-title { font-size: 15px; font-weight: 700; color: #1d1d1f; letter-spacing: -0.02em; }
.nav-desc  { font-size: 11px; color: #aeaeb2; line-height: 1.5; }
.nav-arrow { position: absolute; top: 50%; right: 14px; transform: translateY(-50%); font-size: 18px; color: #d1d1d6; transition: color 0.15s, right 0.15s; }
.nav-card:hover .nav-arrow { color: #db2777; right: 10px; }

.nc-grade    .nav-icon { background: #fdf2f8; }
.nc-grade::after { background: linear-gradient(90deg, #f472b6, #db2777); }
.nc-report   .nav-icon { background: #eff6ff; }
.nc-report::after { background: linear-gradient(90deg, #60a5fa, #2563eb); }
.nc-master   .nav-icon { background: #fdf4ff; }
.nc-master::after { background: linear-gradient(90deg, #e879f9, #a21caf); }

/* ── Quick Stats ── */
.quick-stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 1.6rem; }
.qs-card { background: #ffffff; border: 1px solid #fce7f3; border-radius: 14px; padding: 1rem 1.1rem; display: flex; align-items: center; gap: 12px; }
.qs-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.qs-num  { font-size: 1.3rem; font-weight: 700; letter-spacing: -0.03em; line-height: 1; }
.qs-lbl  { font-size: 10px; color: #aeaeb2; margin-top: 3px; font-weight: 500; }

/* ── 페이지 오버레이 / 패널 ── */
.page-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.35); z-index: 400; backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px); }
.page-overlay.open { display: block; }
.page-panel {
  position: fixed; top: 0; right: 0; bottom: 0;
  width: min(1200px, 100vw);
  background: #fafafa; z-index: 500;
  overflow-y: auto; -webkit-overflow-scrolling: touch;
  transform: translateX(100%);
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  box-shadow: none;
  padding-bottom: env(safe-area-inset-bottom);
}
.page-panel.open { transform: translateX(0); box-shadow: -8px 0 40px rgba(0,0,0,0.12); }
.panel-bar {
  background: #ffffff; border-bottom: 1px solid #fce7f3;
  padding: 0 1.2rem;
  padding-left: max(1.2rem, env(safe-area-inset-left));
  padding-right: max(1.2rem, env(safe-area-inset-right));
  height: 52px; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 10;
}
.panel-bar-title { font-size: 14px; font-weight: 700; color: #1d1d1f; }
.close-btn {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  background: #f5f5f7; border: none; cursor: pointer; font-size: 14px; color: #3c3c43;
  transition: background 0.15s; min-width: 44px; min-height: 44px;
}
.close-btn:hover { background: #fce7f3; color: #db2777; }
.panel-body {
  padding: 1.2rem;
  padding-left: max(1.2rem, env(safe-area-inset-left));
  padding-right: max(1.2rem, env(safe-area-inset-right));
}

/* ════════════════════════════════
   공통 성적 스타일
════════════════════════════════ */
.list-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; flex-wrap: wrap; gap: 8px; }
.list-heading { font-size: 1rem; font-weight: 700; color: #1d1d1f; letter-spacing: -0.02em; }
.list-meta    { font-size: 11px; color: #aeaeb2; margin-top: 2px; }

.table-scroll-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 16px; }
.score-pill { display: inline-flex; align-items: center; justify-content: center; min-width: 44px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
.subject-tag { font-size: 10px; color: #6e6e73; background: #f5f5f7; padding: 2px 7px; border-radius: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: center; max-width: 100%; display: block; }
.date-tag { font-size: 10px; color: #6e6e73; white-space: nowrap; text-align: center; }
.empty-row { padding: 2.5rem; text-align: center; font-size: 13px; color: #aeaeb2; }

/* 학생 상세 */
.back-detail {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 12px; font-weight: 600; color: #db2777;
  background: none; border: none; cursor: pointer;
  font-family: inherit; padding: 8px 0; transition: opacity 0.15s; margin-bottom: 0.8rem;
  min-height: 44px;
}
.back-detail:hover { opacity: 0.7; }
.profile-card {
  background: #fff; border: 1px solid #fce7f3; border-radius: 16px;
  padding: 1rem 1.2rem; display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap;
}
.p-av { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
.p-name { font-size: 1rem; font-weight: 700; color: #1d1d1f; }
.p-meta { font-size: 11px; color: #aeaeb2; margin-top: 3px; }
.p-right { margin-left: auto; text-align: right; }
.p-avg-n { font-size: 1.4rem; font-weight: 700; color: #db2777; line-height: 1; }
.p-avg-l { font-size: 10px; color: #aeaeb2; margin-top: 3px; }
.p-overall-n { font-size: 1.4rem; font-weight: 700; line-height: 1; }
.p-overall-l { font-size: 10px; color: #aeaeb2; margin-top: 3px; }
.c-good{color:#0369a1} .c-avg{color:#d97706} .c-warn{color:#dc2626}
.mini-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 1rem; }
.mini-card { background: #fff; border: 1px solid #fce7f3; border-radius: 12px; padding: 0.8rem 0.6rem; text-align: center; }
.mini-n { font-size: 1.1rem; font-weight: 700; }
.mini-l { font-size: 10px; color: #aeaeb2; margin-top: 3px; font-weight: 500; line-height: 1.3; }
.chart-card { background: #fff; border: 1px solid #fce7f3; border-radius: 16px; padding: 1.1rem 1.2rem; margin-bottom: 1rem; }
.chart-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; flex-wrap: wrap; gap: 6px; }
.chart-title, .card-title { font-size: 13px; font-weight: 600; color: #1d1d1f; margin-bottom: 1rem; }
.chart-head .card-title { margin-bottom: 0; }
.legend { display: flex; gap: 12px; flex-wrap: wrap; }
.leg { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #6e6e73; }
.leg-dot { width: 8px; height: 8px; border-radius: 50%; }

/* ════════════════════════════════
   성적 현황 — 응시 기록 테이블
════════════════════════════════ */
.gc-table { background:#fff; border:1px solid #fce7f3; border-radius:16px; overflow:hidden; }
.gc-head, .gc-row {
  display:grid;
  grid-template-columns: 104px minmax(0,1.8fr) 78px 92px 80px 46px;
  align-items:center;
}
.gc-head {
  padding:0.7rem 1rem; background:#fdf2f8; border-bottom:1px solid #fce7f3;
  font-size:10px; font-weight:700; color:#c9a8bc; letter-spacing:0.06em; text-transform:uppercase;
}
.gc-head > div { display:flex; align-items:center; justify-content:center; }

.gc-row { padding:0.8rem 1rem; border-bottom:1px solid #fdf2f8; transition:background 0.15s; }
.gc-row:last-child { border-bottom:none; }
.gc-row:hover { background:#fffbfe; }
.gc-row > div { display:flex; align-items:center; justify-content:center; min-width:0; }
.gc-date { font-size:11px; color:#6e6e73; white-space:nowrap; }
.gc-exam { font-size:13px; font-weight:600; color:#1d1d1f; word-break:break-word; line-height:1.4; }
.gc-sc { gap:5px; }
.sc-lbl { display:none; }
.sc-pill { display:inline-flex; align-items:center; justify-content:center; min-width:46px; padding:4px 10px; border-radius:20px; font-size:11px; font-weight:700; white-space:nowrap; }
.sc-ox { background:#dbeafe; color:#1e40af; }
.sc-mc { background:#ede9fe; color:#5b21b6; }
.sc-ms { background:#fdf2f8; color:#db2777; }
.sc-na { font-size:13px; color:#d8d8dd; font-weight:600; }
.gc-del-btn { font-size:13px; background:#fff; border:1.5px solid #fca5a5; border-radius:8px; padding:6px 9px; cursor:pointer; color:#dc2626; min-height:34px; line-height:1; font-family:inherit; transition:background 0.15s; }
.gc-del-btn:hover { background:#fef2f2; }

/* 피드백 */
.fb-wrap { background: #fff; border: 1px solid #fce7f3; border-radius: 14px; padding: 1rem 1.1rem; margin-top: 14px; }
.fb-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.8rem; flex-wrap: wrap; gap: 8px; }
.fb-title { font-size: 13px; font-weight: 600; color: #1d1d1f; display: flex; align-items: center; gap: 6px; }
.fb-icon { width: 22px; height: 22px; background: #fdf2f8; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
.fb-edit { font-size: 11px; font-weight: 600; color: #db2777; background: #fdf2f8; border: 1px solid #fce7f3; border-radius: 8px; padding: 8px 14px; cursor: pointer; font-family: inherit; min-height: 36px; }
.fb-body { font-size: 12px; color: #3c3c43; line-height: 1.75; background: #fffbfe; border: 1px solid #fdf2f8; border-radius: 10px; padding: 0.8rem 1rem; min-height: 56px; white-space: pre-wrap; }
.fb-na { color: #aeaeb2; font-style: italic; }
.fb-ta { display: none; width: 100%; min-height: 90px; resize: vertical; border: 1px solid #fce7f3; border-radius: 10px; padding: 0.8rem 1rem; font-size: 16px; font-family: inherit; color: #1d1d1f; outline: none; margin-top: 8px; -webkit-appearance: none; appearance: none; }
.fb-ta:focus { border-color: #db2777; }
.fb-save { display: none; margin-top: 8px; padding: 10px 20px; background: #db2777; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; color: #fff; cursor: pointer; font-family: inherit; min-height: 44px; }

/* 분석 리포트 */
.subject-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; border-radius: 12px; overflow: hidden; border: 1px solid #fce7f3; }
.subject-table thead tr { background: #fdf2f8; }
.subject-table th { padding: 13px 14px; text-align: center; font-weight: 700; color: #db2777; font-size: 12px; }
.subject-table th:first-child { width: 120px; border-right: 1px solid #fce7f3; }
.subject-table td { padding: 13px 14px; border-bottom: 1px solid #fdf2f8; color: #3c3c43; font-size: 13px; text-align: center; line-height: 1.6; word-break: break-word; }
.subject-table tr:last-child td { border-bottom: none; }
.subject-table td:first-child { color: #5b21b6; font-weight: 600; border-right: 1px solid #fdf2f8; }
.analysis-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1rem; align-items: stretch; }
.analysis-row .chart-card { margin-bottom: 0; }
.analysis-row .radar-wrap { align-items: center; height: 100%; }
.radar-wrap { display: flex; justify-content: center; }
.analysis-items { display: flex; flex-direction: column; gap: 7px; }
.analysis-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; border-radius: 10px; background: #fafafa; border: 1px solid #f5f5f7; }
.ai-label { font-size: 12px; font-weight: 500; color: #3c3c43; }
.ai-val { font-size: 12px; font-weight: 700; }
.total-comment { margin-top: 10px; padding: 10px 12px; background: #fdf2f8; border-radius: 10px; font-size: 12px; color: #3c3c43; line-height: 1.7; }
.trend-card { background: #fff; border: 1px solid #fce7f3; border-radius: 16px; padding: 1.1rem 1.2rem; margin-bottom: 1rem; }
.trend-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; flex-wrap: wrap; gap: 6px; }
.trend-title { font-size: 13px; font-weight: 600; }
.trend-badge { font-size: 10px; font-weight: 600; padding: 3px 9px; border-radius: 6px; }
.tb-up{background:#dcfce7;color:#166534} .tb-dn{background:#fee2e2;color:#991b1b} .tb-fl{background:#f5f5f7;color:#6e6e73}
.trend-canvas-wrap { position: relative; height: 160px; }
.trend-empty { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; font-size:13px; color:#aeaeb2; line-height:1.8; }
.q-section { background: #fff; border: 1px solid #fce7f3; border-radius: 16px; padding: 1.1rem 1.2rem; margin-bottom: 1rem; }
.q-section-title { font-size: 13px; font-weight: 600; color: #db2777; margin-bottom: 1rem; display: flex; align-items: center; gap: 6px; }
.q-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(34px, 1fr)); gap: 5px; }
.q-bubble { aspect-ratio: 1; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; }
.q-o{background:#dcfce7;color:#166534} .q-x{background:#fee2e2;color:#991b1b}
.q-stat { margin-top: 10px; font-size: 12px; color: #3c3c43; display: flex; gap: 12px; flex-wrap: wrap; }
.q-stat b { color: #db2777; }
.empty-state { padding: 2.5rem; text-align: center; font-size: 13px; color: #aeaeb2; }
.empty-box { padding: 3rem; text-align: center; font-size: 13px; color: #aeaeb2; background: #fff; border: 1px solid #fce7f3; border-radius: 16px; }
.print-btn { display: inline-flex; align-items: center; gap: 5px; padding: 8px 16px; background: #fdf2f8; border: 1px solid #fce7f3; border-radius: 10px; font-size: 12px; font-weight: 600; color: #db2777; cursor: pointer; font-family: inherit; min-height: 36px; }
.divider { height: 1px; background: #fce7f3; margin: 14px 0; }

/* ══════════════
   반응형 - 태블릿
══════════════ */
@media (max-width: 900px) {
  .nav-grid { grid-template-columns: 1fr; gap: 8px; }
  .quick-stats { grid-template-columns: repeat(2,1fr); }
  .mini-grid { grid-template-columns: repeat(2,1fr); }
  .analysis-row { grid-template-columns: 1fr; }
}

/* ══════════════
   반응형 - 모바일
══════════════ */
@media (max-width: 600px) {
  .header { padding: 0 1rem; padding-left: max(1rem, env(safe-area-inset-left)); padding-right: max(1rem, env(safe-area-inset-right)); }
  .header-badge { display: none; }
  .brand-name { font-size: 13px; }

  .wrap { padding: 1rem 0.9rem 4rem; padding-left: max(0.9rem, env(safe-area-inset-left)); padding-right: max(0.9rem, env(safe-area-inset-right)); }
  .detail-wrap { padding: 0.9rem 0.85rem 4rem; padding-left: max(0.85rem, env(safe-area-inset-left)); padding-right: max(0.85rem, env(safe-area-inset-right)); }
  .sect-title { font-size: 0.95rem; margin: 1.3rem 0 0.8rem; }
  .sect-title .sect-ico { width: 26px; height: 26px; font-size: 13px; }
  .big-divider { margin: 1.4rem 0; height: 6px; }
  .p-right { margin-left: 0; text-align: left; width: 100%; }

  .welcome-bar { padding: 1rem 1.2rem; border-radius: 14px; margin-bottom: 1.2rem; }
  .welcome-avatar { width: 40px; height: 40px; font-size: 18px; }
  .welcome-greeting { font-size: 0.95rem; }
  .welcome-sub { font-size: 10.5px; }
  .welcome-date { font-size: 0.9rem; }

  .quick-stats { grid-template-columns: repeat(2,1fr); gap: 8px; }
  .panel-body { padding: 1rem 0.9rem; padding-left: max(0.9rem, env(safe-area-inset-left)); padding-right: max(0.9rem, env(safe-area-inset-right)); }
  .panel-bar { padding-left: max(1rem, env(safe-area-inset-left)); padding-right: max(1rem, env(safe-area-inset-right)); }

  /* 성적 현황 테이블 → 카드형 리플로우 */
  .gc-head { display:none; }
  .gc-row {
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-areas:
      "exam exam del"
      "date date date"
      "ox mc ms";
    gap: 9px 6px;
    padding: 0.95rem 0.95rem;
  }
  .gc-row > div { justify-content:flex-start; }
  .gc-exam { grid-area:exam; font-size:13.5px; align-self:center; }
  .gc-date { grid-area:date; }
  .gc-del  { grid-area:del; justify-content:flex-end !important; }
  .sc-col-ox { grid-area:ox; }
  .sc-col-mc { grid-area:mc; }
  .sc-col-ms { grid-area:ms; }

const DAY_KO=['일','월','화','수','목','금','토'];

const params=new URLSearchParams(location.search);

let stu=null, sid=null, recsAll=[], feedbackText='';
let radarInst=null, trendInst=null;

onAuthStateChanged(auth, async user => {
  if(!user){ if(gradesUnsub){ gradesUnsub(); gradesUnsub=null; } location.replace('/login.html'); return; }
  try {

});
window.doLogout=async()=>{ if(gradesUnsub){ gradesUnsub(); gradesUnsub=null; } await signOut(auth); location.replace('/login.html'); };
window.addEventListener('beforeunload', ()=>{ if(gradesUnsub){ gradesUnsub(); gradesUnsub=null; } });

async function startRealtime() {
  if(!idParam){ showError(); return; }
  // 1) 학생 정보 — id 필드 직접 조회 → 문서 id 폴백 (students 컬렉션 전체 다운로드 제거)
  stu = await findStudent(idParam);
  if(!stu){ showError(); return; }
  sid=stu.id||stu.uid;
  // 2) 피드백 (가벼운 단일 문서 1회)
  try { const fs=await getDoc(doc(db,'feedbacks',stu.uid)); feedbackText=fs.exists()?(fs.data().text||''):''; } catch { feedbackText=''; }

  // 3) grades 실시간 구독 — 화면을 곧바로 표시.
  //    과목(tests) 매핑은 subject가 비어있는 기록이 있을 때만 1회 지연 로드 → 평상시엔 tests 전체를 받지 않음
  if(gradesUnsub){ gradesUnsub(); gradesUnsub=null; }
  let firstSnap=true;
  gradesUnsub = onSnapshot(
    query(collection(db,'grades'),where('studentId','==',sid)),
    async (snap)=>{
      // 새 구조(ox/multiple/category) + 옛 구조 둘 다 읽어서 필드명 정규화 (문서 1개 = 응시 1건)
      recsAll = snap.docs.map(d=>normalizeDoc(d.id,d.data())).sort((a,b)=>toDate(a.timestamp)-toDate(b.timestamp));
      // subject가 빠진 기록이 있을 때만 tests 매핑을 1회 로드
      if(!testsLoaded && recsAll.some(r=>!r.subject)){ await loadTestSubjMap(); testsLoaded=true; }
      recsAll = enrichSubjectsSync(recsAll);
      if(firstSnap){
        document.getElementById('loadingBox').style.display='none';
        document.getElementById('content').style.display='block';
        renderProfile();
        gcRenderFb();
        renderShareUI();
        firstSnap=false;
      }
      gcRender();
      rpRender();
      // 학부모 공유 링크가 켜져 있으면 최신 성적으로 자동 동기화
      if(stu.shareToken){ setDoc(doc(db,'shares',stu.shareToken), buildShareSnapshot()).catch(()=>{}); }
    },
    (err)=>{
      console.error('grades onSnapshot error:', err);
      if(firstSnap){ showError(); }
    }
  );
}

/* 학생 1명만 조회 — id 필드 우선, 없으면 문서 id로 폴백 (students 전체 스캔 제거) */
async function findStudent(idp){
  try {
    const qs=await getDocs(query(collection(db,'students'),where('id','==',idp)));
    if(!qs.empty){ const d=qs.docs[0]; return {uid:d.id,...d.data()}; }
  } catch {}
  try {
    const ds=await getDoc(doc(db,'students',idp));
    if(ds.exists()) return {uid:ds.id,...ds.data()};
  } catch {}
  return null;
}

async function loadTestSubjMap(){
  try {
    const snap=await getDocs(collection(db,'tests'));
    testById=new Map(); testByTitle=new Map();
    snap.forEach(d=>{ const data=d.data(); testById.set(d.id,data); if(data.title) testByTitle.set(data.title,data); });
  } catch { testById=new Map(); testByTitle=new Map(); }
}
function enrichSubjectsSync(records){
  return records.map(r=>{
    if(r.subject) return r;
    const eid=r.examId||r.testId;
    if(eid && testById.has(eid)){ const s=testById.get(eid).subject; if(s) return {...r,subject:s}; }
    const title=r.testName||r.examTitle;
    if(title && testByTitle.has(title)){ const s=testByTitle.get(title).subject; if(s) return {...r,subject:s}; }
    return r;
  });
}
function showError(){ document.getElementById('loadingBox').style.display='none'; document.getElementById('errorBox').style.display='block'; }

/* ════════════════════════════════════════════════
   기록 정규화 — 새/옛 구조를 한 형태로 통일
   (문서 1개 = 응시 1건. 그 안의 ox/multiple/category를 그대로 보존)
════════════════════════════════════════════════ */
function normalizeDoc(id, r){
  return {
    id,
    // 식별·표시
    examId: r.examId || r.testId || '',
    testId: r.testId || r.examId || '',
    testName: r.testName || r.examTitle || r.unitName || '',
    examTitle: r.examTitle || r.testName || r.unitName || '',
    subject: r.subject || r.studentSubject || '',
    grade: r.grade || r.studentGrade || '',
    // 구조 구분
    category: r.category || (r.testType==='master' ? 'master' : ''),
    ox: (r.ox && typeof r.ox==='object') ? r.ox : null,
    multiple: (r.multiple && typeof r.multiple==='object') ? r.multiple : null,
    // 점수·집계
    score: (typeof r.score==='number') ? r.score : (typeof r.percentage==='number'?r.percentage:null),
    totalQuestions: r.totalQuestions ?? r.totalQ ?? r.total ?? null,
    // 문항별 상세
    answers: Array.isArray(r.answers) ? r.answers : null,
    // 시간 (timestamp 우선, 옛 필드 폴백)
    timestamp: r.timestamp || r.submittedTimestamp || r.submittedAt || r.date || null,
    // 옛 구조 폴백용
    testType: r.testType || null
  };
}

/* 이 기록이 가진 파트별 점수 {ox, mc, master} (없으면 null) */
function partScores(r){
  if(r.category==='master' || r.testType==='master'){
    const sc=(r.multiple && r.multiple.score!=null) ? r.multiple.score : (r.score!=null ? r.score : null);
    return { ox:null, mc:null, master: sc };
  }
  const hasOx = r.ox && r.ox.total;
  const hasMc = r.multiple && r.multiple.total;
  if(hasOx || hasMc){
    return {
      ox: hasOx ? (r.ox.score!=null?r.ox.score:0) : null,
      mc: hasMc ? (r.multiple.score!=null?r.multiple.score:0) : null,
      master: null
    };
  }
  // 옛 구조 (단일 score + testType)
  const sc = r.score!=null ? r.score : 0;
  if(r.testType==='ox')     return { ox:sc, mc:null, master:null };
  if(r.testType==='master') return { ox:null, mc:null, master:sc };
  return { ox:null, mc:sc, master:null }; // 기본 4지선다
}
function hasType(r,kind){ return partScores(r)[kind]!=null; }
function typeScore(r,kind){ const v=partScores(r)[kind]; return v==null?0:v; }
/* 파트별 문항 상세 추출 */
function partAnswers(r,kind){
  if(!Array.isArray(r.answers)) return null;
  if(kind==='master') return r.answers;
  if(kind==='ox')     return r.answers.filter(a=>a.type==='ox');
  return r.answers.filter(a=>a.type==='multiple' || a.type==='mc');
}

function renderProfile() {
  const name=stu.name||stu.displayName||'이름없음', grade=stu.grade||stu.year||'—';
  const bg=GRADE_BG[grade]||'#f5f5f7', col=GRADE_COL[grade]||'#6e6e73', short=GRADE_SHORT[grade]||grade;
  const av=document.getElementById('d-av'); av.textContent=short; av.style.background=bg; av.style.color=col;
  setTxt('d-name',name); setTxt('d-meta',`${grade} · 종합 성적 분석`);
  document.title=`${name} 성적 · 인후쌤의 과학 수업 관리 시스템`;
  const subs=(stu.subject&&stu.subject!=='-')?String(stu.subject).split(',').map(x=>x.trim()).filter(Boolean):[];
  document.getElementById('d-subjects').innerHTML=subs.length?subs.map(x=>`<span class="subject-chip2">${esc2(x)}</span>`).join(''):'';
}

/* ════ 성적 현황 — 응시 기록 테이블 ════ */
function gcRender() {
  // 요약 통계 (전체 기록 기준)
  const avg=(kind)=>{ const v=recsAll.filter(r=>hasType(r,kind)); return v.length?Math.round(v.map(r=>typeScore(r,kind)).reduce((s,x)=>s+x,0)/v.length):null; };
  setTxt('d-cnt',recsAll.length);
  const ox=avg('ox'), mc=avg('mc'), ms=avg('master');
  setTxt('d-ox',ox!==null?ox+'점':'—'); setTxt('d-mc',mc!==null?mc+'점':'—'); setTxt('d-ms',ms!==null?ms+'점':'—');
  // 테이블 (최신순)
  const list=recsAll.slice().sort((a,b)=>toDate(b.timestamp)-toDate(a.timestamp));
  gcRenderTable(list);
}
function gcRenderTable(list){
  const el=document.getElementById('d-records');
  if(!list.length){ el.innerHTML=`<div class="empty-box">아직 응시한 기록이 없습니다.</div>`; return; }
  const scCell=(v,type)=>{
    const map={ ox:{cls:'sc-ox',lbl:'OX',col:'sc-col-ox'}, mc:{cls:'sc-mc',lbl:'4지선다',col:'sc-col-mc'}, ms:{cls:'sc-ms',lbl:'마스터',col:'sc-col-ms'} };
    const m=map[type];
    const inner = (v==null) ? `<span class="sc-na">—</span>` : `<span class="sc-pill ${m.cls}">${v}점</span>`;
    return `<div class="gc-sc ${m.col}"><span class="sc-lbl">${m.lbl}</span>${inner}</div>`;
  };
  const rows=list.map(r=>{
    const p=partScores(r);
    const name=esc2(r.testName||r.examTitle||'—');
    const date=fmtDateShort(r.timestamp)||'—';
    return `<div class="gc-row">
      <div class="gc-date">${date}</div>
      <div class="gc-exam">${name}</div>
      ${scCell(p.ox,'ox')}
      ${scCell(p.mc,'mc')}
      ${scCell(p.master,'ms')}
      <div class="gc-del"><button class="gc-del-btn" title="기록 삭제" onclick="window.gcDeleteRec('${esc(r.id)}','${esc(r.testName||r.examTitle||'')}')">🗑</button></div>
    </div>`;
  }).join('');
  el.innerHTML=`<div class="gc-table">
    <div class="gc-head"><div>응시일</div><div>시험명</div><div>OX</div><div>4지선다</div><div>마스터</div><div>삭제</div></div>
    ${rows}
  </div>`;
}
window.gcDeleteRec=async(recId,name)=>{
  if(!recId){ alert('기록 정보를 찾을 수 없습니다.'); return; }
  if(!confirm(`"${name||'이 기록'}" 응시 기록을 삭제할까요?\n삭제하면 되돌릴 수 없습니다.`)) return;
  // 삭제만 하면 grades 실시간 구독이 표·요약·추이·공유 스냅샷을 자동 갱신합니다.
  try { await deleteDoc(doc(db,'grades',recId)); }
  catch(e){ alert('삭제 실패: '+e.message); }
};

/* 피드백 */
function gcRenderFb() {
  const txt=feedbackText||'';
  document.getElementById('fb-body').innerHTML=txt?txt.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/\n/g,'<br>'):'<span class="fb-na">아직 작성된 피드백이 없습니다.</span>';
  document.getElementById('fb-ta').value=txt;
  document.getElementById('fb-ta').style.display='none';
  document.getElementById('fb-save-btn').style.display='none';
  document.getElementById('fb-toggle').textContent='피드백 작성';
}
window.toggleFb=()=>{ const ta=document.getElementById('fb-ta'),sv=document.getElementById('fb-save-btn'),btn=document.getElementById('fb-toggle'); const open=ta.style.display==='block'; ta.style.display=open?'none':'block'; sv.style.display=open?'none':'inline-block'; btn.textContent=open?'피드백 작성':'취소'; };
window.saveFb=async()=>{ const txt=document.getElementById('fb-ta').value.trim(); try { await setDoc(doc(db,'feedbacks',stu.uid),{text:txt,updatedAt:new Date()}); feedbackText=txt; gcRenderFb(); if(stu.shareToken){ try{ await setDoc(doc(db,'shares',stu.shareToken), buildShareSnapshot()); }catch(e){} } } catch(e){ alert('저장 실패: '+e.message); } };

/* ════ 학부모 공유 (토큰 기반) ════ */
function genToken(){ const a=new Uint8Array(24); crypto.getRandomValues(a); return Array.from(a,b=>b.toString(16).padStart(2,'0')).join(''); }
function shareUrl(){ return location.origin + '/parent.html?t=' + (stu.shareToken||''); }
function buildShareSnapshot(){
  const base=enrollDate();
  // 파트별로 펼쳐서 부모 화면이 OX/4지선다/마스터를 구분해 볼 수 있게
  const records=[];
  recsAll.forEach(r=>{
    const p=partScores(r);
    const ts=toDate(r.timestamp).getTime();
    const mk=(type,score,ans)=>({
      id:r.id, testType:type,
      testName:r.testName||'', examTitle:r.examTitle||'',
      score: score==null?0:score, ts,
      subject:r.subject||'',
      answers: Array.isArray(ans)?ans.map(a=>({isCorrect: a.isCorrect!==undefined?!!a.isCorrect:(a.correct===true)})):null
    });
    if(p.master!=null) records.push(mk('master',p.master,partAnswers(r,'master')));
    if(p.ox!=null)     records.push(mk('ox',p.ox,partAnswers(r,'ox')));
    if(p.mc!=null)     records.push(mk('mc',p.mc,partAnswers(r,'multiple')));
  });
  return {
    v:1,
    token: stu.shareToken||'',
    studentName: stu.name||stu.displayName||'이름없음',
    grade: stu.grade||stu.year||'—',
    subject: (stu.subject&&stu.subject!=='-')?String(stu.subject):'',
    enrollBase: base?base.getTime():null,
    feedback: feedbackText||'',
    records,
    updatedAt: Date.now()
  };
}
function renderShareUI(){
  const el=document.getElementById('share-content'); if(!el) return;
  if(stu.shareToken){
    el.innerHTML=`
      <div style="font-size:12px;color:#3c3c43;line-height:1.6;margin-bottom:8px;">아래 링크를 카카오톡·문자로 보내면 학부모가 <b>로그인 없이</b> 이 학생 성적만 볼 수 있습니다.</div>
      <input readonly value="${shareUrl()}" onclick="this.select()" style="width:100%;padding:9px 12px;border:1px solid #fce7f3;border-radius:10px;font-size:12px;color:#6e6e73;background:#fafafa;font-family:inherit;margin-bottom:8px;">
      <div style="display:flex;gap:6px;flex-wrap:wrap;">
        <button onclick="window.copyShareLink()" style="padding:9px 16px;background:#db2777;border:none;border-radius:9px;font-size:12px;font-weight:700;color:#fff;cursor:pointer;font-family:inherit;min-height:40px;">링크 복사</button>
        <button onclick="window.createOrRefreshShare()" style="padding:9px 16px;background:#fdf2f8;border:1px solid #fce7f3;border-radius:9px;font-size:12px;font-weight:600;color:#db2777;cursor:pointer;font-family:inherit;min-height:40px;">최신 성적으로 갱신</button>
        <button onclick="window.disableShare()" style="padding:9px 16px;background:#fff;border:1.5px solid #fca5a5;border-radius:9px;font-size:12px;font-weight:600;color:#dc2626;cursor:pointer;font-family:inherit;min-height:40px;">링크 비활성화</button>
      </div>`;
  } else {
    el.innerHTML=`
      <div style="font-size:12px;color:#3c3c43;line-height:1.6;margin-bottom:10px;">학부모에게 보낼 읽기 전용 성적 링크를 만듭니다. 추측 불가능한 주소라 링크를 받은 사람만 볼 수 있습니다.</div>
      <button onclick="window.createOrRefreshShare()" style="padding:10px 18px;background:#db2777;border:none;border-radius:9px;font-size:13px;font-weight:700;color:#fff;cursor:pointer;font-family:inherit;min-height:44px;">학부모 공유 링크 만들기</button>`;
  }
}
window.createOrRefreshShare=async()=>{
  try{
    if(!stu.shareToken){ stu.shareToken=genToken(); await setDoc(doc(db,'students',stu.uid),{shareToken:stu.shareToken},{merge:true}); }
    await setDoc(doc(db,'shares',stu.shareToken), buildShareSnapshot());
    renderShareUI(); alert('공유 링크가 생성/갱신되었습니다.');
  }catch(e){ alert('공유 실패: '+e.message); }
};
window.disableShare=async()=>{
  if(!stu.shareToken) return;
  if(!confirm('학부모 공유 링크를 비활성화할까요?\n기존 링크는 더 이상 열리지 않습니다.')) return;
  try{
    await deleteDoc(doc(db,'shares',stu.shareToken));
    await setDoc(doc(db,'students',stu.uid),{shareToken:''},{merge:true});
    stu.shareToken=''; renderShareUI();
  }catch(e){ alert('비활성화 실패: '+e.message); }
};
window.copyShareLink=()=>{
  const url=shareUrl();
  navigator.clipboard.writeText(url).then(()=>alert('링크가 복사되었습니다.')).catch(()=>prompt('아래 링크를 복사하세요',url));
};

/* ════ 분석 리포트 ════ */
function rpRender() {
  // 기간(4주) 필터 제거 → 실제 응시한 전체 시험 데이터로 분석
  const filtered=recsAll;
  const firstOnly=filtered.slice().sort((a,b)=>toDate(a.timestamp)-toDate(b.timestamp));
  const subMap=new Map();
  firstOnly.forEach(r=>{ const subj=r.subject||'과목미지정', content=r.testName||r.examTitle||''; if(content){ if(!subMap.has(subj)) subMap.set(subj,new Set()); subMap.get(subj).add(content); } });
  const subEl=document.getElementById('rp-subject-table');
  if(subMap.size>0){ const rows=[...subMap.entries()].map(([s,c])=>`<tr><td>${esc2(s)}</td><td>${[...c].map(x=>esc2(x)).join(', ')}</td></tr>`).join(''); subEl.innerHTML=`<table class="subject-table"><thead><tr><th>과목</th><th>내용</th></tr></thead><tbody>${rows}</tbody></table>`; } else { subEl.innerHTML=''; }
  const avg=(arr,kind)=>{ const v=arr.filter(r=>hasType(r,kind)); return v.length?Math.round(v.map(r=>typeScore(r,kind)).reduce((a,x)=>a+x,0)/v.length):null; };
  const oxA=avg(firstOnly,'ox'),mcA=avg(firstOnly,'mc'),msA=avg(firstOnly,'master');
  setTxt('rp-cnt',firstOnly.length); setTxt('rp-ox',oxA!==null?oxA+'점':'—'); setTxt('rp-mc',mcA!==null?mcA+'점':'—'); setTxt('rp-ms',msA!==null?msA+'점':'—');
  const vals=[oxA,mcA,msA].filter(v=>v!==null), total=vals.length?Math.round(vals.reduce((a,v)=>a+v,0)/vals.length):null;
  const oel=document.getElementById('rp-overall');
  if(total!==null){ if(total>=80){oel.textContent=`양호 (${total}점)`;oel.className='p-overall-n c-good';} else if(total>=60){oel.textContent=`보통 (${total}점)`;oel.className='p-overall-n c-avg';} else{oel.textContent=`주의 (${total}점)`;oel.className='p-overall-n c-warn';} } else { oel.textContent='—'; oel.className='p-overall-n'; }
  rpRenderAnalysis(oxA,mcA,msA,total); rpDrawRadar(oxA,mcA,msA); rpDrawTrend(filtered); rpRenderQAnalysis(filtered.filter(r=>hasType(r,'master')));
}
function rpRenderAnalysis(oxA,mcA,msA,total) {
  document.getElementById('rp-analysis-items').innerHTML=[{label:'OX 테스트',val:oxA},{label:'4지선다',val:mcA},{label:'마스터테스트',val:msA}].map(r=>{ if(r.val===null) return `<div class="analysis-item"><span class="ai-label">${r.label}</span><span class="ai-val" style="color:#aeaeb2;">데이터 없음</span></div>`; const cls=r.val>=80?'c-good':r.val>=60?'c-avg':'c-warn', lbl=r.val>=80?`양호 (${r.val}점)`:r.val>=60?`보통 (${r.val}점)`:`주의 (${r.val}점)`; return `<div class="analysis-item"><span class="ai-label">${r.label}</span><span class="ai-val ${cls}">${lbl}</span></div>`; }).join('');
  const com=document.getElementById('rp-comment'); if(total===null){com.textContent='아직 데이터가 없습니다.';return;} const low=[],high=[]; if(oxA!==null){if(oxA>=80)high.push('OX');else if(oxA<60)low.push('OX');} if(mcA!==null){if(mcA>=80)high.push('4지선다');else if(mcA<60)low.push('4지선다');} if(msA!==null){if(msA>=80)high.push('마스터');else if(msA<60)low.push('마스터');} const nm=stu.name||stu.displayName||'학생'; let txt=nm+' 학생'; if(total>=80) txt+='은 전반적으로 양호한 수준입니다. '; else if(total>=60) txt+='은 보통 수준이며 일부 영역 보완이 필요합니다. '; else txt+='은 전반적인 기초 개념 복습이 필요합니다. '; if(high.length) txt+=high.join(', ')+' 영역은 우수한 성과를 보이고 있습니다. '; if(low.length) txt+=`특히 ${low.join(', ')} 영역의 집중 학습을 권장합니다.`; com.textContent=txt;
}
function rpDrawRadar(oxA,mcA,msA){ const ctx=document.getElementById('rp-radar').getContext('2d'); if(radarInst) radarInst.destroy(); radarInst=new Chart(ctx,{type:'radar',data:{labels:['OX 테스트','4지선다','마스터테스트'],datasets:[{data:[oxA||0,mcA||0,msA||0],backgroundColor:'rgba(219,39,119,0.15)',borderColor:'#db2777',borderWidth:2,pointBackgroundColor:'#db2777',pointRadius:4}]},options:{responsive:false,animation:false,plugins:{legend:{display:false}},scales:{r:{min:0,max:100,ticks:{stepSize:25,font:{size:9},color:'#aeaeb2'},grid:{color:'#fce7f3'},pointLabels:{font:{size:10},color:'#6e6e73'},angleLines:{color:'#fce7f3'}}}}}); }

/* 점수 추이 — 유형(OX/4지선다/마스터)별로 각각 회차를 매김.
   각 유형은 그 유형의 응시 순서대로 1회차,2회차…(날짜 오름차순).
   유형별로 4회 이상 쌓인 라인만 표시. (예: OX만 4회면 OX 라인만 나옴) */
function rpDrawTrend(filtered) {
  const canvas=document.getElementById('rp-trend');
  const empty=document.getElementById('rp-trend-empty');
  const badge=document.getElementById('rp-trend-badge');
  if(trendInst){ trendInst.destroy(); trendInst=null; }

  const MIN=4;
  // 유형별 점수 시퀀스 (날짜 오름차순)
  const seqOf=(kind)=> filtered.filter(r=>hasType(r,kind))
      .slice().sort((a,b)=>toDate(a.timestamp)-toDate(b.timestamp))
      .map(r=>typeScore(r,kind));
  const oxSeq=seqOf('ox'), mcSeq=seqOf('mc'), msSeq=seqOf('master');

  const types=[
    {label:'OX',     seq:oxSeq, color:'#1e40af', bg:'rgba(30,64,175,0.06)'},
    {label:'4지선다', seq:mcSeq, color:'#5b21b6', bg:'rgba(91,33,182,0.06)'},
    {label:'마스터',  seq:msSeq, color:'#db2777', bg:'rgba(219,39,119,0.06)'}
  ];
  const qualified=types.filter(t=>t.seq.length>=MIN);

  if(!qualified.length){
    canvas.style.display='none';
    empty.style.display='flex';
    empty.innerHTML=`각 유형별 4회 이상 응시하면 점수 추이가 표시됩니다.<br>`+
      `<span style="font-size:12px;color:#6e6e73;font-weight:600;margin-top:6px;display:inline-block;">`+
      `OX ${oxSeq.length}/4 · 4지선다 ${mcSeq.length}/4 · 마스터 ${msSeq.length}/4</span>`;
    badge.textContent='데이터 부족'; badge.className='trend-badge tb-fl';
    return;
  }

  canvas.style.display='block';
  empty.style.display='none';

  const maxLen=Math.max(...qualified.map(t=>t.seq.length));
  const labels=Array.from({length:maxLen},(_,i)=>`${i+1}회차`);
  const datasets=qualified.map(t=>({
    label:t.label,
    data:labels.map((_,i)=> i<t.seq.length ? t.seq[i] : null),
    borderColor:t.color, backgroundColor:t.bg,
    tension:0.35, spanGaps:true, pointRadius:4, pointBackgroundColor:t.color
  }));

  // 추세 배지: 표시된 유형들의 (마지막-처음) 평균
  const diffs=qualified.map(t=>t.seq[t.seq.length-1]-t.seq[0]);
  const avgDiff=Math.round(diffs.reduce((a,v)=>a+v,0)/diffs.length);
  if(avgDiff>0){badge.textContent=`상승세 (+${avgDiff}점)`;badge.className='trend-badge tb-up';}
  else if(avgDiff<0){badge.textContent=`하락세 (${avgDiff}점)`;badge.className='trend-badge tb-dn';}
  else{badge.textContent='보합세';badge.className='trend-badge tb-fl';}

  const ctx=canvas.getContext('2d');
  trendInst=new Chart(ctx,{type:'line',data:{labels,datasets},options:{responsive:true,maintainAspectRatio:false,animation:false,plugins:{legend:{display:false}},scales:{y:{min:0,max:100,ticks:{stepSize:25,font:{size:10},color:'#aeaeb2'},grid:{color:'#f5f5f7'}},x:{ticks:{font:{size:10},color:'#aeaeb2'},grid:{display:false}}}}});
}
function rpRenderQAnalysis(msRecs){ const sec=document.getElementById('rp-q-section'); if(!msRecs.length){sec.style.display='none';return;} const sorted=msRecs.slice().sort((a,b)=>toDate(a.timestamp)-toDate(b.timestamp)); const latest=sorted[sorted.length-1], answers=partAnswers(latest,'master')||[]; if(!answers.length){sec.style.display='none';return;} sec.style.display='block'; document.getElementById('rp-q-grid').innerHTML=answers.map((a,i)=>{ const ok=a.isCorrect!==undefined?a.isCorrect:a.correct===true; return `<div class="q-bubble ${ok?'q-o':'q-x'}">${i+1}</div>`; }).join(''); const correct=answers.filter(a=>a.isCorrect!==undefined?a.isCorrect:a.correct===true).length; document.getElementById('rp-q-stat').innerHTML=`총 <b>${answers.length}</b>문항 &nbsp;|&nbsp; 정답 <b style="color:#166534;">${correct}</b>개 &nbsp;|&nbsp; 오답 <b style="color:#991b1b;">${answers.length-correct}</b>개 &nbsp;|&nbsp; 정답률 <b>${Math.round(correct/answers.length*100)}%</b>`; }

/* 유틸 */
function toDate(ts){if(!ts)return new Date(0);if(typeof ts==='object'&&ts.seconds)return new Date(ts.seconds*1000);if(ts&&typeof ts.toDate==='function')return ts.toDate();return new Date(ts);}
function parseRegDate(r){
  if(!r) return null;
  if(typeof r==='object'&&r.seconds) return new Date(r.seconds*1000);
  if(typeof r==='object'&&typeof r.toDate==='function') return r.toDate();
  if(typeof r==='string'){ const m=r.match(/(\d{4})\D+(\d{1,2})\D+(\d{1,2})/); if(m) return new Date(+m[1],+m[2]-1,+m[3]); const d=new Date(r); return isNaN(d)?null:d; }
  const d=new Date(r); return isNaN(d)?null:d;
}
function enrollDate(){
  const d=parseRegDate(stu&&(stu.regDate||stu.registeredAt||stu.createdAt||stu.joinDate));
  if(d){ d.setHours(0,0,0,0); return d; }
  if(recsAll.length){ const oldest=recsAll.reduce((a,r)=>{const t=toDate(r.timestamp);return t<a?t:a;},toDate(recsAll[0].timestamp)); const e=new Date(oldest); e.setHours(0,0,0,0); return e; }
  return null;
}
function fmtDateShort(ts){if(!ts)return '';const d=toDate(ts);if(d.getTime()===0)return '';const yy=String(d.getFullYear()).slice(2),mm=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0'),day=DAY_KO[d.getDay()];return `${yy}.${mm}.${dd}(${day})`;}
function esc(s){return String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");}
function esc2(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function setTxt(id,txt){const e=document.getElementById(id);if(e)e.textContent=txt;}
</script>

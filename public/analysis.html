<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학생별 분석 - 베타과학</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --primary: #2563eb; --primary-light: #eff6ff; --primary-dark: #1d4ed8; --max-width: 1200px; --bg: #f5f6fa; --white: #ffffff; --text: #1e293b; --text-muted: #64748b; --border: #e2e8f0; --danger: #ef4444; --success: #10b981; --warning: #f59e0b; --radius: 10px; }
  body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .app-wrapper { max-width: var(--max-width); margin: 0 auto; display: flex; flex-direction: column; min-height: 100vh; }
  .topbar { background: var(--white); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; gap: 32px; height: 56px; position: sticky; top: 0; z-index: 100; }
  .logo-area { display: flex; flex-direction: column; align-items: center; line-height: 1.1; flex-shrink: 0; min-width: 80px; }
  .logo-area .brand { font-size: 15px; font-weight: 800; letter-spacing: 0.08em; color: var(--primary); }
  .logo-area .brand-sub { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; color: var(--primary); text-transform: uppercase; }
  .topbar-divider { width: 1px; height: 28px; background: var(--border); flex-shrink: 0; }
  .nav-tabs { display: flex; gap: 2px; list-style: none; }
  .nav-tabs a { display: block; padding: 8px 14px; font-size: 14px; color: var(--text-muted); text-decoration: none; border-radius: 6px; white-space: nowrap; transition: background 0.15s, color 0.15s; }
  .nav-tabs a:hover { background: var(--bg); color: var(--text); }
  .nav-tabs a.active { background: var(--primary-light); color: var(--primary); font-weight: 600; }
  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  .academy-name { font-size: 13px; font-weight: 600; color: var(--text); }
  .badge-admin { font-size: 11px; padding: 2px 8px; background: #f1f5f9; border-radius: 20px; color: var(--text-muted); }
  .main-content { padding: 28px 24px; flex: 1; }
  .page-header { margin-bottom: 24px; }
  .page-header h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
  .page-header p { font-size: 14px; color: var(--text-muted); }
  .card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 20px; }
  .card-title { font-size: 17px; font-weight: 700; margin-bottom: 20px; }
  .filter-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 16px; align-items: end; }
  .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 7px; }
  .search-wrap { position: relative; }
  .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 15px; height: 15px; color: var(--text-muted); pointer-events: none; }
  .search-wrap input { width: 100%; padding: 11px 12px 11px 36px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; color: var(--text); background: var(--white); outline: none; transition: border 0.15s; font-family: inherit; }
  .search-wrap input:focus { border-color: var(--primary); }
  .search-wrap input::placeholder { color: var(--text-muted); }
  .form-group select { width: 100%; padding: 11px 36px 11px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; color: var(--text); background: var(--white); cursor: pointer; outline: none; transition: border 0.15s; appearance: none; background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%2394a3b8' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 14px center; }
  .form-group input[type="date"] { width: 100%; padding: 11px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; color: var(--primary); font-weight: 600; background: var(--white); outline: none; font-family: inherit; cursor: pointer; }
  .empty-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 80px 20px; text-align: center; color: var(--text-muted); }
  .empty-icon { width: 64px; height: 64px; background: #f1f5f9; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
  .empty-card p { font-size: 15px; font-weight: 500; color: var(--text-muted); }
  .profile-grid { display: grid; grid-template-columns: 280px 1fr; gap: 20px; }
  .profile-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; }
  .avatar { width: 64px; height: 64px; border-radius: 50%; background: var(--primary-light); display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 700; color: var(--primary); margin: 0 auto 14px; }
  .profile-name { font-size: 18px; font-weight: 700; text-align: center; margin-bottom: 4px; }
  .profile-sub { font-size: 13px; color: var(--text-muted); text-align: center; margin-bottom: 20px; }
  .profile-divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
  .profile-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; font-size: 14px; }
  .profile-row .key { color: var(--text-muted); } .profile-row .val { font-weight: 600; }
  .analysis-panel { display: flex; flex-direction: column; gap: 16px; }
  .mini-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .mini-stat { background: #f8fafc; border-radius: 8px; padding: 14px 16px; }
  .mini-stat .lbl { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
  .mini-stat .val { font-size: 22px; font-weight: 700; }
  .val-blue { color: var(--primary); } .val-green { color: var(--success); } .val-red { color: var(--danger); }
  .chart-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
  .chart-title { font-size: 14px; font-weight: 700; margin-bottom: 16px; }
  .bar-chart { display: flex; align-items: flex-end; gap: 8px; height: 120px; padding-bottom: 28px; border-bottom: 1px solid var(--border); }
  .bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; height: 100%; justify-content: flex-end; }
  .bar { width: 100%; border-radius: 4px 4px 0 0; opacity: 0.85; min-height: 4px; }
  .bar:hover { opacity: 1; }
  .bar-score { font-size: 10px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
  .history-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .history-header { padding: 16px 20px; border-bottom: 1px solid var(--border); font-size: 14px; font-weight: 700; }
  table { width: 100%; border-collapse: collapse; }
  thead th { font-size: 12px; font-weight: 600; color: var(--text-muted); text-align: left; padding: 10px 16px; border-bottom: 1px solid var(--border); background: #f8fafc; }
  tbody tr { border-bottom: 1px solid var(--border); }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #f8fafc; }
  tbody td { font-size: 13px; padding: 12px 16px; }
  .score-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; color: white; }
  .score-high { background: var(--primary); } .score-mid { background: var(--success); } .score-low { background: var(--danger); }
  .hw-tag { display: inline-block; padding: 2px 8px; background: #fef3c7; color: #92400e; border-radius: 4px; font-size: 11px; font-weight: 600; }
  @media (max-width: 900px) { .filter-grid { grid-template-columns: 1fr 1fr; } .profile-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="app-wrapper">
  <header class="topbar">
    <div class="logo-area"><span class="brand">BETA</span><span class="brand-sub">SCIENCE</span></div>
    <div class="topbar-divider"></div>
    <nav><ul class="nav-tabs">
      <li><a href="dashboard.html">대시보드</a></li>
      <li><a href="students.html">학생 관리</a></li>
      <li><a href="test-create.html">테스트 생성</a></li>
      <li><a href="test-manage.html">테스트 관리</a></li>
      <li><a href="grades.html">성적 조회</a></li>
      <li><a href="analysis.html" class="active">학생별 분석</a></li>
      <li><a href="special.html">특별관리</a></li>
      <li><a href="sms.html">SMS설정</a></li>
    </ul></nav>
    <div class="topbar-right"><span class="academy-name">베타과학학원</span><span class="badge-admin">관리자 모드</span></div>
  </header>
  <main class="main-content">
    <div class="page-header"><h1>학생별 성적 분석</h1><p>학생을 선택하고 기간을 설정하여 성적과 과제를 분석하세요</p></div>
    <div class="card">
      <div class="card-title">필터 설정</div>
      <div class="filter-grid">
        <div class="form-group"><label>학생 검색</label><div class="search-wrap"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><input type="text" id="studentSearch" placeholder="이름 또는 ID 검색..." oninput="filterStudentList()"></div></div>
        <div class="form-group"><label>학생 선택</label><select id="studentSelect" onchange="onStudentSelect()"><option value="">학생을 선택하세요</option></select></div>
        <div class="form-group"><label>시작일</label><input type="date" id="dateFrom" value="2026-01-01" onchange="refreshAnalysis()"></div>
        <div class="form-group"><label>종료일</label><input type="date" id="dateTo" value="2026-04-28" onchange="refreshAnalysis()"></div>
      </div>
    </div>
    <div id="emptyArea" class="empty-card">
      <div class="empty-icon"><svg width="28" height="28" fill="none" stroke="#94a3b8" stroke-width="2" viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg></div>
      <p>학생을 선택하여 성적을 분석하세요</p>
    </div>
    <div id="resultArea" style="display:none;">
      <div class="profile-grid">
        <div class="profile-card">
          <div class="avatar" id="avatarInitial">김</div>
          <div class="profile-name" id="profileName">-</div>
          <div class="profile-sub" id="profileSub">-</div>
          <hr class="profile-divider">
          <div class="profile-row"><span class="key">학생 ID</span><span class="val" id="profileId">-</span></div>
          <div class="profile-row"><span class="key">수강 과목</span><span class="val" id="profileSubject">-</span></div>
          <div class="profile-row"><span class="key">학부모 연락처</span><span class="val" id="profilePhone">-</span></div>
          <div class="profile-row"><span class="key">등록일</span><span class="val" id="profileReg">-</span></div>
          <hr class="profile-divider">
          <div class="profile-row"><span class="key">응시 테스트</span><span class="val val-blue" id="profileTestCount">-</span></div>
          <div class="profile-row"><span class="key">평균 점수</span><span class="val" id="profileAvg">-</span></div>
          <div class="profile-row"><span class="key">추가 과제</span><span class="val val-red" id="profileHw">-</span></div>
        </div>
        <div class="analysis-panel">
          <div class="mini-stats">
            <div class="mini-stat"><div class="lbl">평균 점수</div><div class="val val-blue" id="avgScore">-</div></div>
            <div class="mini-stat"><div class="lbl">최고 점수</div><div class="val val-green" id="maxScore">-</div></div>
            <div class="mini-stat"><div class="lbl">추가 과제 수</div><div class="val val-red" id="hwCount">-</div></div>
          </div>
          <div class="chart-card"><div class="chart-title">점수 추이</div><div class="bar-chart" id="barChart"></div></div>
          <div class="history-card">
            <div class="history-header">테스트 응시 이력</div>
            <table><thead><tr><th>테스트명</th><th>점수</th><th>오답 수</th><th>추가 과제</th><th>제출일</th></tr></thead><tbody id="historyBody"></tbody></table>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
<script>
  const students=[{id:'h01001',name:'김가현',grade:'고등1학년',subject:'통합과학',phone:'010-9876-5432',regDate:'2026. 3. 15.'},{id:'h01002',name:'김재호',grade:'고등1학년',subject:'통합과학, 물리',phone:'010-5555-1234',regDate:'2026. 3. 15.'},{id:'h01003',name:'차도윤',grade:'고등1학년',subject:'통합과학',phone:'010-7777-8888',regDate:'2026. 3. 20.'},{id:'m01007',name:'김대근',grade:'중등1학년',subject:'-',phone:'010-5538-0529',regDate:'2026. 4. 28.'},{id:'m01009',name:'김인후',grade:'중등1학년',subject:'-',phone:'010-4420-7902',regDate:'2026. 4. 28.'},{id:'m01005',name:'이하준',grade:'중등2학년',subject:'-',phone:'010-8973-7455',regDate:'2026. 4. 28.'},{id:'m03001',name:'정민서',grade:'중등3학년',subject:'통합과학',phone:'010-1234-5678',regDate:'2026. 4. 20.'},{id:'h02001',name:'박소연',grade:'고등2학년',subject:'물리, 화학',phone:'010-2222-3333',regDate:'2026. 2. 10.'},{id:'m02102',name:'주승아',grade:'중등2학년',subject:'-',phone:'010-4447-1178',regDate:'2026. 4. 28.'},{id:'m02101',name:'최수혁',grade:'중등2학년',subject:'-',phone:'010-8725-0893',regDate:'2026. 4. 28.'}];
  const testNames=['양정고 2025 1학기 통합과학','진명여고 2025 1학기 통합과학','덕원여고 2025 1학기 통합과학','마포고 2025 1학기 통합과학','한가람고 2025 1학기 통합과학'];
  let filteredStudents=[...students],selectedStudent=null;
  function populateSelect(list){const sel=document.getElementById('studentSelect'),cur=sel.value;sel.innerHTML='<option value="">학생을 선택하세요</option>';list.forEach(s=>{const o=document.createElement('option');o.value=s.id;o.textContent=`${s.name} (${s.grade})`;sel.appendChild(o);});if(cur)sel.value=cur;}
  function filterStudentList(){const q=document.getElementById('studentSearch').value.trim().toLowerCase();filteredStudents=students.filter(s=>!q||s.name.toLowerCase().includes(q)||s.id.toLowerCase().includes(q));populateSelect(filteredStudents);}
  function onStudentSelect(){const id=document.getElementById('studentSelect').value;selectedStudent=students.find(s=>s.id===id)||null;if(!selectedStudent){document.getElementById('emptyArea').style.display='block';document.getElementById('resultArea').style.display='none';return;}refreshAnalysis();}
  function refreshAnalysis(){if(!selectedStudent)return;const s=selectedStudent;document.getElementById('emptyArea').style.display='none';document.getElementById('resultArea').style.display='block';document.getElementById('avatarInitial').textContent=s.name[0];document.getElementById('profileName').textContent=s.name;document.getElementById('profileSub').textContent=s.grade;document.getElementById('profileId').textContent=s.id;document.getElementById('profileSubject').textContent=s.subject;document.getElementById('profilePhone').textContent=s.phone;document.getElementById('profileReg').textContent=s.regDate;const cnt=Math.floor(Math.random()*4)+3,history=Array.from({length:cnt},(_,i)=>{const sc=Math.floor(Math.random()*45)+50,w=Math.floor((100-sc)/10),hw=w<=2?'시험지 오답정리':w<=4?'수업노트 필기+오답정리':'동영상복습+수업노트+오답정리';return{name:testNames[i%testNames.length],score:sc,wrong:w,hw,date:`2026. ${4-i}. 18.`};});const sc=history.map(h=>h.score),avg=Math.round(sc.reduce((a,b)=>a+b,0)/sc.length),maxS=Math.max(...sc),hwT=history.filter(h=>h.wrong>0).length;document.getElementById('profileTestCount').textContent=cnt+'회';document.getElementById('profileAvg').textContent=avg+'점';document.getElementById('profileHw').textContent=hwT+'건';document.getElementById('avgScore').textContent=avg+'점';document.getElementById('maxScore').textContent=maxS+'점';document.getElementById('hwCount').textContent=hwT+'건';const chart=document.getElementById('barChart');chart.innerHTML=history.slice().reverse().map(h=>{const bh=Math.round((h.score/100)*90),c=h.score>=80?'#2563eb':h.score>=60?'#10b981':'#ef4444';return`<div class="bar-wrap"><div class="bar-score">${h.score}</div><div class="bar" style="height:${bh}px;background:${c}"></div><div style="font-size:10px;color:var(--text-muted);text-align:center;margin-top:4px">${h.name.split(' ')[0]}</div></div>`;}).join('');const scB=s=>s>=80?'score-high':s>=60?'score-mid':'score-low';document.getElementById('historyBody').innerHTML=history.map(h=>`<tr><td style="font-weight:500">${h.name}</td><td><span class="score-badge ${scB(h.score)}">${h.score}점</span></td><td style="color:${h.wrong>=5?'var(--danger)':h.wrong>=3?'var(--warning)':'var(--text-muted)'};font-weight:600">${h.wrong}개</td><td><span class="hw-tag">${h.hw}</span></td><td style="color:var(--text-muted);font-size:12px">${h.date}</td></tr>`).join('');}
  populateSelect(students);
</script>
</body>
</html>

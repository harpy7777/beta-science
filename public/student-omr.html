<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>베타과학학원 · 마스터테스트 OMR</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
  background: #f0fdf4; color: #1d1d1f; min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
.header {
  background: #fff; border-bottom: 1px solid #bbf7d0;
  padding: 0 1.5rem; height: 54px;
  display: flex; align-items: center; justify-content: center;
}
.header-inner { display: flex; align-items: center; gap: 10px; }
.logo { width: 32px; height: 32px; background: #16a34a; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
.brand { font-size: 15px; font-weight: 700; color: #14532d; }
.brand-sub { font-size: 11px; color: #16a34a; font-weight: 500; }
.card {
  background: #fff; border: 1px solid #bbf7d0; border-radius: 20px;
  padding: 2rem; max-width: 520px; margin: 2rem auto;
  box-shadow: 0 4px 24px rgba(22,163,74,0.08);
}
.entry-title { font-size: 1.1rem; font-weight: 700; color: #14532d; margin-bottom: 1.4rem; display: flex; align-items: center; gap: 8px; }
.field-label { font-size: 11px; font-weight: 700; color: #16a34a; letter-spacing: 0.05em; margin-bottom: 6px; display: block; }
.field-group { margin-bottom: 14px; }
.inp {
  width: 100%; padding: 11px 14px; border: 1.5px solid #bbf7d0;
  border-radius: 12px; font-size: 14px; font-family: inherit;
  color: #1d1d1f; outline: none; background: #fff; transition: border 0.15s;
}
.inp:focus { border-color: #16a34a; }
.inp-hint { font-size: 11px; color: #aeaeb2; margin-top: 5px; }
.error-msg { font-size: 12px; color: #dc2626; margin-top: 6px; display: none; }
.grade-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
.grade-btn {
  padding: 10px; border: 1.5px solid #bbf7d0; border-radius: 10px;
  background: #fff; font-size: 13px; font-weight: 600; color: #6e6e73;
  cursor: pointer; font-family: inherit; transition: all 0.15s; text-align: center;
}
.grade-btn.sel { background: #16a34a; color: #fff; border-color: #16a34a; }
.grade-btn:hover:not(.sel) { border-color: #16a34a; color: #16a34a; }
.enter-btn {
  width: 100%; padding: 14px; background: #16a34a;
  border: none; border-radius: 14px; font-size: 15px; font-weight: 700;
  color: #fff; cursor: pointer; font-family: inherit; margin-top: 1.2rem;
  transition: background 0.15s; display: flex; align-items: center; justify-content: center; gap: 8px;
}
.enter-btn:hover { background: #15803d; }
.enter-btn:disabled { background: #bbf7d0; color: #fff; cursor: not-allowed; }
.student-badge {
  background: #dcfce7; border: 1px solid #bbf7d0; border-radius: 10px;
  padding: 6px 14px; font-size: 12px; font-weight: 700; color: #14532d;
  display: inline-block; margin-bottom: 14px;
}
.test-list { display: flex; flex-direction: column; gap: 10px; }
.test-item {
  padding: 14px 16px; border: 1.5px solid #bbf7d0; border-radius: 14px;
  background: #f0fdf4; cursor: pointer; transition: all 0.15s;
  display: flex; align-items: center; justify-content: space-between;
}
.test-item:hover { border-color: #16a34a; background: #dcfce7; }
.test-name { font-size: 14px; font-weight: 700; color: #14532d; }
.test-meta { font-size: 11px; color: #16a34a; margin-top: 3px; }
.test-arrow { font-size: 18px; color: #16a34a; }
.back-btn {
  background: none; border: none; font-size: 12px; font-weight: 600;
  color: #6e6e73; cursor: pointer; font-family: inherit; padding: 0;
  margin-bottom: 14px; display: flex; align-items: center; gap: 4px;
  transition: color 0.15s;
}
.back-btn:hover { color: #16a34a; }
.omr-wrap { max-width: 680px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
.omr-header-card {
  background: #fff; border: 1px solid #bbf7d0; border-radius: 18px;
  padding: 1.2rem 1.6rem; margin-bottom: 1.2rem;
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
}
.omr-title { font-size: 1rem; font-weight: 700; color: #14532d; }
.omr-meta { font-size: 12px; color: #16a34a; margin-top: 3px; }
.omr-student-badge {
  background: #dcfce7; border: 1px solid #bbf7d0; border-radius: 10px;
  padding: 6px 14px; font-size: 12px; font-weight: 700; color: #14532d;
}
.omr-section {
  background: #fff; border: 1px solid #bbf7d0; border-radius: 16px;
  padding: 1.2rem 1.4rem; margin-bottom: 10px;
}
.omr-section-title {
  font-size: 13px; font-weight: 700; color: #14532d; margin-bottom: 12px;
  padding-bottom: 8px; border-bottom: 1px solid #f0fdf4;
  display: flex; align-items: center; gap: 6px;
}
.omr-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
@media (max-width: 480px) {
  .omr-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
}
.omr-q { display: flex; flex-direction: column; align-items: center; gap: 5px; }
.omr-q-num { font-size: 10px; font-weight: 700; color: #6e6e73; }
.omr-choices { display: flex; flex-direction: column; gap: 3px; }
.omr-choice {
  width: 34px; height: 34px; border-radius: 50%; border: 2px solid #bbf7d0;
  background: #f0fdf4; display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: #6e6e73; cursor: pointer;
  transition: all 0.12s; user-select: none;
}
.omr-choice:hover { border-color: #16a34a; color: #16a34a; }
.omr-choice.sel { background: #16a34a; border-color: #16a34a; color: #fff; }
.progress-bar-wrap { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 12px; padding: 10px 14px; margin-bottom: 14px; }
.progress-label { font-size: 11px; font-weight: 700; color: #16a34a; margin-bottom: 6px; display: flex; justify-content: space-between; }
.progress-track { height: 8px; background: #dcfce7; border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #16a34a, #4ade80); border-radius: 99px; transition: width 0.3s ease; }
.submit-btn {
  width: 100%; padding: 16px; background: #16a34a;
  border: none; border-radius: 16px; font-size: 16px; font-weight: 700;
  color: #fff; cursor: pointer; font-family: inherit; margin-top: 1rem;
  transition: background 0.15s; box-shadow: 0 4px 16px rgba(22,163,74,0.25);
}
.submit-btn:hover { background: #15803d; }
.submit-btn:disabled { background: #bbf7d0; cursor: not-allowed; box-shadow: none; }
.result-card {
  background: #fff; border: 1px solid #bbf7d0; border-radius: 20px;
  padding: 2.5rem 2rem; max-width: 520px; margin: 2rem auto; text-align: center;
  box-shadow: 0 4px 24px rgba(22,163,74,0.1);
}
.result-emoji { font-size: 3rem; margin-bottom: 1rem; }
.result-title { font-size: 1.3rem; font-weight: 700; color: #14532d; margin-bottom: 6px; }
.result-sub { font-size: 13px; color: #6e6e73; margin-bottom: 1.8rem; }
.result-score-box {
  background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 16px;
  padding: 1.4rem; margin-bottom: 1.4rem;
}
.result-score-num { font-size: 2.5rem; font-weight: 700; color: #16a34a; letter-spacing: -0.05em; }
.result-score-lbl { font-size: 12px; color: #6e6e73; margin-top: 4px; }
.result-task-box {
  background: #fef9c3; border: 1px solid #fde68a; border-radius: 14px;
  padding: 1rem 1.2rem; text-align: left; margin-bottom: 1.4rem;
}
.result-task-title { font-size: 11px; font-weight: 700; color: #854d0e; margin-bottom: 6px; }
.result-task-text { font-size: 13px; color: #1d1d1f; line-height: 1.6; }
.home-btn {
  display: inline-block; padding: 12px 28px; background: #16a34a;
  border: none; border-radius: 14px; font-size: 14px; font-weight: 700;
  color: #fff; cursor: pointer; font-family: inherit; text-decoration: none;
  transition: background 0.15s;
}
.home-btn:hover { background: #15803d; }
.loading { text-align: center; padding: 3rem; color: #16a34a; font-size: 13px; }
.spinner { width: 32px; height: 32px; border: 3px solid #bbf7d0; border-top-color: #16a34a; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty-hint { font-size: 13px; color: #aeaeb2; padding: 2rem; text-align: center; }
.screen { display: none; }
.screen.active { display: block; }
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="logo">🧪</div>
    <div>
      <div class="brand">베타과학학원</div>
      <div class="brand-sub">마스터테스트 OMR</div>
    </div>
  </div>
</header>

<!-- ① 입장 화면 -->
<div class="screen active" id="screen-entry">
  <div class="card">
    <div class="entry-title">🎓 학생 입장</div>

    <div class="field-group">
      <label class="field-label">학생 ID</label>
      <input class="inp" type="text" id="entry-student-id"
        placeholder="예: m01001, h01001"
        oninput="this.value=this.value.toLowerCase()"
        onkeydown="if(event.key==='Enter') doEnter()">
      <div class="inp-hint">선생님께 받은 학생 ID를 입력하세요</div>
      <div class="error-msg" id="id-error">학생 ID가 올바르지 않습니다. 선생님께 확인하세요.</div>
    </div>

    <div class="field-group">
      <label class="field-label">학년</label>
      <div class="grade-grid">
        <button class="grade-btn" onclick="selGrade('중1',this)">중1</button>
        <button class="grade-btn" onclick="selGrade('중2',this)">중2</button>
        <button class="grade-btn" onclick="selGrade('중3',this)">중3</button>
        <button class="grade-btn" onclick="selGrade('고1',this)">고1</button>
        <button class="grade-btn" onclick="selGrade('고2',this)">고2</button>
        <button class="grade-btn" onclick="selGrade('고3',this)">고3</button>
      </div>
    </div>

    <button class="enter-btn" onclick="doEnter()" id="enter-btn">입장하기 →</button>
  </div>
  <p style="text-align:center;font-size:11px;color:#aeaeb2;margin-top:-1rem;">
    학생 ID는 선생님께 받은 고유 번호입니다 (예: m01001, h01001)
  </p>
</div>

<!-- ② 테스트 선택 화면 -->
<div class="screen" id="screen-select">
  <div class="card">
    <button class="back-btn" onclick="goBack('entry')">← 뒤로</button>
    <div class="entry-title">📋 테스트 선택</div>
    <div id="student-badge-wrap"></div>
    <div id="test-list-wrap"><div class="loading"><div class="spinner"></div>불러오는 중...</div></div>
  </div>
</div>

<!-- ③ OMR 화면 -->
<div class="screen" id="screen-omr">
  <div class="omr-wrap">
    <div class="omr-header-card">
      <div>
        <div class="omr-title" id="omr-test-title">—</div>
        <div class="omr-meta" id="omr-test-meta">—</div>
      </div>
      <div class="omr-student-badge" id="omr-student-badge">—</div>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-label">
        <span>답안 작성 현황</span>
        <span id="progress-txt">0 / 0</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>
    <div id="omr-sections"></div>
    <button class="submit-btn" id="submit-btn" onclick="submitOMR()">✓ 답안 제출하기</button>
  </div>
</div>

<!-- ④ 결과 화면 -->
<div class="screen" id="screen-result">
  <div class="result-card">
    <div class="result-emoji" id="result-emoji">🎉</div>
    <div class="result-title" id="result-title">제출 완료!</div>
    <div class="result-sub" id="result-sub">수고했어요!</div>
    <div class="result-score-box">
      <div class="result-score-num" id="result-score">—</div>
      <div class="result-score-lbl">점 / 100점</div>
    </div>
    <div class="result-task-box" id="result-task-box" style="display:none;">
      <div class="result-task-title">📌 이번 과제</div>
      <div class="result-task-text" id="result-task-text">—</div>
    </div>
    <a href="/student-omr.html" class="home-btn">홈으로 돌아가기</a>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, collection, getDocs, addDoc,
  query, where, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const cfg = {
  apiKey:"AIzaSyD5MQx_rXO_xRYelyKxK090TaKa3Gg2D3k",
  authDomain:"beta-science.firebaseapp.com",
  projectId:"beta-science",
  storageBucket:"beta-science.firebasestorage.app",
  messagingSenderId:"650652155367",
  appId:"1:650652155367:web:41d2958e675cb4edd4d142"
};
const app = initializeApp(cfg);
const db  = getFirestore(app);

// ──────────────────────────────────────────────
// 학년 정규화 테이블
// Firebase에 저장된 다양한 학년 표기 → UI 표기(고1, 중2 …)
// ──────────────────────────────────────────────
const GRADE_VARIANTS = {
  '중1': ['중1','중1학년','중학1학년','중학교1학년','중학교 1학년','중 1학년'],
  '중2': ['중2','중2학년','중학2학년','중학교2학년','중학교 2학년','중 2학년'],
  '중3': ['중3','중3학년','중학3학년','중학교3학년','중학교 3학년','중 3학년'],
  '고1': ['고1','고1학년','고등1학년','고등학교1학년','고등학교 1학년','고 1학년'],
  '고2': ['고2','고2학년','고등2학년','고등학교2학년','고등학교 2학년','고 2학년'],
  '고3': ['고3','고3학년','고등3학년','고등학교3학년','고등학교 3학년','고 3학년'],
};

// 공백 제거 후 매핑
function normalizeGrade(raw) {
  const s = String(raw || '').replace(/\s/g, '');
  for (const [uiGrade, variants] of Object.entries(GRADE_VARIANTS)) {
    if (variants.some(v => v.replace(/\s/g,'') === s)) return uiGrade;
  }
  return String(raw || '');
}

// ── 상태 ──
let studentName  = '';
let studentId    = '';
let studentGrade = '';   // 항상 UI 표기 (고1, 중2 등)
let selectedTest = null;
let answers      = {};
let allTests     = [];

// ── 화면 전환 ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  window.scrollTo(0, 0);
}
window.goBack = (to) => showScreen(to);

// ── 학년 선택 ──
window.selGrade = (g, el) => {
  studentGrade = g;
  document.querySelectorAll('.grade-btn').forEach(b => b.classList.remove('sel'));
  el.classList.add('sel');
};

// ── 학생 ID 조회 ──
async function getStudentById(id) {
  const q = query(collection(db, 'students'), where('id', '==', id.toLowerCase()));
  const snap = await getDocs(q);
  if (snap.empty) return null;
  return { fireId: snap.docs[0].id, ...snap.docs[0].data() };
}

// ── 입장 ──
window.doEnter = async () => {
  const inputId = document.getElementById('entry-student-id').value.trim().toLowerCase();
  const idErr   = document.getElementById('id-error');
  const btn     = document.getElementById('enter-btn');

  idErr.style.display = 'none';
  if (!inputId)      return alert('학생 ID를 입력해주세요');
  if (!studentGrade) return alert('학년을 선택해주세요');

  btn.disabled = true;
  btn.textContent = '확인 중...';

  try {
    const student = await getStudentById(inputId);
    if (!student) {
      idErr.style.display = 'block';
      return;
    }
    studentId   = student.id;
    studentName = student.name;

    document.getElementById('student-badge-wrap').innerHTML =
      `<div class="student-badge">${esc(studentName)} · ${esc(studentGrade)}</div>`;

    showScreen('select');
    await loadTests();
  } catch(e) {
    alert('오류가 발생했습니다: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '입장하기 →';
  }
};

// ──────────────────────────────────────────────
// 테스트 목록 불러오기
// 전략: studentGrade의 모든 변형으로 병렬 쿼리
//       → 그래도 없으면 전체 조회 후 클라이언트 정규화 필터
// ──────────────────────────────────────────────
async function loadTests() {
  const wrap = document.getElementById('test-list-wrap');
  wrap.innerHTML = '<div class="loading"><div class="spinner"></div>불러오는 중...</div>';

  try {
    const variants = GRADE_VARIANTS[studentGrade] || [studentGrade];
    const seen = new Set();
    let docs = [];

    // 1단계: 변형별 병렬 쿼리
    const snaps = await Promise.all(
      variants.map(v =>
        getDocs(query(collection(db, 'master-tests'), where('grade', '==', v))).catch(() => null)
      )
    );
    snaps.forEach(snap => {
      if (!snap) return;
      snap.forEach(d => {
        if (!seen.has(d.id)) { seen.add(d.id); docs.push({ fireId: d.id, ...d.data() }); }
      });
    });

    // 2단계: 여전히 없으면 전체 조회 후 클라이언트 정규화 필터 (fallback)
    if (docs.length === 0) {
      const allSnap = await getDocs(collection(db, 'master-tests'));
      allSnap.forEach(d => {
        const data = d.data();
        if (normalizeGrade(data.grade) === studentGrade && !seen.has(d.id)) {
          seen.add(d.id);
          docs.push({ fireId: d.id, ...data });
        }
      });
    }

    // regDate 내림차순 정렬
    docs.sort((a, b) => {
      const da = a.regDate ? new Date(a.regDate) : new Date(0);
      const db2 = b.regDate ? new Date(b.regDate) : new Date(0);
      return db2 - da;
    });

    allTests = docs;
  } catch(e) {
    wrap.innerHTML = `<div class="empty-hint">불러오기 실패: ${esc(e.message)}</div>`;
    return;
  }

  if (!allTests.length) {
    wrap.innerHTML = `<div class="empty-hint">
      <div style="font-size:2rem;margin-bottom:8px;">📭</div>
      ${esc(studentGrade)}에 등록된 테스트가 없습니다<br>
      <span style="font-size:11px;">선생님께 문의하세요</span>
    </div>`;
    return;
  }

  let html = '<div class="test-list">';
  allTests.forEach(t => {
    let totalQ = 0;
    if (t.parts) t.parts.forEach(p => totalQ += Object.keys(p.answers || {}).length);
    totalQ = Math.min(totalQ, 30);
    html += `<div class="test-item" onclick="selectTest('${t.fireId}')">
      <div>
        <div class="test-name">${esc(t.unitName || '—')}</div>
        <div class="test-meta">${esc(t.subject || '—')} · ${totalQ}문제</div>
      </div>
      <span class="test-arrow">›</span>
    </div>`;
  });
  html += '</div>';
  wrap.innerHTML = html;
}

// ── 테스트 선택 ──
window.selectTest = (fireId) => {
  selectedTest = allTests.find(t => t.fireId === fireId);
  if (!selectedTest) return;
  answers = {};
  buildOMR();
  showScreen('omr');
};

// ──────────────────────────────────────────────
// OMR 구성 — 5지선다
// part.answers의 정답 최댓값으로 선택지 수 자동 감지
// 기본값: 5지선다 (①②③④⑤)
// ──────────────────────────────────────────────
function buildOMR() {
  document.getElementById('omr-test-title').textContent    = selectedTest.unitName || '—';
  document.getElementById('omr-test-meta').textContent     =
    `${selectedTest.subject || ''} · ${normalizeGrade(selectedTest.grade || '')}`;
  document.getElementById('omr-student-badge').textContent = `${studentName} (${studentGrade})`;

  const parts = selectedTest.parts || [];
  let html = '';

  parts.forEach((part, pi) => {
    const qNums = Object.keys(part.answers || {})
      .sort((a, b) => Number(a.replace('q','')) - Number(b.replace('q','')));
    if (!qNums.length) return;

    // 정답 중 최댓값으로 선택지 수 결정 (4 또는 5)
    const maxAns = Math.max(...Object.values(part.answers || {}).map(v => Number(v)));
    const choiceCount = (isFinite(maxAns) && maxAns >= 5) ? 5 : 5; // 기본 5지선다
    const symbols = ['①','②','③','④','⑤'].slice(0, choiceCount);

    html += `<div class="omr-section">
      <div class="omr-section-title">
        <span style="background:#dcfce7;color:#16a34a;font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;">
          ${pi+1}부 · ${esc(part.range || '')}번
        </span>
        ${part.sectionName ? `<span>${esc(part.sectionName)}</span>` : ''}
      </div>
      <div class="omr-grid">`;

    qNums.forEach(qno => {
      const num = qno.replace('q','');
      html += `<div class="omr-q">
        <div class="omr-q-num">${num}번</div>
        <div class="omr-choices">
          ${symbols.map((sym, idx) => {
            const n = idx + 1;
            return `<div class="omr-choice" id="choice-${qno}-${n}" onclick="pickAnswer('${qno}',${n})">${sym}</div>`;
          }).join('')}
        </div>
      </div>`;
    });

    html += `</div></div>`;
  });

  document.getElementById('omr-sections').innerHTML = html;
  updateProgress();
}

// ── 답 선택 ──
window.pickAnswer = (qno, n) => {
  for (let i = 1; i <= 5; i++) {
    const el = document.getElementById(`choice-${qno}-${i}`);
    if (el) el.classList.remove('sel');
  }
  const el = document.getElementById(`choice-${qno}-${n}`);
  if (el) el.classList.add('sel');
  answers[qno] = String(n);
  updateProgress();
};

function updateProgress() {
  const parts = selectedTest?.parts || [];
  let total = 0;
  parts.forEach(p => total += Object.keys(p.answers||{}).length);
  total = Math.min(total, 30);
  const done = Object.keys(answers).length;
  const pct  = total ? Math.round(done/total*100) : 0;
  document.getElementById('progress-txt').textContent  = `${done} / ${total}`;
  document.getElementById('progress-fill').style.width = pct + '%';
}

// ── 제출 ──
window.submitOMR = async () => {
  const parts = selectedTest?.parts || [];
  let total = 0;
  parts.forEach(p => total += Object.keys(p.answers||{}).length);
  total = Math.min(total, 30);

  const done = Object.keys(answers).length;
  if (done < total && !confirm(`아직 ${total-done}문제를 선택하지 않았어요. 그래도 제출할까요?`)) return;

  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = '제출 중...';

  // 채점: 정답 맵 생성
  const correctMap = {};
  parts.forEach(part => {
    Object.entries(part.answers||{}).forEach(([qno, ans]) => {
      correctMap[qno] = String(ans);
    });
  });

  let correct = 0, wrong = 0;
  const wrongNums = [];
  Object.entries(correctMap).forEach(([qno, correctAns]) => {
    const sa = answers[qno];
    if (!sa || sa !== correctAns) {
      wrong++;
      wrongNums.push(Number(qno.replace('q','')));
    } else {
      correct++;
    }
  });

  const score = total > 0 ? Math.round((correct/total)*100) : 0;

  // 과제 결정
  const fp = parts[0];
  let taskText = '';
  if (fp) taskText = wrong<=2 ? (fp.taskLow||'') : wrong<=4 ? (fp.taskMid||'') : (fp.taskHigh||'');

  // Firebase 저장
  try {
    await addDoc(collection(db, 'answers'), {
      testId:        selectedTest.testId    || '',
      testFireId:    selectedTest.fireId,
      unitName:      selectedTest.unitName  || '',
      subject:       selectedTest.subject   || '',
      testGrade:     selectedTest.grade     || '',
      testGradeNorm: normalizeGrade(selectedTest.grade || ''),
      studentId,
      studentName,
      studentGrade,
      answers: Object.entries(answers).map(([qno, val]) => ({
        question:      `Q${qno.replace('q','')}`,
        studentAnswer: val,
        isCorrect:     val === correctMap[qno],
      })),
      score,
      testType:  'master',
      examTitle: selectedTest.unitName || '마스터테스트 OMR',
      correct, wrong, wrongNums, total,
      submittedAt: serverTimestamp(),
      regDate: new Date().toLocaleString(),
    });
  } catch(e) {
    alert('제출 실패: ' + e.message);
    btn.disabled = false; btn.textContent = '✓ 답안 제출하기';
    return;
  }

  // 결과 화면
  const emoji = score>=90?'🎉':score>=70?'😊':score>=50?'😅':'💪';
  const msg   = score>=90?'훌륭해요!':score>=70?'잘했어요!':score>=50?'더 열심히 해봐요!':'다음엔 더 잘할 수 있어요!';
  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-title').textContent = '제출 완료!';
  document.getElementById('result-sub').textContent   = `${studentName}학생, ${msg}`;
  document.getElementById('result-score').textContent = score;
  if (taskText) {
    document.getElementById('result-task-box').style.display = 'block';
    document.getElementById('result-task-text').textContent  = taskText;
  }
  showScreen('result');
};

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>

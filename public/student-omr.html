<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><script src="/favicon.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>베타과학학원 · 마스터테스트 OMR</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
  background: #fafafa; color: #1d1d1f; min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
.header {
  background: #fff; border-bottom: 1px solid #fce7f3;
  padding: 0 1.5rem; height: 54px;
  display: flex; align-items: center; justify-content: center;
}
.header-inner { display: flex; align-items: center; gap: 10px; }
.logo {
  width: 32px; height: 32px;
  background: linear-gradient(135deg,#f472b6,#db2777);
  border-radius: 9px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.brand { font-size: 15px; font-weight: 700; color: #1d1d1f; }
.brand-sub { font-size: 11px; color: #db2777; font-weight: 600; }
.card {
  background: #fff; border: 1px solid #fce7f3; border-radius: 18px;
  padding: 2rem; max-width: 520px; margin: 2rem auto;
  box-shadow: 0 4px 24px rgba(219,39,119,0.08);
}
.entry-title { font-size: 1.1rem; font-weight: 700; color: #1d1d1f; margin-bottom: 1.4rem; display: flex; align-items: center; gap: 8px; }
.field-label { font-size: 11px; font-weight: 700; color: #db2777; letter-spacing: 0.05em; margin-bottom: 6px; display: block; }
.field-group { margin-bottom: 14px; }
.inp {
  width: 100%; padding: 11px 14px; border: 1.5px solid #fce7f3;
  border-radius: 12px; font-size: 16px; font-family: inherit;
  color: #1d1d1f; outline: none; background: #fff; transition: border 0.15s;
}
.inp:focus { border-color: #db2777; }
.inp-hint { font-size: 11px; color: #aeaeb2; margin-top: 5px; }
.error-msg { font-size: 12px; color: #dc2626; margin-top: 6px; display: none; }
.grade-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
.grade-btn {
  padding: 10px; border: 1.5px solid #fce7f3; border-radius: 10px;
  background: #fff; font-size: 13px; font-weight: 600; color: #6e6e73;
  cursor: pointer; font-family: inherit; transition: all 0.15s; text-align: center; min-height: 44px;
}
.grade-btn.sel { background: linear-gradient(135deg,#f472b6,#db2777); color: #fff; border-color: #db2777; }
.grade-btn:hover:not(.sel) { border-color: #fbcfe8; color: #db2777; }
.enter-btn {
  width: 100%; padding: 14px; background: linear-gradient(135deg,#f472b6,#db2777);
  border: none; border-radius: 14px; font-size: 15px; font-weight: 700;
  color: #fff; cursor: pointer; font-family: inherit; margin-top: 1.2rem;
  transition: opacity 0.15s; display: flex; align-items: center; justify-content: center; gap: 8px; min-height: 48px;
}
.enter-btn:hover { opacity: 0.88; }
.enter-btn:disabled { background: #fce7f3; color: #fff; cursor: not-allowed; }
.student-badge {
  background: #fdf2f8; border: 1px solid #fce7f3; border-radius: 10px;
  padding: 6px 14px; font-size: 12px; font-weight: 700; color: #db2777;
  display: inline-block; margin-bottom: 14px;
}
.test-list { display: flex; flex-direction: column; gap: 10px; }
.test-item {
  padding: 14px 16px; border: 1.5px solid #fce7f3; border-radius: 14px;
  background: #fff; cursor: pointer; transition: all 0.15s;
  display: flex; align-items: center; justify-content: space-between;
}
.test-item:hover { border-color: #fbcfe8; background: #fdf2f8; }
.test-name { font-size: 14px; font-weight: 700; color: #1d1d1f; }
.test-meta { font-size: 11px; color: #db2777; margin-top: 3px; }
.test-arrow { font-size: 18px; color: #db2777; }
.back-btn {
  background: none; border: none; font-size: 12px; font-weight: 600;
  color: #6e6e73; cursor: pointer; font-family: inherit; padding: 0;
  margin-bottom: 14px; display: flex; align-items: center; gap: 4px;
  transition: color 0.15s; min-height: 36px;
}
.back-btn:hover { color: #db2777; }
.omr-wrap { max-width: 680px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
.omr-header-card {
  background: #fff; border: 1px solid #fce7f3; border-radius: 18px;
  padding: 1.2rem 1.6rem; margin-bottom: 1.2rem;
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
}
.omr-title { font-size: 1rem; font-weight: 700; color: #1d1d1f; }
.omr-meta { font-size: 12px; color: #db2777; margin-top: 3px; }
.omr-student-badge {
  background: #fdf2f8; border: 1px solid #fce7f3; border-radius: 10px;
  padding: 6px 14px; font-size: 12px; font-weight: 700; color: #db2777;
}
.omr-section {
  background: #fff; border: 1px solid #fce7f3; border-radius: 16px;
  padding: 1.2rem 1.4rem; margin-bottom: 10px;
}
.omr-section-title {
  font-size: 13px; font-weight: 700; color: #1d1d1f; margin-bottom: 12px;
  padding-bottom: 8px; border-bottom: 1px solid #fdf2f8;
  display: flex; align-items: center; gap: 6px;
}
.omr-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
@media (max-width: 480px) {
  .omr-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
}
.omr-q { display: flex; flex-direction: column; align-items: center; gap: 5px; }
.omr-q-num { font-size: 10px; font-weight: 700; color: #6e6e73; }
.omr-choices { display: flex; flex-direction: column; gap: 3px; }
.omr-choice {
  width: 34px; height: 34px; border-radius: 50%; border: 2px solid #fce7f3;
  background: #fff; display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: #6e6e73; cursor: pointer;
  transition: all 0.12s; user-select: none;
}
.omr-choice:hover { border-color: #fbcfe8; color: #db2777; }
.omr-choice.sel { background: linear-gradient(135deg,#f472b6,#db2777); border-color: #db2777; color: #fff; }
.progress-bar-wrap { background: #fff; border: 1px solid #fce7f3; border-radius: 12px; padding: 10px 14px; margin-bottom: 14px; }
.progress-label { font-size: 11px; font-weight: 700; color: #db2777; margin-bottom: 6px; display: flex; justify-content: space-between; }
.progress-track { height: 8px; background: #fce7f3; border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg,#f472b6,#db2777); border-radius: 99px; transition: width 0.3s ease; }
.submit-btn {
  width: 100%; padding: 16px; background: linear-gradient(135deg,#f472b6,#db2777);
  border: none; border-radius: 16px; font-size: 16px; font-weight: 700;
  color: #fff; cursor: pointer; font-family: inherit; margin-top: 1rem;
  transition: opacity 0.15s; box-shadow: 0 4px 16px rgba(219,39,119,0.25);
}
.submit-btn:hover { opacity: 0.88; }
.submit-btn:disabled { background: #fce7f3; cursor: not-allowed; box-shadow: none; }
.result-card {
  background: #fff; border: 1px solid #fce7f3; border-radius: 20px;
  padding: 2.5rem 2rem; max-width: 520px; margin: 2rem auto; text-align: center;
  box-shadow: 0 4px 24px rgba(219,39,119,0.1);
}
.result-emoji { font-size: 3rem; margin-bottom: 1rem; }
.result-title { font-size: 1.3rem; font-weight: 700; color: #1d1d1f; margin-bottom: 6px; }
.result-sub { font-size: 13px; color: #6e6e73; margin-bottom: 1.8rem; }
.result-score-box {
  background: #fdf2f8; border: 1px solid #fce7f3; border-radius: 16px;
  padding: 1.4rem; margin-bottom: 1.4rem;
}
.result-score-num { font-size: 2.5rem; font-weight: 700; color: #db2777; letter-spacing: -0.05em; }
.result-score-lbl { font-size: 12px; color: #6e6e73; margin-top: 4px; }
.result-task-box {
  background: #fef9c3; border: 1px solid #fde68a; border-radius: 14px;
  padding: 1rem 1.2rem; text-align: left; margin-bottom: 1.4rem;
}
.result-task-title { font-size: 11px; font-weight: 700; color: #854d0e; margin-bottom: 6px; }
.result-task-text { font-size: 13px; color: #1d1d1f; line-height: 1.6; }
.home-btn {
  display: inline-block; padding: 12px 28px; background: linear-gradient(135deg,#f472b6,#db2777);
  border: none; border-radius: 14px; font-size: 14px; font-weight: 700;
  color: #fff; cursor: pointer; font-family: inherit; text-decoration: none;
  transition: opacity 0.15s;
}
.home-btn:hover { opacity: 0.88; }
.loading { text-align: center; padding: 3rem; color: #db2777; font-size: 13px; }
.spinner { width: 32px; height: 32px; border: 3px solid #fce7f3; border-top-color: #db2777; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty-hint { font-size: 13px; color: #aeaeb2; padding: 2rem; text-align: center; }
.screen { display: none; }
.screen.active { display: block; }
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="logo">
      <svg width="16" height="16" viewBox="0 0 18 18" fill="none">
        <circle cx="9" cy="7" r="3" fill="rgba(255,255,255,0.9)"/>
        <path d="M3.5 16c0-3 2.5-5.5 5.5-5.5s5.5 2.5 5.5 5.5" stroke="rgba(255,255,255,0.9)" stroke-width="1.4" stroke-linecap="round" fill="none"/>
      </svg>
    </div>
    <div>
      <div class="brand">베타과학학원</div>
      <div class="brand-sub">마스터테스트 OMR</div>
    </div>
  </div>
</header>

<!-- ⓪ 자동 진입 로딩 (클리닉 링크로 들어올 때) -->
<div class="screen" id="screen-autoload">
  <div class="loading" style="padding:5rem 2rem;"><div class="spinner"></div>시험을 여는 중...</div>
</div>

<!-- ① 입장 화면 -->
<div class="screen active" id="screen-entry">
  <div class="card">
    <div class="entry-title">🎓 학생 입장</div>

    <div class="field-group">
      <label class="field-label">학생 ID</label>
      <input class="inp" type="text" id="entry-student-id"
        placeholder="예: m01001, h01001"
        oninput="this.value=this.value.toLowerCase()"
        onkeydown="if(event.key==='Enter') doEnter()">
      <div class="inp-hint">선생님께 받은 학생 ID를 입력하세요</div>
      <div class="error-msg" id="id-error">학생 ID가 올바르지 않습니다. 선생님께 확인하세요.</div>
    </div>

    <div class="field-group">
      <label class="field-label">학년</label>
      <div class="grade-grid">
        <button class="grade-btn" onclick="selGrade('중1',this)">중1</button>
        <button class="grade-btn" onclick="selGrade('중2',this)">중2</button>
        <button class="grade-btn" onclick="selGrade('중3',this)">중3</button>
        <button class="grade-btn" onclick="selGrade('고1',this)">고1</button>
        <button class="grade-btn" onclick="selGrade('고2',this)">고2</button>
        <button class="grade-btn" onclick="selGrade('고3',this)">고3</button>
      </div>
    </div>

    <button class="enter-btn" onclick="doEnter()" id="enter-btn">입장하기 →</button>
  </div>
  <p style="text-align:center;font-size:11px;color:#aeaeb2;margin-top:-1rem;">
    학생 ID는 선생님께 받은 고유 번호입니다 (예: m01001, h01001)
  </p>
</div>

<!-- ② 테스트 선택 화면 -->
<div class="screen" id="screen-select">
  <div class="card">
    <button class="back-btn" onclick="goBack('entry')">← 뒤로</button>
    <div class="entry-title">📋 테스트 선택</div>
    <div id="student-badge-wrap"></div>
    <div id="test-list-wrap"><div class="loading"><div class="spinner"></div>불러오는 중...</div></div>
  </div>
</div>

<!-- ③ OMR 화면 -->
<div class="screen" id="screen-omr">
  <div class="omr-wrap">
    <div class="omr-header-card">
      <div>
        <div class="omr-title" id="omr-test-title">—</div>
        <div class="omr-meta" id="omr-test-meta">—</div>
      </div>
      <div class="omr-student-badge" id="omr-student-badge">—</div>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-label">
        <span>답안 작성 현황</span>
        <span id="progress-txt">0 / 0</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>
    <div id="omr-sections"></div>
    <button class="submit-btn" id="submit-btn" onclick="submitOMR()">✓ 답안 제출하기</button>
  </div>
</div>

<!-- ④ 결과 화면 -->
<div class="screen" id="screen-result">
  <div class="result-card">
    <div class="result-emoji" id="result-emoji">🎉</div>
    <div class="result-title" id="result-title">제출 완료!</div>
    <div class="result-sub" id="result-sub">수고했어요!</div>
    <div class="result-score-box">
      <div class="result-score-num" id="result-score">—</div>
      <div class="result-score-lbl">총 100점 기준</div>
    </div>
    <div class="result-task-box" id="result-task-box" style="display:none;">
      <div class="result-task-title">📌 이번 과제</div>
      <div class="result-task-text" id="result-task-text">—</div>
    </div>
    <a href="/student-omr.html" id="omr-home-btn" class="home-btn">홈으로 돌아가기</a>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, collection, getDocs, addDoc, doc, getDoc,
  query, where, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const cfg = {
  apiKey:"AIzaSyD5MQx_rXO_xRYelyKxK090TaKa3Gg2D3k",
  authDomain:"beta-science.firebaseapp.com",
  projectId:"beta-science",
  storageBucket:"beta-science.firebasestorage.app",
  messagingSenderId:"650652155367",
  appId:"1:650652155367:web:41d2958e675cb4edd4d142"
};
const app = initializeApp(cfg);
const db  = getFirestore(app);
const auth = getAuth(app);

// ──────────────────────────────────────────────
// ★ 학생 인증 보장 (선생님 로그인은 건드리지 않음)
// ──────────────────────────────────────────────
let _authReady = null;
function waitForAuthReady() {
  if (_authReady) return _authReady;
  _authReady = new Promise((resolve) => {
    const unsub = onAuthStateChanged(auth, () => { unsub(); resolve(); });
  });
  return _authReady;
}
async function ensureAuth() {
  try {
    await waitForAuthReady();
    if (!auth.currentUser) {
      await signInAnonymously(auth);
    }
  } catch (e) {
    console.warn('[OMR] ensureAuth skipped:', e);
  }
}

// ──────────────────────────────────────────────
// 학년 정규화 테이블
// ──────────────────────────────────────────────
const GRADE_VARIANTS = {
  '중1': ['중1','중1학년','중학1학년','중학교1학년','중학교 1학년','중 1학년'],
  '중2': ['중2','중2학년','중학2학년','중학교2학년','중학교 2학년','중 2학년'],
  '중3': ['중3','중3학년','중학3학년','중학교3학년','중학교 3학년','중 3학년'],
  '고1': ['고1','고1학년','고등1학년','고등학교1학년','고등학교 1학년','고 1학년'],
  '고2': ['고2','고2학년','고등2학년','고등학교2학년','고등학교 2학년','고 2학년'],
  '고3': ['고3','고3학년','고등3학년','고등학교3학년','고등학교 3학년','고 3학년'],
};

function normalizeGrade(raw) {
  const s = String(raw || '').replace(/\s/g, '');
  for (const [uiGrade, variants] of Object.entries(GRADE_VARIANTS)) {
    if (variants.some(v => v.replace(/\s/g,'') === s)) return uiGrade;
  }
  return String(raw || '');
}

// ── 상태 ──
let studentName  = '';
let studentId    = '';
let studentGrade = '';
let selectedTest = null;
let answers      = {};
let allTests     = [];

// ── 화면 전환 ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  window.scrollTo(0, 0);
}
window.goBack = (to) => showScreen(to);

// ── 학년 선택 ──
window.selGrade = (g, el) => {
  studentGrade = g;
  document.querySelectorAll('.grade-btn').forEach(b => b.classList.remove('sel'));
  el.classList.add('sel');
};

// ── 학생 ID 조회 ──
async function getStudentById(id) {
  const q = query(collection(db, 'students'), where('id', '==', id.toLowerCase()));
  const snap = await getDocs(q);
  if (snap.empty) return null;
  return { fireId: snap.docs[0].id, ...snap.docs[0].data() };
}

// ── 입장 ──
window.doEnter = async () => {
  const inputId = document.getElementById('entry-student-id').value.trim().toLowerCase();
  const idErr   = document.getElementById('id-error');
  const btn     = document.getElementById('enter-btn');

  idErr.style.display = 'none';
  if (!inputId)      return alert('학생 ID를 입력해주세요');
  if (!studentGrade) return alert('학년을 선택해주세요');

  btn.disabled = true;
  btn.textContent = '확인 중...';

  try {
    await ensureAuth();
    const student = await getStudentById(inputId);
    if (!student) {
      idErr.style.display = 'block';
      return;
    }
    studentId   = student.id;
    studentName = student.name;

    document.getElementById('student-badge-wrap').innerHTML =
      `<div class="student-badge">${esc(studentName)} · ${esc(studentGrade)}</div>`;

    showScreen('select');
    await loadTests();
  } catch(e) {
    alert('오류가 발생했습니다: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '입장하기 →';
  }
};

// ──────────────────────────────────────────────
// 테스트 목록 불러오기
// ──────────────────────────────────────────────
async function loadTests() {
  const wrap = document.getElementById('test-list-wrap');
  wrap.innerHTML = '<div class="loading"><div class="spinner"></div>불러오는 중...</div>';

  try {
    const variants = GRADE_VARIANTS[studentGrade] || [studentGrade];
    const seen = new Set();
    let docs = [];

    const snaps = await Promise.all(
      variants.map(v =>
        getDocs(query(collection(db, 'master-tests'), where('grade', '==', v))).catch(() => null)
      )
    );
    snaps.forEach(snap => {
      if (!snap) return;
      snap.forEach(d => {
        if (!seen.has(d.id)) { seen.add(d.id); docs.push({ fireId: d.id, ...d.data() }); }
      });
    });

    if (docs.length === 0) {
      const allSnap = await getDocs(collection(db, 'master-tests'));
      allSnap.forEach(d => {
        const data = d.data();
        if (normalizeGrade(data.grade) === studentGrade && !seen.has(d.id)) {
          seen.add(d.id);
          docs.push({ fireId: d.id, ...data });
        }
      });
    }

    docs.sort((a, b) => {
      const da = a.regDate ? new Date(a.regDate) : new Date(0);
      const db2 = b.regDate ? new Date(b.regDate) : new Date(0);
      return db2 - da;
    });

    allTests = docs;
  } catch(e) {
    wrap.innerHTML = `<div class="empty-hint">불러오기 실패: ${esc(e.message)}</div>`;
    return;
  }

  if (!allTests.length) {
    wrap.innerHTML = `<div class="empty-hint">
      <div style="font-size:2rem;margin-bottom:8px;">📭</div>
      ${esc(studentGrade)}에 등록된 테스트가 없습니다<br>
      <span style="font-size:11px;">선생님께 문의하세요</span>
    </div>`;
    return;
  }

  let html = '<div class="test-list">';
  allTests.forEach(t => {
    let totalQ = 0;
    if (t.parts) t.parts.forEach(p => totalQ += Object.keys(p.answers || {}).length);
    totalQ = Math.min(totalQ, 30);
    html += `<div class="test-item" onclick="selectTest('${t.fireId}')">
      <div>
        <div class="test-name">${esc(t.unitName || '—')}</div>
        <div class="test-meta">${esc(t.subject || '—')} · ${totalQ}문제</div>
      </div>
      <span class="test-arrow">›</span>
    </div>`;
  });
  html += '</div>';
  wrap.innerHTML = html;
}

// ── 테스트 선택 ──
window.selectTest = (fireId) => {
  selectedTest = allTests.find(t => t.fireId === fireId);
  if (!selectedTest) return;
  answers = {};
  buildOMR();
  showScreen('omr');
};

// ──────────────────────────────────────────────
// OMR 구성 — 5지선다
// ──────────────────────────────────────────────
function buildOMR() {
  document.getElementById('omr-test-title').textContent    = selectedTest.unitName || '—';
  document.getElementById('omr-test-meta').textContent     =
    `${selectedTest.subject || ''} · ${normalizeGrade(selectedTest.grade || '')}`;
  document.getElementById('omr-student-badge').textContent = `${studentName} (${studentGrade})`;

  const parts = selectedTest.parts || [];
  let html = '';

  parts.forEach((part, pi) => {
    const qNums = Object.keys(part.answers || {})
      .sort((a, b) => Number(a.replace('q','')) - Number(b.replace('q','')));
    if (!qNums.length) return;

    const choiceCount = 5; // 기본 5지선다
    const symbols = ['①','②','③','④','⑤'].slice(0, choiceCount);

    html += `<div class="omr-section">
      <div class="omr-section-title">
        <span style="background:#fdf2f8;color:#db2777;font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;">
          ${pi+1}부 · ${esc(part.range || '')}번
        </span>
        ${part.sectionName ? `<span>${esc(part.sectionName)}</span>` : ''}
      </div>
      <div class="omr-grid">`;

    qNums.forEach(qno => {
      const num = qno.replace('q','');
      html += `<div class="omr-q">
        <div class="omr-q-num">${num}번</div>
        <div class="omr-choices">
          ${symbols.map((sym, idx) => {
            const n = idx + 1;
            return `<div class="omr-choice" id="choice-${qno}-${n}" onclick="pickAnswer('${qno}',${n})">${sym}</div>`;
          }).join('')}
        </div>
      </div>`;
    });

    html += `</div></div>`;
  });

  document.getElementById('omr-sections').innerHTML = html;
  updateProgress();
}

// ── 답 선택 ──
window.pickAnswer = (qno, n) => {
  for (let i = 1; i <= 5; i++) {
    const el = document.getElementById(`choice-${qno}-${i}`);
    if (el) el.classList.remove('sel');
  }
  const el = document.getElementById(`choice-${qno}-${n}`);
  if (el) el.classList.add('sel');
  answers[qno] = String(n);
  updateProgress();
};

function updateProgress() {
  const parts = selectedTest?.parts || [];
  let total = 0;
  parts.forEach(p => total += Object.keys(p.answers||{}).length);
  total = Math.min(total, 30);
  const done = Object.keys(answers).length;
  const pct  = total ? Math.round(done/total*100) : 0;
  document.getElementById('progress-txt').textContent  = `${done} / ${total}`;
  document.getElementById('progress-fill').style.width = pct + '%';
}

// ── 제출 ──
window.submitOMR = async () => {
  const parts = selectedTest?.parts || [];
  let total = 0;
  parts.forEach(p => total += Object.keys(p.answers||{}).length);
  total = Math.min(total, 30);

  const done = Object.keys(answers).length;
  if (done < total && !confirm(`아직 ${total-done}문제를 선택하지 않았어요. 그래도 제출할까요?`)) return;

  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = '제출 중...';

  // 채점: 정답 맵 생성
  const correctMap = {};
  parts.forEach(part => {
    Object.entries(part.answers||{}).forEach(([qno, ans]) => {
      correctMap[qno] = String(ans);
    });
  });

  let correct = 0, wrong = 0;
  const wrongNums = [];
  // 문항별 상세 (통일 구조: answers 배열)
  const answersDetail = [];
  Object.entries(correctMap).forEach(([qno, correctAns]) => {
    const sa = answers[qno];
    const isCorrect = sa === correctAns;
    if (isCorrect) correct++; else { wrong++; wrongNums.push(Number(qno.replace('q',''))); }
    answersDetail.push({
      question:      `Q${qno.replace('q','')}`,
      studentAnswer: sa || null,
      correctAnswer: correctAns,
      isCorrect,
      type:          'master'
    });
  });
  // 문항 번호 순 정렬
  answersDetail.sort((a,b) => Number(a.question.replace('Q','')) - Number(b.question.replace('Q','')));

  const score = total > 0 ? Math.round((correct/total)*100) : 0;

  // 과제 결정
  const fp = parts[0];
  let taskText = '';
  if (fp) taskText = wrong<=2 ? (fp.taskLow||'') : wrong<=4 ? (fp.taskMid||'') : (fp.taskHigh||'');

  // ── Firebase 저장 (통일 구조: grades/{자동ID}, 1회 응시 = 문서 1개) ──
  try {
    await ensureAuth();
    await addDoc(collection(db, 'grades'), {
      // ── 식별 ──
      studentId,
      studentName,
      grade: studentGrade,
      subject: selectedTest.subject || '',
      examId: selectedTest.fireId,                       // master-tests 문서 id (대시보드 삭제 연동 키)
      testName: selectedTest.unitName || '마스터테스트 OMR',
      category: 'master',                                // 마스터 OMR
      // ── 파트별 점수 (마스터는 객관식 → multiple에, ox는 null) ──
      ox: null,
      multiple: { correct, total, score },
      // ── 대표 점수/집계 ──
      score,
      totalCorrect: correct,
      totalQuestions: total,
      // ── 문항별 상세 ──
      answers: answersDetail,
      wrongNums,
      // ── 시간 (읽는 쪽이 timestamp로 정렬) ──
      timestamp: serverTimestamp(),
      // ── 구버전 읽기 호환용 보조 필드 ──
      testType: 'master',
      testId: selectedTest.testId || '',
      testFireId: selectedTest.fireId,
      unitName: selectedTest.unitName || '',
      examTitle: selectedTest.unitName || '마스터테스트 OMR',
      testGrade: selectedTest.grade || '',
      testGradeNorm: normalizeGrade(selectedTest.grade || ''),
      studentGrade,
      correct, wrong, total
    });
  } catch(e) {
    alert('제출 실패: ' + e.message);
    btn.disabled = false; btn.textContent = '✓ 답안 제출하기';
    return;
  }

  // 결과 화면
  const emoji = score>=90?'🎉':score>=70?'😊':score>=50?'😅':'💪';
  const msg   = score>=90?'훌륭해요!':score>=70?'잘했어요!':score>=50?'더 열심히 해봐요!':'다음엔 더 잘할 수 있어요!';
  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-title').textContent = '제출 완료!';
  document.getElementById('result-sub').textContent   = `${studentName}학생, ${msg}`;
  document.getElementById('result-score').textContent = score + '점';
  if (taskText) {
    document.getElementById('result-task-box').style.display = 'block';
    document.getElementById('result-task-text').textContent  = taskText;
  }
  showScreen('result');
};

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ──────────────────────────────────────────────
// ★ 클리닉 링크 자동 진입: ?testId=문서ID&sid=학생ID
//   - 입장 화면을 건너뛰고 해당 마스터테스트를 바로 OMR로 띄움
//   - sid로 학생을 자동 조회(이름·학년 채움) → 점수가 그 학생에게 기록됨
//   - testId가 없거나 학생/시험 조회 실패 시 → 기존 입장 화면 그대로
// ──────────────────────────────────────────────
async function getMasterTestById(testId) {
  try {
    const snap = await getDoc(doc(db, 'master-tests', testId));
    if (snap.exists()) return { fireId: snap.id, ...snap.data() };
  } catch (e) {
    console.warn('[OMR] master-test load fail:', e);
  }
  return null;
}

async function initFromURL() {
  const params = new URLSearchParams(location.search);
  const testId = (params.get('testId') || '').trim();
  const sid    = (params.get('sid') || '').trim().toLowerCase();

  // 클리닉에서 들어왔으면 결과 화면의 "홈으로 돌아가기"를 클리닉 첫 페이지로 연결
  // (사이트 내부 경로만 허용 — 오픈 리다이렉트 방지)
  const fromRaw = params.get('from') || '';
  if (fromRaw && fromRaw.startsWith('/') && !fromRaw.startsWith('//')) {
    const homeBtn = document.getElementById('omr-home-btn');
    if (homeBtn) { homeBtn.setAttribute('href', fromRaw); homeBtn.textContent = '← 클리닉으로 돌아가기'; }
  }

  if (!testId) return; // 일반 입장 화면 유지

  // 자동 진입 로딩 화면
  showScreen('autoload');

  try {
    await ensureAuth();

    // 학생 자동 조회 (sid 필수: 점수를 학생에게 연결하려면 필요)
    let student = null;
    if (sid) student = await getStudentById(sid);
    if (!student) {
      // 학생을 못 찾으면 일반 입장 화면으로 되돌림
      showScreen('entry');
      return;
    }
    studentId    = student.id;
    studentName  = student.name;
    studentGrade = normalizeGrade(student.grade);

    // 시험 문서 직접 로드 (학년 목록을 거치지 않고 콕 집어 열기)
    const test = await getMasterTestById(testId);
    if (!test) {
      alert('시험을 찾을 수 없습니다. 선생님께 문의하세요.');
      showScreen('entry');
      return;
    }

    selectedTest = test;
    answers = {};
    buildOMR();
    showScreen('omr');
  } catch (e) {
    console.warn('[OMR] initFromURL error:', e);
    showScreen('entry'); // 실패 시 일반 입장 화면
  }
}
initFromURL();
</script>

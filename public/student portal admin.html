<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>학생 포털 관리 - 베타과학학원</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --pink:#ec4899;--pink-lt:#fdf2f8;--pink-dk:#be185d;
  --bg:#fef7fb;--wh:#fff;--tx:#1e293b;--mt:#94a3b8;--bd:#f0e4ec;
  --r:14px;--ok:#10b981;--ng:#ef4444;
  --purple:#7c3aed;--purple-lt:#f5f3ff;--purple-bd:#ddd6fe;
  --safe-top:env(safe-area-inset-top);
  --safe-bot:env(safe-area-inset-bottom);
  --safe-l:env(safe-area-inset-left);
  --safe-r:env(safe-area-inset-right);
}
html{-webkit-text-size-adjust:100%}
body{font-family:'Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif;font-size:15px;background:var(--bg);color:var(--tx);min-height:100vh;min-height:100dvh;visibility:hidden}

/* 탑바 */
.topbar{
  background:var(--wh);border-bottom:1px solid var(--bd);
  display:flex;align-items:center;justify-content:space-between;
  height:calc(52px + var(--safe-top));
  padding:var(--safe-top) 16px 0;
  position:sticky;top:0;z-index:100;
  box-shadow:0 2px 12px rgba(236,72,153,.06);
}
.topbar-left{display:flex;align-items:center;gap:10px}
.logo-icon{width:30px;height:30px;background:linear-gradient(135deg,#f472b6,#db2777);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-name{font-size:15px;font-weight:700;color:var(--tx)}
.topbar-right{display:flex;align-items:center;gap:8px}
.btn-logout{
  padding:8px 14px;background:transparent;
  border:1.5px solid #fbcfe8;border-radius:20px;
  font-family:inherit;font-size:13px;font-weight:700;
  color:var(--pink);cursor:pointer;min-height:40px;
}
.btn-logout:active{background:var(--pink-lt)}
.btn-back{
  display:flex;align-items:center;gap:6px;
  padding:8px 14px;background:var(--purple-lt);
  border:1px solid var(--purple-bd);border-radius:20px;
  font-family:inherit;font-size:13px;font-weight:700;
  color:var(--purple);cursor:pointer;min-height:40px;
  text-decoration:none;
}
.btn-back:active{background:#ede9fe}

/* 메인 */
.main{
  padding:16px 16px calc(16px + var(--safe-bot));
  max-width:680px;margin:0 auto;
}

/* 페이지 헤더 */
.page-header{
  background:linear-gradient(135deg,var(--purple-lt),#ede9fe);
  border:1px solid var(--purple-bd);border-radius:var(--r);
  padding:18px 16px;margin-bottom:14px;
}
.page-header h1{font-size:20px;font-weight:700;margin-bottom:4px}
.page-header p{font-size:13px;color:var(--mt);line-height:1.6}

/* 안내 박스 */
.guide-box{
  background:var(--wh);border:1px solid var(--purple-bd);
  border-radius:var(--r);padding:16px;margin-bottom:14px;
  display:flex;align-items:flex-start;gap:10px;
}
.guide-icon{font-size:20px;flex-shrink:0;margin-top:1px}
.guide-txt{font-size:13px;color:var(--tx);line-height:1.9}
.guide-txt strong{color:var(--purple)}
.guide-url{
  display:block;margin-top:8px;
  background:var(--purple-lt);border:1px solid var(--purple-bd);
  border-radius:8px;padding:8px 10px;
  font-size:11px;font-family:monospace;color:var(--purple);
  word-break:break-all;line-height:1.5;
}

/* 필터 */
.filter-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:0}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--mt)}
.search-input{
  width:100%;padding:12px 12px 12px 38px;
  border:1px solid var(--bd);border-radius:10px;
  font-size:15px;color:var(--tx);background:var(--wh);
  outline:none;font-family:inherit;min-height:48px;
}
.search-input:focus{border-color:var(--purple)}
.filter-select{
  padding:12px;border:1px solid var(--bd);border-radius:10px;
  font-size:14px;color:var(--tx);background:var(--wh);
  cursor:pointer;outline:none;font-family:inherit;
  min-height:48px;min-width:120px;
}
.filter-select:focus{border-color:var(--purple)}

/* 카운트 + 전체복사 */
.action-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:8px}
.count-txt{font-size:14px;color:var(--mt)}<br>.count-txt strong{color:var(--tx);font-weight:700}
.bulk-btn{
  display:flex;align-items:center;gap:6px;
  padding:11px 16px;background:var(--purple);color:#fff;
  border:none;border-radius:10px;font-size:14px;font-weight:700;
  cursor:pointer;font-family:inherit;min-height:48px;white-space:nowrap;
}
.bulk-btn:active{background:#6d28d9}

/* 카드 목록 */
.card-list{display:flex;flex-direction:column;gap:10px}

/* 학생 카드 */
.portal-card{
  background:var(--wh);border:1px solid var(--bd);
  border-radius:var(--r);overflow:hidden;
}
.card-head{
  padding:14px 16px;border-bottom:1px solid #f9f5ff;
  display:flex;align-items:center;gap:12px;
}
.avatar{
  width:44px;height:44px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,#ede9fe,#ddd6fe);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:700;color:var(--purple);
}
.student-info{flex:1;min-width:0}
.student-name{font-size:16px;font-weight:700;margin-bottom:4px}
.student-meta{display:flex;gap:5px;flex-wrap:wrap}
.grade-chip{font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px}
.grade-mid1{background:#ede9fe;color:#6d28d9}
.grade-mid2{background:#dbeafe;color:#1d4ed8}
.grade-mid3{background:#d1fae5;color:#065f46}
.grade-high1{background:#fef3c7;color:#92400e}
.grade-high2{background:#fee2e2;color:#991b1b}
.grade-high3{background:#fce7f3;color:#9d174d}
.id-chip{font-size:11px;color:var(--mt);font-family:monospace;background:#f8f9fa;border:1px solid var(--bd);border-radius:4px;padding:2px 6px}

.card-body{padding:12px 16px 14px}
.url-row{
  display:flex;align-items:center;gap:8px;
  background:var(--purple-lt);border:1px solid var(--purple-bd);
  border-radius:10px;padding:10px 12px;margin-bottom:10px;
}
.url-txt{flex:1;font-size:12px;font-family:monospace;color:var(--purple);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.btn-copy{
  display:flex;align-items:center;justify-content:center;gap:4px;
  padding:8px 14px;background:var(--purple);color:#fff;
  border:none;border-radius:8px;font-size:13px;font-weight:700;
  cursor:pointer;font-family:inherit;flex-shrink:0;min-height:40px;min-width:72px;
}
.btn-copy:active{background:#6d28d9}
.btn-copy.copied{background:var(--ok)}

/* 액션 버튼들 */
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn-preview{
  display:flex;align-items:center;justify-content:center;gap:6px;
  padding:12px;background:var(--purple-lt);color:var(--purple);
  border:1px solid var(--purple-bd);border-radius:10px;
  font-size:14px;font-weight:700;cursor:pointer;
  text-decoration:none;font-family:inherit;min-height:48px;
}
.btn-preview:active{background:#ede9fe}
.btn-kakao{
  display:flex;align-items:center;justify-content:center;gap:6px;
  padding:12px;background:#FEE500;color:#3A1D1D;
  border:none;border-radius:10px;
  font-size:14px;font-weight:700;cursor:pointer;
  font-family:inherit;min-height:48px;
}
.btn-kakao:active{background:#FFD900}

/* 빈 상태 */
.empty-state{text-align:center;padding:60px 20px;color:var(--mt);font-size:14px}

/* 토스트 */
.toast{
  position:fixed;
  bottom:calc(24px + var(--safe-bot));
  left:50%;transform:translateX(-50%) translateY(80px);
  background:#1e293b;color:#fff;padding:13px 22px;
  border-radius:12px;font-size:14px;font-weight:700;
  z-index:500;transition:transform .3s ease;
  pointer-events:none;white-space:nowrap;
  box-shadow:0 4px 16px rgba(0,0,0,.2);
}
.toast.show{transform:translateX(-50%) translateY(0)}

/* 로딩 */
.loading-center{text-align:center;padding:60px 20px;color:var(--mt)}
.spinner{width:36px;height:36px;border:3px solid var(--bd);border-top-color:var(--purple);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<header class="topbar">
  <div class="topbar-left">
    <div class="logo-icon">
      <svg width="16" height="16" viewBox="0 0 18 18" fill="none">
        <circle cx="9" cy="7" r="3" fill="rgba(255,255,255,0.9)"/>
        <path d="M3.5 16c0-3 2.5-5.5 5.5-5.5s5.5 2.5 5.5 5.5" stroke="rgba(255,255,255,0.9)" stroke-width="1.4" stroke-linecap="round" fill="none"/>
      </svg>
    </div>
    <span class="logo-name">학생 포털 관리</span>
  </div>
  <div class="topbar-right">
    <a class="btn-back" href="index.html">← 홈</a>
    <button class="btn-logout" onclick="doLogout()">로그아웃</button>
  </div>
</header>

<main class="main">

  <div class="page-header">
    <h1>🔗 학생 포털 관리</h1>
    <p>링크를 복사해 카카오톡으로 학부모님께 공유하세요.<br>로그인 없이 바로 열립니다.</p>
  </div>

  <div class="guide-box">
    <div class="guide-icon">💡</div>
    <div class="guide-txt">
      <strong>보기 전용 · 로그인 불필요 · 자동 연동</strong><br>
      수업기록, 테스트 결과가 자동으로 표시됩니다.
      <span class="guide-url" id="baseUrlDisplay">불러오는 중...</span>
    </div>
  </div>

  <div class="filter-row">
    <div class="search-wrap">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="search-input" type="text" id="searchInput" placeholder="이름 또는 ID 검색..." oninput="filterStudents()">
    </div>
    <select class="filter-select" id="gradeFilter" onchange="filterStudents()">
      <option value="">전체 학년</option>
      <option value="중등1학년">중등1</option>
      <option value="중등2학년">중등2</option>
      <option value="중등3학년">중등3</option>
      <option value="고등1학년">고등1</option>
      <option value="고등2학년">고등2</option>
      <option value="고등3학년">고등3</option>
    </select>
  </div>

  <div class="action-row">
    <span class="count-txt">총 <strong id="countDisplay">0</strong>명</span>
    <button class="bulk-btn" onclick="copyAllLinks()">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      전체 링크 복사
    </button>
  </div>

  <div class="card-list" id="cardList">
    <div class="loading-center">
      <div class="spinner"></div>
      <p>학생 목록을 불러오는 중...</p>
    </div>
  </div>

</main>

<div class="toast" id="toast"></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getAuth,onAuthStateChanged,signOut}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import{getFirestore,doc,getDoc,collection,query,orderBy,getDocs}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const fc={apiKey:"AIzaSyD5MQx_rXO_xRYelyKxK090TaKa3Gg2D3k",authDomain:"beta-science.firebaseapp.com",projectId:"beta-science",storageBucket:"beta-science.firebasestorage.app",messagingSenderId:"650652155367",appId:"1:650652155367:web:41d2958e675cb4edd4d142"};
const app=initializeApp(fc);
const auth=getAuth(app);
const db=getFirestore(app);

const BASE_URL=window.location.origin+'/student-portal.html?id=';
document.getElementById('baseUrlDisplay').textContent=BASE_URL+'학생ID';

let allStudents=[];let filtered=[];

onAuthStateChanged(auth,async u=>{
  if(!u){window.location.replace('/login.html');return;}
  try{
    const s=await getDoc(doc(db,'users',u.uid));
    if(!s.exists()||s.data().status!=='approved'){await signOut(auth);window.location.replace('/login.html');return;}
    document.body.style.visibility='visible';
    loadStudents();
  }catch(e){window.location.replace('/login.html');}
});

window.doLogout=async()=>{await signOut(auth);window.location.replace('/login.html');};

async function loadStudents(){
  try{
    const snap=await getDocs(query(collection(db,'students'),orderBy('regDate','desc')));
    allStudents=snap.docs.map(d=>({fireId:d.id,...d.data()}));
    filterStudents();
  }catch(err){
    document.getElementById('cardList').innerHTML='<div class="empty-state">학생 정보를 불러오지 못했습니다.</div>';
  }
}

window.filterStudents=function(){
  const kw=document.getElementById('searchInput').value.trim().toLowerCase();
  const gr=document.getElementById('gradeFilter').value;
  filtered=allStudents.filter(s=>
    (!kw||(s.name||'').toLowerCase().includes(kw)||(s.id||'').toLowerCase().includes(kw))&&
    (!gr||s.grade===gr)
  );
  document.getElementById('countDisplay').textContent=filtered.length;
  renderCards();
};

function renderCards(){
  const list=document.getElementById('cardList');
  if(!filtered.length){list.innerHTML='<div class="empty-state">학생이 없습니다.</div>';return;}
  list.innerHTML=filtered.map(s=>renderCard(s)).join('');
}

function renderCard(s){
  const url=BASE_URL+(s.id||s.fireId);
  const grade=s.grade||'';
  const gradeCls={'중등1학년':'grade-mid1','중등2학년':'grade-mid2','중등3학년':'grade-mid3','고등1학년':'grade-high1','고등2학년':'grade-high2','고등3학년':'grade-high3'}[grade]||'grade-mid1';
  const initial=(s.name||'?').charAt(0);
  const shortUrl=url.length>42?url.substring(0,42)+'…':url;
  const fid=e(s.fireId);
  const safeUrl=e(url);
  const safeName=e(s.name||'');
  return`<div class="portal-card">
    <div class="card-head">
      <div class="avatar">${e(initial)}</div>
      <div class="student-info">
        <div class="student-name">${safeName}</div>
        <div class="student-meta">
          <span class="grade-chip ${gradeCls}">${e(grade)}</span>
          <span class="id-chip">${e(s.id||'-')}</span>
        </div>
      </div>
    </div>
    <div class="card-body">
      <div class="url-row">
        <span class="url-txt">${e(shortUrl)}</span>
        <button class="btn-copy" id="btn-${fid}" onclick="copyLink('${safeUrl}','${fid}')">
          📋 복사
        </button>
      </div>
      <div class="btn-row">
        <a class="btn-preview" href="${safeUrl}" target="_blank" rel="noopener">
          👁 미리보기
        </a>
        <button class="btn-kakao" onclick="shareKakao('${safeName}','${safeUrl}')">
          💬 카카오 공유
        </button>
      </div>
    </div>
  </div>`;
}

window.copyLink=async function(url,fireId){
  try{
    await navigator.clipboard.writeText(url);
  }catch(err){
    const ta=document.createElement('textarea');ta.value=url;ta.style.cssText='position:fixed;opacity:0;top:0;left:0';document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand('copy');}catch(e){}document.body.removeChild(ta);
  }
  const btn=document.getElementById('btn-'+fireId);
  if(btn){btn.classList.add('copied');btn.textContent='✓ 완료';setTimeout(()=>{btn.classList.remove('copied');btn.textContent='📋 복사';},2200);}
  showToast('✅ 링크가 복사되었습니다!');
};

window.copyAllLinks=async function(){
  if(!filtered.length){showToast('⚠️ 표시된 학생이 없습니다');return;}
  const text=filtered.map(s=>`[베타과학학원] ${s.name||''}(${s.grade||''}) 학생 포털\n${BASE_URL+(s.id||s.fireId)}`).join('\n\n');
  try{await navigator.clipboard.writeText(text);}
  catch(err){const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;opacity:0;top:0;left:0';document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand('copy');}catch(e){}document.body.removeChild(ta);}
  showToast(`✅ ${filtered.length}명 링크 전체 복사 완료!`);
};

window.shareKakao=function(name,url){
  const msg=`[베타과학학원] ${name} 학생 포털 링크\n📚 수업기록 · 테스트 결과 확인\n${url}`;
  if(navigator.share){
    navigator.share({title:`${name} 학생 포털`,text:msg,url:url}).catch(()=>{});
  }else{
    if(navigator.clipboard){navigator.clipboard.writeText(msg).then(()=>{showToast('✅ 카카오톡에 붙여넣기 하세요!');});}
    else{const ta=document.createElement('textarea');ta.value=msg;ta.style.cssText='position:fixed;opacity:0;top:0;left:0';document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand('copy');}catch(e){}document.body.removeChild(ta);showToast('✅ 카카오톡에 붙여넣기 하세요!');}
  }
};

function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2600);
}

function e(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
</script>
</body>
</html>

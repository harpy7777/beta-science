<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel='icon' type='image/svg+xml' href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 140 140'%3E%3Cpolygon points='70,8 121,38 121,102 70,132 19,102 19,38' fill='none' stroke='%23E85D75' stroke-width='8' stroke-linejoin='round'/%3E%3Cpolygon points='70,38 97,53 97,87 70,102 43,87 43,53' fill='none' stroke='%23E85D75' stroke-width='4' stroke-linejoin='round' stroke-dasharray='10 6'/%3E%3Ccircle cx='70' cy='8' r='10' fill='%23E85D75'/%3E%3Ccircle cx='121' cy='38' r='10' fill='%23E85D75'/%3E%3Ccircle cx='121' cy='102' r='10' fill='%23E85D75'/%3E%3Ccircle cx='70' cy='132' r='10' fill='%23E85D75'/%3E%3Ccircle cx='19' cy='102' r='10' fill='%23E85D75'/%3E%3Ccircle cx='19' cy='38' r='10' fill='%23E85D75'/%3E%3C/svg%3E">
<title>처방 만들기 · 베타과학학원</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
:root{
  --pur-dark:#3b1fa3; --pur-main:#5b3fd4; --pur-mid:#7c5ce8;
  --pur-tint:#f5f3ff; --pur-tint2:#ede9fe; --pur-border:#c4b5fd; --pur-border2:#a78bfa;
  --green:#059669; --green-bg:#ecfdf5; --green-border:#a7f3d0;
  --amber:#d97706; --amber-bg:#fffbeb; --amber-border:#fde68a;
  --red:#dc2626; --red-bg:#fef2f2; --red-border:#fecaca;
  --text:#1d1d1f; --muted:#6e6e73; --dim:#aeaeb2;
  --bg:#f8f7ff; --white:#fff;
  --radius-sm:10px; --radius:14px; --radius-lg:18px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,textarea{font-family:inherit}

.header{background:#fff;border-bottom:1px solid #ede9fe;padding:0 1rem;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:500;box-shadow:0 1px 0 #ede9fe}
.header-left{display:flex;align-items:center;gap:9px}
.logo-mark{width:30px;height:30px;background:linear-gradient(135deg,var(--pur-mid),var(--pur-dark));border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand-name{font-size:14px;font-weight:700;letter-spacing:-.3px}
.logout-btn{padding:7px 14px;border:1.5px solid var(--pur-border);border-radius:20px;font-size:12px;font-weight:700;color:var(--pur-dark)}
.logout-btn:hover{background:var(--pur-tint)}

.wrap{max-width:760px;margin:0 auto;padding:1.6rem 1.2rem 5rem}
#gate{text-align:center;color:var(--muted);font-size:14px;padding:4rem 1rem}

.card{background:#fff;border:1.5px solid #e5e7eb;border-radius:var(--radius-lg);padding:1.4rem 1.5rem;margin-bottom:1.4rem}
.card-title{font-size:15px;font-weight:900;letter-spacing:-.02em;margin-bottom:1rem;display:flex;align-items:center;gap:8px}

.uid-box{background:var(--amber-bg);border:1.5px solid var(--amber-border);border-left:4px solid var(--amber);border-radius:var(--radius);padding:.9rem 1.1rem;font-size:12.5px;line-height:1.7;color:#92400e}
.uid-box code{background:#fff;border:1px solid var(--amber-border);border-radius:6px;padding:2px 7px;font-size:12px;word-break:break-all;color:var(--text)}
.uid-copy{margin-left:6px;background:var(--amber);color:#fff;border-radius:7px;padding:3px 10px;font-size:11px;font-weight:700}

label.fld{display:block;font-size:12px;font-weight:800;color:var(--pur-dark);margin:0 0 .4rem}
.row2{display:flex;gap:10px;flex-wrap:wrap}
.row2>div{flex:1;min-width:160px;margin-bottom:.9rem}
input.txt,textarea.txt{width:100%;border:1.5px solid var(--pur-border);border-radius:10px;padding:10px 12px;font-size:13.5px;color:var(--text);background:#fff;resize:vertical}
input.txt:focus,textarea.txt:focus{outline:none;border-color:var(--pur-main)}
textarea.txt{min-height:58px;line-height:1.6}

.add-row{display:flex;gap:8px;flex-wrap:wrap;margin:.4rem 0 1rem}
.add-btn{border:1.5px dashed var(--pur-border2);border-radius:10px;padding:9px 14px;font-size:12.5px;font-weight:700;color:var(--pur-main);background:var(--pur-tint)}
.add-btn:hover{background:var(--pur-tint2)}

.item-card{background:var(--pur-tint);border:1.5px solid var(--pur-border);border-radius:var(--radius);padding:1rem 1.1rem;margin-bottom:.8rem;position:relative}
.item-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:.7rem}
.item-tag{font-size:11px;font-weight:800;letter-spacing:.05em;color:var(--pur-dark);background:#fff;border:1px solid var(--pur-border);border-radius:20px;padding:3px 11px}
.item-ctrls{display:flex;gap:5px}
.icbtn{width:28px;height:28px;border-radius:8px;background:#fff;border:1px solid var(--pur-border);font-size:13px;font-weight:800;color:var(--pur-dark);display:flex;align-items:center;justify-content:center}
.icbtn:hover{background:var(--pur-tint2)}
.icbtn.del{color:var(--red);border-color:var(--red-border)}
.icbtn.del:hover{background:var(--red-bg)}
.choice-grid{display:flex;flex-direction:column;gap:7px}
.choice-line{display:flex;align-items:center;gap:8px}
.choice-line input[type=radio]{width:18px;height:18px;accent-color:var(--pur-main);flex-shrink:0}
.choice-line .num{width:20px;font-weight:800;color:var(--pur-dark);font-size:13px;flex-shrink:0}
.ox-pick{display:flex;gap:14px;align-items:center;margin:.2rem 0 .6rem;font-size:14px;font-weight:700}
.ox-pick label{display:flex;align-items:center;gap:6px;cursor:pointer}
.ox-pick input[type=radio]{width:18px;height:18px;accent-color:var(--pur-main)}
.hint{font-size:11px;color:var(--muted);margin:.2rem 0 .5rem}

.save-btn{width:100%;background:var(--pur-main);color:#fff;border-radius:12px;padding:14px 0;font-size:15px;font-weight:800;margin-top:.4rem;transition:background .15s}
.save-btn:hover{background:var(--pur-dark)}
.save-btn:disabled{opacity:.5;cursor:default}

.result{display:none;margin-top:1rem;background:var(--green-bg);border:1.5px solid var(--green-border);border-left:4px solid var(--green);border-radius:var(--radius);padding:1rem 1.1rem}
.result.show{display:block}
.result-label{font-size:12px;font-weight:800;color:#065f46;margin-bottom:.5rem}
.link-row{display:flex;gap:8px;align-items:center}
.link-row input{flex:1;border:1.5px solid var(--green-border);border-radius:9px;padding:9px 11px;font-size:12.5px;color:var(--text);background:#fff}
.copy-btn{background:var(--green);color:#fff;border-radius:9px;padding:9px 15px;font-size:12.5px;font-weight:700;white-space:nowrap}

.list-empty{color:var(--muted);font-size:13px;padding:.6rem 0;line-height:1.7}
.lrow{display:flex;align-items:center;justify-content:space-between;gap:10px;border:1.5px solid #e5e7eb;border-radius:var(--radius);padding:.85rem 1rem;margin-bottom:.6rem}
.lrow:hover{border-color:var(--pur-border)}
.lr-info{min-width:0}
.lr-name{font-size:13.5px;font-weight:800}
.lr-meta{font-size:11.5px;color:var(--muted);margin-top:2px}
.lr-actions{display:flex;gap:6px;flex-shrink:0}
.lr-btn{border:1.5px solid var(--pur-border);border-radius:9px;padding:7px 11px;font-size:12px;font-weight:700;color:var(--pur-dark)}
.lr-btn:hover{background:var(--pur-tint)}
.lr-btn.del{color:var(--red);border-color:var(--red-border)}
.lr-btn.del:hover{background:var(--red-bg)}

.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--text);color:#fff;font-size:13px;font-weight:700;padding:11px 20px;border-radius:24px;opacity:0;transition:all .25s;z-index:900;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:520px){
  .wrap{padding:1.2rem .85rem 4rem}
  .card{padding:1.1rem 1.1rem}
}
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <div class="logo-mark">
      <svg width="16" height="16" viewBox="0 0 18 18" fill="none">
        <circle cx="9" cy="7" r="3" fill="rgba(255,255,255,0.9)"/>
        <path d="M3.5 16c0-3 2.5-5.5 5.5-5.5s5.5 2.5 5.5 5.5" stroke="rgba(255,255,255,0.9)" stroke-width="1.4" stroke-linecap="round" fill="none"/>
      </svg>
    </div>
    <span class="brand-name">처방 만들기</span>
  </div>
  <button class="logout-btn" id="logoutBtn" style="display:none">로그아웃</button>
</header>

<div id="gate">로그인 확인 중…</div>

<main class="wrap" id="main" style="display:none">

  <div class="card">
    <div class="card-title">✅ 보안 규칙 (처음 한 번만)</div>
    <div class="uid-box">
      이 페이지는 <strong>승인된 선생님 계정</strong>만 들어올 수 있습니다. Firebase 콘솔에서 아래 규칙을 한 번만 등록하면, 학생·학부모는 처방을 만들거나 지울 수 없습니다.<br>
      참고용 내 UID: <code id="uidText">…</code><button class="uid-copy" id="uidCopy">복사</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">📝 새 처방 만들기</div>
    <div class="row2">
      <div>
        <label class="fld">학생 이름</label>
        <input class="txt" id="studentName" placeholder="예: 홍길동">
      </div>
      <div>
        <label class="fld">주차 / 범위</label>
        <input class="txt" id="weekLabel" placeholder="예: 6월 2주차 · 3단원">
      </div>
    </div>

    <label class="fld" style="margin-top:.3rem">학습 내용</label>
    <div class="hint">아래 버튼으로 핵심내용·OX·객관식을 원하는 만큼 추가하세요. 추가한 순서대로 학생에게 보입니다.</div>
    <div id="items"></div>
    <div class="add-row">
      <button class="add-btn" data-add="concept">＋ 핵심내용</button>
      <button class="add-btn" data-add="ox">＋ OX 문제</button>
      <button class="add-btn" data-add="mc">＋ 객관식</button>
    </div>

    <button class="save-btn" id="saveBtn">🔗 처방 링크 만들기</button>

    <div class="result" id="result">
      <div class="result-label">✅ 링크가 만들어졌습니다 — 카카오톡으로 보내세요</div>
      <div class="link-row">
        <input id="resultLink" readonly>
        <button class="copy-btn" id="copyLink">복사</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">📋 보낸 처방 목록</div>
    <div id="list"><div class="list-empty">불러오는 중…</div></div>
  </div>

</main>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, deleteDoc, collection, query, orderBy, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const cfg = {
  apiKey:"AIzaSyD5MQx_rXO_xRYelyKxK090TaKa3Gg2D3k",
  authDomain:"beta-science.firebaseapp.com",
  projectId:"beta-science",
  storageBucket:"beta-science.firebasestorage.app",
  messagingSenderId:"650652155367",
  appId:"1:650652155367:web:41d2958e675cb4edd4d142"
};
const app  = initializeApp(cfg);
const auth = getAuth(app);
const db   = getFirestore(app);

const $ = id => document.getElementById(id);
let cardSeq = 0;

function toast(msg){
  const t=$('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'),1800);
}
function copy(text){
  if(navigator.clipboard && navigator.clipboard.writeText){
    return navigator.clipboard.writeText(text);
  }
  const ta=document.createElement('textarea'); ta.value=text; document.body.appendChild(ta);
  ta.select(); try{document.execCommand('copy')}catch(e){} ta.remove();
  return Promise.resolve();
}
function genToken(len=24){
  const chars='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
  const arr=new Uint8Array(len); crypto.getRandomValues(arr);
  let s=''; for(const b of arr) s+=chars[b % chars.length]; return s;
}
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ── 아이템 카드 생성 ── */
function addCard(type){
  const id = ++cardSeq;
  const card=document.createElement('div');
  card.className='item-card';
  card.dataset.type=type;

  let inner = `
    <div class="item-head">
      <span class="item-tag">${type==='concept'?'📖 핵심내용':type==='ox'?'⭕ OX 문제':'📝 객관식'}</span>
      <div class="item-ctrls">
        <button class="icbtn" data-mv="up" title="위로">↑</button>
        <button class="icbtn" data-mv="down" title="아래로">↓</button>
        <button class="icbtn del" data-mv="del" title="삭제">✕</button>
      </div>
    </div>`;

  if(type==='concept'){
    inner += `
      <input class="txt f-title" placeholder="제목 (예: 광합성의 정의) — 비워도 됨" style="margin-bottom:.5rem">
      <textarea class="txt f-body" placeholder="학생에게 보여줄 핵심 내용을 입력하세요."></textarea>`;
  } else if(type==='ox'){
    inner += `
      <textarea class="txt f-q" placeholder="OX 지문을 입력하세요. (예: 식물은 빛이 없어도 광합성을 한다.)"></textarea>
      <div class="ox-pick" style="margin-top:.6rem">
        <span style="font-size:12px;color:var(--muted)">정답:</span>
        <label><input type="radio" name="ox-${id}" value="O">O</label>
        <label><input type="radio" name="ox-${id}" value="X">X</label>
      </div>
      <textarea class="txt f-explain" placeholder="해설 (선택)"></textarea>`;
  } else { // mc
    inner += `<textarea class="txt f-q" placeholder="문제를 입력하세요." style="margin-bottom:.6rem"></textarea>
      <div class="hint">정답 보기의 동그라미를 선택하세요.</div>
      <div class="choice-grid">`;
    for(let i=0;i<4;i++){
      inner += `<div class="choice-line">
          <input type="radio" name="mc-${id}" value="${i}">
          <span class="num">${i+1}.</span>
          <input class="txt f-choice" placeholder="보기 ${i+1}">
        </div>`;
    }
    inner += `</div><textarea class="txt f-explain" placeholder="해설 (선택)" style="margin-top:.6rem"></textarea>`;
  }

  card.innerHTML=inner;

  card.querySelector('[data-mv="del"]').addEventListener('click',()=>card.remove());
  card.querySelector('[data-mv="up"]').addEventListener('click',()=>{
    const prev=card.previousElementSibling; if(prev) card.parentNode.insertBefore(card,prev);
  });
  card.querySelector('[data-mv="down"]').addEventListener('click',()=>{
    const next=card.nextElementSibling; if(next) card.parentNode.insertBefore(next,card);
  });

  $('items').appendChild(card);
}

document.querySelectorAll('.add-btn').forEach(b=>{
  b.addEventListener('click',()=>addCard(b.dataset.add));
});

/* ── 입력값 수집 + 검증 ── */
function collectItems(){
  const cards=[...document.querySelectorAll('#items .item-card')];
  if(cards.length===0) throw '학습 내용을 1개 이상 추가하세요.';
  const items=[];
  cards.forEach((c,idx)=>{
    const type=c.dataset.type;
    const n=idx+1;
    if(type==='concept'){
      const title=c.querySelector('.f-title').value.trim();
      const body=c.querySelector('.f-body').value.trim();
      if(!body) throw `${n}번째 핵심내용의 내용을 입력하세요.`;
      items.push({type:'concept',title,body});
    } else if(type==='ox'){
      const q=c.querySelector('.f-q').value.trim();
      const ans=c.querySelector('input[type=radio]:checked');
      const explain=c.querySelector('.f-explain').value.trim();
      if(!q) throw `${n}번째 OX 지문을 입력하세요.`;
      if(!ans) throw `${n}번째 OX의 정답(O/X)을 선택하세요.`;
      items.push({type:'ox',q,answer:ans.value==='O',explain});
    } else {
      const q=c.querySelector('.f-q').value.trim();
      const choices=[...c.querySelectorAll('.f-choice')].map(i=>i.value.trim());
      const ans=c.querySelector('input[type=radio]:checked');
      const explain=c.querySelector('.f-explain').value.trim();
      if(!q) throw `${n}번째 객관식 문제를 입력하세요.`;
      if(choices.some(x=>!x)) throw `${n}번째 객관식의 보기 4개를 모두 입력하세요.`;
      if(!ans) throw `${n}번째 객관식의 정답을 선택하세요.`;
      items.push({type:'mc',q,choices,answer:Number(ans.value),explain});
    }
  });
  return items;
}

/* ── 저장 ── */
$('saveBtn').addEventListener('click', async ()=>{
  const studentName=$('studentName').value.trim();
  const weekLabel=$('weekLabel').value.trim();
  if(!studentName){ toast('학생 이름을 입력하세요.'); return; }
  let items;
  try{ items=collectItems(); }
  catch(msg){ toast(typeof msg==='string'?msg:'입력을 확인하세요.'); return; }

  const btn=$('saveBtn'); btn.disabled=true; btn.textContent='만드는 중…';
  const token=genToken();
  try{
    await setDoc(doc(db,'assignments',token),{
      studentName, weekLabel, items,
      createdAt: serverTimestamp(),
      createdBy: auth.currentUser ? auth.currentUser.uid : null
    });
    const link=`${location.origin}/assignment.html?t=${token}`;
    $('resultLink').value=link;
    $('result').classList.add('show');
    toast('처방이 만들어졌습니다.');
    // 폼 초기화
    $('studentName').value=''; $('weekLabel').value=''; $('items').innerHTML='';
    loadList();
  }catch(err){
    toast('저장 실패 — 보안 규칙을 확인하세요.');
    console.error(err);
  }finally{
    btn.disabled=false; btn.textContent='🔗 처방 링크 만들기';
  }
});

$('copyLink').addEventListener('click',()=>{ copy($('resultLink').value).then(()=>toast('링크를 복사했습니다.')); });

/* ── 목록 ── */
async function loadList(){
  const box=$('list');
  try{
    const q=query(collection(db,'assignments'), orderBy('createdAt','desc'));
    const snap=await getDocs(q);
    if(snap.empty){ box.innerHTML='<div class="list-empty">아직 만든 처방이 없습니다.</div>'; return; }
    box.innerHTML='';
    snap.forEach(d=>{
      const data=d.data();
      const link=`${location.origin}/assignment.html?t=${d.id}`;
      const cnt=Array.isArray(data.items)?data.items.length:0;
      const row=document.createElement('div'); row.className='lrow';
      row.innerHTML=`
        <div class="lr-info">
          <div class="lr-name">${esc(data.studentName)||'(이름 없음)'}</div>
          <div class="lr-meta">${esc(data.weekLabel)||'—'} · 항목 ${cnt}개</div>
        </div>
        <div class="lr-actions">
          <button class="lr-btn" data-act="copy">링크</button>
          <button class="lr-btn del" data-act="del">삭제</button>
        </div>`;
      row.querySelector('[data-act="copy"]').addEventListener('click',()=>copy(link).then(()=>toast('링크를 복사했습니다.')));
      row.querySelector('[data-act="del"]').addEventListener('click', async ()=>{
        if(!confirm(`'${data.studentName}' 학생의 이 처방을 삭제할까요? (되돌릴 수 없습니다)`)) return;
        try{ await deleteDoc(doc(db,'assignments',d.id)); toast('삭제했습니다.'); loadList(); }
        catch(e){ toast('삭제 실패 — 권한을 확인하세요.'); }
      });
      box.appendChild(row);
    });
  }catch(err){
    box.innerHTML='<div class="list-empty">목록을 불러오지 못했습니다. 보안 규칙이 설정되었는지 확인하세요.</div>';
  }
}

/* ── UID 복사 ── */
$('uidCopy').addEventListener('click',()=>{
  const uid=$('uidText').textContent;
  copy(uid).then(()=>toast('UID를 복사했습니다.'));
});

/* ── 로그인 가드 ── */
$('logoutBtn').addEventListener('click',()=>{ signOut(auth).then(()=>location.replace('/login.html')); });

onAuthStateChanged(auth, async user=>{
  if(!user){ location.replace('/login.html'); return; }
  try{
    const snap=await getDoc(doc(db,'users',user.uid));
    if(!snap.exists() || snap.data().status!=='approved'){
      await signOut(auth); location.replace('/login.html'); return;
    }
  }catch(err){ location.replace('/login.html'); return; }
  $('gate').style.display='none';
  $('main').style.display='block';
  $('logoutBtn').style.display='inline-block';
  $('uidText').textContent=user.uid;
  loadList();
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMS설정 - 베타과학학원</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --pink:#ec4899;--pink-lt:#fdf2f8;--pink-dk:#be185d;
  --mw:1200px;--bg:#fef7fb;--wh:#fff;
  --tx:#1e293b;--mt:#94a3b8;--bd:#f0e4ec;--r:12px;
  --ok:#10b981;--ng:#ef4444;--wn:#f59e0b;
}
body{font-family:'Noto Sans KR',-apple-system,sans-serif;font-weight:400;font-size:13px;background:var(--bg);color:var(--tx);min-height:100vh;visibility:hidden}
.app-wrapper{max-width:var(--mw);margin:0 auto;display:flex;flex-direction:column;min-height:100vh}
/* ══ 공통 탑바 ══ */
.topbar{background:var(--wh);border-bottom:1px solid var(--bd);padding:0 28px;display:flex;align-items:center;gap:12px;height:52px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(236,72,153,.06)}
.logo-area{display:flex;align-items:center;gap:9px;text-decoration:none;flex-shrink:0}
.logo-icon {
  width: 28px;
  height: 28px;
  /* 🎨 요청하신 그라데이션 색상을 그대로 적용했습니다 */
  background: linear-gradient(135deg, #f472b6 0%, #db2777 100%); 
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  /* ✨ 그림자 색상도 새 핑크색(#f472b6) 계열로 맞춰서 더 자연스럽게 수정했습니다 */
  box-shadow: 0 2px 8px rgba(244, 114, 182, 0.35); 
  flex-shrink: 0;
}
.logo-name{font-size:14px;font-weight:500;color:var(--tx);letter-spacing:-.01em}
.topbar-divider{width:1px;height:20px;background:var(--bd);flex-shrink:0}
/* ══ 핵심: nav flex:1 ══ */
.topbar nav{flex:1;display:flex;align-items:center;min-width:0}
.nav-tabs{display:flex;list-style:none;width:100%;justify-content:space-evenly;align-items:center}
.nav-tabs li{flex:1;text-align:center}
.nav-tabs a{display:block;padding:7px 6px;font-size:12px;font-weight:500;color:var(--mt);text-decoration:none;border-radius:20px;white-space:nowrap;transition:all .15s;text-align:center}
.nav-tabs a:hover{background:var(--pink-lt);color:var(--tx)}
.nav-tabs a.active{background:#fce7f3;color:var(--pink);font-weight:700}
.topbar-right{flex-shrink:0;display:flex;align-items:center;gap:10px}
.badge-admin{font-size:11px;padding:3px 10px;background:var(--pink-lt);border:1px solid #fbcfe8;border-radius:20px;color:var(--pink);font-weight:700}
.btn-logout{padding:5px 14px;background:transparent;border:1.5px solid #fbcfe8;border-radius:20px;font-family:inherit;font-size:11px;font-weight:700;color:var(--pink);cursor:pointer;transition:all .15s}
.btn-logout:hover{background:var(--pink-lt)}
/* ══ 레이아웃 ══ */
.main-content{padding:24px 28px;flex:1;padding-bottom:90px}
.page-header{margin-bottom:22px;background:linear-gradient(135deg,#fdf2f8,#fce7f3);border-radius:14px;padding:20px 24px;border:1px solid #fbcfe8}
.page-header h1{font-size:20px;font-weight:700;margin-bottom:3px;display:flex;align-items:center;gap:9px}
.page-header p{font-size:12px;color:var(--mt)}
.layout{display:grid;grid-template-columns:1fr 360px;gap:20px;align-items:start}
/* ══ 카드 ══ */
.card{background:var(--wh);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:18px;overflow:hidden;transition:border-color .15s}
.card:hover{border-color:#fbcfe8}
.card-header{padding:16px 22px;border-bottom:1px solid #fce7f3}
.card-header h2{font-size:14px;font-weight:700}
.card-header p{font-size:12px;color:var(--mt);margin-top:2px}
.card-body{padding:20px}
/* ══ 폼 ══ */
.form-group{margin-bottom:18px}
.form-group:last-child{margin-bottom:0}
.form-group label{display:block;font-size:12px;font-weight:700;color:var(--tx);margin-bottom:6px}
.form-group .hint{font-size:11px;color:var(--mt);margin-top:4px}
.form-input{width:100%;padding:10px 13px;border:1px solid var(--bd);border-radius:8px;font-size:13px;color:var(--tx);background:var(--wh);outline:none;transition:border .15s;font-family:inherit}
.form-input:focus{border-color:var(--pink)}
.score-msg-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.score-msg-item label{font-size:11px;font-weight:700;color:var(--mt);margin-bottom:5px;display:flex;align-items:center;gap:5px}
.score-dot{width:7px;height:7px;border-radius:50%}
.score-msg-item textarea{width:100%;padding:9px 11px;border:1px solid var(--bd);border-radius:8px;font-size:12px;color:var(--tx);background:var(--wh);outline:none;resize:vertical;min-height:56px;font-family:inherit;transition:border .15s;line-height:1.5}
.score-msg-item textarea:focus{border-color:var(--pink)}
.score-msg-full{grid-column:span 2}
.feedback-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:9px}
.feedback-item label{font-size:11px;font-weight:700;color:var(--mt);margin-bottom:4px;display:block;text-align:center}
.feedback-item input{width:100%;padding:8px 7px;border:1px solid var(--bd);border-radius:8px;font-size:12px;color:var(--tx);text-align:center;background:var(--wh);outline:none;font-family:inherit;transition:border .15s}
.feedback-item input:focus{border-color:var(--pink)}
.hw-type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.hw-type-item label{font-size:11px;font-weight:700;color:var(--mt);margin-bottom:5px;display:block}
.hw-type-item input{width:100%;padding:9px 11px;border:1px solid var(--bd);border-radius:8px;font-size:12px;color:var(--tx);background:var(--wh);outline:none;font-family:inherit;transition:border .15s}
.hw-type-item input:focus{border-color:var(--pink)}
.hw-default-grid{display:grid;grid-template-columns:1fr;gap:10px}
.hw-default-item label{font-size:12px;font-weight:700;color:var(--tx);margin-bottom:5px;display:block}
.hw-default-item textarea{width:100%;padding:9px 13px;border:1px solid var(--bd);border-radius:8px;font-size:12px;color:var(--tx);background:var(--wh);outline:none;resize:vertical;min-height:64px;font-family:inherit;transition:border .15s;line-height:1.6}
.hw-default-item textarea:focus{border-color:var(--pink)}
/* ══ 미리보기 ══ */
.preview-sticky{position:sticky;top:64px}
.preview-card{background:var(--wh);border:1px solid #fbcfe8;border-radius:var(--r);overflow:hidden}
.preview-header{padding:14px 18px;border-bottom:1px solid #fce7f3;background:var(--pink-lt);display:flex;align-items:center;gap:8px}
.preview-header h3{font-size:13px;font-weight:700;color:var(--pink)}
.preview-body{padding:18px}
.sms-bubble{background:var(--pink-lt);border:1px solid #fbcfe8;border-radius:10px;padding:14px;font-size:12px;line-height:1.8;color:var(--tx);white-space:pre-wrap;font-family:inherit;min-height:180px}
.preview-meta{margin-top:8px;font-size:11px;color:var(--mt);text-align:right}
/* ══ 저장 바 ══ */
.save-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:var(--mw);background:var(--wh);border-top:1px solid #fce7f3;padding:12px 28px;z-index:50}
.btn-save{width:100%;padding:13px;background:linear-gradient(135deg,var(--pink),var(--pink-dk));color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .15s;font-family:inherit;box-shadow:0 4px 14px rgba(236,72,153,.30)}
.btn-save:hover{opacity:.9}
.toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%) translateY(20px);background:#1e293b;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:500;opacity:0;transition:opacity .3s,transform .3s;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:900px){.layout{grid-template-columns:1fr}.preview-sticky{position:static}.score-msg-grid{grid-template-columns:1fr}.score-msg-full{grid-column:span 1}.feedback-grid{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>
<div class="app-wrapper">
<!-- ══ 공통 탑바 ══ -->
<header class="topbar">
  <a href="index.html" class="logo-area">
    <div class="logo-icon">
      <svg width="16" height="16" viewBox="0 0 18 18" fill="none">
        <circle cx="9" cy="7" r="3" fill="rgba(255,255,255,0.9)"/>
        <path d="M3.5 16c0-3 2.5-5.5 5.5-5.5s5.5 2.5 5.5 5.5"
              stroke="rgba(255,255,255,0.9)" stroke-width="1.4" stroke-linecap="round" fill="none"/>
      </svg>
    </div>
    <span class="logo-name">베타과학학원</span>
  </a>
  <div class="topbar-divider"></div>
  <nav>
    <ul class="nav-tabs">
      <li><a href="dashboard.html">대시보드</a></li>
      <li><a href="students.html">학생 관리</a></li>
      <li><a href="special.html">특별관리</a></li>
      <li><a href="sms.html" class="active">SMS설정</a></li>
      <li><a href="management.html">학원관리</a></li>
      <li><a href="teacher-board.html">선생님 게시판</a></li>
    </ul>
  </nav>
  <div class="topbar-right">
    <span class="badge-admin">관리자 모드</span>
    <button class="btn-logout" onclick="doLogout()">로그아웃</button>
  </div>
</header>

<main class="main-content">
  <div class="page-header">
    <h1><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>SMS 문자 설정</h1>
    <p>학부모에게 발송되는 성적 알림 문자의 내용을 설정하세요</p>
  </div>
  <div class="layout">
    <div>
      <div class="card">
        <div class="card-header"><h2>학원 정보</h2></div>
        <div class="card-body">
          <div class="form-group">
            <label>학원명</label>
            <input class="form-input" id="academyName" type="text" value="베타과학학원" oninput="updatePreview()">
            <div class="hint">문자 발송 시 "[학원명 성적알림]" 형태로 표시됩니다</div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><h2>점수별 평가 메시지</h2></div>
        <div class="card-body">
          <div class="score-msg-grid">
            <div class="score-msg-item"><label><span class="score-dot" style="background:#10b981"></span>90점 이상</label><textarea id="msg90" oninput="updatePreview()">훌륭합니다!</textarea></div>
            <div class="score-msg-item"><label><span class="score-dot" style="background:#ec4899"></span>80점 이상</label><textarea id="msg80" oninput="updatePreview()">잘했어요!</textarea></div>
            <div class="score-msg-item"><label><span class="score-dot" style="background:#f59e0b"></span>70점 이상</label><textarea id="msg70" oninput="updatePreview()">조금만 더 노력하면 완벽해요!</textarea></div>
            <div class="score-msg-item"><label><span class="score-dot" style="background:#f97316"></span>60점 이상</label><textarea id="msg60" oninput="updatePreview()">조금 더 복습이 필요해요.</textarea></div>
            <div class="score-msg-item score-msg-full"><label><span class="score-dot" style="background:#ef4444"></span>60점 미만</label><textarea id="msg59" oninput="updatePreview()">열심히 복습해주세요!</textarea></div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><h2>파트별 점수 피드백</h2></div>
        <div class="card-body">
          <div class="feedback-grid">
            <div class="feedback-item"><label>90% 이상</label><input id="fb90" type="text" value="우수" oninput="updatePreview()"></div>
            <div class="feedback-item"><label>80% 이상</label><input id="fb80" type="text" value="양호" oninput="updatePreview()"></div>
            <div class="feedback-item"><label>70% 이상</label><input id="fb70" type="text" value="보통" oninput="updatePreview()"></div>
            <div class="feedback-item"><label>60% 이상</label><input id="fb60" type="text" value="노력" oninput="updatePreview()"></div>
            <div class="feedback-item"><label>60% 미만</label><input id="fb59" type="text" value="복습필요" oninput="updatePreview()"></div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><h2>과제 유형명</h2></div>
        <div class="card-body">
          <div class="hw-type-grid">
            <div class="hw-type-item"><label>0-2개 오답</label><input id="hwType1" type="text" value="기본" oninput="updatePreview()"></div>
            <div class="hw-type-item"><label>3-4개 오답</label><input id="hwType2" type="text" value="보충" oninput="updatePreview()"></div>
            <div class="hw-type-item"><label>5개 이상 오답</label><input id="hwType3" type="text" value="심화" oninput="updatePreview()"></div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><h2>기본 과제 내용</h2><p>테스트별 과제가 설정되지 않았을 때 사용됩니다</p></div>
        <div class="card-body">
          <div class="hw-default-grid">
            <div class="hw-default-item"><label>0-2개 오답 과제</label><textarea id="hw1" oninput="updatePreview()">시험지에 오답문제 정리해오기</textarea></div>
            <div class="hw-default-item"><label>3-4개 오답 과제</label><textarea id="hw2" oninput="updatePreview()">수업노트 필기 다시하고 오답문제 정리하기</textarea></div>
            <div class="hw-default-item"><label>5개 이상 오답 과제</label><textarea id="hw3" oninput="updatePreview()">동영상 수업 내용복습, 수업노트 필기, 오답정리해오기</textarea></div>
          </div>
        </div>
      </div>
    </div>
    <div class="preview-sticky">
      <div class="preview-card">
        <div class="preview-header">
          <svg width="14" height="14" fill="none" stroke="var(--pink)" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <h3>문자 미리보기</h3>
        </div>
        <div class="preview-body">
          <div class="sms-bubble" id="previewBubble"></div>
          <div class="preview-meta">샘플: 홍길동 학생 / 70점 / 오답 3개</div>
        </div>
      </div>
    </div>
  </div>
</main>
<div class="save-bar">
  <button class="btn-save" onclick="saveSettings()">
    <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    SMS 설정 저장
  </button>
</div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getAuth,onAuthStateChanged,signOut}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import{getFirestore,doc,getDoc}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const fc={apiKey:"AIzaSyD5MQx_rXO_xRYelyKxK090TaKa3Gg2D3k",authDomain:"beta-science.firebaseapp.com",projectId:"beta-science",storageBucket:"beta-science.firebasestorage.app",messagingSenderId:"650652155367",appId:"1:650652155367:web:41d2958e675cb4edd4d142"};
const app=initializeApp(fc),auth=getAuth(app),db=getFirestore(app);
onAuthStateChanged(auth,async u=>{if(!u){window.location.replace("/login.html");return;}try{const s=await getDoc(doc(db,"users",u.uid));if(!s.exists()||s.data().status!=="approved"){await signOut(auth);window.location.replace("/login.html");return;}document.body.style.visibility="visible";}catch(e){window.location.replace("/login.html");}});
window.doLogout=async function(){await signOut(auth);window.location.replace("/login.html");};
</script>
<script>
function updatePreview(){
  const ac=document.getElementById('academyName').value||'베타과학학원';
  const msg=document.getElementById('msg70').value||'조금만 더 노력하면 완벽해요!';
  const hw2=document.getElementById('hw2').value||'수업노트 필기 다시하고 오답문제 정리하기';
  const fb90=document.getElementById('fb90').value||'우수';
  const fb70=document.getElementById('fb70').value||'보통';
  const fb59=document.getElementById('fb59').value||'복습필요';
  document.getElementById('previewBubble').textContent=`[${ac} 성적알림]\n\n홍길동 학생\n1주차 통합과학 결과\n\n12/31 테스트 결과\n총점: 70점\n정답: 21/30문항\n${msg}\n\n[파트별 성적]\n세포의 구조: 8/10 (${fb90})\n세포 분열: 7/10 (${fb70})\nDNA 구조: 6/10 (${fb59})\n\n[보충 과제]\n세포의 구조(기본): 시험지에 오답문제 정리해오기\n세포 분열(보충): ${hw2}\nDNA 구조(심화): 동영상 수업 내용복습, 수업노트 필기, 오답정리해오기\n\n문의: ${ac}`;
}
function saveSettings(){showToast('✓ SMS 설정이 저장되었습니다');}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
updatePreview();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><script src="/favicon.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>SMS설정 - 베타과학학원</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Helvetica Neue',Arial,sans-serif;background:#fafafa;color:#1d1d1f;min-height:100vh;-webkit-font-smoothing:antialiased;visibility:hidden;overscroll-behavior:none}

/* ── Header ── */
.header{background:#fff;border-bottom:1px solid #f0e8ed;padding:0 1.2rem;padding-left:max(1.2rem,env(safe-area-inset-left));padding-right:max(1.2rem,env(safe-area-inset-right));height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:300}
.header-left{display:flex;align-items:center;gap:9px;text-decoration:none;color:inherit;cursor:pointer;transition:opacity .15s}
.header-left:hover{opacity:.75}
.logo-mark{width:30px;height:30px;background:linear-gradient(135deg,#f472b6 0%,#db2777 100%);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand-name{font-size:14px;font-weight:600;color:#1d1d1f;letter-spacing:-.3px}
.header-badge{display:flex;align-items:center;gap:5px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:20px;padding:4px 10px;font-size:10px;font-weight:600;color:#16a34a;white-space:nowrap}
.dot-green{width:5px;height:5px;background:#22c55e;border-radius:50%;animation:blink 2s ease-in-out infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.logout-btn{padding:7px 14px;min-height:36px;background:transparent;border:1.5px solid #f4c8d4;border-radius:20px;font-family:inherit;font-size:12px;font-weight:600;color:#e8375a;cursor:pointer;white-space:nowrap;transition:background .15s}
.logout-btn:hover,.logout-btn:active{background:#fceef2}

/* ── Page Nav ── */
.page-nav{background:#fff;border-bottom:1px solid #f0e8ed;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;position:sticky;top:54px;z-index:200}
.page-nav::-webkit-scrollbar{display:none}
.page-nav-inner{display:flex;padding:0;width:100%;justify-content:space-evenly;}
.pnav-a{display:block;padding:11px 13px;font-size:13px;font-weight:500;color:#aeaeb2;text-decoration:none;white-space:nowrap;border-bottom:2px solid transparent;transition:all .15s}
.pnav-a:hover{color:#1d1d1f}
.pnav-a.on{color:#db2777;border-bottom-color:#db2777;font-weight:600}

/* ── Wrap ── */
.wrap{padding:1.4rem 1.2rem;padding-bottom:max(6rem,calc(5rem + env(safe-area-inset-bottom)));padding-left:max(1.2rem,env(safe-area-inset-left));padding-right:max(1.2rem,env(safe-area-inset-right));flex:1}

/* ── Page Hero ── */
.page-hero{background:linear-gradient(135deg,#fff0f7 0%,#fdf2f8 60%,#f0f9ff 100%);border:1px solid #fce7f3;border-radius:18px;padding:1.2rem 1.4rem;margin-bottom:1.4rem;display:flex;align-items:center;gap:12px}
.hero-icon{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#f472b6,#db2777);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;box-shadow:0 4px 12px rgba(219,39,119,.25)}
.hero-title{font-size:1.05rem;font-weight:700;letter-spacing:-.03em}
.hero-sub{font-size:11px;color:#aeaeb2;margin-top:3px}

/* ── Section heading ── */
.section-heading{font-size:11px;font-weight:700;color:#aeaeb2;letter-spacing:.08em;text-transform:uppercase;margin-bottom:.8rem}

/* ── Layout ── */
.layout{display:flex;flex-direction:column;gap:1rem}
.form-col{flex:1;min-width:0}
.preview-panel{width:100%}

/* ── Card ── */
.card{background:#fff;border:1px solid #fce7f3;border-radius:16px;margin-bottom:1rem;overflow:hidden;transition:border-color .15s}
.card:last-child{margin-bottom:0}
.card:hover{border-color:#fbcfe8}
.card-header{padding:1rem 1.2rem;border-bottom:1px solid #fce7f3}
.card-header h2{font-size:14px;font-weight:700}
.card-header p{font-size:11px;color:#aeaeb2;margin-top:3px}
.card-body{padding:1.1rem 1.2rem}

/* ── Form ── */
.form-group{margin-bottom:1rem}
.form-group:last-child{margin-bottom:0}
.form-group label{display:block;font-size:12px;font-weight:700;color:#1d1d1f;margin-bottom:6px}
.form-group .hint{font-size:11px;color:#aeaeb2;margin-top:5px}
.form-input{width:100%;padding:11px 13px;min-height:44px;border:1.5px solid #fce7f3;border-radius:10px;font-size:16px;color:#1d1d1f;background:#fff;outline:none;transition:border .15s;font-family:inherit;-webkit-appearance:none;appearance:none}
.form-input:focus{border-color:#db2777}

/* ── Score Msg Grid ── */
.score-msg-grid{display:grid;grid-template-columns:1fr;gap:10px}
.score-msg-item label{font-size:12px;font-weight:700;color:#aeaeb2;margin-bottom:5px;display:flex;align-items:center;gap:5px}
.score-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.score-msg-item textarea{width:100%;padding:10px 13px;min-height:44px;border:1.5px solid #fce7f3;border-radius:10px;font-size:16px;color:#1d1d1f;background:#fff;outline:none;resize:vertical;font-family:inherit;transition:border .15s;line-height:1.5;-webkit-appearance:none}
.score-msg-item textarea:focus{border-color:#db2777}

/* ── Feedback Grid ── */
.feedback-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.feedback-item label{font-size:11px;font-weight:700;color:#aeaeb2;margin-bottom:4px;display:block;text-align:center}
.feedback-item input{width:100%;padding:9px 7px;min-height:44px;border:1.5px solid #fce7f3;border-radius:10px;font-size:15px;color:#1d1d1f;text-align:center;background:#fff;outline:none;font-family:inherit;transition:border .15s;-webkit-appearance:none}
.feedback-item input:focus{border-color:#db2777}

/* ── Homework Type ── */
.hw-type-grid{display:grid;grid-template-columns:1fr;gap:10px}
.hw-type-item label{font-size:12px;font-weight:700;color:#1d1d1f;margin-bottom:5px;display:block}
.hw-type-item input{width:100%;padding:10px 13px;min-height:44px;border:1.5px solid #fce7f3;border-radius:10px;font-size:16px;color:#1d1d1f;background:#fff;outline:none;font-family:inherit;transition:border .15s;-webkit-appearance:none}
.hw-type-item input:focus{border-color:#db2777}

/* ── HW Default ── */
.hw-default-item{margin-bottom:.9rem}
.hw-default-item:last-child{margin-bottom:0}
.hw-default-item label{font-size:12px;font-weight:700;color:#1d1d1f;margin-bottom:5px;display:block}
.hw-default-item textarea{width:100%;padding:10px 13px;min-height:44px;border:1.5px solid #fce7f3;border-radius:10px;font-size:16px;color:#1d1d1f;background:#fff;outline:none;resize:vertical;min-height:60px;font-family:inherit;transition:border .15s;line-height:1.6;-webkit-appearance:none}
.hw-default-item textarea:focus{border-color:#db2777}

/* ── Preview ── */
.preview-toggle-btn{width:100%;padding:12px;background:#fff0f7;border:1.5px solid #fce7f3;border-radius:12px;font-size:13px;font-weight:600;color:#db2777;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s;margin-bottom:1rem}
.preview-toggle-btn:hover{background:#fce7f3}
.preview-content{display:none}
.preview-content.show{display:block}
.preview-card{background:#fff;border:1.5px solid #fce7f3;border-radius:16px;overflow:hidden}
.preview-header{padding:.9rem 1.1rem;border-bottom:1px solid #fce7f3;background:#fff0f7;display:flex;align-items:center;gap:8px}
.preview-header h3{font-size:13px;font-weight:700;color:#db2777}
.preview-body{padding:1.1rem}
.sms-bubble{background:#fff0f7;border:1.5px solid #fce7f3;border-radius:12px;padding:1rem 1.1rem;font-size:13px;line-height:1.9;color:#1d1d1f;white-space:pre-wrap;font-family:inherit;min-height:160px}
.preview-meta{margin-top:8px;font-size:11px;color:#aeaeb2;text-align:right}

/* ── Save Bar ── */
.save-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.95);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-top:1px solid #fce7f3;padding:10px 1.2rem;padding-bottom:max(10px,env(safe-area-inset-bottom));z-index:50}
.btn-save{width:100%;max-width:480px;display:block;margin:0 auto;padding:14px;background:linear-gradient(135deg,#f472b6,#db2777);color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 4px 16px rgba(219,39,119,.3);transition:opacity .15s}
.btn-save:hover{opacity:.9}
.btn-save:active{opacity:.8}

/* ── Toast ── */
.toast{position:fixed;bottom:6rem;left:50%;transform:translateX(-50%) translateY(20px);background:#1d1d1f;color:#fff;padding:11px 22px;border-radius:12px;font-size:13px;font-weight:500;opacity:0;transition:opacity .3s,transform .3s;z-index:999;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Responsive ── */
@media(max-width:520px){
  .wrap{padding:.9rem .85rem}
  .header{padding:0 .9rem;height:50px}
  .page-nav{top:50px}
  .page-nav-inner{padding:0 .75rem}
  .brand-name{font-size:13px}
  .header-badge .dot-green{display:none}
  .page-hero{padding:.9rem 1rem;border-radius:14px}
  .card{border-radius:14px}
}
@media(min-width:600px){
  .score-msg-grid{grid-template-columns:1fr 1fr}
  .feedback-grid{grid-template-columns:repeat(5,1fr)}
  .hw-type-grid{grid-template-columns:repeat(3,1fr)}
}
@media(min-width:920px){
  .layout{flex-direction:row;align-items:flex-start}
  .preview-panel{width:360px;flex-shrink:0;position:sticky;top:calc(54px + 44px + 1.4rem)}
  .preview-toggle-btn{display:none}
  .preview-content{display:block!important}
  .save-bar{max-width:1100px;left:50%;right:auto;transform:translateX(-50%);width:100%;border-radius:0;padding:12px 1.2rem 12px}
}
</style>
</head>
<body>

<header class="header">
  <a href="index.html" class="header-left">
    <div class="logo-mark">
      <svg width="16" height="16" viewBox="0 0 18 18" fill="none">
        <circle cx="9" cy="7" r="3" fill="rgba(255,255,255,0.9)"/>
        <path d="M3.5 16c0-3 2.5-5.5 5.5-5.5s5.5 2.5 5.5 5.5" stroke="rgba(255,255,255,0.9)" stroke-width="1.4" stroke-linecap="round" fill="none"/>
      </svg>
    </div>
    <span class="brand-name">베타과학학원</span>
  </a>
  <div style="display:flex;align-items:center;gap:8px">
    <div class="header-badge"><span class="dot-green"></span>ONLINE</div>
    <button class="logout-btn" onclick="doLogout()">로그아웃</button>
  </div>
</header>

<nav class="page-nav">
  <div class="page-nav-inner">
    <a href="dashboard.html" class="pnav-a">대시보드</a>
    <a href="students.html" class="pnav-a">학생 관리</a>
    <a href="special.html" class="pnav-a">특별관리</a>
    <a href="sms.html" class="pnav-a on">SMS설정</a>
    <a href="management.html" class="pnav-a">학원관리</a>
    <a href="teacher-board.html" class="pnav-a">선생님 게시판</a><a href="backup.html" class="pnav-a">백업</a>
  </div>
</nav>

<div class="wrap">
  <!-- Page Hero -->
  <div class="page-hero">
    <div class="hero-icon">💬</div>
    <div>
      <div class="hero-title">SMS 문자 설정</div>
      <div class="hero-sub">학부모에게 발송되는 성적 알림 문자의 내용을 설정하세요</div>
    </div>
  </div>

  <div class="layout">
    <div class="form-col">
      <!-- 학원 정보 -->
      <div class="section-heading">BASIC</div>
      <div class="card">
        <div class="card-header"><h2>학원 정보</h2></div>
        <div class="card-body">
          <div class="form-group">
            <label>학원명</label>
            <input class="form-input" id="academyName" type="text" value="베타과학학원" oninput="updatePreview()">
            <div class="hint">문자 발송 시 "[학원명 성적알림]" 형태로 표시됩니다</div>
          </div>
        </div>
      </div>

      <!-- 점수별 평가 메시지 -->
      <div class="section-heading">MESSAGES</div>
      <div class="card">
        <div class="card-header"><h2>점수별 평가 메시지</h2></div>
        <div class="card-body">
          <div class="score-msg-grid">
            <div class="score-msg-item"><label><span class="score-dot" style="background:#16a34a"></span>90점 이상</label><textarea id="msg90" oninput="updatePreview()">훌륭합니다!</textarea></div>
            <div class="score-msg-item"><label><span class="score-dot" style="background:#db2777"></span>80점 이상</label><textarea id="msg80" oninput="updatePreview()">잘했어요!</textarea></div>
            <div class="score-msg-item"><label><span class="score-dot" style="background:#d97706"></span>70점 이상</label><textarea id="msg70" oninput="updatePreview()">조금만 더 노력하면 완벽해요!</textarea></div>
            <div class="score-msg-item"><label><span class="score-dot" style="background:#ea580c"></span>60점 이상</label><textarea id="msg60" oninput="updatePreview()">조금 더 복습이 필요해요.</textarea></div>
            <div class="score-msg-item"><label><span class="score-dot" style="background:#dc2626"></span>60점 미만</label><textarea id="msg59" oninput="updatePreview()">열심히 복습해주세요!</textarea></div>
          </div>
        </div>
      </div>

      <!-- 파트별 점수 피드백 -->
      <div class="section-heading">FEEDBACK</div>
      <div class="card">
        <div class="card-header"><h2>파트별 점수 피드백</h2></div>
        <div class="card-body">
          <div class="feedback-grid">
            <div class="feedback-item"><label>90% 이상</label><input id="fb90" type="text" value="우수" oninput="updatePreview()"></div>
            <div class="feedback-item"><label>80% 이상</label><input id="fb80" type="text" value="양호" oninput="updatePreview()"></div>
            <div class="feedback-item"><label>70% 이상</label><input id="fb70" type="text" value="보통" oninput="updatePreview()"></div>
            <div class="feedback-item"><label>60% 이상</label><input id="fb60" type="text" value="노력" oninput="updatePreview()"></div>
            <div class="feedback-item"><label>60% 미만</label><input id="fb59" type="text" value="복습필요" oninput="updatePreview()"></div>
          </div>
        </div>
      </div>

      <!-- 과제 유형명 -->
      <div class="section-heading">HOMEWORK</div>
      <div class="card">
        <div class="card-header"><h2>과제 유형명</h2></div>
        <div class="card-body">
          <div class="hw-type-grid">
            <div class="hw-type-item"><label>0-2개 오답</label><input id="hwType1" type="text" value="기본" oninput="updatePreview()"></div>
            <div class="hw-type-item"><label>3-4개 오답</label><input id="hwType2" type="text" value="보충" oninput="updatePreview()"></div>
            <div class="hw-type-item"><label>5개 이상 오답</label><input id="hwType3" type="text" value="심화" oninput="updatePreview()"></div>
          </div>
        </div>
      </div>

      <!-- 기본 과제 내용 -->
      <div class="card">
        <div class="card-header"><h2>기본 과제 내용</h2><p>테스트별 과제가 설정되지 않았을 때 사용됩니다</p></div>
        <div class="card-body">
          <div class="hw-default-item"><label>0-2개 오답 과제</label><textarea id="hw1" oninput="updatePreview()">시험지에 오답문제 정리해오기</textarea></div>
          <div class="hw-default-item"><label>3-4개 오답 과제</label><textarea id="hw2" oninput="updatePreview()">수업노트 필기 다시하고 오답문제 정리하기</textarea></div>
          <div class="hw-default-item"><label>5개 이상 오답 과제</label><textarea id="hw3" oninput="updatePreview()">동영상 수업 내용복습, 수업노트 필기, 오답정리해오기</textarea></div>
        </div>
      </div>
    </div>

    <!-- Preview Panel -->
    <div class="preview-panel">
      <button class="preview-toggle-btn" onclick="togglePreview()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span id="previewToggleText">문자 미리보기 보기</span>
      </button>
      <div class="preview-content" id="previewContent">
        <div class="preview-card">
          <div class="preview-header">
            <svg width="14" height="14" fill="none" stroke="#db2777" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <h3>문자 미리보기</h3>
          </div>
          <div class="preview-body">
            <div class="sms-bubble" id="previewBubble"></div>
            <div class="preview-meta">샘플: 홍길동 학생 / 70점 / 오답 3개</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="save-bar">
  <button class="btn-save" onclick="saveSettings()">
    <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" style="display:inline;vertical-align:middle;margin-right:6px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    SMS 설정 저장
  </button>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getAuth,onAuthStateChanged,signOut}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import{getFirestore,doc,getDoc}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const fc={apiKey:"AIzaSyD5MQx_rXO_xRYelyKxK090TaKa3Gg2D3k",authDomain:"beta-science.firebaseapp.com",projectId:"beta-science",storageBucket:"beta-science.firebasestorage.app",messagingSenderId:"650652155367",appId:"1:650652155367:web:41d2958e675cb4edd4d142"};
const app=initializeApp(fc),auth=getAuth(app),db=getFirestore(app);
onAuthStateChanged(auth,async u=>{if(!u){window.location.replace("/login.html");return;}try{const s=await getDoc(doc(db,"users",u.uid));if(!s.exists()||s.data().status!=="approved"){await signOut(auth);window.location.replace("/login.html");return;}document.body.style.visibility="visible";}catch(e){window.location.replace("/login.html");}});
window.doLogout=async function(){await signOut(auth);window.location.replace("/login.html");};
</script>
<script>
function updatePreview(){const ac=document.getElementById('academyName').value||'베타과학학원';const msg=document.getElementById('msg70').value||'조금만 더 노력하면 완벽해요!';const hw2=document.getElementById('hw2').value||'수업노트 필기 다시하고 오답문제 정리하기';const fb90=document.getElementById('fb90').value||'우수';const fb70=document.getElementById('fb70').value||'보통';const fb59=document.getElementById('fb59').value||'복습필요';document.getElementById('previewBubble').textContent=`[${ac} 성적알림]\n\n홍길동 학생\n1주차 통합과학 결과\n\n12/31 테스트 결과\n총점: 70점\n정답: 21/30문항\n${msg}\n\n[파트별 성적]\n세포의 구조: 8/10 (${fb90})\n세포 분열: 7/10 (${fb70})\nDNA 구조: 6/10 (${fb59})\n\n[보충 과제]\n세포의 구조(기본): 시험지에 오답문제 정리해오기\n세포 분열(보충): ${hw2}\nDNA 구조(심화): 동영상 수업 내용복습, 수업노트 필기, 오답정리해오기\n\n문의: ${ac}`;}
function togglePreview(){const content=document.getElementById('previewContent');const btn=document.getElementById('previewToggleText');const isShow=content.classList.toggle('show');btn.textContent=isShow?'문자 미리보기 닫기':'문자 미리보기 보기';}
function saveSettings(){showToast('✓ SMS 설정이 저장되었습니다');}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
updatePreview();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 140 140'><polygon points='70,8 121,38 121,102 70,132 19,102 19,38' fill='none' stroke='%23E85D75' stroke-width='8' stroke-linejoin='round'/><polygon points='70,38 97,53 97,87 70,102 43,87 43,53' fill='none' stroke='%23E85D75' stroke-width='4' stroke-linejoin='round' stroke-dasharray='10 6'/><circle cx='70' cy='8' r='10' fill='%23E85D75'/><circle cx='121' cy='38' r='10' fill='%23E85D75'/><circle cx='121' cy='102' r='10' fill='%23E85D75'/><circle cx='70' cy='132' r='10' fill='%23E85D75'/><circle cx='19' cy='102' r='10' fill='%23E85D75'/><circle cx='19' cy='38' r='10' fill='%23E85D75'/></svg>">
<title>주간 학습 클리닉 · 베타과학학원</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
  background: #fafafa; color: #1d1d1f; min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Header ── */
.header {
  background: #ffffff; border-bottom: 1px solid #f0e8ed;
  padding: 0 1rem;
  padding-left: max(1rem, env(safe-area-inset-left));
  padding-right: max(1rem, env(safe-area-inset-right));
  height: 54px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 300;
}
.header-left { display: flex; align-items: center; gap: 9px; }
.logo-mark {
  width: 30px; height: 30px;
  background: linear-gradient(135deg, #f472b6 0%, #db2777 100%);
  border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.brand-name { font-size: 14px; font-weight: 600; color: #1d1d1f; letter-spacing: -0.3px; }
.header-badge {
  display: flex; align-items: center; gap: 5px;
  background: #f0fdf4; border: 1px solid #bbf7d0;
  border-radius: 20px; padding: 4px 10px;
  font-size: 10px; font-weight: 600; color: #16a34a; white-space: nowrap;
}
.dot-green { width: 5px; height: 5px; background: #22c55e; border-radius: 50%; animation: blink 2s ease-in-out infinite; flex-shrink: 0; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── Layout ── */
.wrap {
  max-width: 760px; margin: 0 auto;
  padding: 1.2rem 0.9rem 4rem;
  padding-bottom: max(4rem, calc(3rem + env(safe-area-inset-bottom)));
  padding-left: max(0.9rem, env(safe-area-inset-left));
  padding-right: max(0.9rem, env(safe-area-inset-right));
}

/* ── Welcome ── */
.welcome-bar {
  background: linear-gradient(135deg, #fff0f7 0%, #fdf2f8 60%, #f0f9ff 100%);
  border: 1px solid #fce7f3; border-radius: 18px;
  padding: 1.3rem 1.4rem; margin-bottom: 1.4rem;
  display: flex; align-items: center; gap: 12px;
}
.welcome-avatar {
  width: 46px; height: 46px; border-radius: 50%;
  background: linear-gradient(135deg, #f472b6, #db2777);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
  box-shadow: 0 4px 12px rgba(219,39,119,0.25);
}
.welcome-greeting { font-size: 1.15rem; font-weight: 700; color: #1d1d1f; letter-spacing: -0.03em; }
.welcome-sub { font-size: 12px; color: #6e6e73; margin-top: 4px; font-weight: 500; }

/* ── 카운트 칩 ── */
.count-row { display:flex; gap:7px; flex-wrap:wrap; margin-bottom:1.2rem; }
.count-chip { background:#fff; border:1px solid #fce7f3; border-radius:20px; padding:6px 14px; font-size:12px; font-weight:600; color:#db2777; }

/* ── 섹션 라벨 ── */
.section-label { font-size: 10px; font-weight: 700; color: #aeaeb2; letter-spacing: 0.1em; text-transform: uppercase; margin: 1.4rem 0 0.7rem; }

/* ── 핵심내용 박스 ── */
.concept-box {
  background:#fff; border:1px solid #fce7f3; border-left:3px solid #db2777;
  border-radius:14px; padding:1.1rem 1.2rem; margin-bottom:.8rem;
}
.concept-title { font-size:13.5px; font-weight:700; color:#be185d; margin-bottom:.5rem; }
.concept-body { font-size:13.5px; color:#3c3c43; line-height:1.8; white-space:pre-line; }

/* ── 퀴즈 박스 ── */
.quiz-box { background:#fff; border:1px solid #fce7f3; border-radius:16px; padding:1.2rem 1.3rem; margin-bottom:.8rem; }
.quiz-label { font-size:10px; font-weight:700; color:#db2777; letter-spacing:0.08em; text-transform:uppercase; margin-bottom:.7rem; }
.quiz-q { font-size:14.5px; font-weight:600; color:#1d1d1f; line-height:1.7; margin-bottom:.9rem; white-space:pre-line; }

.choices { display:flex; flex-direction:column; gap:8px; margin-bottom:.9rem; }
.choice {
  display:flex; align-items:flex-start; gap:10px;
  background:#fafafa; border:1.5px solid #fce7f3; border-radius:11px;
  padding:11px 13px; font-size:14px; line-height:1.5; cursor:pointer; transition:all 0.15s;
}
.choice:active { transform:scale(0.99); }
.choice.selected { border-color:#db2777; background:#fdf2f8; }
.choice.correct { border-color:#059669; background:#ecfdf5; }
.choice.wrong { border-color:#dc2626; background:#fef2f2; }
.choice-mark { width:22px; height:22px; border-radius:7px; background:#fce7f3; color:#be185d; font-weight:800; font-size:12px; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
.choice.correct .choice-mark { background:#a7f3d0; color:#065f46; }
.choice.wrong .choice-mark { background:#fecaca; color:#991b1b; }

.ox-btns { display:flex; gap:9px; margin-bottom:.9rem; }
.ox-btn {
  flex:1; background:#fafafa; border:1.5px solid #fce7f3; border-radius:12px;
  padding:14px 0; font-size:18px; font-weight:800; color:#be185d; transition:all 0.15s; cursor:pointer; font-family:inherit;
}
.ox-btn:active { transform:scale(0.98); }
.ox-btn.selected { border-color:#db2777; background:#fdf2f8; }
.ox-btn.correct { border-color:#059669; background:#ecfdf5; color:#059669; }
.ox-btn.wrong { border-color:#dc2626; background:#fef2f2; color:#dc2626; }

.quiz-toggle {
  background: linear-gradient(135deg,#f472b6,#db2777); color:#fff; border:none;
  border-radius:20px; padding:9px 20px; min-height:40px;
  font-size:13px; font-weight:600; cursor:pointer; font-family:inherit;
  box-shadow:0 2px 8px rgba(219,39,119,0.25); transition:opacity 0.15s;
}
.quiz-toggle:active { opacity:0.8; }
.quiz-ans {
  display:none; margin-top:.9rem; padding:1rem 1.1rem;
  background:#fafafa; border:1px solid #f0e8ed; border-radius:12px;
  font-size:13.5px; color:#3c3c43; line-height:1.8; white-space:pre-line;
}
.quiz-ans.show { display:block; }
.quiz-ans .res { font-weight:800; font-size:14px; margin-bottom:.4rem; display:block; }
.quiz-ans .res.o { color:#059669; }
.quiz-ans .res.x { color:#dc2626; }

.footer { text-align:center; color:#c7c7cc; font-size:11px; margin-top:2.5rem; line-height:1.7; }

.state { text-align:center; color:#aeaeb2; font-size:14px; padding:4rem 1rem; line-height:1.9; }
.state .big { font-size:2.4rem; display:block; margin-bottom:.7rem; }

@media (max-width: 520px) {
  .wrap { padding: 1rem 0.75rem 3.5rem; }
  .brand-name { font-size: 13px; }
  .header-badge .dot-green { display:none; }
  .welcome-bar { padding: 1.1rem 1.1rem; }
  .welcome-greeting { font-size: 1.08rem; }
  .quiz-box { padding: 1.1rem 1.1rem; }
  .quiz-q { font-size: 14px; }
  .choice { font-size: 13.5px; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <div class="logo-mark">
      <svg width="16" height="16" viewBox="0 0 18 18" fill="none">
        <circle cx="9" cy="7" r="3" fill="rgba(255,255,255,0.9)"/>
        <path d="M3.5 16c0-3 2.5-5.5 5.5-5.5s5.5 2.5 5.5 5.5" stroke="rgba(255,255,255,0.9)" stroke-width="1.4" stroke-linecap="round" fill="none"/>
      </svg>
    </div>
    <span class="brand-name">베타과학학원</span>
  </div>
  <div class="header-badge"><span class="dot-green"></span>ONLINE</div>
</header>

<div class="wrap">
  <div id="loading" class="state"><span class="big">⏳</span>불러오는 중…</div>
  <div id="error" class="state" style="display:none"></div>

  <div id="content" style="display:none">
    <div class="welcome-bar">
      <div class="welcome-avatar">🩺</div>
      <div>
        <div class="welcome-greeting" id="heroTitle"></div>
        <div class="welcome-sub" id="heroSub"></div>
      </div>
    </div>
    <div class="count-row" id="countRow"></div>
    <div id="items"></div>
    <div class="footer">베타과학학원 · 이 페이지는 학생 본인을 위한 주간 학습 클리닉입니다.</div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const cfg = {
  apiKey:"AIzaSyD5MQx_rXO_xRYelyKxK090TaKa3Gg2D3k",
  authDomain:"beta-science.firebaseapp.com",
  projectId:"beta-science",
  storageBucket:"beta-science.firebasestorage.app",
  messagingSenderId:"650652155367",
  appId:"1:650652155367:web:41d2958e675cb4edd4d142"
};
const app = initializeApp(cfg);
const db  = getFirestore(app);

const $ = id => document.getElementById(id);
function el(tag, cls, text){ const e=document.createElement(tag); if(cls)e.className=cls; if(text!=null)e.textContent=text; return e; }

function showError(msg){
  $('loading').style.display='none';
  const e=$('error'); e.innerHTML='';
  e.appendChild(el('span','big','🔒'));
  e.appendChild(document.createTextNode(msg));
  e.style.display='block';
}

function renderConcept(it){
  const box=el('div','concept-box');
  if(it.title) box.appendChild(el('div','concept-title', it.title));
  box.appendChild(el('div','concept-body', it.body||''));
  return box;
}
function renderLink(it){
  const a=document.createElement('a');
  a.className='concept-box';
  a.style.cssText='display:flex;align-items:center;justify-content:space-between;gap:10px;text-decoration:none;border-left-color:#2563eb;background:#eff6ff;border-color:#bfdbfe;';
  a.href=it.file||'#';
  const left=el('div');
  left.appendChild(el('div','concept-title', '📖 '+(it.title||'단원 정리'))).style.color='#1e40af';
  left.appendChild(el('div',null,'눌러서 단원 정리를 확인하세요')).style.cssText='font-size:12px;color:#6e6e73;margin-top:3px';
  const arrow=el('div',null,'›'); arrow.style.cssText='font-size:22px;color:#2563eb;font-weight:700;flex-shrink:0';
  a.append(left,arrow);
  return a;
}
function renderOX(it, idx){
  const w=el('div','quiz-box');
  w.appendChild(el('div','quiz-label', 'OX 문제 '+idx));
  w.appendChild(el('div','quiz-q', it.q||''));
  const btns=el('div','ox-btns');
  const oBtn=el('button','ox-btn','O'), xBtn=el('button','ox-btn','X');
  let picked=null;
  oBtn.addEventListener('click',()=>{picked=true;oBtn.classList.add('selected');xBtn.classList.remove('selected')});
  xBtn.addEventListener('click',()=>{picked=false;xBtn.classList.add('selected');oBtn.classList.remove('selected')});
  btns.append(oBtn,xBtn); w.appendChild(btns);
  const toggle=el('button','quiz-toggle','정답 확인 ▼');
  const ans=el('div','quiz-ans');
  ans.appendChild(el('span','res '+(it.answer?'o':'x'), '정답: '+(it.answer?'O':'X')));
  if(it.explain) ans.appendChild(document.createTextNode(it.explain));
  toggle.addEventListener('click',()=>{
    const open=ans.classList.toggle('show');
    toggle.textContent= open?'정답 닫기 ▲':'정답 확인 ▼';
    if(open){ (it.answer?oBtn:xBtn).classList.add('correct'); if(picked!==null && picked!==it.answer)(picked?oBtn:xBtn).classList.add('wrong'); }
  });
  w.append(toggle,ans); return w;
}
function renderMC(it, idx){
  const w=el('div','quiz-box');
  w.appendChild(el('div','quiz-label', '객관식 '+idx));
  w.appendChild(el('div','quiz-q', it.q||''));
  const list=el('div','choices'); const choiceEls=[]; let picked=null;
  (it.choices||[]).forEach((c,i)=>{
    const ch=el('div','choice');
    ch.appendChild(el('div','choice-mark', String(i+1)));
    ch.appendChild(el('div',null,c));
    ch.addEventListener('click',()=>{ picked=i; choiceEls.forEach(x=>x.classList.remove('selected')); ch.classList.add('selected'); });
    choiceEls.push(ch); list.appendChild(ch);
  });
  w.appendChild(list);
  const toggle=el('button','quiz-toggle','정답 확인 ▼');
  const ans=el('div','quiz-ans');
  ans.appendChild(el('span','res o', '정답: '+(Number(it.answer)+1)+'번'));
  if(it.explain) ans.appendChild(document.createTextNode(it.explain));
  toggle.addEventListener('click',()=>{
    const open=ans.classList.toggle('show');
    toggle.textContent= open?'정답 닫기 ▲':'정답 확인 ▼';
    if(open){ const a=Number(it.answer); choiceEls.forEach(x=>x.classList.remove('selected'));
      if(choiceEls[a]) choiceEls[a].classList.add('correct');
      if(picked!==null && picked!==a && choiceEls[picked]) choiceEls[picked].classList.add('wrong'); }
  });
  w.append(toggle,ans); return w;
}

async function load(){
  const params=new URLSearchParams(location.search);
  const token=params.get('t');
  if(!token){ showError('잘못된 접근입니다. 선생님이 보내주신 링크로 다시 접속해 주세요.'); return; }
  let snap;
  try{ snap=await getDoc(doc(db,'assignments',token)); }
  catch(err){ showError('내용을 불러오지 못했습니다. 잠시 후 다시 시도해 주세요.'); return; }
  if(!snap.exists()){ showError('링크가 올바르지 않거나 만료되었습니다. 선생님께 문의해 주세요.'); return; }

  const data=snap.data();
  const items=Array.isArray(data.items)?data.items:[];
  $('heroTitle').textContent = (data.studentName||'') + ' 학생';
  $('heroSub').textContent = data.weekLabel ? '📅 '+data.weekLabel : '이번 주 학습 클리닉';

  const nC=items.filter(i=>i.type==='concept'||i.type==='link').length;
  const nO=items.filter(i=>i.type==='ox').length;
  const nM=items.filter(i=>i.type==='mc').length;
  const row=$('countRow');
  if(nC) row.appendChild(el('span','count-chip','📖 핵심내용 '+nC));
  if(nO) row.appendChild(el('span','count-chip','⭕ OX '+nO));
  if(nM) row.appendChild(el('span','count-chip','📝 객관식 '+nM));

  const box=$('items'); let oxN=0, mcN=0;
  items.forEach(it=>{
    if(it.type==='concept') box.appendChild(renderConcept(it));
    else if(it.type==='link') box.appendChild(renderLink(it));
    else if(it.type==='ox') box.appendChild(renderOX(it, ++oxN));
    else if(it.type==='mc') box.appendChild(renderMC(it, ++mcN));
  });
  if(items.length===0) box.appendChild(el('div','state','등록된 학습 내용이 없습니다.'));

  $('loading').style.display='none';
  $('content').style.display='block';
}
load();
</script>
</body>
</html>

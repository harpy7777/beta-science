<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 140 140'><polygon points='70,8 121,38 121,102 70,132 19,102 19,38' fill='none' stroke='%23E85D75' stroke-width='8' stroke-linejoin='round'/><polygon points='70,38 97,53 97,87 70,102 43,87 43,53' fill='none' stroke='%23E85D75' stroke-width='4' stroke-linejoin='round' stroke-dasharray='10 6'/><circle cx='70' cy='8' r='10' fill='%23E85D75'/><circle cx='121' cy='38' r='10' fill='%23E85D75'/><circle cx='121' cy='102' r='10' fill='%23E85D75'/><circle cx='70' cy='132' r='10' fill='%23E85D75'/><circle cx='19' cy='102' r='10' fill='%23E85D75'/><circle cx='19' cy='38' r='10' fill='%23E85D75'/></svg>">
<title>주간 학습 클리닉 · 베타과학학원</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
  background: #fafafa; color: #1d1d1f; min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Header ── */
.header {
  background: #ffffff; border-bottom: 1px solid #f0e8ed;
  padding: 0 1rem;
  padding-left: max(1rem, env(safe-area-inset-left));
  padding-right: max(1rem, env(safe-area-inset-right));
  height: 54px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 300;
}
.header-left { display: flex; align-items: center; gap: 9px; }
.logo-mark {
  width: 30px; height: 30px;
  background: linear-gradient(135deg, #f472b6 0%, #db2777 100%);
  border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.brand-name { font-size: 14px; font-weight: 600; color: #1d1d1f; letter-spacing: -0.3px; }
.header-badge {
  display: flex; align-items: center; gap: 5px;
  background: #f0fdf4; border: 1px solid #bbf7d0;
  border-radius: 20px; padding: 4px 10px;
  font-size: 10px; font-weight: 600; color: #16a34a; white-space: nowrap;
}
.dot-green { width: 5px; height: 5px; background: #22c55e; border-radius: 50%; animation: blink 2s ease-in-out infinite; flex-shrink: 0; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── Layout ── */
.wrap {
  max-width: 760px; margin: 0 auto;
  padding: 1.2rem 0.9rem 5.5rem;
  padding-bottom: max(5.5rem, calc(4.5rem + env(safe-area-inset-bottom)));
  padding-left: max(0.9rem, env(safe-area-inset-left));
  padding-right: max(0.9rem, env(safe-area-inset-right));
}

/* ── Welcome ── */
.welcome-bar {
  background: linear-gradient(135deg, #fff0f7 0%, #fdf2f8 60%, #f0f9ff 100%);
  border: 1px solid #fce7f3; border-radius: 18px;
  padding: 1.3rem 1.4rem; margin-bottom: 1.4rem;
  display: flex; align-items: center; gap: 12px;
}
.welcome-avatar {
  width: 46px; height: 46px; border-radius: 50%;
  background: linear-gradient(135deg, #f472b6, #db2777);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
  box-shadow: 0 4px 12px rgba(219,39,119,0.25);
}
.welcome-greeting { font-size: 1.15rem; font-weight: 700; color: #1d1d1f; letter-spacing: -0.03em; }
.welcome-sub { font-size: 12px; color: #6e6e73; margin-top: 4px; font-weight: 500; }

/* ── 카운트 칩 ── */
.count-row { display:flex; gap:7px; flex-wrap:wrap; margin-bottom:1.2rem; }
.count-chip { background:#fff; border:1px solid #fce7f3; border-radius:20px; padding:6px 14px; font-size:12px; font-weight:600; color:#db2777; }

/* ── 섹션 라벨 ── */
.section-label { font-size: 10px; font-weight: 700; color: #aeaeb2; letter-spacing: 0.1em; text-transform: uppercase; margin: 1.4rem 0 0.7rem; }

/* ── 이어풀기 안내 ── */
.resume-bar {
  display:none; align-items:center; gap:9px;
  background:#eff6ff; border:1px solid #bfdbfe; border-radius:12px;
  padding:.8rem 1rem; margin-bottom:1rem; font-size:12.5px; color:#1e40af; line-height:1.5;
}
.resume-bar.show { display:flex; }
.resume-bar .ic { font-size:16px; flex-shrink:0; }

/* ── 핵심내용 박스 ── */
.concept-box {
  background:#fff; border:1px solid #fce7f3; border-left:3px solid #db2777;
  border-radius:14px; padding:1.1rem 1.2rem; margin-bottom:.8rem;
}
.concept-title { font-size:13.5px; font-weight:700; color:#be185d; margin-bottom:.5rem; }
.concept-body { font-size:13.5px; color:#3c3c43; line-height:1.8; white-space:pre-line; }

/* ── 퀴즈 박스 ── */
.quiz-box { background:#fff; border:1px solid #fce7f3; border-radius:16px; padding:1.2rem 1.3rem; margin-bottom:.8rem; }
.quiz-label { font-size:10px; font-weight:700; color:#db2777; letter-spacing:0.08em; text-transform:uppercase; margin-bottom:.7rem; display:flex; align-items:center; gap:7px; }
.quiz-badge { font-size:10px; font-weight:800; border-radius:20px; padding:2px 9px; letter-spacing:0; }
.quiz-badge.ok { background:#ecfdf5; color:#059669; border:1px solid #a7f3d0; }
.quiz-badge.no { background:#fef2f2; color:#dc2626; border:1px solid #fecaca; }
.quiz-q { font-size:14.5px; font-weight:600; color:#1d1d1f; line-height:1.7; margin-bottom:.9rem; white-space:pre-line; }

.choices { display:flex; flex-direction:column; gap:8px; margin-bottom:.3rem; }
.choice {
  display:flex; align-items:flex-start; gap:10px;
  background:#fafafa; border:1.5px solid #fce7f3; border-radius:11px;
  padding:11px 13px; font-size:14px; line-height:1.5; cursor:pointer; transition:all 0.15s;
}
.choice:active { transform:scale(0.99); }
.choice.selected { border-color:#db2777; background:#fdf2f8; }
.choice.correct { border-color:#059669; background:#ecfdf5; }
.choice.wrong { border-color:#dc2626; background:#fef2f2; }
.choice.locked { cursor:default; }
.choice.locked:active { transform:none; }
.choice-mark { width:22px; height:22px; border-radius:7px; background:#fce7f3; color:#be185d; font-weight:800; font-size:12px; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
.choice.selected .choice-mark { background:#f9a8d4; color:#831843; }
.choice.correct .choice-mark { background:#a7f3d0; color:#065f46; }
.choice.wrong .choice-mark { background:#fecaca; color:#991b1b; }

.ox-btns { display:flex; gap:9px; margin-bottom:.3rem; }
.ox-btn {
  flex:1; background:#fafafa; border:1.5px solid #fce7f3; border-radius:12px;
  padding:14px 0; font-size:18px; font-weight:800; color:#be185d; transition:all 0.15s; cursor:pointer; font-family:inherit;
}
.ox-btn:active { transform:scale(0.98); }
.ox-btn.selected { border-color:#db2777; background:#fdf2f8; }
.ox-btn.correct { border-color:#059669; background:#ecfdf5; color:#059669; }
.ox-btn.wrong { border-color:#dc2626; background:#fef2f2; color:#dc2626; }
.ox-btn.locked { cursor:default; }
.ox-btn.locked:active { transform:none; }

/* ── 해설 (채점 후에만 노출) ── */
.quiz-ans {
  display:none; margin-top:.9rem; padding:1rem 1.1rem;
  background:#fafafa; border:1px solid #f0e8ed; border-radius:12px;
  font-size:13.5px; color:#3c3c43; line-height:1.8; white-space:pre-line;
}
.quiz-ans.show { display:block; }
.quiz-ans .res { font-weight:800; font-size:14px; margin-bottom:.4rem; display:block; }
.quiz-ans .res.o { color:#059669; }
.quiz-ans .res.x { color:#dc2626; }

/* ── 채점 바 ── */
.grade-zone { margin-top:1.6rem; }
.grade-btn {
  width:100%; padding:16px 0; min-height:52px;
  background: linear-gradient(135deg,#f472b6,#db2777); border:none; border-radius:14px;
  font-size:16px; font-weight:700; color:#fff; cursor:pointer; font-family:inherit;
  box-shadow:0 4px 14px rgba(219,39,119,0.3); transition:opacity 0.15s, transform 0.1s;
}
.grade-btn:active { opacity:0.9; transform:scale(0.99); }
.grade-btn:disabled { opacity:0.45; cursor:default; box-shadow:none; }
.grade-hint { text-align:center; font-size:12px; color:#aeaeb2; margin-top:.7rem; line-height:1.6; }

/* ── 결과 카드 ── */
.score-card {
  display:none; margin-top:1.4rem; text-align:center;
  background:linear-gradient(135deg,#fff0f7 0%, #fdf2f8 60%, #f0f9ff 100%);
  border:1px solid #fce7f3; border-radius:18px; padding:1.6rem 1.4rem;
}
.score-card.show { display:block; }
.score-emoji { font-size:2.6rem; display:block; margin-bottom:.4rem; }
.score-big { font-size:1.9rem; font-weight:800; color:#be185d; letter-spacing:-0.02em; }
.score-big .total { color:#aeaeb2; font-size:1.2rem; font-weight:700; }
.score-sub { font-size:13px; color:#6e6e73; margin-top:.5rem; font-weight:500; }
.score-pct { font-size:12px; color:#db2777; margin-top:.3rem; font-weight:700; }
.retry-btn {
  margin-top:1.1rem; background:#fff; border:1.5px solid #f4c8d4; color:#db2777;
  border-radius:24px; padding:11px 26px; min-height:44px;
  font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; transition:background 0.15s;
}
.retry-btn:active { background:#fce7f3; }

.footer { text-align:center; color:#c7c7cc; font-size:11px; margin-top:2.5rem; line-height:1.7; }

.state { text-align:center; color:#aeaeb2; font-size:14px; padding:4rem 1rem; line-height:1.9; }
.state .big { font-size:2.4rem; display:block; margin-bottom:.7rem; }

/* ── 시험 바로가기 카드 ── */
.exam-link {
  display:flex; align-items:center; gap:12px; width:100%;
  border:1.5px solid #fce7f3; border-radius:16px; background:#fff;
  padding:1.05rem 1.15rem; margin-bottom:.8rem; cursor:pointer;
  text-decoration:none; color:inherit; font-family:inherit; text-align:left;
  transition:border-color .15s, background .15s;
}
.exam-link:active { transform:scale(0.995); }
.exam-link.ox { border-left:4px solid #059669; }
.exam-link.mc { border-left:4px solid #2563eb; }
.exam-link.master { border-left:4px solid #db2777; }
.exam-link .el-icon {
  width:42px; height:42px; border-radius:12px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; font-size:20px;
}
.exam-link.ox .el-icon { background:#ecfdf5; }
.exam-link.mc .el-icon { background:#eff6ff; }
.exam-link.master .el-icon { background:#fdf2f8; }
.exam-link .el-body { flex:1; min-width:0; }
.exam-link .el-badge {
  display:inline-block; font-size:10px; font-weight:800; letter-spacing:.03em;
  padding:2px 8px; border-radius:20px; margin-bottom:4px;
}
.exam-link.ox .el-badge { background:#ecfdf5; color:#059669; }
.exam-link.mc .el-badge { background:#eff6ff; color:#2563eb; }
.exam-link.master .el-badge { background:#fdf2f8; color:#be185d; }
.exam-link .el-title { font-size:14px; font-weight:700; color:#1d1d1f; line-height:1.4; }
.exam-link .el-sub { font-size:11.5px; color:#aeaeb2; margin-top:3px; }
.exam-link .el-go {
  flex-shrink:0; display:flex; align-items:center; justify-content:center; gap:4px;
  font-size:12.5px; font-weight:700; color:#fff; white-space:nowrap;
  padding:9px 14px; min-height:40px; border-radius:11px;
}
.exam-link.ox .el-go { background:linear-gradient(135deg,#34d399,#059669); }
.exam-link.mc .el-go { background:linear-gradient(135deg,#60a5fa,#2563eb); }
.exam-link.master .el-go { background:linear-gradient(135deg,#f472b6,#db2777); }
@media (max-width: 520px) {
  .exam-link .el-go { padding:8px 11px; font-size:12px; }
  .exam-link .el-icon { width:38px; height:38px; font-size:18px; }
}

/* ── Toast ── */
.toast { position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(20px); background:#1d1d1f; color:#fff; font-size:13px; font-weight:600; padding:11px 20px; border-radius:24px; opacity:0; transition:all 0.25s; z-index:900; pointer-events:none; max-width:90%; text-align:center; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

@media (max-width: 520px) {
  .wrap { padding: 1rem 0.75rem 4.5rem; }
  .brand-name { font-size: 13px; }
  .header-badge .dot-green { display:none; }
  .welcome-bar { padding: 1.1rem 1.1rem; }
  .welcome-greeting { font-size: 1.08rem; }
  .quiz-box { padding: 1.1rem 1.1rem; }
  .quiz-q { font-size: 14px; }
  .choice { font-size: 13.5px; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <div class="logo-mark">
      <svg width="16" height="16" viewBox="0 0 18 18" fill="none">
        <circle cx="9" cy="7" r="3" fill="rgba(255,255,255,0.9)"/>
        <path d="M3.5 16c0-3 2.5-5.5 5.5-5.5s5.5 2.5 5.5 5.5" stroke="rgba(255,255,255,0.9)" stroke-width="1.4" stroke-linecap="round" fill="none"/>
      </svg>
    </div>
    <span class="brand-name">베타과학학원</span>
  </div>
  <div class="header-badge"><span class="dot-green"></span>ONLINE</div>
</header>

<div class="wrap">
  <div id="loading" class="state"><span class="big">⏳</span>불러오는 중…</div>
  <div id="error" class="state" style="display:none"></div>

  <div id="content" style="display:none">
    <div class="welcome-bar">
      <div class="welcome-avatar">🩺</div>
      <div>
        <div class="welcome-greeting" id="heroTitle"></div>
        <div class="welcome-sub" id="heroSub"></div>
      </div>
    </div>
    <div class="count-row" id="countRow"></div>

    <div class="resume-bar" id="resumeBar">
      <span class="ic">💾</span>
      <span id="resumeText">이전에 풀던 내용을 불러왔어요. 이어서 풀 수 있습니다.</span>
    </div>

    <div id="items"></div>

    <div class="grade-zone" id="gradeZone" style="display:none">
      <button class="grade-btn" id="gradeBtn">📝 채점하기</button>
      <div class="grade-hint" id="gradeHint"></div>
    </div>

    <div class="score-card" id="scoreCard">
      <span class="score-emoji" id="scoreEmoji">🎉</span>
      <div class="score-big"><span id="scoreNum">0</span><span class="total"> / <span id="scoreTotal">0</span>문제</span></div>
      <div class="score-pct" id="scorePct"></div>
      <div class="score-sub" id="scoreSub">채점이 완료되었습니다. 아래에서 정답과 해설을 확인하세요.</div>
      <button class="retry-btn" id="retryBtn">↺ 처음부터 다시 풀기</button>
    </div>

    <div class="footer">베타과학학원 · 이 페이지는 학생 본인을 위한 주간 학습 클리닉입니다.</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const cfg = {
  apiKey:"AIzaSyD5MQx_rXO_xRYelyKxK090TaKa3Gg2D3k",
  authDomain:"beta-science.firebaseapp.com",
  projectId:"beta-science",
  storageBucket:"beta-science.firebasestorage.app",
  messagingSenderId:"650652155367",
  appId:"1:650652155367:web:41d2958e675cb4edd4d142"
};
const app = initializeApp(cfg);
const db  = getFirestore(app);

const $ = id => document.getElementById(id);
function el(tag, cls, text){ const e=document.createElement(tag); if(cls)e.className=cls; if(text!=null)e.textContent=text; return e; }

let toastTimer=null;
function toast(msg){
  const t=$('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),1900);
}

function showError(msg){
  $('loading').style.display='none';
  const e=$('error'); e.innerHTML='';
  e.appendChild(el('span','big','🔒'));
  e.appendChild(document.createTextNode(msg));
  e.style.display='block';
}

/* ── 저장: 토큰별로 풀이/채점 상태를 브라우저에 보관 ── */
let storeKey = null;            // 'clinic_state_' + token
const quizzes = [];             // 채점 대상 문제들의 핸들
let graded = false;

function saveState(){
  if(!storeKey) return;
  try{
    const picks = quizzes.map(q=>q.getPicked());
    localStorage.setItem(storeKey, JSON.stringify({ picks, graded, v:1 }));
  }catch(e){ /* 시크릿모드 등 저장 불가 시 무시 */ }
}
function loadState(){
  if(!storeKey) return null;
  try{
    const s=localStorage.getItem(storeKey);
    return s ? JSON.parse(s) : null;
  }catch(e){ return null; }
}
function clearState(){
  if(!storeKey) return;
  try{ localStorage.removeItem(storeKey); }catch(e){}
}

function renderConcept(it){
  const box=el('div','concept-box');
  if(it.title) box.appendChild(el('div','concept-title', it.title));
  box.appendChild(el('div','concept-body', it.body||''));
  return box;
}
function renderLink(it){
  const a=document.createElement('a');
  a.className='concept-box';
  a.style.cssText='display:flex;align-items:center;justify-content:space-between;gap:10px;text-decoration:none;border-left-color:#2563eb;background:#eff6ff;border-color:#bfdbfe;';
  a.href=it.file||'#';
  const left=el('div');
  left.appendChild(el('div','concept-title', '📖 '+(it.title||'단원 정리'))).style.color='#1e40af';
  left.appendChild(el('div',null,'눌러서 단원 정리를 확인하세요')).style.cssText='font-size:12px;color:#6e6e73;margin-top:3px';
  const arrow=el('div',null,'›'); arrow.style.cssText='font-size:22px;color:#2563eb;font-weight:700;flex-shrink:0';
  a.append(left,arrow);
  return a;
}

/* ── 시험 바로가기 (온라인 테스트 / 마스터테스트) ── */
let clinicStudentId = '';   // 클리닉 문서의 studentId (load에서 설정)
function buildExamHref(it){
  if(it.source==='master'){
    const sidPart = clinicStudentId ? ('&sid='+encodeURIComponent(clinicStudentId)) : '';
    return '/student-omr.html?testId='+encodeURIComponent(it.examId||'')+sidPart;
  }
  // online: /student/{examId}?type=ox|multiple
  const typePart = it.examType ? ('?type='+encodeURIComponent(it.examType)) : '';
  return '/student/'+encodeURIComponent(it.examId||'')+typePart;
}
function renderExamLink(it){
  const kind = it.source==='master' ? 'master' : (it.examType==='ox' ? 'ox' : 'mc');
  const a=document.createElement('a');
  a.className='exam-link '+kind;
  a.href=buildExamHref(it);

  let icon, badge;
  if(kind==='master'){ icon='📝'; badge='마스터테스트 OMR'; }
  else if(kind==='ox'){ icon='⭕'; badge='OX 시험'; }
  else { icon='📝'; badge='4지선다 시험'; }

  const ic=el('div','el-icon', icon);
  const body=el('div','el-body');
  body.appendChild(el('span','el-badge', badge));
  body.appendChild(el('div','el-title', it.title||'시험'));
  body.appendChild(el('div','el-sub', '눌러서 시험을 풀면 점수가 자동 기록돼요'));
  const go=el('div','el-go','▶ 풀러 가기');
  a.append(ic, body, go);
  return a;
}

/* ── OX 문제 ── */
function renderOX(it, idx){
  const w=el('div','quiz-box');
  const label=el('div','quiz-label', 'OX 문제 '+idx);
  w.appendChild(label);
  w.appendChild(el('div','quiz-q', it.q||''));

  const btns=el('div','ox-btns');
  const oBtn=el('button','ox-btn','O'), xBtn=el('button','ox-btn','X');
  const state={ picked:null };

  function paintSelection(){
    oBtn.classList.toggle('selected', state.picked===true);
    xBtn.classList.toggle('selected', state.picked===false);
  }
  function pick(val){            // 학생 클릭
    if(graded) return;
    state.picked=val; paintSelection(); saveState();
  }
  oBtn.addEventListener('click',()=>pick(true));
  xBtn.addEventListener('click',()=>pick(false));
  btns.append(oBtn,xBtn); w.appendChild(btns);

  const ans=el('div','quiz-ans');

  function reveal(){             // 채점 시 정답·해설 공개 + 잠금
    const correctBtn = it.answer ? oBtn : xBtn;
    correctBtn.classList.add('correct');
    const isCorrect = state.picked!==null && state.picked===it.answer;
    if(state.picked!==null && !isCorrect){
      (state.picked ? oBtn : xBtn).classList.add('wrong');
    }
    [oBtn,xBtn].forEach(b=>{ b.classList.add('locked'); b.classList.remove('selected'); });
    if(!label.querySelector('.quiz-badge')){
      label.appendChild(el('span','quiz-badge '+(isCorrect?'ok':'no'), isCorrect?'정답':(state.picked===null?'미응답':'오답')));
    }
    ans.innerHTML='';
    ans.appendChild(el('span','res '+(it.answer?'o':'x'), '정답: '+(it.answer?'O':'X')));
    if(it.explain) ans.appendChild(document.createTextNode(it.explain));
    ans.classList.add('show');
    return isCorrect;
  }
  function reset(){
    state.picked=null;
    [oBtn,xBtn].forEach(b=>{ b.classList.remove('selected','correct','wrong','locked'); });
    const b=label.querySelector('.quiz-badge'); if(b) b.remove();
    ans.classList.remove('show'); ans.innerHTML='';
  }
  w.appendChild(ans);
  quizzes.push({
    answered:()=>state.picked!==null,
    getPicked:()=>state.picked,
    setPicked:(v)=>{ state.picked=(v===true||v===false)?v:null; paintSelection(); },
    reveal, reset
  });
  return w;
}

/* ── 객관식 ── */
function renderMC(it, idx){
  const w=el('div','quiz-box');
  const label=el('div','quiz-label', '객관식 '+idx);
  w.appendChild(label);
  w.appendChild(el('div','quiz-q', it.q||''));

  const list=el('div','choices'); const choiceEls=[];
  const state={ picked:null };
  const correctIdx=Number(it.answer);

  function paintSelection(){
    choiceEls.forEach((x,i)=>x.classList.toggle('selected', i===state.picked));
  }
  (it.choices||[]).forEach((c,i)=>{
    const ch=el('div','choice');
    ch.appendChild(el('div','choice-mark', String(i+1)));
    ch.appendChild(el('div',null,c));
    ch.addEventListener('click',()=>{
      if(graded) return;
      state.picked=i; paintSelection(); saveState();
    });
    choiceEls.push(ch); list.appendChild(ch);
  });
  w.appendChild(list);

  const ans=el('div','quiz-ans');

  function reveal(){
    if(choiceEls[correctIdx]) choiceEls[correctIdx].classList.add('correct');
    const isCorrect = state.picked!==null && state.picked===correctIdx;
    if(state.picked!==null && !isCorrect && choiceEls[state.picked]){
      choiceEls[state.picked].classList.add('wrong');
    }
    choiceEls.forEach(x=>{ x.classList.add('locked'); x.classList.remove('selected'); });
    if(!label.querySelector('.quiz-badge')){
      label.appendChild(el('span','quiz-badge '+(isCorrect?'ok':'no'), isCorrect?'정답':(state.picked===null?'미응답':'오답')));
    }
    ans.innerHTML='';
    ans.appendChild(el('span','res o', '정답: '+(correctIdx+1)+'번'));
    if(it.explain) ans.appendChild(document.createTextNode(it.explain));
    ans.classList.add('show');
    return isCorrect;
  }
  function reset(){
    state.picked=null;
    choiceEls.forEach(x=>{ x.classList.remove('selected','correct','wrong','locked'); });
    const b=label.querySelector('.quiz-badge'); if(b) b.remove();
    ans.classList.remove('show'); ans.innerHTML='';
  }
  w.appendChild(ans);
  quizzes.push({
    answered:()=>state.picked!==null,
    getPicked:()=>state.picked,
    setPicked:(v)=>{ state.picked=(Number.isInteger(v)&&v>=0&&v<choiceEls.length)?v:null; paintSelection(); },
    reveal, reset
  });
  return w;
}

/* ── 채점 결과 화면 적용 (확인창·저장·스크롤 없음) ── */
function applyGrade(){
  graded=true;
  let correct=0;
  quizzes.forEach(q=>{ if(q.reveal()) correct++; });
  const total=quizzes.length;

  $('gradeBtn').disabled=true;
  $('gradeBtn').textContent='✅ 채점 완료';
  $('gradeHint').textContent='각 문제 아래에서 정답과 해설을 확인하세요.';

  const pct = total? Math.round(correct/total*100) : 0;
  $('scoreNum').textContent=correct;
  $('scoreTotal').textContent=total;
  $('scorePct').textContent='정답률 '+pct+'%';
  let emoji='💪', sub='틀린 문제의 해설을 꼼꼼히 확인해 보세요.';
  if(pct===100){ emoji='🏆'; sub='완벽해요! 모든 문제를 맞혔습니다.'; }
  else if(pct>=80){ emoji='🎉'; sub='아주 잘했어요! 틀린 문제만 다시 확인해요.'; }
  else if(pct>=60){ emoji='👍'; sub='좋아요! 해설을 보며 부족한 부분을 채워봐요.'; }
  $('scoreEmoji').textContent=emoji;
  $('scoreSub').textContent=sub;
  $('scoreCard').classList.add('show');
}

/* ── 채점 버튼 클릭 ── */
function doGrade(){
  if(graded) return;
  const unanswered=quizzes.filter(q=>!q.answered()).length;
  if(unanswered>0){
    if(!confirm(`아직 풀지 않은 문제가 ${unanswered}개 있습니다.\n그래도 채점할까요? (안 푼 문제는 오답 처리됩니다)`)) return;
  }
  applyGrade();
  saveState();
  $('scoreCard').scrollIntoView({behavior:'smooth', block:'center'});
}

/* ── 처음부터 다시 풀기 (저장 내용까지 초기화) ── */
function doRetry(){
  if(!confirm('지금까지 푼 답과 채점 결과가 모두 지워집니다. 처음부터 다시 풀까요?')) return;
  graded=false;
  quizzes.forEach(q=>q.reset());
  clearState();
  $('resumeBar').classList.remove('show');
  $('gradeBtn').disabled=false;
  $('gradeBtn').textContent='📝 채점하기';
  $('gradeHint').textContent='모든 문제를 푼 뒤 채점하기를 누르세요.';
  $('scoreCard').classList.remove('show');
  window.scrollTo({top:0, behavior:'smooth'});
}

async function load(){
  const params=new URLSearchParams(location.search);
  const token=params.get('t');
  if(!token){ showError('잘못된 접근입니다. 선생님이 보내주신 링크로 다시 접속해 주세요.'); return; }
  storeKey='clinic_state_'+token;

  let snap;
  try{ snap=await getDoc(doc(db,'assignments',token)); }
  catch(err){ showError('내용을 불러오지 못했습니다. 잠시 후 다시 시도해 주세요.'); return; }
  if(!snap.exists()){ showError('링크가 올바르지 않거나 만료되었습니다. 선생님께 문의해 주세요.'); return; }

  const data=snap.data();
  const items=Array.isArray(data.items)?data.items:[];
  clinicStudentId = data.studentId || '';
  $('heroTitle').textContent = (data.studentName||'') + ' 학생';
  $('heroSub').textContent = data.weekLabel ? '📅 '+data.weekLabel : '이번 주 학습 클리닉';

  // 시험 자동 로그인을 위해 학생 정보를 브라우저에 심어둠 (응시 페이지가 읽어 이름 입력을 건너뜀)
  try{
    if(data.studentName) localStorage.setItem('studentName', data.studentName);
    if(clinicStudentId)  localStorage.setItem('studentId', clinicStudentId);
  }catch(e){}

  const nC=items.filter(i=>i.type==='concept'||i.type==='link').length;
  const nO=items.filter(i=>i.type==='ox').length;
  const nM=items.filter(i=>i.type==='mc').length;
  const nE=items.filter(i=>i.type==='examlink').length;
  const row=$('countRow');
  if(nE) row.appendChild(el('span','count-chip','📋 시험 '+nE));
  if(nC) row.appendChild(el('span','count-chip','📖 핵심내용 '+nC));
  if(nO) row.appendChild(el('span','count-chip','⭕ OX '+nO));
  if(nM) row.appendChild(el('span','count-chip','📝 객관식 '+nM));

  const box=$('items'); let oxN=0, mcN=0;
  items.forEach(it=>{
    if(it.type==='concept') box.appendChild(renderConcept(it));
    else if(it.type==='link') box.appendChild(renderLink(it));
    else if(it.type==='examlink') box.appendChild(renderExamLink(it));
    else if(it.type==='ox') box.appendChild(renderOX(it, ++oxN));
    else if(it.type==='mc') box.appendChild(renderMC(it, ++mcN));
  });
  if(items.length===0) box.appendChild(el('div','state','등록된 학습 내용이 없습니다.'));

  if(quizzes.length>0){
    $('gradeZone').style.display='block';
    $('gradeHint').textContent='모든 문제를 푼 뒤 채점하기를 누르세요.';
    $('gradeBtn').addEventListener('click', doGrade);
    $('retryBtn').addEventListener('click', doRetry);

    // ── 저장된 풀이/채점 상태 복원 (문항 수가 같을 때만) ──
    const saved=loadState();
    if(saved && Array.isArray(saved.picks) && saved.picks.length===quizzes.length){
      saved.picks.forEach((p,i)=>quizzes[i].setPicked(p));
      if(saved.graded){
        applyGrade();                       // 채점 결과 그대로 복원 (스크롤 X)
        $('resumeText').textContent='채점한 결과를 그대로 불러왔어요. 정답과 해설을 다시 확인할 수 있습니다.';
        $('resumeBar').classList.add('show');
      } else {
        const answered=saved.picks.filter(p=>p!==null && p!==undefined).length;
        if(answered>0){
          $('resumeText').textContent=`이전에 풀던 내용(${answered}문제)을 불러왔어요. 이어서 풀 수 있습니다.`;
          $('resumeBar').classList.add('show');
        }
      }
    } else if(saved){
      // 선생님이 문제를 바꿔 문항 수가 달라진 경우: 옛 기록 폐기
      clearState();
    }
  }

  $('loading').style.display='none';
  $('content').style.display='block';
}
load();
</script>

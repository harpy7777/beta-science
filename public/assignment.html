<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel='icon' type='image/svg+xml' href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 140 140'%3E%3Cpolygon points='70,8 121,38 121,102 70,132 19,102 19,38' fill='none' stroke='%23E85D75' stroke-width='8' stroke-linejoin='round'/%3E%3Cpolygon points='70,38 97,53 97,87 70,102 43,87 43,53' fill='none' stroke='%23E85D75' stroke-width='4' stroke-linejoin='round' stroke-dasharray='10 6'/%3E%3Ccircle cx='70' cy='8' r='10' fill='%23E85D75'/%3E%3Ccircle cx='121' cy='38' r='10' fill='%23E85D75'/%3E%3Ccircle cx='121' cy='102' r='10' fill='%23E85D75'/%3E%3Ccircle cx='70' cy='132' r='10' fill='%23E85D75'/%3E%3Ccircle cx='19' cy='102' r='10' fill='%23E85D75'/%3E%3Ccircle cx='19' cy='38' r='10' fill='%23E85D75'/%3E%3C/svg%3E">
<title>주간 학습 클리닉 · 베타과학학원</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');

:root{
  --pur-dark:#3b1fa3; --pur-main:#5b3fd4; --pur-mid:#7c5ce8;
  --pur-light:#a78bfa; --pur-tint:#f5f3ff; --pur-tint2:#ede9fe;
  --pur-border:#c4b5fd; --pur-border2:#a78bfa;
  --green:#059669; --green-bg:#ecfdf5; --green-border:#a7f3d0;
  --red:#dc2626; --red-bg:#fef2f2; --red-border:#fecaca;
  --text:#1d1d1f; --muted:#6e6e73; --dim:#aeaeb2;
  --bg:#f8f7ff; --white:#fff;
  --radius-sm:10px; --radius:14px; --radius-lg:18px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{
  font-family:'Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg); color:var(--text); min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;cursor:pointer;border:none;background:none}

/* HEADER */
.header{
  background:#fff; border-bottom:1px solid #ede9fe;
  padding:0 1rem; height:54px; display:flex; align-items:center;
  position:sticky; top:0; z-index:500; box-shadow:0 1px 0 #ede9fe;
}
.header-left{display:flex;align-items:center;gap:9px}
.logo-mark{
  width:30px;height:30px;
  background:linear-gradient(135deg,var(--pur-mid),var(--pur-dark));
  border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.brand-name{font-size:14px;font-weight:700;letter-spacing:-.3px}

/* HERO */
.hero{
  background:linear-gradient(135deg,var(--pur-dark),var(--pur-main) 55%,var(--pur-mid));
  padding:2rem 1.4rem 1.8rem; position:relative; overflow:hidden;
}
.hero::before{content:'';position:absolute;right:-70px;top:-70px;width:240px;height:240px;border-radius:50%;background:rgba(255,255,255,.06)}
.hero-inner{max-width:760px;margin:0 auto;position:relative;z-index:1}
.hero-eyebrow{
  display:inline-block;background:rgba(255,255,255,.15);
  border:1px solid rgba(255,255,255,.25);border-radius:20px;
  padding:5px 14px;font-size:11px;font-weight:700;color:#fff;
  letter-spacing:.08em;margin-bottom:.8rem;
}
.hero-title{font-size:1.5rem;font-weight:900;color:#fff;letter-spacing:-.02em;line-height:1.25}
.hero-sub{font-size:13px;color:rgba(255,255,255,.85);margin-top:.4rem;font-weight:500}

/* CONTENT */
.wrap{max-width:760px;margin:0 auto;padding:1.6rem 1.2rem 4rem}
.state{text-align:center;color:var(--muted);font-size:14px;padding:3rem 1rem;line-height:1.8}
.state .big{font-size:2.2rem;display:block;margin-bottom:.6rem}

.count-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.4rem}
.count-chip{
  background:#fff;border:1.5px solid var(--pur-border);border-radius:20px;
  padding:6px 14px;font-size:12px;font-weight:700;color:var(--pur-dark);
}

/* SECTION TITLE */
.sec-title{
  font-size:12px;font-weight:800;color:var(--pur-dark);
  letter-spacing:.06em;text-transform:uppercase;
  margin:1.6rem 0 .8rem;display:flex;align-items:center;gap:8px;
}
.sec-title::before{content:'';width:4px;height:16px;background:var(--pur-main);border-radius:2px;display:block;flex-shrink:0}

/* CONCEPT BOX */
.concept-box{
  background:var(--pur-tint);border:1.5px solid var(--pur-border);
  border-left:4px solid var(--pur-main);border-radius:var(--radius);
  padding:1rem 1.2rem;margin:.7rem 0;line-height:1.78;font-size:13.5px;
}
.concept-box .cb-title{font-weight:800;color:var(--pur-dark);font-size:14px;margin-bottom:.45rem}
.concept-box .cb-body{white-space:pre-line}

/* QUIZ */
.quiz-wrap{
  background:linear-gradient(135deg,var(--pur-tint2),var(--pur-tint));
  border:1.5px solid var(--pur-border);border-radius:var(--radius-lg);
  padding:1.1rem 1.3rem;margin:.7rem 0;
}
.quiz-label{font-size:11px;font-weight:800;color:var(--pur-dark);letter-spacing:.08em;text-transform:uppercase;margin-bottom:.7rem}
.quiz-q{font-size:14px;font-weight:700;color:var(--text);line-height:1.7;margin-bottom:.8rem;white-space:pre-line}
.choices{display:flex;flex-direction:column;gap:7px;margin-bottom:.8rem}
.choice{
  display:flex;align-items:flex-start;gap:9px;
  background:#fff;border:1.5px solid var(--pur-border);border-radius:10px;
  padding:9px 12px;font-size:13.5px;line-height:1.55;cursor:pointer;transition:all .15s;
}
.choice:hover{border-color:var(--pur-main)}
.choice.selected{border-color:var(--pur-main);background:var(--pur-tint)}
.choice.correct{border-color:var(--green);background:var(--green-bg)}
.choice.wrong{border-color:var(--red);background:var(--red-bg)}
.choice-mark{
  width:22px;height:22px;border-radius:7px;background:var(--pur-tint2);
  color:var(--pur-dark);font-weight:900;font-size:12px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.ox-btns{display:flex;gap:8px;margin-bottom:.8rem}
.ox-btn{
  flex:1;background:#fff;border:1.5px solid var(--pur-border);border-radius:10px;
  padding:11px 0;font-size:16px;font-weight:900;color:var(--pur-dark);transition:all .15s;
}
.ox-btn:hover{border-color:var(--pur-main)}
.ox-btn.selected{border-color:var(--pur-main);background:var(--pur-tint)}
.ox-btn.correct{border-color:var(--green);background:var(--green-bg);color:var(--green)}
.ox-btn.wrong{border-color:var(--red);background:var(--red-bg);color:var(--red)}
.quiz-toggle{
  background:var(--pur-main);color:#fff;border-radius:20px;
  padding:7px 18px;font-size:12px;font-weight:700;transition:background .15s;
}
.quiz-toggle:hover{background:var(--pur-dark)}
.quiz-ans{
  display:none;margin-top:.8rem;padding:.9rem 1rem;
  background:rgba(255,255,255,.9);border-radius:10px;
  font-size:13.5px;color:var(--text);line-height:1.75;
  border:1px solid var(--pur-border);white-space:pre-line;
}
.quiz-ans.show{display:block}
.quiz-ans .res{font-weight:800;font-size:14px;margin-bottom:.4rem;display:block}
.quiz-ans .res.o{color:var(--green)}
.quiz-ans .res.x{color:var(--red)}

.footer{text-align:center;color:var(--dim);font-size:11px;margin-top:3rem;line-height:1.7}

@media(max-width:520px){
  .hero{padding:1.6rem 1rem 1.4rem}
  .hero-title{font-size:1.28rem}
  .wrap{padding:1.2rem .85rem 3.5rem}
  .quiz-wrap{padding:1rem 1.05rem}
  .quiz-q{font-size:13px}
  .choice{padding:10px 12px;font-size:13px}
  .ox-btn{padding:13px 0;font-size:17px}
}
@media(max-width:360px){
  .wrap{padding:1rem .7rem 3rem}
  .hero{padding:1.4rem .8rem 1.2rem}
  .count-chip{font-size:11px;padding:5px 11px}
}
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <div class="logo-mark">
      <svg width="16" height="16" viewBox="0 0 18 18" fill="none">
        <circle cx="9" cy="7" r="3" fill="rgba(255,255,255,0.9)"/>
        <path d="M3.5 16c0-3 2.5-5.5 5.5-5.5s5.5 2.5 5.5 5.5" stroke="rgba(255,255,255,0.9)" stroke-width="1.4" stroke-linecap="round" fill="none"/>
      </svg>
    </div>
    <span class="brand-name">베타과학학원</span>
  </div>
</header>

<div id="hero" class="hero" style="display:none">
  <div class="hero-inner">
    <div class="hero-eyebrow">📚 이번 주 학습 클리닉</div>
    <div class="hero-title" id="heroTitle"></div>
    <div class="hero-sub" id="heroSub"></div>
  </div>
</div>

<main class="wrap">
  <div id="loading" class="state"><span class="big">⏳</span>불러오는 중…</div>
  <div id="error" class="state" style="display:none"></div>
  <div id="content" style="display:none">
    <div class="count-row" id="countRow"></div>
    <div id="items"></div>
    <div class="footer">베타과학학원 · 이 페이지는 학생 본인을 위한 주간 학습 클리닉입니다.</div>
  </div>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const cfg = {
  apiKey:"AIzaSyD5MQx_rXO_xRYelyKxK090TaKa3Gg2D3k",
  authDomain:"beta-science.firebaseapp.com",
  projectId:"beta-science",
  storageBucket:"beta-science.firebasestorage.app",
  messagingSenderId:"650652155367",
  appId:"1:650652155367:web:41d2958e675cb4edd4d142"
};
const app = initializeApp(cfg);
const db  = getFirestore(app);

const $ = id => document.getElementById(id);
function el(tag, cls, text){ const e=document.createElement(tag); if(cls)e.className=cls; if(text!=null)e.textContent=text; return e; }

function showError(msg){
  $('loading').style.display='none';
  const e=$('error');
  e.innerHTML='';
  e.appendChild(el('span','big','🔒'));
  e.appendChild(document.createTextNode(msg));
  e.style.display='block';
}

function renderConcept(it){
  const box=el('div','concept-box');
  if(it.title) box.appendChild(el('div','cb-title', it.title));
  box.appendChild(el('div','cb-body', it.body||''));
  return box;
}

function renderOX(it, idx){
  const w=el('div','quiz-wrap');
  w.appendChild(el('div','quiz-label', 'OX 문제 '+idx));
  w.appendChild(el('div','quiz-q', it.q||''));

  const btns=el('div','ox-btns');
  const oBtn=el('button','ox-btn','O');
  const xBtn=el('button','ox-btn','X');
  let picked=null;
  oBtn.addEventListener('click',()=>{picked=true;oBtn.classList.add('selected');xBtn.classList.remove('selected')});
  xBtn.addEventListener('click',()=>{picked=false;xBtn.classList.add('selected');oBtn.classList.remove('selected')});
  btns.appendChild(oBtn); btns.appendChild(xBtn);
  w.appendChild(btns);

  const toggle=el('button','quiz-toggle','정답 확인 ▼');
  const ans=el('div','quiz-ans');
  const res=el('span','res '+(it.answer?'o':'x'), '정답: '+(it.answer?'O':'X'));
  ans.appendChild(res);
  if(it.explain) ans.appendChild(document.createTextNode(it.explain));
  toggle.addEventListener('click',()=>{
    const open=ans.classList.toggle('show');
    toggle.textContent= open?'정답 닫기 ▲':'정답 확인 ▼';
    if(open){
      const correctBtn = it.answer?oBtn:xBtn;
      correctBtn.classList.add('correct');
      if(picked!==null && picked!==it.answer){ (picked?oBtn:xBtn).classList.add('wrong'); }
    }
  });
  w.appendChild(toggle); w.appendChild(ans);
  return w;
}

function renderMC(it, idx){
  const w=el('div','quiz-wrap');
  w.appendChild(el('div','quiz-label', '객관식 '+idx));
  w.appendChild(el('div','quiz-q', it.q||''));

  const list=el('div','choices');
  const choiceEls=[];
  let picked=null;
  (it.choices||[]).forEach((c,i)=>{
    const ch=el('div','choice');
    ch.appendChild(el('div','choice-mark', String(i+1)));
    ch.appendChild(el('div',null,c));
    ch.addEventListener('click',()=>{
      picked=i;
      choiceEls.forEach(x=>x.classList.remove('selected'));
      ch.classList.add('selected');
    });
    choiceEls.push(ch);
    list.appendChild(ch);
  });
  w.appendChild(list);

  const toggle=el('button','quiz-toggle','정답 확인 ▼');
  const ans=el('div','quiz-ans');
  const res=el('span','res o', '정답: '+(Number(it.answer)+1)+'번');
  ans.appendChild(res);
  if(it.explain) ans.appendChild(document.createTextNode(it.explain));
  toggle.addEventListener('click',()=>{
    const open=ans.classList.toggle('show');
    toggle.textContent= open?'정답 닫기 ▲':'정답 확인 ▼';
    if(open){
      const a=Number(it.answer);
      choiceEls.forEach(x=>{x.classList.remove('selected')});
      if(choiceEls[a]) choiceEls[a].classList.add('correct');
      if(picked!==null && picked!==a && choiceEls[picked]) choiceEls[picked].classList.add('wrong');
    }
  });
  w.appendChild(toggle); w.appendChild(ans);
  return w;
}

async function load(){
  const params=new URLSearchParams(location.search);
  const token=params.get('t');
  if(!token){ showError('잘못된 접근입니다. 선생님이 보내주신 링크로 다시 접속해 주세요.'); return; }

  let snap;
  try{
    snap=await getDoc(doc(db,'assignments',token));
  }catch(err){
    showError('내용을 불러오지 못했습니다. 잠시 후 다시 시도해 주세요.');
    return;
  }
  if(!snap.exists()){ showError('링크가 올바르지 않거나 만료되었습니다. 선생님께 문의해 주세요.'); return; }

  const data=snap.data();
  const items=Array.isArray(data.items)?data.items:[];

  // hero
  $('heroTitle').textContent = (data.studentName||'') + ' 학생';
  $('heroSub').textContent = data.weekLabel ? '📅 '+data.weekLabel : '';
  $('hero').style.display='block';

  // counts
  const nC=items.filter(i=>i.type==='concept').length;
  const nO=items.filter(i=>i.type==='ox').length;
  const nM=items.filter(i=>i.type==='mc').length;
  const row=$('countRow');
  if(nC) row.appendChild(el('span','count-chip','📖 핵심내용 '+nC));
  if(nO) row.appendChild(el('span','count-chip','⭕ OX '+nO));
  if(nM) row.appendChild(el('span','count-chip','📝 객관식 '+nM));

  // items in order
  const box=$('items');
  let oxN=0, mcN=0;
  items.forEach(it=>{
    if(it.type==='concept') box.appendChild(renderConcept(it));
    else if(it.type==='ox') box.appendChild(renderOX(it, ++oxN));
    else if(it.type==='mc') box.appendChild(renderMC(it, ++mcN));
  });
  if(items.length===0){
    box.appendChild(el('div','state','등록된 학습 내용이 없습니다.'));
  }

  $('loading').style.display='none';
  $('content').style.display='block';
}
load();
</script>
</body>
</html>

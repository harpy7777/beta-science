<style>
:root{
  --navy:#1e3a8a;--royal:#2563eb;--blue-mid:#3b82f6;--blue-light:#60a5fa;
  --bg-tint:#eff6ff;--bg-tint2:#dbeafe;--border:#bfdbfe;--border-soft:#e0eaff;
  --green:#16a34a;--green-bg:#f0fdf4;--green-bd:#bbf7d0;
  --amber:#d97706;--amber-bg:#fffbeb;--amber-bd:#fde68a;
  --violet:#7c3aed;
  --safe-b:env(safe-area-inset-bottom);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',Arial,sans-serif;background:#fafafa;color:#1d1d1f;min-height:100vh;-webkit-font-smoothing:antialiased;overscroll-behavior:none}

/* Header */
.header{background:#fff;border-bottom:1px solid var(--border-soft);padding:0 1rem;padding-left:max(1rem,env(safe-area-inset-left));padding-right:max(1rem,env(safe-area-inset-right));height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:300}
.header-left{display:flex;align-items:center;gap:9px;text-decoration:none;color:inherit;cursor:pointer;transition:opacity .15s}
.header-left:hover{opacity:.75}
.logo-mark{width:30px;height:30px;background:linear-gradient(135deg,var(--blue-mid),var(--navy));border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand-name{font-size:14px;font-weight:600;letter-spacing:-.3px}
.header-badge{display:flex;align-items:center;gap:5px;background:var(--green-bg);border:1px solid var(--green-bd);border-radius:20px;padding:4px 10px;font-size:10px;font-weight:600;color:var(--green);white-space:nowrap}
.dot-green{width:5px;height:5px;background:#22c55e;border-radius:50%;animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.wrap{max-width:920px;margin:0 auto;padding:1.1rem 0.9rem;padding-left:max(.9rem,env(safe-area-inset-left));padding-right:max(.9rem,env(safe-area-inset-right));padding-bottom:calc(7rem + var(--safe-b))}

.breadcrumb{display:flex;align-items:center;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
.bc-item{font-size:12px;color:#aeaeb2;font-weight:500;text-decoration:none;cursor:pointer}
.bc-item:hover{color:var(--royal)}
.bc-sep{font-size:12px;color:#d1d1d6}
.bc-current{font-size:12px;font-weight:700}

.welcome-bar{background:linear-gradient(135deg,var(--bg-tint) 0%,#eef4ff 60%,#f0f7ff 100%);border:1px solid var(--border);border-radius:18px;padding:1.1rem 1.3rem;margin-bottom:1.3rem;display:flex;align-items:center;gap:13px}
.welcome-avatar{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--blue-mid),var(--navy));display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0;box-shadow:0 4px 14px rgba(30,58,138,.25)}
.welcome-title{font-size:1.05rem;font-weight:800;letter-spacing:-.03em}
.welcome-sub{font-size:12px;color:#6e6e73;margin-top:4px;line-height:1.55}

.section-heading{font-size:11px;font-weight:700;color:#aeaeb2;letter-spacing:.09em;text-transform:uppercase;margin-bottom:.8rem}

/* Tabs */
.tabs{display:flex;gap:8px;margin-bottom:1.2rem}
.tab{flex:1;text-align:center;padding:11px 10px;border-radius:13px;font-size:13px;font-weight:700;cursor:pointer;border:2px solid var(--border-soft);background:#fff;color:#6e6e73;transition:all .15s;min-height:46px;display:flex;align-items:center;justify-content:center;gap:6px}
.tab.active{border-color:var(--royal);background:var(--bg-tint);color:var(--navy)}

/* Topic grid */
.topic-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:13px}
.topic-card{background:#fff;border:1px solid var(--border-soft);border-radius:18px;overflow:hidden;cursor:pointer;transition:transform .18s,box-shadow .18s;display:flex;flex-direction:column}
.topic-card:hover{transform:translateY(-3px);box-shadow:0 10px 26px rgba(30,58,138,.13)}
.topic-card:active{transform:scale(.985)}
.tc-banner{height:84px;display:flex;align-items:center;justify-content:space-between;padding:0 1.1rem;position:relative;overflow:hidden}
.tc-banner::before{content:'';position:absolute;right:-26px;bottom:-26px;width:96px;height:96px;border-radius:50%;background:rgba(255,255,255,.12)}
.tb-a{background:linear-gradient(135deg,#22c55e,#15803d)}
.tb-b{background:linear-gradient(135deg,#a78bfa,#6d28d9)}
.tb-c{background:linear-gradient(135deg,#fb923c,#c2410c)}
.tc-unit{font-size:11px;font-weight:800;color:rgba(255,255,255,.92);letter-spacing:-.01em;position:relative;z-index:1;line-height:1.3}
.tc-emoji{font-size:30px;position:relative;z-index:1}
.tc-body{padding:.95rem 1.05rem 1.05rem;flex:1;display:flex;flex-direction:column;gap:9px}
.tc-title{font-size:13.5px;font-weight:700;line-height:1.4;letter-spacing:-.01em}
.tc-tags{display:flex;flex-wrap:wrap;gap:5px}
.tg{font-size:10px;font-weight:600;padding:3px 8px;border-radius:6px;background:var(--bg-tint);color:var(--navy);white-space:nowrap}
.tc-go{margin-top:auto;font-size:12px;font-weight:700;color:var(--royal);display:flex;justify-content:flex-end;gap:5px}

.empty{background:#fff;border:1px dashed var(--border);border-radius:18px;padding:2.6rem 1rem;text-align:center;color:#aeaeb2;font-size:13px;line-height:1.7}

/* Report view */
.rep-head{border-radius:18px;padding:1.3rem 1.4rem;margin-bottom:1.1rem;color:#fff;position:relative;overflow:hidden}
.rep-head::before{content:'';position:absolute;right:-30px;bottom:-30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.12)}
.rh-a{background:linear-gradient(135deg,#22c55e,#15803d)}
.rh-b{background:linear-gradient(135deg,#a78bfa,#6d28d9)}
.rh-c{background:linear-gradient(135deg,#fb923c,#c2410c)}
.rep-unit{font-size:11px;font-weight:700;color:rgba(255,255,255,.85);letter-spacing:.04em;position:relative;z-index:1}
.rep-title{font-size:1.25rem;font-weight:800;letter-spacing:-.02em;margin:7px 0 10px;line-height:1.35;position:relative;z-index:1}
.rep-tags{display:flex;flex-wrap:wrap;gap:6px;position:relative;z-index:1}
.rep-tags .tg{background:rgba(255,255,255,.22);color:#fff}

.name-row{background:#fff;border:1px solid var(--border-soft);border-radius:14px;padding:.9rem 1rem;margin-bottom:1.1rem}
.name-row label{font-size:11px;font-weight:700;color:#6e6e73;display:block;margin-bottom:6px}

.rep-sec{background:#fff;border:1px solid var(--border-soft);border-radius:14px;padding:1rem 1.1rem;margin-bottom:11px}
.sec-label{display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:800;color:var(--navy);margin-bottom:9px}
.sec-no{width:22px;height:22px;border-radius:7px;background:var(--bg-tint2);color:var(--navy);font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}

.input,.textarea{width:100%;padding:11px 12px;border:1.5px solid var(--border-soft);border-radius:11px;font-size:15px;font-family:inherit;color:#1d1d1f;background:#fcfdff;outline:none;line-height:1.75;transition:border-color .15s;word-break:break-word}
.input:focus,.textarea:focus{border-color:var(--royal)}
.textarea{resize:vertical;min-height:70px}

.saet-block{background:var(--amber-bg);border:1px solid var(--amber-bd);border-radius:14px;padding:1rem 1.1rem;margin-bottom:11px}
.saet-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;flex-wrap:wrap;gap:8px}
.saet-title{font-size:13.5px;font-weight:800;color:#92400e;display:flex;align-items:center;gap:7px}
.saet-block .textarea{background:#fff;border-color:var(--amber-bd)}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:12px 18px;border-radius:13px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;border:1.5px solid transparent;transition:all .15s;min-height:46px}
.btn-primary{background:linear-gradient(135deg,var(--royal),var(--navy));color:#fff;box-shadow:0 4px 12px rgba(30,58,138,.22)}
.btn-primary:active{transform:scale(.97)}
.btn-ghost{background:#fff;color:var(--navy);border-color:var(--border)}
.btn-ghost:active{background:var(--bg-tint)}
.btn-sm{padding:8px 13px;font-size:12px;min-height:38px;border-radius:10px}

.back-bar{display:flex;align-items:center;margin-bottom:1rem}
.back-link{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:var(--navy);cursor:pointer;padding:8px 4px}

/* 하단 고정 액션바 (모바일 핵심) */
.action-dock{position:fixed;left:0;right:0;bottom:0;z-index:200;background:rgba(255,255,255,.96);backdrop-filter:saturate(180%) blur(10px);border-top:1px solid var(--border-soft);padding:.7rem .9rem;padding-bottom:calc(.7rem + var(--safe-b));display:none;gap:8px}
.action-dock.show{display:flex}
.action-dock .btn{flex:1;padding:13px 8px;font-size:13.5px}

.toast{position:fixed;left:50%;bottom:calc(86px + var(--safe-b));transform:translateX(-50%) translateY(20px);background:#1d1d1f;color:#fff;font-size:13px;font-weight:600;padding:11px 20px;border-radius:24px;z-index:400;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.25)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.footer{background:#fff;border-top:1px solid var(--border-soft);padding:1.6rem 1rem;text-align:center;margin-top:1.5rem}
.footer-logo{font-size:14px;font-weight:800;letter-spacing:-.02em}
.footer-logo span{color:var(--royal)}
.footer-copy{font-size:11px;color:#aeaeb2;margin-top:6px}

.hidden{display:none!important}

@media(max-width:560px){
  .topic-grid{grid-template-columns:1fr}
  .welcome-bar{align-items:flex-start}
  .rep-title{font-size:1.12rem}
  .wrap{padding:1rem .8rem;padding-bottom:calc(7rem + var(--safe-b))}
  .header-badge .dot-green{display:none}
}
</style>
</head>

<script>
/* ════════ 데이터 ════════ */
var TOPICS=[
{
  id:'misi-geosi', subject:'통합과학1', accent:'a', emoji:'🔭',
  unit:'Ⅰ. 과학의 기초 · 과학의 기본량',
  title:'미시 세계와 거시 세계의 규모(scale)에 따른 차이점 분석',
  tags:['통합과학1','가상실험','미시세계','거시세계'],
  sections:[
    {label:'탐구 동기', body:'우리가 배우는 과학은 눈에 보이지 않을 만큼 작은 수소 원자부터 상상하기 어려울 만큼 거대한 우리은하까지 모두를 다룬다. 같은 자연을 탐구하더라도 대상의 크기가 이렇게까지 다르다면 측정하고 분석하는 방법도 달라지지 않을까 하는 의문이 들어 이 탐구를 시작하게 되었다.'},
    {label:'탐구 목적', body:'미시 세계와 거시 세계를 대표하는 대상의 규모(scale) 차이를 비교하고, 규모가 달라질 때 측정 방법, 시간 규모, 측정 오차가 어떻게 달라지는지 분석하여 규모에 따른 과학적 탐구 방법의 차이를 이해한다.'},
    {label:'관련 과학 개념', body:'· 규모(scale): 대상의 크기나 변화하는 시간의 정도를 나타내는 척도이다.\n· 미시 세계: 원자·분자처럼 매우 작은 영역으로, 대표적인 예는 수소 원자(약 10⁻¹⁰ m)이다.\n· 거시 세계: 천체처럼 매우 큰 영역으로, 대표적인 예는 우리은하(약 10²¹ m)이다.\n· 기본량과 단위: 길이(m), 시간(s)처럼 측정의 기준이 되는 양이다.\n· 측정 오차: 측정값과 참값의 차이로, 측정 방법과 대상에 따라 그 의미와 허용 범위가 달라진다.'},
    {label:'탐구 과정 (시뮬레이션 분석)', body:'물체의 크기 비교 시뮬레이션을 이용하여 수소 원자부터 우리은하까지 여러 대상을 크기 순서로 배열하며 관찰하였다. 가장 작은 대상으로 수소 원자가, 가장 큰 대상으로 우리은하가 제시되었으며, 그 사이에 다양한 규모의 물체가 폭넓게 분포함을 확인하였다.'},
    {label:'결과 분석', body:'규모가 달라지면 단순히 크기만 변하는 것이 아니라 탐구 방식 전반이 달라졌다.\n(1) 측정 방법의 가변성 — 미시 세계와 거시 세계는 같은 도구나 단위로 잴 수 없으며, 각 규모에 맞는 측정 체계가 필요하다.\n(2) 시간 규모의 차이 — 규모에 따라 변화가 일어나고 관찰되는 시간의 단위가 달라진다.\n(3) 측정 오차 범위의 차이 — 같은 크기의 오차라도 미시 세계와 거시 세계에서 갖는 의미가 다르므로, 오차를 해석하는 기준도 규모에 맞게 다시 정해야 한다.'},
    {label:'결론', body:'자연 현상은 수소 원자에서 우리은하까지 극도로 다양한 규모를 가진다. 성공적인 과학적 분석을 위해서는 먼저 대상의 규모를 파악하고, 그 규모에 맞는 측정 방법·시간 관점·오차 기준을 적용해야 한다. 즉 규모의 변화는 곧 탐구 패러다임의 변화를 의미한다.'},
    {label:'느낀 점', body:'같은 \u2018측정\u2019이라는 말도 대상의 크기에 따라 완전히 다른 방법과 기준을 요구한다는 점이 인상 깊었다. 앞으로 어떤 현상을 탐구할 때 \u2018이 대상은 어느 정도 규모인가\u2019를 먼저 생각하는 습관을 기르게 되었다.'}
  ],
  saet:'미시 세계와 거시 세계의 규모 비교 시뮬레이션을 분석하여 수소 원자와 우리은하를 양 극단의 사례로 제시하고, 규모의 차이가 측정 방법·시간 규모·측정 오차의 차이로 이어짐을 논리적으로 설명함. 규모에 따라 과학적 탐구 방법이 달라진다는 점을 스스로 도출하여 통합적 과학 사고력을 보임.'
},
{
  id:'smart-measure', subject:'통합과학1', accent:'a', emoji:'📱',
  unit:'Ⅰ. 과학의 기초 · 과학의 기본량',
  title:'스마트 기기를 활용한 기본량(길이·거리·시간) 측정',
  tags:['통합과학1','실험영상','기본량','측정'],

/* ════════ 상태 ════════ */
var curTab='통합과학1', curTopic=null;
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function $(id){return document.getElementById(id)}

/* ════════ 목록 ════════ */
function setTab(s){curTab=s;document.querySelectorAll('.tab').forEach(function(t){t.classList.toggle('active',t.getAttribute('data-subj')===s)});renderList();}
function renderList(){
  var list=TOPICS.filter(function(t){return t.subject===curTab});
  var grid=$('topic-grid'),empty=$('topic-empty');
  $('list-count').textContent='주제 '+list.length+'개';
  if(!list.length){grid.innerHTML='';empty.classList.remove('hidden');return;}
  empty.classList.add('hidden');
  grid.innerHTML=list.map(function(t){
    return '<div class="topic-card" onclick="openTopic(\''+t.id+'\')">'+
      '<div class="tc-banner tb-'+t.accent+'"><span class="tc-unit">'+esc(t.unit.split(' · ')[0])+'</span><span class="tc-emoji">'+t.emoji+'</span></div>'+
      '<div class="tc-body"><div class="tc-title">'+esc(t.title)+'</div>'+
      '<div class="tc-tags">'+t.tags.map(function(g){return '<span class="tg">'+esc(g)+'</span>'}).join('')+'</div>'+
      '<div class="tc-go">보고서 보기 →</div></div></div>';
  }).join('');
}

/* ════════ 보고서 ════════ */
function openTopic(id){
  curTopic=TOPICS.find(function(t){return t.id===id});if(!curTopic)return;
  $('view-list').classList.add('hidden');
  $('view-report').classList.remove('hidden');
  $('dock').classList.add('show');
  $('bc-tail').textContent='📄 '+curTopic.title;
  renderReport();
  window.scrollTo(0,0);
}
function goList(){
  curTopic=null;
  $('view-report').classList.add('hidden');
  $('view-list').classList.remove('hidden');
  $('dock').classList.remove('show');
  $('bc-tail').textContent='📝 수행평가 보고서';
  renderList();window.scrollTo(0,0);
}
function autoRows(text){var lines=String(text).split('\n').length;var wrap=Math.ceil(String(text).length/38);return Math.min(22,Math.max(3,lines+wrap-Math.floor(lines/2)));}
function renderReport(){
  var t=curTopic;
  var secs=t.sections.map(function(s,i){
    return '<div class="rep-sec"><div class="sec-label"><span class="sec-no">'+(i+1)+'</span>'+esc(s.label)+'</div>'+
      '<textarea class="textarea" data-sec="'+i+'" rows="'+autoRows(s.body)+'">'+esc(s.body)+'</textarea></div>';
  }).join('');
  var saet='<div class="saet-block"><div class="saet-head"><span class="saet-title">🏆 세특 문장 (교사 기록용)</span>'+
    '<button class="btn btn-ghost btn-sm" onclick="copySaet()">📋 세특만 복사</button></div>'+
    '<textarea class="textarea" id="saet-area" rows="'+autoRows(t.saet)+'">'+esc(t.saet)+'</textarea></div>';
  $('report-host').innerHTML=
    '<div class="rep-head rh-'+t.accent+'"><div class="rep-unit">'+esc(t.unit)+'</div>'+
    '<div class="rep-title">'+esc(t.title)+'</div>'+
    '<div class="rep-tags">'+t.tags.map(function(g){return '<span class="tg">'+esc(g)+'</span>'}).join('')+'</div></div>'+
    '<div class="name-row"><label>학번 / 이름 (직접 입력)</label><input class="input" id="stu-name" placeholder="1학년 O반 O번 / 이름"></div>'+
    secs+saet;
}

/* ════════ 텍스트 조립 ════════ */
function buildText(){
  var t=curTopic;if(!t)return '';
  var name=($('stu-name')&&$('stu-name').value.trim())||'';
  var out='[통합과학 수행평가 탐구 보고서]\n';
  if(name)out+='학번 / 이름: '+name+'\n';
  out+='탐구 주제: '+t.title+'\n\n';
  document.querySelectorAll('[data-sec]').forEach(function(ta){
    var i=parseInt(ta.getAttribute('data-sec'),10);
    out+=(i+1)+'. '+t.sections[i].label+'\n'+ta.value.trim()+'\n\n';
  });
  return out.trim();
}
function buildSaetText(){var a=$('saet-area');return a?a.value.trim():(curTopic?curTopic.saet:'');}

/* ════════ 복사 ════════ */
function doCopy(text,okMsg){
  if(navigator.clipboard&&window.isSecureContext){
    navigator.clipboard.writeText(text).then(function(){toast(okMsg)}).catch(function(){fallbackCopy(text,okMsg)});
  }else{fallbackCopy(text,okMsg);}
}
function fallbackCopy(text,okMsg){
  var ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.top='-1000px';
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand('copy');toast(okMsg);}catch(e){toast('복사 실패 — 길게 눌러 직접 복사하세요');}
  document.body.removeChild(ta);
}
function copyAll(){doCopy(buildText(),'보고서 전체를 복사했어요 📋');}
function copySaet(){doCopy(buildSaetText(),'세특 문장을 복사했어요 📋');}

/* ════════ 인쇄 / PDF ════════ */
function buildPrintHTML(){
  var t=curTopic;var name=($('stu-name')&&$('stu-name').value.trim())||'';
  var body='<div style="text-align:center;border-bottom:2px solid #1e3a8a;padding-bottom:14px;margin-bottom:18px">'+
    '<div style="font-size:12px;color:#2563eb;font-weight:700;letter-spacing:1px">통합과학 수행평가 탐구 보고서</div>'+
    '<div style="font-size:20px;font-weight:800;color:#1e3a8a;margin-top:8px;line-height:1.4">'+esc(t.title)+'</div>'+
    (name?'<div style="font-size:13px;color:#444;margin-top:8px">학번 / 이름: '+esc(name)+'</div>':'')+'</div>';
  document.querySelectorAll('[data-sec]').forEach(function(ta){
    var i=parseInt(ta.getAttribute('data-sec'),10);
    body+='<div style="margin-bottom:14px"><div style="font-size:14px;font-weight:800;color:#1e3a8a;margin-bottom:5px">'+(i+1)+'. '+esc(t.sections[i].label)+'</div>'+
      '<div style="font-size:13px;line-height:1.85;color:#222;white-space:pre-wrap">'+esc(ta.value.trim())+'</div></div>';
  });
  body+='<div style="margin-top:8px;background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:12px"><div style="font-size:13px;font-weight:800;color:#92400e;margin-bottom:5px">🏆 세특 문장</div>'+
    '<div style="font-size:13px;line-height:1.85;color:#222;white-space:pre-wrap">'+esc(buildSaetText())+'</div></div>';
  return '<div style="max-width:680px;margin:0 auto;padding:24px;font-family:-apple-system,Arial,sans-serif">'+body+
    '<div style="text-align:center;font-size:11px;color:#aaa;margin-top:24px;border-top:1px solid #eee;padding-top:10px">베타과학학원 · 통합과학 수행평가</div></div>';
}
function printReport(){
  var w=window.open('','_blank');
  if(!w){toast('팝업이 차단됐어요. 복사 기능을 이용하세요');return;}
  w.document.write('<html><head><meta charset="utf-8"><title>'+esc(curTopic.title)+'</title></head><body>'+buildPrintHTML()+'</body></html>');
  w.document.close();w.focus();setTimeout(function(){w.print();},350);
}
function exportPDF(){
  if(typeof html2pdf==='undefined'){toast('PDF 로드 실패 — 인쇄를 이용하세요');return;}
  toast('PDF 만드는 중...');
  var holder=document.createElement('div');holder.innerHTML=buildPrintHTML();
  var name=curTopic.title.replace(/[^\w가-힣]/g,'_').slice(0,40)+'.pdf';
  html2pdf().set({margin:8,filename:name,image:{type:'jpeg',quality:0.96},html2canvas:{scale:2,useCORS:true},jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}}).from(holder).save().catch(function(){toast('PDF 오류 — 인쇄를 이용하세요');});
}

/* ════════ 토스트 ════════ */
var toastTimer=null;
function toast(msg){var el=$('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(function(){el.classList.remove('show')},2000);}

/* ════════ 시작 ════════ */
renderList();
</script>
</body>
</html>

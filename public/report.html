<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>베타과학학원 · 학생별 분석 리포트</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
  background: #fafafa; color: #1d1d1f; min-height: 100vh;
  -webkit-font-smoothing: antialiased; visibility: hidden;
}
.header {
  background: #ffffff; border-bottom: 1px solid #f0e8ed;
  padding: 0 1.5rem; height: 54px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 300;
}
.header-left { display: flex; align-items: center; gap: 9px; }
.logo-mark {
  width: 30px; height: 30px;
  background: linear-gradient(135deg, #f472b6 0%, #db2777 100%);
  border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.brand-name { font-size: 14px; font-weight: 600; color: #1d1d1f; letter-spacing: -0.3px; }
.header-badge {
  display: flex; align-items: center; gap: 5px;
  background: #f0fdf4; border: 1px solid #bbf7d0;
  border-radius: 20px; padding: 4px 10px;
  font-size: 10px; font-weight: 600; color: #16a34a; white-space: nowrap;
}
.dot-green { width: 5px; height: 5px; background: #22c55e; border-radius: 50%; animation: blink 2s ease-in-out infinite; flex-shrink: 0; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.sub-bar {
  background: #ffffff; border-bottom: 1px solid #f5f0f3;
  padding: 0 1.5rem; height: 46px;
  display: flex; align-items: center; gap: 8px;
}
.back-btn {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 12px; font-weight: 600; color: #db2777;
  background: none; border: none; cursor: pointer;
  font-family: inherit; padding: 4px 8px; border-radius: 8px;
  text-decoration: none; transition: background 0.15s;
}
.back-btn:hover { background: #fdf2f8; }
.sub-sep { color: #e0d0d8; font-size: 14px; }
.sub-title { font-size: 13px; font-weight: 600; color: #1d1d1f; }
.sub-hint { font-size: 11px; color: #aeaeb2; margin-left: 4px; }
.main-tabs {
  background: #ffffff; border-bottom: 1px solid #fce7f3;
  padding: 0 1.5rem; display: flex; gap: 0; overflow-x: auto;
}
.mtab {
  padding: 12px 20px; font-size: 13px; font-weight: 500;
  color: #aeaeb2; border: none; background: none; cursor: pointer;
  font-family: inherit; border-bottom: 2px solid transparent;
  transition: all 0.15s; white-space: nowrap;
}
.mtab.on { color: #db2777; border-bottom-color: #db2777; font-weight: 600; }
.mtab:hover:not(.on) { color: #6e6e73; }
.wrap { max-width: 980px; margin: 0 auto; padding: 1.4rem 1rem 3rem; }
.view { display: none; }
.view.active { display: block; }
.list-top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 1rem; flex-wrap: wrap; gap: 8px;
}
.list-heading { font-size: 1rem; font-weight: 700; color: #1d1d1f; letter-spacing: -0.02em; }
.list-meta { font-size: 11px; color: #aeaeb2; }
.filter-row { display: flex; gap: 8px; flex-wrap: wrap; }
.search-input {
  padding: 7px 12px; border: 1.5px solid #fce7f3; border-radius: 10px;
  font-size: 12px; font-family: inherit; color: #1d1d1f; outline: none; min-width: 160px;
  transition: border 0.15s;
}
.search-input:focus { border-color: #db2777; }
.filter-select {
  padding: 7px 12px; border: 1.5px solid #fce7f3; border-radius: 10px;
  font-size: 12px; font-family: inherit; color: #1d1d1f;
  background: #fff; outline: none; cursor: pointer; appearance: none; min-width: 110px;
}
.filter-select:focus { border-color: #db2777; }

.stu-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
.stu-card {
  background: #ffffff; border: 1px solid #fce7f3; border-radius: 14px;
  padding: 1rem; cursor: pointer;
  transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
}
.stu-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(219,39,119,0.1); border-color: #fbcfe8; }
.stu-card-top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.stu-av { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
.stu-card-name { font-size: 14px; font-weight: 700; color: #1d1d1f; letter-spacing: -0.02em; }
.stu-card-grade { font-size: 11px; color: #aeaeb2; margin-top: 1px; }

.stu-card-tests { display: flex; flex-direction: column; gap: 3px; margin-bottom: 8px; min-height: 20px; }
.stu-test-tag {
  font-size: 10px; color: #7c3aed; background: #ede9fe;
  padding: 2px 7px; border-radius: 5px; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis; max-width: 100%;
  display: inline-block;
}
.stu-test-more { font-size: 10px; color: #aeaeb2; }

.empty-box { padding: 3rem; text-align: center; font-size: 13px; color: #aeaeb2; background: #fff; border: 1px solid #fce7f3; border-radius: 16px; }
.back-row { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-bottom: 1rem; }
.back-detail {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 12px; font-weight: 600; color: #db2777;
  background: none; border: none; cursor: pointer;
  font-family: inherit; padding: 4px 0; transition: opacity 0.15s;
}
.back-detail:hover { opacity: 0.7; }
.print-btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 7px 16px; background: #fdf2f8; border: 1px solid #fce7f3;
  border-radius: 10px; font-size: 12px; font-weight: 600; color: #db2777;
  cursor: pointer; font-family: inherit; transition: background 0.15s;
}
.print-btn:hover { background: #fce7f3; }
.period-tabs { display: flex; gap: 6px; margin-bottom: 1.2rem; flex-wrap: wrap; }
.ptab {
  padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 500;
  font-family: inherit; border: 1px solid #fce7f3; background: #ffffff; color: #6e6e73;
  cursor: pointer; transition: all 0.15s;
}
.ptab.on { background: #db2777; color: #fff; border-color: #db2777; }
.ptab:hover:not(.on) { background: #fdf2f8; }
.profile-card {
  background: #ffffff; border: 1px solid #fce7f3; border-radius: 16px;
  padding: 1.2rem 1.4rem; display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap;
}
.p-av { width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 700; flex-shrink: 0; }
.p-name { font-size: 1.1rem; font-weight: 700; color: #1d1d1f; letter-spacing: -0.02em; }
.p-meta { font-size: 11px; color: #aeaeb2; margin-top: 3px; }
.p-badges { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
.p-badge { font-size: 10px; font-weight: 600; padding: 3px 9px; border-radius: 6px; }
.p-right { margin-left: auto; text-align: right; }
.p-overall-n { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.03em; line-height: 1; }
.p-overall-l { font-size: 10px; color: #aeaeb2; margin-top: 3px; letter-spacing: 0.05em; }
.c-good { color: #0369a1; } .c-avg { color: #d97706; } .c-warn { color: #dc2626; }

.mini-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 1rem; }
.mini-card { background: #ffffff; border: 1px solid #fce7f3; border-radius: 12px; padding: 0.85rem 0.6rem; text-align: center; }
.mini-n { font-size: 1.15rem; font-weight: 700; letter-spacing: -0.02em; }
.mini-l { font-size: 10px; color: #aeaeb2; margin-top: 3px; font-weight: 500; line-height: 1.3; }
.analysis-row { display: grid; grid-template-columns: 260px 1fr; gap: 10px; margin-bottom: 1rem; }
.chart-card { background: #ffffff; border: 1px solid #fce7f3; border-radius: 16px; padding: 1.2rem 1.4rem; }
.card-title { font-size: 13px; font-weight: 600; color: #1d1d1f; margin-bottom: 1rem; }
.radar-wrap { display: flex; justify-content: center; }
.analysis-items { display: flex; flex-direction: column; gap: 7px; }
.analysis-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; border-radius: 10px; background: #fafafa; border: 1px solid #f5f5f7; }
.ai-label { font-size: 12px; font-weight: 500; color: #3c3c43; }
.ai-val { font-size: 12px; font-weight: 700; }
.total-comment { margin-top: 10px; padding: 10px 12px; background: #fdf2f8; border-radius: 10px; font-size: 12px; color: #3c3c43; line-height: 1.7; }
.trend-card { background: #ffffff; border: 1px solid #fce7f3; border-radius: 16px; padding: 1.2rem 1.4rem; margin-bottom: 1rem; }
.trend-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; flex-wrap: wrap; gap: 6px; }
.trend-title { font-size: 13px; font-weight: 600; color: #1d1d1f; }
.trend-badge { font-size: 10px; font-weight: 600; padding: 3px 9px; border-radius: 6px; }
.tb-up { background: #dcfce7; color: #166534; }
.tb-dn { background: #fee2e2; color: #991b1b; }
.tb-fl { background: #f5f5f7; color: #6e6e73; }
.legend { display: flex; gap: 12px; flex-wrap: wrap; }
.leg { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #6e6e73; }
.leg-dot { width: 8px; height: 8px; border-radius: 50%; }
.trend-canvas-wrap { position: relative; height: 180px; }
.exam-tabs { display: flex; gap: 6px; margin-bottom: 1rem; flex-wrap: wrap; }
.etab {
  padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 500;
  font-family: inherit; border: 1px solid #fce7f3; background: #ffffff; color: #6e6e73;
  cursor: pointer; transition: all 0.15s;
}
.etab.on { background: #db2777; color: #fff; border-color: #db2777; }
.etab:hover:not(.on) { background: #fdf2f8; }
.result-section { margin-bottom: 1rem; }
.result-section-title { font-size: 13px; font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.rs-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.result-table { background: #ffffff; border: 1px solid #fce7f3; border-radius: 14px; overflow: hidden; }
.rt-head {
  display: grid; padding: 0.6rem 1.2rem;
  background: #fdf2f8; border-bottom: 1px solid #fce7f3;
  font-size: 10px; font-weight: 700; color: #c9a8bc; letter-spacing: 0.1em; text-transform: uppercase;
}
.rt-row { display: grid; padding: 0.75rem 1.2rem; border-bottom: 1px solid #fdf2f8; align-items: center; transition: background 0.15s; }
.rt-row:last-child { border-bottom: none; }
.rt-row:hover { background: #fffbfe; }

.gt-base { grid-template-columns: 1fr 90px 90px 80px 100px; }

.cell-name { font-size: 12px; font-weight: 500; color: #1d1d1f; }
.cell-date { font-size: 11px; color: #aeaeb2; }
.cell-score { font-size: 13px; font-weight: 700; }
.cs-ox { color: #1e40af; } .cs-mc { color: #5b21b6; } .cs-ms { color: #065f46; }
.bar-wrap { display: flex; align-items: center; gap: 6px; }
.bar-track { flex: 1; height: 5px; background: #f5f5f7; border-radius: 3px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }

.attempt-badge {
  display: inline-flex; align-items: center; font-size: 10px; font-weight: 700;
  padding: 2px 8px; border-radius: 6px; white-space: nowrap;
}
.ab-first  { background: #dbeafe; color: #1e40af; }
.ab-retry1 { background: #ede9fe; color: #5b21b6; }
.ab-retry2 { background: #fef9c3; color: #854d0e; }
.ab-retry3 { background: #fee2e2; color: #991b1b; }
.ab-retry  { background: #f5f5f7; color: #6e6e73; }

.fb-chip { display: inline-flex; align-items: center; font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 6px; }
.fb-g { background: #dcfce7; color: #166534; }
.fb-a { background: #fef9c3; color: #854d0e; }
.fb-w { background: #fee2e2; color: #991b1b; }
.q-section { background: #ffffff; border: 1px solid #d1fae5; border-radius: 16px; padding: 1.2rem 1.4rem; margin-bottom: 1rem; }
.q-section-title { font-size: 13px; font-weight: 600; color: #065f46; margin-bottom: 1rem; display: flex; align-items: center; gap: 6px; }
.q-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(38px, 1fr)); gap: 6px; }
.q-bubble { aspect-ratio: 1; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; }
.q-o { background: #dcfce7; color: #166534; }
.q-x { background: #fee2e2; color: #991b1b; }
.q-stat { margin-top: 10px; font-size: 12px; color: #3c3c43; display: flex; gap: 16px; flex-wrap: wrap; }
.q-stat b { color: #065f46; }
.empty-state { padding: 2.5rem; text-align: center; font-size: 13px; color: #aeaeb2; }
@media (max-width: 700px) {
  .mini-grid { grid-template-columns: repeat(2, 1fr); }
  .analysis-row { grid-template-columns: 1fr; }
  .gt-base { grid-template-columns: 1fr 80px 70px; }
  .gt-base > *:nth-child(4), .gt-base > *:nth-child(5) { display: none; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <div class="logo-mark">
      <svg width="16" height="16" viewBox="0 0 18 18" fill="none">
        <circle cx="9" cy="7" r="3" fill="rgba(255,255,255,0.9)"/>
        <path d="M3.5 16c0-3 2.5-5.5 5.5-5.5s5.5 2.5 5.5 5.5" stroke="rgba(255,255,255,0.9)" stroke-width="1.4" stroke-linecap="round" fill="none"/>
      </svg>
    </div>
    <span class="brand-name">베타과학학원</span>
  </div>
  <div style="display:flex;align-items:center;gap:10px;">
    <div class="header-badge"><span class="dot-green"></span>SYSTEM ONLINE</div>
    <button onclick="doLogout()" style="padding:6px 14px;background:transparent;border:1.5px solid #f4c8d4;border-radius:20px;font-family:inherit;font-size:11px;font-weight:600;color:#e8375a;cursor:pointer;"
      onmouseover="this.style.background='#fceef2'" onmouseout="this.style.background='transparent'">로그아웃</button>
  </div>
</header>

<div class="sub-bar">
  <a class="back-btn" href="index.html">
    <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M9 11L5 7l4-4" stroke="#db2777" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    홈으로
  </a>
  <span class="sub-sep">›</span>
  <span class="sub-title" id="bar-title">학생별 분석 리포트</span>
  <span class="sub-hint" id="bar-hint">학생 이름을 클릭하면 종합 분석을 볼 수 있습니다</span>
</div>

<div class="main-tabs">
  <button class="mtab on" id="tab-list-btn" onclick="goList()">📋 학생 목록</button>
  <button class="mtab" id="tab-report-btn" style="display:none;">📊 <span id="tab-stu-name">—</span> 리포트</button>
</div>

<div class="wrap">

  <div id="v-list" class="view active">
    <div class="list-top">
      <div>
        <div class="list-heading">전체 학생</div>
        <div class="list-meta" id="stu-count">불러오는 중...</div>
      </div>
      <div class="filter-row">
        <input class="search-input" type="text" id="search-input" placeholder="이름 검색..." oninput="filterCards()">
        <select class="filter-select" id="grade-filter" onchange="filterCards()">
          <option value="">전체 학년</option>
          <option value="중등1학년">중1</option>
          <option value="중등2학년">중2</option>
          <option value="중등3학년">중3</option>
          <option value="고등1학년">고1</option>
          <option value="고등2학년">고2</option>
          <option value="고등3학년">고3</option>
        </select>
      </div>
    </div>
    <div class="stu-cards" id="stu-cards">
      <div class="empty-box">학생 데이터를 불러오는 중입니다...</div>
    </div>
  </div>

  <div id="v-report" class="view">
    <div class="back-row">
      <button class="back-detail" onclick="goList()">
        <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M9 11L5 7l4-4" stroke="#db2777" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        학생 목록으로
      </button>
      <button class="print-btn" onclick="window.print()">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><rect x="3" y="1" width="10" height="7" rx="1.2" stroke="#db2777" stroke-width="1.2"/><rect x="1" y="6" width="14" height="7" rx="1.5" stroke="#db2777" stroke-width="1.2"/><rect x="4" y="10" width="8" height="4" rx="0.8" fill="#fce7f3"/><circle cx="12.5" cy="9" r="0.8" fill="#db2777"/></svg>
        인쇄 / PDF
      </button>
    </div>

    <div class="period-tabs">
      <button class="ptab on" onclick="setPeriod('all',this)">전체</button>
      <button class="ptab" onclick="setPeriod('1w',this)">최근 1주</button>
      <button class="ptab" onclick="setPeriod('1m',this)">최근 1개월</button>
      <button class="ptab" onclick="setPeriod('3m',this)">최근 3개월</button>
      <button class="ptab" onclick="setPeriod('6m',this)">최근 6개월</button>
      <button class="ptab" onclick="setPeriod('1y',this)">최근 1년</button>
    </div>

    <div class="profile-card">
      <div class="p-av" id="r-av"></div>
      <div>
        <div class="p-name" id="r-name"></div>
        <div class="p-meta" id="r-meta"></div>
        <div id="r-test-names" style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;"></div>
        <div class="p-badges" id="r-badges"></div>
      </div>
      <div class="p-right">
        <div class="p-overall-n" id="r-overall">—</div>
        <div class="p-overall-l">종합 평가</div>
      </div>
    </div>

    <div class="mini-grid">
      <div class="mini-card"><div class="mini-n" id="r-cnt" style="color:#db2777;">0</div><div class="mini-l">총 응시 횟수</div></div>
      <div class="mini-card"><div class="mini-n" id="r-ox"  style="color:#1e40af;">—</div><div class="mini-l">OX 평균</div></div>
      <div class="mini-card"><div class="mini-n" id="r-mc"  style="color:#5b21b6;">—</div><div class="mini-l">4지선다 평균</div></div>
      <div class="mini-card"><div class="mini-n" id="r-ms"  style="color:#065f46;">—</div><div class="mini-l">마스터 평균</div></div>
    </div>

    <div class="analysis-row">
      <div class="chart-card">
        <div class="card-title">종합 역량 분석</div>
        <div class="radar-wrap"><canvas id="radar-chart" width="220" height="200"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="card-title">분석 요약</div>
        <div class="analysis-items" id="r-analysis-items"></div>
        <div class="total-comment" id="r-comment"></div>
      </div>
    </div>

    <div class="trend-card">
      <div class="trend-head">
        <span class="trend-title">점수 추이</span>
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
          <span class="trend-badge tb-fl" id="r-trend-badge">—</span>
          <div class="legend">
            <div class="leg"><div class="leg-dot" style="background:#1e40af;"></div>OX</div>
            <div class="leg"><div class="leg-dot" style="background:#5b21b6;"></div>4지선다</div>
            <div class="leg"><div class="leg-dot" style="background:#10b981;"></div>마스터</div>
          </div>
        </div>
      </div>
      <div class="trend-canvas-wrap"><canvas id="trend-chart"></canvas></div>
    </div>

    <div class="exam-tabs">
      <button class="etab on" onclick="pickExam('all',this)">전체</button>
      <button class="etab" onclick="pickExam('ox',this)">OX 문제</button>
      <button class="etab" onclick="pickExam('mc',this)">4지선다</button>
      <button class="etab" onclick="pickExam('master',this)">마스터테스트</button>
    </div>
    <div id="r-result-wrap"></div>

    <div class="q-section" id="r-q-section" style="display:none;">
      <div class="q-section-title">

<script type="module">
import { initializeApp }               from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const cfg = {
  apiKey:"AIzaSyD5MQx_rXO_xRYelyKxK090TaKa3Gg2D3k",
  authDomain:"beta-science.firebaseapp.com",
  projectId:"beta-science",
  storageBucket:"beta-science.firebasestorage.app",

};
const app  = initializeApp(cfg);

const GRADE_BG    = {'중등1학년':'#eff6ff','중등2학년':'#f0fdf4','중등3학년':'#fefce8','고등1학년':'#fdf4ff','고등2학년':'#fff7ed','고등3학년':'#fdf2f8'};
const GRADE_COL   = {'중등1학년':'#1d4ed8','중등2학년':'#15803d','중등3학년':'#a16207','고등1학년':'#7e22ce','고등2학년':'#c2410c','고등3학년':'#db2777'};
const GRADE_SHORT = {'중등1학년':'중1','중등2학년':'중2','중등3학년':'중3','고등1학년':'고1','고등2학년':'고2','고등3학년':'고3'};

let students=[], allRecs={}, curStu=null, curPeriod='all', curExam='all';
let radarInst=null, trendInst=null;

onAuthStateChanged(auth, async user => {
  if (!user) { location.replace('/login.html'); return; }
  try {
    const snap = await getDoc(doc(db,'users',user.uid));
    if (!snap.exists() || snap.data().status !== 'approved') {
      await signOut(auth); location.replace('/login.html'); return;
    }
    document.body.style.visibility = 'visible';
    await loadStudents();
  } catch { location.replace('/login.html'); }
});
window.doLogout = async () => { await signOut(auth); location.replace('/login.html'); };

async function loadStudents() {
  try {
    const s2 = await getDocs(collection(db,'students'));
    students = [];
    s2.forEach(d => students.push({uid: d.id, ...d.data()}));
    if (!students.length) {
      const snaps = await getDocs(collection(db,'users'));
      snaps.forEach(d => { const u=d.data(); if(u.role==='student') students.push({uid:d.id,...u}); });
    }
  } catch { students=[]; }
  setTxt('stu-count', `총 ${students.length}명`);
  renderCards(students);
  students.forEach(loadCardSummary);
}

/* ── loadCardSummary: timestamp 조건 제거 → JS에서 필터/정렬 ── */
async function loadCardSummary(s) {
  const studentId = s.id || s.uid;
  try {
    const since = new Date(); since.setDate(since.getDate()-28);
    const q = query(
      collection(db,'grades'),
      where('studentId','==',studentId)
    );
    const snap = await getDocs(q);

    const docsAsc = snap.docs
      .map(d => d.data())
      .filter(r => toDate(r.timestamp) >= since)
      .sort((a,b) => toDate(a.timestamp).getTime() - toDate(b.timestamp).getTime());

    const firstMap = new Map();
    const testNames = [];
    const seenNames = new Set();

    docsAsc.forEach(r => {
      const testKey = r.examId||r.testId||r.testName||r.examTitle||'unknown';
      if(!firstMap.has(testKey)) firstMap.set(testKey, r);
      const tname = r.testName||r.examTitle||'';
      if(tname && !seenNames.has(tname)) { seenNames.add(tname); testNames.push(tname); }
    });

    const card = document.getElementById(`sc-${s.uid}`);
    if (!card) return;

    const testsWrap = card.querySelector('.stu-card-tests');
    if(testsWrap && testNames.length) {
      const show = testNames.slice(0,2);
      const more = testNames.length - show.length;
      testsWrap.innerHTML = show.map(n=>`<span class="stu-test-tag">${esc2(n)}</span>`).join('')
        + (more>0?`<span class="stu-test-more">+${more}개</span>`:'');
    }
  } catch(e) { console.error('loadCardSummary error:', e); }
}

function renderCards(list) {
  const body = document.getElementById('stu-cards');
  if (!list.length) { body.innerHTML='<div class="empty-box">해당하는 학생이 없습니다.</div>'; return; }
  body.innerHTML = list.map(s => {
    const name  = s.name||s.displayName||'이름없음';
    const grade = s.grade||s.year||'—';
    const bg    = GRADE_BG[grade]||'#f5f5f7';
    const col   = GRADE_COL[grade]||'#6e6e73';
    const short = GRADE_SHORT[grade]||grade;
    const studentId = s.id || s.uid;
    return `<div class="stu-card" id="sc-${s.uid}" onclick="openReport('${esc(studentId)}','${esc(name)}','${grade}','${s.uid}')">
      <div class="stu-card-top">
        <div class="stu-av" style="background:${bg};color:${col};">${short}</div>
        <div><div class="stu-card-name">${name}</div><div class="stu-card-grade">${grade}</div></div>
      </div>
      <div class="stu-card-tests"></div>
    </div>`;
  }).join('');
}

window.filterCards = () => {
  const q = (document.getElementById('search-input').value||'').toLowerCase();
  const g = document.getElementById('grade-filter').value;
  const filtered = students.filter(s => {
    const name  = (s.name||s.displayName||'').toLowerCase();
    const grade = s.grade||s.year||'';
    return (!q||name.includes(q)) && (!g||grade===g);
  });
  renderCards(filtered);
  filtered.forEach(loadCardSummary);
};

function toDate(ts) {
  if(!ts) return new Date(0);
  if(ts && typeof ts === 'object' && ts.seconds) return new Date(ts.seconds * 1000);
  if(ts && typeof ts.toDate === 'function') return ts.toDate();
  return new Date(ts);
}

/* ── openReport: orderBy 제거 → JS에서 정렬 ── */
window.openReport = async (studentId, name, grade, uid) => {
  curStu = {studentId, name, grade, uid};
  curPeriod = 'all'; curExam = 'all';

  setTxt('tab-stu-name', name);
  document.getElementById('tab-report-btn').style.display = '';
  document.querySelectorAll('.mtab').forEach(t => t.classList.remove('on'));
  document.getElementById('tab-report-btn').classList.add('on');
  setTxt('bar-title', name+' 분석 리포트');
  setTxt('bar-hint', '기간을 선택해 성적을 분석합니다');

  document.querySelectorAll('.ptab').forEach((t,i) => t.classList.toggle('on', i===0));
  document.querySelectorAll('.etab').forEach((t,i) => t.classList.toggle('on', i===0));

  const bg=GRADE_BG[grade]||'#f5f5f7', col=GRADE_COL[grade]||'#6e6e73', short=GRADE_SHORT[grade]||grade;
  const av=document.getElementById('r-av');
  av.textContent=short; av.style.background=bg; av.style.color=col;
  setTxt('r-name', name);
  setTxt('r-meta', `${grade} · 종합 성적 분석 리포트`);

  try {
    const q = query(
      collection(db,'grades'),
      where('studentId','==',studentId)
    );
    const snap = await getDocs(q);
    allRecs[uid] = [];
    snap.forEach(d => allRecs[uid].push({id:d.id,...d.data()}));
    allRecs[uid].sort((a,b) => toDate(a.timestamp).getTime() - toDate(b.timestamp).getTime());
  } catch(e) { console.error('openReport error:', e); allRecs[uid]=[]; }

  document.getElementById('v-list').classList.remove('active');
  document.getElementById('v-report').classList.add('active');
  renderReport();
};

function buildAttemptInfo(recs) {
  const groupMap = new Map();
  recs.forEach(r => {
    const testKey = r.examId||r.testId||r.testName||r.examTitle||'unknown';
    if(!groupMap.has(testKey)) groupMap.set(testKey, []);
    groupMap.get(testKey).push(r);
  });
  const infoMap = new Map();
  groupMap.forEach((arr) => {
    arr.forEach((r, i) => {
      const total = arr.length;
      let label = '첫시험';
      let isRetry = false;
      if(i > 0) { label = `재시험${i}`; isRetry = true; }
      infoMap.set(r.id, {label, index:i, total, isRetry});
    });
  });
  return infoMap;
}

function renderReport() {
  const uid = curStu.uid;
  const all = allRecs[uid]||[];
  const filtered = filterByPeriod(all, curPeriod);

  const testNamesEl = document.getElementById('r-test-names');
  const seenTestNames = new Set();
  const uniqueTestNames = [];
  filtered.forEach(r => {
    const n = r.testName||r.examTitle||'';
    if(n && !seenTestNames.has(n)) { seenTestNames.add(n); uniqueTestNames.push(n); }
  });
  testNamesEl.innerHTML = uniqueTestNames.slice(0,4).map(n =>
    `<span style="font-size:10px;font-weight:600;padding:2px 8px;border-radius:5px;background:#ede9fe;color:#5b21b6;">${esc2(n)}</span>`
  ).join('') + (uniqueTestNames.length > 4 ? `<span style="font-size:10px;color:#aeaeb2;">+${uniqueTestNames.length-4}개</span>` : '');

  const attemptInfo = buildAttemptInfo(filtered);
  const firstOnly = filtered.filter(r => {
    const info = attemptInfo.get(r.id);
    return !info || info.index === 0;
  });

  const ox  = firstOnly.filter(r=>(r.testType||'mc')==='ox');
  const mc  = firstOnly.filter(r=>(r.testType||'mc')==='mc');
  const ms  = firstOnly.filter(r=>(r.testType||'mc')==='master');
  const avg = arr => arr.length ? Math.round(arr.map(scoreOf).reduce((a,v)=>a+v,0)/arr.length) : null;

  const oxA=avg(ox), mcA=avg(mc), msA=avg(ms);

  setTxt('r-cnt', filtered.length);
  setTxt('r-ox',  oxA!==null  ? oxA+'점'  : '—');
  setTxt('r-mc',  mcA!==null  ? mcA+'점'  : '—');
  setTxt('r-ms',  msA!==null  ? msA+'점'  : '—');

  const vals=[oxA,mcA,msA].filter(v=>v!==null);
  const total=vals.length ? Math.round(vals.reduce((a,v)=>a+v,0)/vals.length) : null;

  const oel=document.getElementById('r-overall');
  if(total!==null){
    if(total>=80)      {oel.textContent=`양호 (${total}점)`;oel.className='p-overall-n c-good';}
    else if(total>=60) {oel.textContent=`보통 (${total}점)`;oel.className='p-overall-n c-avg';}
    else               {oel.textContent=`주의 (${total}점)`;oel.className='p-overall-n c-warn';}
  } else { oel.textContent='—'; oel.className='p-overall-n'; }

  document.getElementById('r-badges').innerHTML=[
    {l:'OX',      v:oxA, bg:'#dbeafe',col:'#1e40af'},
    {l:'4지선다', v:mcA, bg:'#ede9fe',col:'#5b21b6'},
    {l:'마스터',  v:msA, bg:'#d1fae5',col:'#065f46'},
  ].filter(b=>b.v!==null).map(b=>`<span class="p-badge" style="background:${b.bg};color:${b.col};">${b.l} ${b.v}점</span>`).join('');

  renderAnalysis(oxA, mcA, msA, total);
  drawRadar(oxA, mcA, msA);
  drawTrend(filtered);
  renderResults(filtered, curExam);
  renderQAnalysis(ms);
}

function renderAnalysis(oxA, mcA, msA, total) {
  document.getElementById('r-analysis-items').innerHTML=[
    {label:'OX 테스트',    val:oxA},
    {label:'4지선다',      val:mcA},
    {label:'마스터테스트', val:msA},
  ].map(r=>{
    if(r.val===null) return `<div class="analysis-item"><span class="ai-label">${r.label}</span><span class="ai-val" style="color:#aeaeb2;">데이터 없음</span></div>`;
    const cls=r.val>=80?'c-good':r.val>=60?'c-avg':'c-warn';
    const lbl=r.val>=80?`양호 (${r.val}점)`:r.val>=60?`보통 (${r.val}점)`:`주의 (${r.val}점)`;
    return `<div class="analysis-item"><span class="ai-label">${r.label}</span><span class="ai-val ${cls}">${lbl}</span></div>`;
  }).join('');

  const com=document.getElementById('r-comment');
  if(total===null){com.textContent='아직 데이터가 없습니다.';return;}
  const low=[],high=[];
  if(oxA!==null){if(oxA>=80)high.push('OX');else if(oxA<60)low.push('OX');}
  if(mcA!==null){if(mcA>=80)high.push('4지선다');else if(mcA<60)low.push('4지선다');}
  if(msA!==null){if(msA>=80)high.push('마스터');else if(msA<60)low.push('마스터');}
  let txt=curStu.name+'님 ';
  if(total>=80)      txt+='은 전반적으로 양호한 수준입니다. ';
  else if(total>=60) txt+='은 보통 수준이며 일부 영역 보완이 필요합니다. ';
  else               txt+='은 전반적인 기초 개념 복습이 필요합니다. ';
  if(high.length) txt+=high.join(', ')+' 영역은 우수한 성과를 보이고 있습니다. ';
  if(low.length)  txt+=`특히 ${low.join(', ')} 영역의 집중 학습을 권장합니다.`;
  com.textContent=txt;
}

function drawRadar(oxA, mcA, msA) {
  const ctx=document.getElementById('radar-chart').getContext('2d');
  if(radarInst) radarInst.destroy();
  radarInst=new Chart(ctx,{
    type:'radar',
    data:{
      labels:['OX 테스트','4지선다','마스터테스트','수업 테스트','과제 성취도'],
      datasets:[{
        data:[oxA||0,mcA||0,msA||0,0,0],
        backgroundColor:'rgba(219,39,119,0.15)',
        borderColor:'#db2777',borderWidth:2,
        pointBackgroundColor:'#db2777',pointRadius:4,
      }]
    },
    options:{
      responsive:false,
      plugins:{legend:{display:false}},
      scales:{r:{
        min:0,max:100,
        ticks:{stepSize:25,font:{size:9},color:'#aeaeb2'},
        grid:{color:'#fce7f3'},
        pointLabels:{font:{size:10},color:'#6e6e73'},
        angleLines:{color:'#fce7f3'},
      }}
    }
  });
}

function drawTrend(filtered) {
  const ctx=document.getElementById('trend-chart').getContext('2d');
  if(trendInst) trendInst.destroy();
  const sorted=[...filtered];
  const oxR=sorted.filter(r=>(r.testType||'mc')==='ox');
  const mcR=sorted.filter(r=>(r.testType||'mc')==='mc');
  const msR=sorted.filter(r=>(r.testType||'mc')==='master');
  const allDates=[...new Set([...oxR,...mcR,...msR].map(r=>fmtDate(r.timestamp)))].sort();
  const byDate=(recs,dates)=>dates.map(d=>{
    const dr=recs.filter(r=>fmtDate(r.timestamp)===d);
    return dr.length?Math.round(dr.map(scoreOf).reduce((a,v)=>a+v,0)/dr.length):null;
  });
  const combined=[...oxR,...mcR].sort((a,b)=>toDate(a.timestamp).getTime()-toDate(b.timestamp).getTime());
  const badge=document.getElementById('r-trend-badge');
  if(combined.length>=2){
    const diff=scoreOf(combined[combined.length-1])-scoreOf(combined[0]);
    if(diff>0)      {badge.textContent=`상승세 (+${diff}점)`;badge.className='trend-badge tb-up';}
    else if(diff<0) {badge.textContent=`하락세 (${diff}점)`;badge.className='trend-badge tb-dn';}
    else            {badge.textContent='보합세';badge.className='trend-badge tb-fl';}
  } else {badge.textContent='데이터 부족';badge.className='trend-badge tb-fl';}
  trendInst=new Chart(ctx,{
    type:'line',
    data:{
      labels:allDates,
      datasets:[
        {label:'OX',     data:byDate(oxR,allDates),borderColor:'#1e40af',backgroundColor:'rgba(30,64,175,0.06)',  tension:0.35,spanGaps:true,pointRadius:4,pointBackgroundColor:'#1e40af'},
        {label:'4지선다',data:byDate(mcR,allDates),borderColor:'#5b21b6',backgroundColor:'rgba(91,33,182,0.06)',  tension:0.35,spanGaps:true,pointRadius:4,pointBackgroundColor:'#5b21b6'},
        {label:'마스터', data:byDate(msR,allDates),borderColor:'#10b981',backgroundColor:'rgba(16,185,129,0.06)',tension:0.35,spanGaps:true,pointRadius:4,pointBackgroundColor:'#10b981'},
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        y:{min:0,max:100,ticks:{stepSize:25,font:{size:10},color:'#aeaeb2'},grid:{color:'#f5f5f7'}},
        x:{ticks:{font:{size:10},color:'#aeaeb2'},grid:{display:false}}
      }
    }
  });
}

function attemptBadge(info) {
  if(!info) return '';
  if(info.index === 0) return `<span class="attempt-badge ab-first">첫시험</span>`;
  const cls = info.index===1?'ab-retry1':info.index===2?'ab-retry2':info.index===3?'ab-retry3':'ab-retry';
  return `<span class="attempt-badge ${cls}">재시험${info.index}</span>`;
}

function renderResults(filtered, examType) {
  const wrap=document.getElementById('r-result-wrap');
  const attemptInfo = buildAttemptInfo(filtered);

  const oxR=filtered.filter(r=>(r.testType||'mc')==='ox');
  const mcR=filtered.filter(r=>(r.testType||'mc')==='mc');
  const msR=filtered.filter(r=>(r.testType||'mc')==='master');
  let html='';

  function makeRows(recs, scoreClass, barColor) {
    return recs.map(r => {
      const sc=scoreOf(r);
      const info = attemptInfo.get(r.id);
      const attempts = info ? info.total : 1;
      return `<div class="rt-row gt-base">
        <div class="cell-name">${r.testName||r.examTitle||'—'}</div>
        <div class="cell-date">${fmtDate(r.timestamp)}</div>
        <div>${attemptBadge(info)} ${attempts>1?`<span style="font-size:10px;color:#aeaeb2;">총 ${attempts}회</span>`:''}</div>
        <div class="cell-score ${scoreClass}">${sc}점</div>
        <div class="bar-wrap"><div class="bar-track"><div class="bar-fill" style="width:${sc}%;background:${barColor};"></div></div></div>
      </div>`;
    }).join('');
  }

  if((examType==='all'||examType==='ox')&&oxR.length){
    html+=`<div class="result-section">
      <div class="result-section-title"><span class="rs-dot" style="background:#1e40af;"></span><span style="color:#1e40af;">OX 문제</span><span style="font-size:11px;color:#aeaeb2;font-weight:400;">(${oxR.length}회)</span></div>
      <div class="result-table">
        <div class="rt-head gt-base"><div>단원명</div><div>시험일</div><div>응시횟수</div><div>점수</div><div>점수 바</div></div>
        ${makeRows(oxR,'cs-ox','#1e40af')}
      </div>
    </div>`;
  }

  if((examType==='all'||examType==='mc')&&mcR.length){
    html+=`<div class="result-section">
      <div class="result-section-title"><span class="rs-dot" style="background:#5b21b6;"></span><span style="color:#5b21b6;">4지선다</span><span style="font-size:11px;color:#aeaeb2;font-weight:400;">(${mcR.length}회)</span></div>
      <div class="result-table">
        <div class="rt-head gt-base"><div>단원명</div><div>시험일</div><div>응시횟수</div><div>점수</div><div>점수 바</div></div>
        ${makeRows(mcR,'cs-mc','#5b21b6')}
      </div>
    </div>`;
  }

  if((examType==='all'||examType==='master')&&msR.length){
    html+=`<div class="result-section">
      <div class="result-section-title"><span class="rs-dot" style="background:#10b981;"></span><span style="color:#065f46;">마스터테스트</span><span style="font-size:11px;color:#aeaeb2;font-weight:400;">(${msR.length}회)</span></div>
      <div class="result-table">
        <div class="rt-head gt-base"><div>단원명</div><div>시험일</div><div>응시횟수</div><div>점수</div><div>점수 바</div></div>
        ${msR.map(r=>{
          const sc=scoreOf(r);
          const info = attemptInfo.get(r.id);
          const attempts = info ? info.total : 1;
          const fb=sc>=80?`<span class="fb-chip fb-g">양호</span>`:sc>=60?`<span class="fb-chip fb-a">보통</span>`:`<span class="fb-chip fb-w">주의</span>`;
          return `<div class="rt-row gt-base">
            <div class="cell-name">${r.testName||r.examTitle||'—'}</div>
            <div class="cell-date">${fmtDate(r.timestamp)}</div>
            <div style="display:flex;align-items:center;gap:4px;">${attemptBadge(info)} ${attempts>1?`<span style="font-size:10px;color:#aeaeb2;">총 ${attempts}회</span>`:''}</div>
            <div class="cell-score cs-ms">${sc}점 ${fb}</div>
            <div class="bar-wrap"><div class="bar-track"><div class="bar-fill" style="width:${sc}%;background:#10b981;"></div></div></div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  wrap.innerHTML=html||`<div class="result-table"><div class="empty-state">해당 조건의 시험 기록이 없습니다.</div></div>`;
}

function renderQAnalysis(msRecs) {
  const sec=document.getElementById('r-q-section');
  if(!msRecs.length){sec.style.display='none';return;}
  const latest=msRecs[msRecs.length-1];
  const answers=latest.answers||[];
  if(!answers.length){sec.style.display='none';return;}
  sec.style.display='block';
  document.getElementById('r-q-grid').innerHTML=answers.map((a,i)=>{
    const ok=a.isCorrect!==undefined?a.isCorrect:a.correct===true;
    return `<div class="q-bubble ${ok?'q-o':'q-x'}" title="${a.question||'Q'+(i+1)}">${i+1}</div>`;
  }).join('');
  const correct=answers.filter(a=>a.isCorrect!==undefined?a.isCorrect:a.correct===true).length;
  document.getElementById('r-q-stat').innerHTML=
    `총 <b>${answers.length}</b>문항 &nbsp;|&nbsp; 정답 <b style="color:#166534;">${correct}</b>개 &nbsp;|&nbsp; 오답 <b style="color:#991b1b;">${answers.length-correct}</b>개 &nbsp;|&nbsp; 정답률 <b>${Math.round(correct/answers.length*100)}%</b>`;
}

window.setPeriod=(p,el)=>{
  curPeriod=p;
  document.querySelectorAll('.ptab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  renderReport();
};
window.pickExam=(e,el)=>{
  curExam=e;
  document.querySelectorAll('.etab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  renderResults(filterByPeriod(allRecs[curStu.uid]||[],curPeriod),curExam);
};
window.goList=()=>{
  document.getElementById('v-list').classList.add('active');
  document.getElementById('v-report').classList.remove('active');
  document.querySelectorAll('.mtab').forEach(t=>t.classList.remove('on'));
  document.getElementById('tab-list-btn').classList.add('on');
  setTxt('bar-title','학생별 분석 리포트');
  setTxt('bar-hint','학생 이름을 클릭하면 종합 분석을 볼 수 있습니다');
};

function filterByPeriod(recs,period){
  if(period==='all') return recs;
  const days={'1w':7,'1m':30,'3m':90,'6m':180,'1y':365}[period]||0;
  if(!days) return recs;
  const since=new Date(); since.setDate(since.getDate()-days);
  return recs.filter(r=>{
    const d=toDate(r.timestamp||0);
    return d>=since;
  });
}
function scoreOf(r){return typeof r.score==='number'?r.score:(r.percentage||0);}
function fmtDate(ts){
  if(!ts) return '';
  const d=toDate(ts);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}
function esc(s){return (s||'').replace(/'/g,"\\'");}
function esc2(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function setTxt(id,txt){const e=document.getElementById(id);if(e)e.textContent=txt;}
</script>

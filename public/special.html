<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>특별관리 - 베타과학학원</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Helvetica Neue',Arial,sans-serif;background:#fafafa;color:#1d1d1f;min-height:100vh;-webkit-font-smoothing:antialiased;visibility:hidden;overscroll-behavior:none}

/* ── Header ── */
.header{background:#fff;border-bottom:1px solid #f0e8ed;padding:0 1.2rem;padding-left:max(1.2rem,env(safe-area-inset-left));padding-right:max(1.2rem,env(safe-area-inset-right));height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:300}
.header-left{display:flex;align-items:center;gap:9px;text-decoration:none;color:inherit;cursor:pointer;transition:opacity .15s}
.header-left:hover{opacity:.75}
.logo-mark{width:30px;height:30px;background:linear-gradient(135deg,#f472b6 0%,#db2777 100%);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand-name{font-size:14px;font-weight:600;color:#1d1d1f;letter-spacing:-.3px}
.header-badge{display:flex;align-items:center;gap:5px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:20px;padding:4px 10px;font-size:10px;font-weight:600;color:#16a34a;white-space:nowrap}
.dot-green{width:5px;height:5px;background:#22c55e;border-radius:50%;animation:blink 2s ease-in-out infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.logout-btn{padding:7px 14px;min-height:36px;background:transparent;border:1.5px solid #f4c8d4;border-radius:20px;font-family:inherit;font-size:12px;font-weight:600;color:#e8375a;cursor:pointer;white-space:nowrap;transition:background .15s}
.logout-btn:hover,.logout-btn:active{background:#fceef2}

/* ── Page Nav ── */
.page-nav{background:#fff;border-bottom:1px solid #f0e8ed;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;position:sticky;top:54px;z-index:200}
.page-nav::-webkit-scrollbar{display:none}
.page-nav-inner{display:flex;padding:0 1.2rem;min-width:max-content}
.pnav-a{display:block;padding:11px 13px;font-size:13px;font-weight:500;color:#aeaeb2;text-decoration:none;white-space:nowrap;border-bottom:2px solid transparent;transition:all .15s}
.pnav-a:hover{color:#1d1d1f}
.pnav-a.on{color:#db2777;border-bottom-color:#db2777;font-weight:600}

/* ── Wrap ── */
.wrap{padding:1.4rem 1.2rem;padding-bottom:max(4rem,calc(3rem + env(safe-area-inset-bottom)));padding-left:max(1.2rem,env(safe-area-inset-left));padding-right:max(1.2rem,env(safe-area-inset-right));flex:1}

/* ── Page Hero ── */
.page-hero{background:linear-gradient(135deg,#fffbeb 0%,#fef9c3 50%,#fff7ed 100%);border:1px solid #fde68a;border-radius:18px;padding:1.2rem 1.4rem;margin-bottom:1.4rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.hero-left{display:flex;align-items:center;gap:12px}
.hero-icon{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#fbbf24,#d97706);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;box-shadow:0 4px 12px rgba(217,119,6,.25)}
.hero-title{font-size:1.05rem;font-weight:700;letter-spacing:-.03em}
.hero-sub{font-size:11px;color:#aeaeb2;margin-top:3px}

/* ── Section heading ── */
.section-heading{font-size:11px;font-weight:700;color:#aeaeb2;letter-spacing:.08em;text-transform:uppercase;margin-bottom:.8rem}

/* ── Stats Grid ── */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.4rem}
.stat-card{background:#fff;border:1px solid #fce7f3;border-radius:14px;padding:1.1rem 1.2rem;transition:border-color .15s}
.stat-card:hover{border-color:#fbcfe8}
.stat-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.stat-status{font-size:12px;font-weight:700}
.stat-status.warning{color:#d97706}.stat-status.success{color:#16a34a}
.stat-icon-wrap{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px}
.stat-icon-wrap.warning{background:#fffbeb}.stat-icon-wrap.success{background:#f0fdf4}
.stat-number{font-size:2rem;font-weight:700;line-height:1;margin-bottom:4px;letter-spacing:-.04em}
.stat-number.warning{color:#d97706}.stat-number.success{color:#16a34a}
.stat-desc{font-size:11px;color:#aeaeb2;font-weight:500}

/* ── Section Card ── */
.section-card{background:#fff;border:1px solid #fce7f3;border-radius:16px;margin-bottom:1rem;overflow:hidden;transition:border-color .15s}
.section-card:hover{border-color:#fbcfe8}
.section-header{padding:1rem 1.2rem;border-bottom:1px solid #fce7f3;display:flex;align-items:center;gap:8px}
.section-header h2{font-size:14px;font-weight:700}
.section-body{padding:1rem 1.2rem}
.empty-state{text-align:center;padding:2.5rem 1.2rem}
.empty-state p{font-size:13px;color:#aeaeb2;font-weight:500}

/* ── Student List ── */
.student-list{display:flex;flex-direction:column;gap:10px}
.student-item{border:1px solid #fce7f3;border-radius:14px;padding:1rem 1.1rem;display:flex;align-items:flex-start;gap:12px;background:#fff;transition:border-color .15s;flex-wrap:wrap}
.student-item:hover{border-color:#fbcfe8}
.student-item.danger{border-left:3px solid #dc2626;background:#fffafa}
.student-item.warning{border-left:3px solid #d97706;background:#fffdf5}
.student-avatar{width:40px;height:40px;border-radius:50%;background:#fff0f7;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#db2777;flex-shrink:0}
.student-info{flex:1;min-width:120px}
.student-name{font-size:14px;font-weight:700;margin-bottom:3px;letter-spacing:-.02em}
.student-meta{font-size:12px;color:#aeaeb2}
.score-chip{padding:4px 13px;border-radius:20px;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;align-self:flex-start}
.score-chip.danger{background:#dc2626}.score-chip.warning{background:#d97706}.score-chip.success{background:#16a34a}
.action-area{width:100%;display:flex;flex-direction:column;gap:7px;margin-top:4px}
.action-input{flex:1;padding:10px 13px;border:1.5px solid #fce7f3;border-radius:10px;font-size:14px;color:#1d1d1f;font-family:inherit;outline:none;transition:border .15s;background:#fff;-webkit-appearance:none}
.action-input:focus{border-color:#db2777}
.action-input.filled{border-color:#16a34a;background:#f0fdf4}
.action-btns{display:flex;gap:8px}
.btn-save{padding:9px 16px;min-height:40px;background:linear-gradient(135deg,#f472b6,#db2777);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;transition:opacity .15s;box-shadow:0 2px 8px rgba(219,39,119,.25)}
.btn-save:hover{opacity:.85}
.btn-complete{padding:9px 16px;min-height:40px;background:linear-gradient(135deg,#4ade80,#16a34a);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;transition:opacity .15s}
.btn-complete:hover{opacity:.85}
.btn-outline{display:flex;align-items:center;gap:6px;padding:9px 16px;min-height:40px;border:1.5px solid #fce7f3;border-radius:20px;background:#fff;font-size:13px;font-weight:600;color:#db2777;cursor:pointer;transition:background .15s;font-family:inherit;white-space:nowrap;flex-shrink:0}
.btn-outline:hover{background:#fdf2f8}

/* ── History Table ── */
.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:480px}
thead th{font-size:11px;font-weight:700;color:#aeaeb2;text-align:left;padding:9px 13px;border-bottom:1px solid #fce7f3;background:#fafafa;white-space:nowrap}
tbody tr{border-bottom:1px solid #fce7f3;transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#fdf2f8}
tbody td{font-size:13px;padding:11px 13px;color:#1d1d1f}

/* ── Toast ── */
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(20px);background:#1d1d1f;color:#fff;padding:11px 22px;border-radius:12px;font-size:13px;font-weight:500;opacity:0;transition:opacity .3s,transform .3s;z-index:999;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Responsive ── */
@media(max-width:520px){
  .wrap{padding:.9rem .85rem}
  .header{padding:0 .9rem;height:50px}
  .page-nav{top:50px}
  .page-nav-inner{padding:0 .75rem}
  .brand-name{font-size:13px}
  .header-badge .dot-green{display:none}
  .page-hero{padding:.9rem 1rem;border-radius:14px}
  .section-card{border-radius:14px}
  .student-item{flex-direction:column;gap:8px}
  .action-btns{flex-direction:column}
  .btn-save,.btn-complete{width:100%;text-align:center;justify-content:center}
}
@media(min-width:601px){
  .student-item{flex-wrap:nowrap;align-items:center}
  .action-area{width:auto;min-width:200px;margin-top:0}
}
</style>
</head>
<body>

<header class="header">
  <a href="index.html" class="header-left">
    <div class="logo-mark">
      <svg width="16" height="16" viewBox="0 0 18 18" fill="none">
        <circle cx="9" cy="7" r="3" fill="rgba(255,255,255,0.9)"/>
        <path d="M3.5 16c0-3 2.5-5.5 5.5-5.5s5.5 2.5 5.5 5.5" stroke="rgba(255,255,255,0.9)" stroke-width="1.4" stroke-linecap="round" fill="none"/>
      </svg>
    </div>
    <span class="brand-name">베타과학학원</span>
  </a>
  <div style="display:flex;align-items:center;gap:8px">
    <div class="header-badge"><span class="dot-green"></span>ONLINE</div>
    <button class="logout-btn" onclick="doLogout()">로그아웃</button>
  </div>
</header>

<nav class="page-nav">
  <div class="page-nav-inner">
    <a href="dashboard.html" class="pnav-a">대시보드</a>
    <a href="students.html" class="pnav-a">학생 관리</a>
    <a href="special.html" class="pnav-a on">특별관리</a>
    <a href="sms.html" class="pnav-a">SMS설정</a>
    <a href="management.html" class="pnav-a">학원관리</a>
    <a href="teacher-board.html" class="pnav-a">선생님 게시판</a>
  </div>
</nav>

<div class="wrap">
  <!-- Page Hero -->
  <div class="page-hero">
    <div class="hero-left">
      <div class="hero-icon">⚠️</div>
      <div>
        <div class="hero-title">특별 관리 대상</div>
        <div class="hero-sub">70점 미만 학생들의 대처방안을 입력하고 관리하세요</div>
      </div>
    </div>
    <button class="btn-outline" onclick="showHistory()">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.7"/></svg>
      전체 이력 보기
    </button>
  </div>

  <!-- Stats -->
  <div class="section-heading">OVERVIEW</div>
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-card-top">
        <span class="stat-status warning">대기 중</span>
        <div class="stat-icon-wrap warning">⚠️</div>
      </div>
      <div class="stat-number warning" id="pendingCount">0</div>
      <div class="stat-desc">대처방안 미입력 학생</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-top">
        <span class="stat-status success">처리 완료</span>
        <div class="stat-icon-wrap success">✅</div>
      </div>
      <div class="stat-number success" id="doneCount">0</div>
      <div class="stat-desc">대처방안 입력 완료</div>
    </div>
  </div>

  <!-- Pending -->
  <div class="section-heading">PENDING</div>
  <div class="section-card">
    <div class="section-header">
      <span style="font-size:15px">⚠️</span>
      <h2>대처방안 입력 필요</h2>
    </div>
    <div class="section-body">
      <div class="student-list" id="pendingList"></div>
    </div>
  </div>

  <!-- Done -->
  <div class="section-heading">COMPLETED</div>
  <div class="section-card">
    <div class="section-header">
      <span style="font-size:15px">✅</span>
      <h2>처리 완료</h2>
    </div>
    <div class="section-body">
      <div class="student-list" id="doneList"></div>
    </div>
  </div>

  <!-- History -->
  <div class="section-card" id="historySection" style="display:none">
    <div class="section-header">
      <span style="font-size:15px">🔄</span>
      <h2>전체 관리 이력</h2>
    </div>
    <div class="section-body">
      <div class="table-scroll">
        <table>
          <thead><tr><th>학생명</th><th>테스트</th><th>점수</th><th>상태</th><th>대처방안</th><th>날짜</th></tr></thead>
          <tbody id="historyBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getAuth,onAuthStateChanged,signOut}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import{getFirestore,doc,getDoc,collection,onSnapshot,updateDoc}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const fc={apiKey:"AIzaSyD5MQx_rXO_xRYelyKxK090TaKa3Gg2D3k",authDomain:"beta-science.firebaseapp.com",projectId:"beta-science",storageBucket:"beta-science.firebasestorage.app",messagingSenderId:"650652155367",appId:"1:650652155367:web:41d2958e675cb4edd4d142"};
const app=initializeApp(fc),auth=getAuth(app),db=getFirestore(app);
onAuthStateChanged(auth,async u=>{if(!u){window.location.replace("/login.html");return;}try{const s=await getDoc(doc(db,"users",u.uid));if(!s.exists()||s.data().status!=="approved"){await signOut(auth);window.location.replace("/login.html");return;}document.body.style.visibility="visible";initPage();}catch(e){window.location.replace("/login.html");}});
window.doLogout=async function(){await signOut(auth);window.location.replace("/login.html");};
function initPage(){onSnapshot(collection(db,"specialManagement"),s=>{const all=s.docs.map(d=>({id:d.id,...d.data()}));renderPending(all.filter(x=>!x.done));renderDone(all.filter(x=>x.done));renderHistory(all);});}
window.renderPending=(data)=>{
  const l=document.getElementById('pendingList');
  document.getElementById('pendingCount').textContent=data.length;
  if(!data.length){l.innerHTML=`<div class="empty-state"><p>✅ 모든 학생의 대처방안이 입력되었습니다</p></div>`;return;}
  l.innerHTML=data.map(s=>`
    <div class="student-item ${s.score<40?'danger':s.score<60?'warning':''}">
      <div class="student-avatar">${(s.name||'?')[0]}</div>
      <div class="student-info">
        <div class="student-name">${s.name||'-'}</div>
        <div class="student-meta">${s.grade||''} · ${s.test||''}</div>
      </div>
      <span class="score-chip ${s.score<40?'danger':s.score<60?'warning':'success'}">${s.score}점</span>
      <div class="action-area">
        <input class="action-input" id="input-${s.id}" type="text" placeholder="대처방안을 입력하세요" value="${s.action||''}">
        <div class="action-btns">
          <button class="btn-save" onclick="saveAction('${s.id}')">저장</button>
          <button class="btn-complete" onclick="markDone('${s.id}')">완료 처리</button>
        </div>
      </div>
    </div>`).join('');
};
window.renderDone=(data)=>{
  const l=document.getElementById('doneList');
  document.getElementById('doneCount').textContent=data.length;
  if(!data.length){l.innerHTML=`<div class="empty-state"><p>처리 완료된 항목이 없습니다</p></div>`;return;}
  l.innerHTML=data.map(s=>`
    <div class="student-item" style="border-left:3px solid #16a34a;background:#f0fdf4">
      <div class="student-avatar" style="background:#dcfce7;color:#16a34a">${(s.name||'?')[0]}</div>
      <div class="student-info">
        <div class="student-name">${s.name||'-'}</div>
        <div class="student-meta">${s.test||''}</div>
      </div>
      <div class="action-area">
        <input class="action-input filled" type="text" value="${s.action||''}" readonly>
      </div>
    </div>`).join('');
};
window.renderHistory=(data)=>{document.getElementById('historyBody').innerHTML=data.map(s=>`<tr><td>${s.name||'-'}</td><td>${s.test||'-'}</td><td>${s.score}점</td><td>${s.done?'<span style="color:#16a34a;font-weight:700">완료</span>':'<span style="color:#d97706;font-weight:700">대기</span>'}</td><td>${s.action||'-'}</td><td style="color:#aeaeb2">${s.date||'-'}</td></tr>`).join('');};
window.showHistory=()=>{const s=document.getElementById('historySection');s.style.display=s.style.display==='none'?'block':'none';};
window.saveAction=async(id)=>{const v=document.getElementById(`input-${id}`).value;await updateDoc(doc(db,"specialManagement",id),{action:v});showToast("저장되었습니다!");};
window.markDone=async(id)=>{const v=document.getElementById(`input-${id}`).value;await updateDoc(doc(db,"specialManagement",id),{action:v,done:true});showToast("처리가 완료되었습니다!");};
window.showToast=(m)=>{const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);};
</script>
</body>
</html>

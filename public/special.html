<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>특별관리 - 베타과학</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --primary: #ec4899; --primary-light: #fdf2f8; --primary-dark: #be185d; --max-width: 1200px; --bg: #fef7fb; --white: #ffffff; --text: #1e293b; --text-muted: #64748b; --border: #e2e8f0; --danger: #ef4444; --danger-light: #fef2f2; --success: #10b981; --success-light: #f0fdf4; --warning: #f59e0b; --warning-light: #fffbeb; --radius: 10px; }
  body { font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; visibility: hidden; }
  .app-wrapper { max-width: var(--max-width); margin: 0 auto; display: flex; flex-direction: column; min-height: 100vh; }
  .topbar { background: var(--white); border-bottom: 1px solid #fce7f3; padding: 0 24px; display: flex; align-items: center; gap: 32px; height: 56px; position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 6px rgba(236,72,153,0.07); }
  .logo-area { display: flex; flex-direction: row; align-items: center; gap: 8px; text-decoration: none; cursor: pointer; flex-shrink: 0; }
  .logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 2px 8px rgba(236,72,153,0.30); }
  .logo-text { display: flex; flex-direction: column; align-items: flex-start; line-height: 1.1; }
  .logo-area .brand { font-size: 15px; font-weight: 800; letter-spacing: 0.08em; color: var(--primary); }
  .logo-area .brand-sub { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; color: var(--primary); text-transform: uppercase; }
  .topbar-divider { width: 1px; height: 28px; background: #fce7f3; flex-shrink: 0; }
  .nav-tabs { display: flex; gap: 25px; list-style: none; margin-left: 60px; }
  .nav-tabs a { display: block; padding: 8px 18px; font-size: 14px; color: var(--text-muted); text-decoration: none; border-radius: 6px; white-space: nowrap; transition: background 0.15s, color 0.15s; }
  .nav-tabs a:hover { background: var(--bg); color: var(--text); }
  .nav-tabs a.active { background: var(--primary-light); color: var(--primary); font-weight: 600; }
  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  .academy-name { font-size: 13px; font-weight: 600; color: var(--text); }
  .badge-admin { font-size: 11px; padding: 2px 8px; background: #fdf2f8; border-radius: 20px; color: var(--primary); font-weight: 600; }
  .btn-logout { padding: 6px 14px; background: transparent; border: 1.5px solid #fbcfe8; border-radius: 20px; font-family: inherit; font-size: 11px; font-weight: 600; color: var(--primary); cursor: pointer; transition: all 0.18s; white-space: nowrap; }
  .btn-logout:hover { background: var(--primary-light); }
  .main-content { padding: 28px 24px; flex: 1; }
  .page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; background: linear-gradient(135deg, #fdf2f8 0%, #fce7f3 100%); border-radius: 14px; padding: 22px 28px; border: 1px solid #fbcfe8; }
  .page-header-left h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
  .page-header-left p { font-size: 14px; color: var(--text-muted); }
  .btn-outline { display: flex; align-items: center; gap: 6px; padding: 9px 18px; border: 1px solid #fbcfe8; border-radius: 8px; background: var(--white); font-size: 13px; font-weight: 600; color: var(--primary); cursor: pointer; transition: background 0.1s; }
  .btn-outline:hover { background: var(--primary-light); }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  .stat-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; transition: border-color 0.15s; }
  .stat-card:hover { border-color: #fbcfe8; }
  .stat-card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .stat-status { font-size: 13px; font-weight: 600; }
  .stat-status.warning { color: var(--warning); } .stat-status.success { color: var(--success); }
  .stat-icon-wrap { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
  .stat-icon-wrap.warning { background: var(--warning-light); } .stat-icon-wrap.success { background: var(--success-light); }
  .stat-number { font-size: 36px; font-weight: 800; margin-bottom: 4px; }
  .stat-number.warning { color: var(--warning); } .stat-number.success { color: var(--success); }
  .stat-desc { font-size: 14px; color: var(--text-muted); }
  .section-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 20px; overflow: hidden; transition: border-color 0.15s; }
  .section-card:hover { border-color: #fbcfe8; }
  .section-header { padding: 20px 24px; border-bottom: 1px solid #fce7f3; display: flex; align-items: center; gap: 8px; }
  .section-header h2 { font-size: 17px; font-weight: 700; }
  .section-body { padding: 24px; }
  .empty-state { text-align: center; padding: 48px 20px; }
  .empty-state p { font-size: 15px; color: var(--text-muted); font-weight: 500; }
  .student-list { display: flex; flex-direction: column; gap: 12px; }
  .student-item { border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; display: flex; align-items: center; gap: 16px; background: var(--white); transition: border-color 0.15s; }
  .student-item:hover { border-color: #fbcfe8; }
  .student-item.danger { border-left: 4px solid var(--danger); background: #fff9f9; }
  .student-item.warning { border-left: 4px solid var(--warning); background: #fffdf5; }
  .student-avatar { width: 42px; height: 42px; border-radius: 50%; background: var(--primary-light); display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 700; color: var(--primary); flex-shrink: 0; }
  .student-info { flex: 1; }
  .student-name { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
  .student-meta { font-size: 13px; color: var(--text-muted); }
  .score-chip { padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 700; color: white; flex-shrink: 0; }
  .score-chip.danger { background: var(--danger); } .score-chip.warning { background: var(--warning); } .score-chip.success { background: var(--success); }
  .action-area { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; min-width: 220px; }
  .action-input { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 7px; font-size: 13px; color: var(--text); font-family: inherit; outline: none; transition: border 0.15s; background: var(--white); }
  .action-input:focus { border-color: var(--primary); }
  .action-input.filled { border-color: var(--success); background: var(--success-light); }
  .btn-save-action { padding: 7px 14px; background: var(--primary); color: white; border: none; border-radius: 7px; font-size: 12px; font-weight: 600; cursor: pointer; }
  .btn-save-action:hover { background: var(--primary-dark); }
  .btn-complete { padding: 7px 14px; background: var(--success); color: white; border: none; border-radius: 7px; font-size: 12px; font-weight: 600; cursor: pointer; }
  table { width: 100%; border-collapse: collapse; }
  thead th { font-size: 12px; font-weight: 600; color: var(--text-muted); text-align: left; padding: 10px 14px; border-bottom: 1px solid var(--border); background: #fdf2f8; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #fdf2f8; }
  tbody td { font-size: 13px; padding: 12px 14px; }
  .toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px); background: #1e293b; color: white; padding: 11px 22px; border-radius: 8px; font-size: 14px; font-weight: 500; opacity: 0; transition: opacity 0.3s, transform 0.3s; z-index: 999; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="app-wrapper">
  <header class="topbar">
    <a href="index.html" class="logo-area">
      <div class="logo-icon">
        <svg width="18" height="18" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
          <path d="M9 3h6M9 3v7L4.5 17A2 2 0 0 0 6.4 20h11.2a2 2 0 0 0 1.9-3L15 10V3"/>
          <line x1="6.5" y1="14" x2="17.5" y2="14"/>
        </svg>
      </div>
      <div class="logo-text"><span class="brand">BETA</span><span class="brand-sub">SCIENCE</span></div>
    </a>
    <div class="topbar-divider"></div>
    <nav><ul class="nav-tabs">
  <li><a href="dashboard.html">대시보드</a></li>
  <li><a href="students.html">학생 관리</a></li>
<li><a href="special.html" class="active">특별관리</a></li>
  <li><a href="sms.html">SMS설정</a></li>
 <li><a href="management.html">학원관리</a></li>
  <li><a href="teacher-board.html">선생님 게시판</a></li>
</ul></nav>
   <div class="topbar-right">
  <span class="badge-admin">관리자 모드</span>
  <button class="btn-logout" onclick="doLogout()">로그아웃</button>
</div>
  </header>

  <main class="main-content">
    <div class="page-header">
      <div class="page-header-left">
        <h1><svg width="22" height="22" fill="none" stroke="#f59e0b" stroke-width="2" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>특별 관리 대상</h1>
        <p>70점 미만 학생들의 대처방안을 입력하고 관리하세요</p>
      </div>
      <button class="btn-outline" onclick="showHistory()"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.7"/></svg>전체 이력 보기</button>
    </div>

    <div class="stats-grid">
      <div class="stat-card"><div class="stat-card-top"><span class="stat-status warning">대기 중</span><div class="stat-icon-wrap warning"><svg width="20" height="20" fill="none" stroke="#f59e0b" stroke-width="2" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div></div><div class="stat-number warning" id="pendingCount">0</div><div class="stat-desc">대처방안 미입력 학생</div></div>
      <div class="stat-card"><div class="stat-card-top"><span class="stat-status success">처리 완료</span><div class="stat-icon-wrap success"><svg width="20" height="20" fill="none" stroke="#10b981" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div></div><div class="stat-number success" id="doneCount">0</div><div class="stat-desc">대처방안 입력 완료</div></div>
    </div>

    <div class="section-card">
      <div class="section-header"><svg width="18" height="18" fill="none" stroke="#f59e0b" stroke-width="2" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><h2>대처방안 입력 필요</h2></div>
      <div class="section-body"><div class="student-list" id="pendingList"></div></div>
    </div>

    <div class="section-card">
      <div class="section-header"><svg width="18" height="18" fill="none" stroke="#10b981" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg><h2>처리 완료</h2></div>
      <div class="section-body"><div class="student-list" id="doneList"></div></div>
    </div>

    <div class="section-card" id="historySection" style="display:none;">
      <div class="section-header"><svg width="18" height="18" fill="none" stroke="#ec4899" stroke-width="2" viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.7"/></svg><h2>전체 관리 이력</h2></div>
      <div class="section-body"><table><thead><tr><th>학생명</th><th>테스트</th><th>점수</th><th>상태</th><th>대처방안</th><th>날짜</th></tr></thead><tbody id="historyBody"></tbody></table></div>
    </div>
  </main>
</div>
<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, collection, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD5MQx_rXO_xRYelyKxK090TaKa3Gg2D3k",
    authDomain: "beta-science.firebaseapp.com",
    projectId: "beta-science",
    storageBucket: "beta-science.firebasestorage.app",
    messagingSenderId: "650652155367",
    appId: "1:650652155367:web:41d2958e675cb4edd4d142"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.replace("/login.html"); return; }
    try {
      const snap = await getDoc(doc(db, "users", user.uid));
      if (!snap.exists() || snap.data().status !== "approved") {
        await signOut(auth); window.location.replace("/login.html"); return;
      }
      document.body.style.visibility = "visible";
      initPage();
    } catch(e) { window.location.replace("/login.html"); }
  });

  window.doLogout = async function() { await signOut(auth); window.location.replace("/login.html"); };

  function initPage() {
    onSnapshot(collection(db, "specialManagement"), (snapshot) => {
      const all = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      renderPending(all.filter(s => !s.done));
      renderDone(all.filter(s => s.done));
      renderHistory(all);
    });
  }

  window.renderPending = (data) => {
    const list = document.getElementById('pendingList');
    document.getElementById('pendingCount').textContent = data.length;
    if (!data.length) { list.innerHTML = `<div class="empty-state"><p>모든 학생의 대처방안이 입력되었습니다</p></div>`; return; }
    list.innerHTML = data.map(s => `
      <div class="student-item ${s.score < 40 ? 'danger' : s.score < 60 ? 'warning' : ''}">
        <div class="student-avatar">${s.name[0]}</div>
        <div class="student-info"><div class="student-name">${s.name}</div><div class="student-meta">${s.grade} · ${s.test}</div></div>
        <span class="score-chip ${s.score < 40 ? 'danger' : s.score < 60 ? 'warning' : 'success'}">${s.score}점</span>
        <div class="action-area">
          <input class="action-input" id="input-${s.id}" type="text" placeholder="대처방안 입력" value="${s.action || ''}">
          <div style="display:flex;gap:6px;margin-top:5px">
            <button class="btn-save-action" onclick="saveAction('${s.id}')">저장</button>
            <button class="btn-complete" onclick="markDone('${s.id}')">완료</button>
          </div>
        </div>
      </div>`).join('');
  };

  window.renderDone = (data) => {
    const list = document.getElementById('doneList');
    document.getElementById('doneCount').textContent = data.length;
    if (!data.length) { list.innerHTML = `<div class="empty-state"><p>처리 완료된 항목이 없습니다</p></div>`; return; }
    list.innerHTML = data.map(s => `
      <div class="student-item" style="border-left:4px solid var(--success)">
        <div class="student-info"><div class="student-name">${s.name}</div><div class="student-meta">${s.test}</div></div>
        <div class="action-area"><input class="action-input filled" type="text" value="${s.action}" readonly></div>
      </div>`).join('');
  };

  window.renderHistory = (data) => {
    document.getElementById('historyBody').innerHTML = data.map(s => `
      <tr><td>${s.name}</td><td>${s.test}</td><td>${s.score}점</td>
      <td>${s.done ? '<span style="color:var(--success);font-weight:600">완료</span>' : '<span style="color:var(--warning);font-weight:600">대기</span>'}</td>
      <td>${s.action || '-'}</td><td style="color:var(--text-muted)">${s.date || '-'}</td></tr>`).join('');
  };

  window.showHistory = () => {
    const sec = document.getElementById('historySection');
    sec.style.display = sec.style.display === 'none' ? 'block' : 'none';
  };

  window.saveAction = async (id) => {
    const val = document.getElementById(`input-${id}`).value;
    await updateDoc(doc(db, "specialManagement", id), { action: val });
    showToast("저장되었습니다!");
  };

  window.markDone = async (id) => {
    const val = document.getElementById(`input-${id}`).value;
    await updateDoc(doc(db, "specialManagement", id), { action: val, done: true });
    showToast("처리가 완료되었습니다!");
  };

  window.showToast = (m) => {
    const t = document.getElementById('toast');
    t.textContent = m; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  };
</script>
</body>
</html>

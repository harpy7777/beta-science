<title>특별관리 - 인후쌤의 과학 수업 관리 시스템</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Helvetica Neue',Arial,sans-serif;background:#fafafa;color:#1d1d1f;min-height:100vh;-webkit-font-smoothing:antialiased;visibility:hidden;overscroll-behavior:none}

/* ── Header ── */
.header{background:#fff;border-bottom:1px solid #f0e8ed;padding:0 1.2rem;padding-left:max(1.2rem,env(safe-area-inset-left));padding-right:max(1.2rem,env(safe-area-inset-right));height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:300}
.header-left{display:flex;align-items:center;gap:9px;text-decoration:none;color:inherit;cursor:pointer;transition:opacity .15s}
.header-left:hover{opacity:.75}
.logo-mark{width:30px;height:30px;background:linear-gradient(135deg,#f472b6 0%,#db2777 100%);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand-name{font-size:14px;font-weight:600;color:#1d1d1f;letter-spacing:-.3px}
.header-badge{display:flex;align-items:center;gap:5px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:20px;padding:4px 10px;font-size:10px;font-weight:600;color:#16a34a;white-space:nowrap}
.dot-green{width:5px;height:5px;background:#22c55e;border-radius:50%;animation:blink 2s ease-in-out infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.logout-btn{padding:7px 14px;min-height:36px;background:transparent;border:1.5px solid #f4c8d4;border-radius:20px;font-family:inherit;font-size:12px;font-weight:600;color:#e8375a;cursor:pointer;white-space:nowrap;transition:background .15s}
.logout-btn:hover,.logout-btn:active{background:#fceef2}

/* ── Page Nav ── */
.page-nav{background:#fff;border-bottom:1px solid #f0e8ed;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;position:sticky;top:54px;z-index:200}
.page-nav::-webkit-scrollbar{display:none}
.page-nav-inner{display:flex;padding:0;width:100%;justify-content:space-evenly;}
.pnav-a{display:block;padding:11px 13px;font-size:13px;font-weight:500;color:#aeaeb2;text-decoration:none;white-space:nowrap;border-bottom:2px solid transparent;transition:all .15s}
.pnav-a:hover{color:#1d1d1f}
.pnav-a.on{color:#db2777;border-bottom-color:#db2777;font-weight:600}

/* ── Wrap ── */
.wrap{padding:1.4rem 1.2rem;padding-bottom:max(4rem,calc(3rem + env(safe-area-inset-bottom)));padding-left:max(1.2rem,env(safe-area-inset-left));padding-right:max(1.2rem,env(safe-area-inset-right));flex:1}

/* ── Page Hero ── */
.page-hero{background:linear-gradient(135deg,#fffbeb 0%,#fef9c3 50%,#fff7ed 100%);border:1px solid #fde68a;border-radius:18px;padding:1.2rem 1.4rem;margin-bottom:1.4rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.hero-left{display:flex;align-items:center;gap:12px}
.hero-icon{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#fbbf24,#d97706);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;box-shadow:0 4px 12px rgba(217,119,6,.25)}
.hero-title{font-size:1.05rem;font-weight:700;letter-spacing:-.03em}
.hero-sub{font-size:11px;color:#aeaeb2;margin-top:3px}

/* ── Section heading ── */
.section-heading{font-size:11px;font-weight:700;color:#aeaeb2;letter-spacing:.08em;text-transform:uppercase;margin-bottom:.8rem}

/* ── Period Filter ── */
.period-filter{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.2rem}
.pf-chip{flex:1 1 auto;min-width:80px;min-height:40px;padding:9px 14px;border-radius:20px;border:1.5px solid #fde68a;background:#fff;color:#b45309;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
.pf-chip:hover{background:#fffbeb}
.pf-chip.on{background:linear-gradient(135deg,#fbbf24,#d97706);border-color:#d97706;color:#fff;box-shadow:0 3px 10px rgba(217,119,6,.25)}
.hidden-note{margin-top:10px;padding:9px 13px;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;font-size:12px;color:#b45309;font-weight:600;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.hidden-note button{border:none;background:#d97706;color:#fff;font-size:12px;font-weight:700;padding:6px 12px;min-height:34px;border-radius:8px;cursor:pointer;font-family:inherit;white-space:nowrap}

/* ── Stats Grid ── */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.4rem}
.stat-card{background:#fff;border:1px solid #fce7f3;border-radius:14px;padding:1.1rem 1.2rem;transition:border-color .15s}
.stat-card:hover{border-color:#fbcfe8}
.stat-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.stat-status{font-size:12px;font-weight:700}
.stat-status.warning{color:#d97706}.stat-status.success{color:#16a34a}
.stat-icon-wrap{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px}
.stat-icon-wrap.warning{background:#fffbeb}.stat-icon-wrap.success{background:#f0fdf4}
.stat-number{font-size:2rem;font-weight:700;line-height:1;margin-bottom:4px;letter-spacing:-.04em}
.stat-number.warning{color:#d97706}.stat-number.success{color:#16a34a}
.stat-desc{font-size:11px;color:#aeaeb2;font-weight:500}

/* ── Section Card ── */
.section-card{background:#fff;border:1px solid #fce7f3;border-radius:16px;margin-bottom:1rem;overflow:hidden;transition:border-color .15s}
.section-card:hover{border-color:#fbcfe8}
.section-header{padding:1rem 1.2rem;border-bottom:1px solid #fce7f3;display:flex;align-items:center;gap:8px}
.section-header h2{font-size:14px;font-weight:700}
.section-body{padding:1rem 1.2rem}
.empty-state{text-align:center;padding:2.5rem 1.2rem}
.empty-state p{font-size:13px;color:#aeaeb2;font-weight:500}

/* ── Student List (좌측정렬 행 레이아웃) ── */
.student-list{display:flex;flex-direction:column;gap:10px}
.student-item{border:1px solid #fce7f3;border-radius:14px;padding:1rem 1.1rem;display:flex;align-items:flex-start;gap:12px;background:#fff;transition:border-color .15s;flex-wrap:wrap}
.student-item:hover{border-color:#fbcfe8}
.student-item.danger{border-left:3px solid #dc2626;background:#fffafa}
.student-item.warning{border-left:3px solid #d97706;background:#fffdf5}
.student-item.done{border-left:3px solid #16a34a;background:#f6fef9}
.student-avatar{width:40px;height:40px;border-radius:50%;background:#fff0f7;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#db2777;flex-shrink:0}
.student-avatar.mid{background:#ede9fe;color:#6b21a8}
.student-avatar.high{background:#dbeafe;color:#1e40af}
.student-avatar.done{background:#dcfce7;color:#16a34a}
.student-info{flex:1;min-width:120px}
.student-name{font-size:15px;font-weight:700;margin-bottom:5px;letter-spacing:-.02em;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.student-meta{font-size:12px;color:#aeaeb2;font-weight:600;line-height:1.4;white-space:nowrap}
.student-test{font-size:13.5px;color:#1d1d1f;font-weight:700;margin-top:4px;line-height:1.45;word-break:keep-all;letter-spacing:-.02em}
.score-line{margin-top:9px}
.type-tag{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;vertical-align:middle}
.tag-ox{background:#eff6ff;color:#1d4ed8}.tag-multi{background:#f0fdf4;color:#15803d}.tag-master{background:#faf5ff;color:#7e22ce}
.score-chip{display:inline-block;padding:5px 15px;border-radius:20px;font-size:13px;font-weight:800;color:#fff}
.score-chip.danger{background:#dc2626}.score-chip.warning{background:#d97706}.score-chip.success{background:#16a34a}
.action-area{width:100%;display:flex;flex-direction:column;gap:8px;margin-top:2px}
.action-input{width:100%;padding:10px 13px;border:1.5px solid #fce7f3;border-radius:10px;font-size:14px;color:#1d1d1f;font-family:inherit;outline:none;transition:border .15s;background:#fff;-webkit-appearance:none}
.action-input:focus{border-color:#db2777}
.action-input.filled{border-color:#86efac;background:#f6fef9;color:#166534;font-weight:600}
.action-btns{display:flex;gap:8px;flex-wrap:wrap}
.btn-save{padding:9px 16px;min-height:40px;background:linear-gradient(135deg,#f472b6,#db2777);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;transition:opacity .15s;box-shadow:0 2px 8px rgba(219,39,119,.25)}
.btn-save:hover{opacity:.85}
.btn-complete{padding:9px 16px;min-height:40px;background:linear-gradient(135deg,#4ade80,#16a34a);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;transition:opacity .15s}
.btn-complete:hover{opacity:.85}
.btn-reopen{padding:8px 14px;min-height:38px;background:#fff;color:#d97706;border:1.5px solid #fde68a;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;transition:background .15s}
.btn-reopen:hover{background:#fffbeb}
.btn-outline{display:flex;align-items:center;gap:6px;padding:9px 16px;min-height:40px;border:1.5px solid #fce7f3;border-radius:20px;background:#fff;font-size:13px;font-weight:600;color:#db2777;cursor:pointer;transition:background .15s;font-family:inherit;white-space:nowrap;flex-shrink:0}
.btn-outline:hover{background:#fdf2f8}

/* ── History Table ── */
.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:520px}
thead th{font-size:11px;font-weight:700;color:#aeaeb2;text-align:left;padding:9px 13px;border-bottom:1px solid #fce7f3;background:#fafafa;white-space:nowrap}
tbody tr{border-bottom:1px solid #fce7f3;transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#fdf2f8}
tbody td{font-size:13px;padding:11px 13px;color:#1d1d1f}

/* ── Toast ── */
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(20px);background:#1d1d1f;color:#fff;padding:11px 22px;border-radius:12px;font-size:13px;font-weight:500;opacity:0;transition:opacity .3s,transform .3s;z-index:999;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Responsive ── */
@media(max-width:520px){
  .wrap{padding:.9rem .85rem}
  .header{padding:0 .9rem;height:50px}
  .page-nav{top:50px}
  .page-nav-inner{padding:0 .75rem}
  .brand-name{font-size:13px}
  .header-badge .dot-green{display:none}
  .page-hero{padding:.9rem 1rem;border-radius:14px}
  .section-card{border-radius:14px}
  .student-item{padding:.9rem 1rem}
}
</style>
<script>(function(){if(new URLSearchParams(location.search).get('student')!=='1')return;var here=location.pathname;function cross(a){var raw=a.getAttribute('href');if(!raw||raw.charAt(0)==='#')return false;if(/^(javascript:|mailto:|tel:|sms:)/i.test(raw.trim()))return false;try{return new URL(a.href,location.href).pathname!==here;}catch(e){return false;}}function lock(){document.querySelectorAll('a[href]').forEach(function(a){if(!cross(a))return;a.removeAttribute('href');a.style.pointerEvents='none';a.style.cursor='default';a.setAttribute('aria-disabled','true');});}if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',lock);else lock();document.addEventListener('click',function(e){var a=e.target.closest?e.target.closest('a[href]'):null;if(a&&cross(a)){e.preventDefault();e.stopPropagation();}},true);})();</script></head>
<body>

<header class="header">

<nav class="page-nav">

<div class="wrap">
  <!-- Page Hero -->
  <div class="page-hero">
    <div class="hero-left">
      <div class="hero-icon">⚠️</div>
      <div>
        <div class="hero-title">특별 관리 대상</div>
        <div class="hero-sub">70점 미만 응시 기록을 자동으로 모아 대처방안을 관리하세요</div>
      </div>
    </div>
    <button class="btn-outline" onclick="showHistory()">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.7"/></svg>
      전체 이력 보기
    </button>

  <!-- Period Filter -->
  <div class="section-heading">기간</div>
  <div class="period-filter" id="periodFilter">
    <button class="pf-chip" data-days="14" onclick="setPeriod(14,this)">최근 2주</button>
    <button class="pf-chip on" data-days="30" onclick="setPeriod(30,this)">최근 1개월</button>
    <button class="pf-chip" data-days="90" onclick="setPeriod(90,this)">최근 3개월</button>
    <button class="pf-chip" data-days="0" onclick="setPeriod(0,this)">전체</button>

  <!-- Stats -->

      <div class="stat-card-top">

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getAuth,onAuthStateChanged,signOut}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import{getFirestore,doc,getDoc,setDoc,collection,onSnapshot}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const fc={apiKey:"AIzaSyD5MQx_rXO_xRYelyKxK090TaKa3Gg2D3k",authDomain:"beta-science.firebaseapp.com",projectId:"beta-science",storageBucket:"beta-science.firebasestorage.app",messagingSenderId:"650652155367",appId:"1:650652155367:web:41d2958e675cb4edd4d142"};
const app=initializeApp(fc),auth=getAuth(app),db=getFirestore(app);

/* ── 기준점: 70점 미만이면 특별관리 대상 (대시보드와 통일) ── */
const THRESHOLD=70;
const TYPE_LABEL={ox:'OX',multi:'4지선다',master:'마스터'};
const TYPE_TAG={ox:'tag-ox',multi:'tag-multi',master:'tag-master'};

onAuthStateChanged(auth,async u=>{
  if(!u){window.location.replace("/login.html");return;}
  try{const s=await getDoc(doc(db,"users",u.uid));
    if(!s.exists()||s.data().status!=="approved"){await signOut(auth);window.location.replace("/login.html");return;}
    document.body.style.visibility="visible";initPage();
  }catch(e){window.location.replace("/login.html");}
});
window.doLogout=async function(){await signOut(auth);window.location.replace("/login.html");};

/* ── 유틸 ── */
function e(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function pRD(r){if(!r)return null;if(typeof r==='object'&&r.seconds!=null)return new Date(r.seconds*1000);if(typeof r==='object'&&typeof r.toDate==='function')return r.toDate();if(typeof r!=='string')return null;const m=r.match(/(\d{4})\.\s*(\d{1,2})\.\s*(\d{1,2})/);if(m)return new Date(+m[1],+m[2]-1,+m[3]);const d=new Date(r);return isNaN(d)?null:d;}
function resolveDate(r){const t=r.timestamp||r.submittedTimestamp;if(t){if(typeof t==='object'&&t.seconds!=null)return new Date(t.seconds*1000);if(typeof t==='object'&&typeof t.toDate==='function')return t.toDate();const d=new Date(t);return isNaN(d)?null:d;}return pRD(r.date);}
function fmtDate(d){if(!d||isNaN(d)||d.getTime()<=0)return '-';return`${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;}
function shortDate(d){if(!d||d==='-')return d||'-';const m=String(d).match(/(\d{4})[.\-](\d{1,2})[.\-](\d{1,2})/);return m?`${m[1].slice(2)}.${m[2].padStart(2,'0')}.${m[3].padStart(2,'0')}`:d;}
function shortGrade(g){const s=String(g==null?'':g).replace('등','').replace('학년','').trim();return s||'?';}
function avatarCls(g){const s=shortGrade(g);if(s.startsWith('중'))return 'mid';if(s.startsWith('고'))return 'high';return '';}

/* ── 점수 계산 (dashboard.html과 동일 로직) ── */
function cSc(r){let o,mu,ma;if(r.oxScore!=null)o=+r.oxScore;else if(Array.isArray(r.oxAnswers)&&Array.isArray(r.oxCorrect)){let c=0;r.oxAnswers.forEach((a,i)=>{if(a===r.oxCorrect[i])c++;});o=Math.round(c/r.oxCorrect.length*100);}else if(r.testType==='ox'&&r.score!=null)o=+r.score;if(r.multiScore!=null)mu=+r.multiScore;else if(Array.isArray(r.multiAnswers)&&Array.isArray(r.multiCorrect)){let c=0;r.multiAnswers.forEach((a,i)=>{if(a===r.multiCorrect[i])c++;});mu=Math.round(c/r.multiCorrect.length*100);}else if(r.testType==='multiple'&&r.score!=null)mu=+r.score;if(r.testType==='master'&&r.score!=null)ma=+r.score;else if(r.masterScore!=null)ma=+r.masterScore;if(o==null&&mu==null&&ma==null){if(r.testType==='ox')o=+(r.score||0);else if(r.testType==='multiple')mu=+(r.score||0);}return{oxScore:o,multiScore:mu,masterScore:ma};}
function partScores(r){
  if(r.category==='master'||r.testType==='master'){
    const sc=(r.multiple&&typeof r.multiple==='object'&&r.multiple.score!=null)?+r.multiple.score:(r.score!=null?+r.score:null);
    return {ox:null,multi:null,master:sc};
  }
  const hasOx=r.ox&&typeof r.ox==='object'&&r.ox.total;
  const hasMu=r.multiple&&typeof r.multiple==='object'&&r.multiple.total;
  if(hasOx||hasMu){
    let ox=hasOx?(r.ox.score!=null?+r.ox.score:0):null;
    let mu=hasMu?(r.multiple.score!=null?+r.multiple.score:0):null;
    if(ox!=null&&!(ox>0))ox=null;
    if(mu!=null&&!(mu>0))mu=null;
    return {ox,multi:mu,master:null};
  }
  const{oxScore:o,multiScore:mu,masterScore:ma}=cSc(r);
  let ox=o==null?null:+o, m=mu==null?null:+mu, ms=ma==null?null:+ma;
  if(ox!=null&&!(ox>0))ox=null;
  if(m!=null&&!(m>0))m=null;
  if(ox==null&&m==null&&ms==null&&r.score!=null&&+r.score>0)m=+r.score;
  return {ox, multi:m, master:ms};
}

/* ── 실시간 데이터 ── */
let aIds=new Set();      // 등록 학생 id 집합 (탈원생 필터용)
let gradeDocs=[];        // grades 원본
let mgmtMap={};          // specialManagement: caseId -> {action, done, date}
let caseMap={};          // 현재 화면의 caseId -> case 정보 (버튼에서 사용)
let activePeriodDays=30; // 기간 필터: 최근 N일 (0=전체). 기본 최근 1개월

function initPage(){
  onSnapshot(collection(db,"students"),s=>{aIds=new Set(s.docs.map(d=>d.data().id).filter(Boolean));render();});
  onSnapshot(collection(db,"grades"),s=>{gradeDocs=s.docs;render();});
  onSnapshot(collection(db,"specialManagement"),s=>{const m={};s.docs.forEach(d=>{m[d.id]=d.data();});mgmtMap=m;render();});
}

/* grades에서 70점 미만 파트를 케이스로 추출 (파트 1개 = 케이스 1개) */
function buildCases(){
  const cases=[];
  gradeDocs.forEach(d=>{
    const r=d.data(),sid=r.studentId||'';
    if(aIds.size>0 && sid && !aIds.has(sid))return;   // 등록 학생만 (대시보드와 동일 기준)
    const p=partScores(r);
    const dObj=resolveDate(r);
    const base={
      sid,
      name:r.studentName||'-',
      grade:r.studentGrade||r.grade||'',
      test:r.testName||r.examTitle||r.unitName||'-',
      dObj,
      dateStr:fmtDate(dObj)
    };
    [['ox',p.ox],['multi',p.multi],['master',p.master]].forEach(([type,sc])=>{
      if(sc!=null && sc<THRESHOLD){
        cases.push({...base,caseId:`${d.id}__${type}`,type,score:sc});
      }
    });
  });
  return cases;
}

// 기간 필터 통과 여부: 전체(0)면 항상 통과, 아니면 날짜가 최근 N일 이내여야 함
function inPeriod(c){
  if(activePeriodDays===0)return true;
  if(!c.dObj||isNaN(c.dObj))return false;  // 날짜 없는 옛 기록은 '전체'에서만 노출
  const cutoff=Date.now()-activePeriodDays*86400000;
  return c.dObj.getTime()>=cutoff;
}

function render(){
  const all=buildCases();
  all.sort((a,b)=>(b.dObj?b.dObj.getTime():0)-(a.dObj?a.dObj.getTime():0));
  caseMap={};
  const pending=[],done=[];
  let hiddenPending=0;
  all.forEach(c=>{
    const m=mgmtMap[c.caseId]||{};
    const item={...c,action:m.action||'',done:!!m.done,date:m.date||c.dateStr};
    if(!inPeriod(c)){ if(!item.done)hiddenPending++; return; }  // 기간 밖은 목록에서 제외
    caseMap[c.caseId]=c;
    (item.done?done:pending).push(item);
  });
  renderPending(pending,hiddenPending);
  renderDone(done);
  renderHistory(all.map(c=>{const m=mgmtMap[c.caseId]||{};return{...c,action:m.action||'',done:!!m.done,date:m.date||c.dateStr};}));
}

window.setPeriod=(days,el)=>{
  activePeriodDays=days;
  document.querySelectorAll('.pf-chip').forEach(b=>b.classList.remove('on'));
  if(el)el.classList.add('on');
  render();
};

function renderPending(data,hiddenPending){
  const l=document.getElementById('pendingList');
  document.getElementById('pendingCount').textContent=data.length;
  const note=(hiddenPending>0&&activePeriodDays!==0)
    ? `<div class="hidden-note"><span>⏳ 기간 밖 미처리 기록 ${hiddenPending}건이 숨겨져 있습니다</span><button onclick="setPeriod(0,document.querySelector('.pf-chip[data-days=&quot;0&quot;]'))">전체 보기</button></div>`
    : '';
  if(!data.length){l.innerHTML=note+`<div class="empty-state"><p>✅ 이 기간에 처리할 70점 미만 기록이 없습니다</p></div>`;return;}
  l.innerHTML=note+data.map(s=>{
    const lvl=s.score<40?'danger':s.score<60?'warning':'success';
    const itemLvl=s.score<40?'danger':s.score<60?'warning':'';
    const sg=shortGrade(s.grade);
    return `
    <div class="student-item ${itemLvl}">
      <div class="student-avatar ${avatarCls(s.grade)}">${e(sg)}</div>
      <div class="student-info">
        <div class="student-name">${e(s.name||'-')}<span class="type-tag ${TYPE_TAG[s.type]}">${TYPE_LABEL[s.type]}</span></div>
        <div class="student-meta">${e(sg)} · ${e(shortDate(s.date))}</div>
        <div class="student-test">${e(s.test||'-')}</div>
        <div class="score-line"><span class="score-chip ${lvl}">${s.score}점</span></div>
        <div class="action-area">
          <input class="action-input${s.action?' filled':''}" id="input-${s.caseId}" type="text" placeholder="대처방안을 입력하세요" value="${e(s.action||'')}">
          <div class="action-btns">
            <button class="btn-save" onclick="saveAction('${s.caseId}')">저장</button>
            <button class="btn-complete" onclick="markDone('${s.caseId}')">완료 처리</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderDone(data){
  const l=document.getElementById('doneList');
  document.getElementById('doneCount').textContent=data.length;
  if(!data.length){l.innerHTML=`<div class="empty-state"><p>처리 완료된 항목이 없습니다</p></div>`;return;}
  l.innerHTML=data.map(s=>{
    const sg=shortGrade(s.grade);
    return `
    <div class="student-item done">
      <div class="student-avatar done">${e(sg)}</div>
      <div class="student-info">
        <div class="student-name">${e(s.name||'-')}<span class="type-tag ${TYPE_TAG[s.type]}">${TYPE_LABEL[s.type]}</span></div>
        <div class="student-meta">${e(sg)} · ${e(shortDate(s.date))}</div>
        <div class="student-test">${e(s.test||'-')}</div>
        <div class="score-line"><span class="score-chip success">${s.score}점</span></div>
        <div class="action-area">
          <input class="action-input filled" type="text" value="${e(s.action||'')}" readonly>
          <div class="action-btns"><button class="btn-reopen" onclick="reopen('${s.caseId}')">↩ 다시 대기로</button></div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderHistory(data){
  document.getElementById('historyBody').innerHTML=data.map(s=>`<tr><td>${e(s.name||'-')}</td><td>${e(s.test||'-')}</td><td>${TYPE_LABEL[s.type]||'-'}</td><td>${s.score}점</td><td>${s.done?'<span style="color:#16a34a;font-weight:700">완료</span>':'<span style="color:#d97706;font-weight:700">대기</span>'}</td><td>${e(s.action||'-')}</td><td style="color:#aeaeb2">${e(shortDate(s.date||'-'))}</td></tr>`).join('');
}

window.showHistory=()=>{const s=document.getElementById('historySection');s.style.display=s.style.display==='none'?'block':'none';};

/* specialManagement에 caseId를 문서 ID로 저장 (결정적 ID → 중복 없음) */
async function writeCase(caseId,patch){
  const c=caseMap[caseId];
  if(!c){showToast('기록을 찾을 수 없습니다');return;}
  await setDoc(doc(db,"specialManagement",caseId),{
    caseId,studentId:c.sid,name:c.name,grade:c.grade,test:c.test,
    type:c.type,score:c.score,date:c.dateStr,updatedAt:new Date().toISOString(),
    ...patch
  },{merge:true});
}
window.saveAction=async(caseId)=>{const el=document.getElementById(`input-${caseId}`);const v=el?el.value.trim():'';try{await writeCase(caseId,{action:v,done:false});showToast("저장되었습니다!");}catch(e){showToast("저장 실패: "+e.message);}};
window.markDone=async(caseId)=>{const el=document.getElementById(`input-${caseId}`);const v=el?el.value.trim():'';try{await writeCase(caseId,{action:v,done:true});showToast("처리가 완료되었습니다!");}catch(e){showToast("처리 실패: "+e.message);}};
window.reopen=async(caseId)=>{try{await writeCase(caseId,{done:false});showToast("다시 대기 목록으로 이동했습니다");}catch(e){showToast("변경 실패: "+e.message);}};
window.showToast=(m)=>{const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);};
</script>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>베타과학학원 온라인 테스트</title>
<style>
/* 원장님의 기존 CSS 디자인을 그대로 유지합니다 */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:linear-gradient(160deg,#f0eeff 0%,#f5f0ff 50%,#ede9ff 100%);min-height:100vh}
.ta-header{background:linear-gradient(90deg,#6c63ff,#534AB7);padding:1rem;text-align:center;color:#fff;display:flex;align-items:center;justify-content:center;gap:12px}
.ta-header-icon{width:44px;height:44px;background:rgba(255,255,255,0.2);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px}
.ta-header-title{font-size:18px;font-weight:600}
.ta-header-sub{font-size:12px;opacity:0.85}
.ta-body{max-width:640px;margin:0 auto;padding:1.5rem 1rem}
.ta-login-card{background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 4px 24px rgba(100,100,200,0.12)}
.ta-login-hero{background:linear-gradient(135deg,#7c6fff,#534AB7);padding:2.5rem 2rem;text-align:center;position:relative;overflow:hidden}
.ta-hero-icon{width:72px;height:72px;background:rgba(255,255,255,0.18);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 1rem;position:relative;z-index:1}
.ta-hero-title{color:#fff;font-size:26px;font-weight:700;margin-bottom:8px;position:relative;z-index:1}
.ta-hero-badge{display:inline-block;background:rgba(255,255,255,0.2);color:#fff;font-size:13px;padding:4px 14px;border-radius:20px;position:relative;z-index:1}
.ta-form{padding:2rem}
.ta-form label{font-size:13px;font-weight:500;color:#333;display:block;margin-bottom:6px}
.ta-form select, .ta-form input{width:100%;padding:12px 14px;border:1.5px solid #e0e4f0;border-radius:10px;font-size:14px;background:#f8f9ff;color:#222;margin-bottom:1.25rem;outline:none;font-family:inherit}
.ta-btn-primary{width:100%;padding:14px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;border:none;background:linear-gradient(90deg,#7c6fff,#534AB7);color:#fff}
.ta-test-card{background:#fff;border-radius:16px;padding:1.5rem;margin-bottom:1rem;box-shadow:0 2px 12px rgba(100,100,200,0.08)}
.ta-progress{background:#f0f0f8;border-radius:4px;height:6px;margin-bottom:1.5rem;overflow:hidden}
.ta-progress-bar{background:linear-gradient(90deg,#7c6fff,#534AB7);height:100%;border-radius:4px;transition:width 0.3s}
.ta-q-text{font-size:16px;font-weight:500;color:#1a1a2e;margin-bottom:1.25rem;line-height:1.6}
.ta-option{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1.5px solid #e0e4f0;border-radius:10px;margin-bottom:8px;cursor:pointer;transition:all 0.15s;background:#fff}
.ta-option:hover{border-color:#534AB7;background:#f5f0ff}
.ta-option.selected{border-color:#534AB7;background:#ede9ff; font-weight: 600;}
.ta-next-btn{width:100%;padding:14px;background:linear-gradient(90deg,#7c6fff,#534AB7);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;margin-top:1rem}
.ta-result-card{background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 4px 24px rgba(100,100,200,0.12);text-align:center}
.ta-result-hero{background:linear-gradient(135deg,#7c6fff,#534AB7);padding:2.5rem 2rem}
.ta-result-score{font-size:56px;font-weight:700;color:#fff}
.loading{text-align:center;padding:3rem;color:#888;font-size:14px}
</style>
</head>
<body>

<div class="ta-header">
  <div class="ta-header-icon">📖</div>
  <div>
    <div class="ta-header-title">베타과학학원</div>
    <div class="ta-header-sub">BETA SCIENCE ACADEMY</div>
  </div>
</div>

<div class="ta-body">
  <div id="ta-login">
    <div class="ta-login-card">
      <div class="ta-login-hero">
        <div class="ta-hero-icon">📋</div>
        <div class="ta-hero-title">온라인 테스트</div>
        <div id="ta-subject-badge" class="ta-hero-badge">정보를 입력하세요</div>
      </div>
      <div class="ta-form">
        <label>테스트 코드 (배포 ID)</label>
        <input type="text" id="ta-test-code" placeholder="원장님이 알려주신 코드를 입력하세요">
        <label>학년</label>
        <select id="ta-grade">
          <option value="">학년을 선택하세요</option>
          <option>중등1학년</option><option>중등2학년</option><option>중등3학년</option>
          <option>고등1학년</option><option>고등2학년</option><option>고등3학년</option>
        </select>
        <label>학생 이름</label>
        <input type="text" id="ta-name" placeholder="이름을 입력하세요">
        <button class="ta-btn-primary" onclick="startTest()">▶ 테스트 시작</button>
      </div>
    </div>
  </div>

  <div id="ta-test" style="display:none">
    <div class="ta-test-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
        <span style="font-size:13px;color:#666" id="ta-student-info"></span>
        <span style="font-size:13px;color:#534AB7;font-weight:500" id="ta-q-counter"></span>
      </div>
      <div class="ta-progress"><div class="ta-progress-bar" id="ta-prog"></div></div>
      <div class="ta-q-text" id="ta-q-text"></div>
      <div id="ta-options">
        <div class="ta-option" onclick="selectOption(1)"><div style="width:24px">①</div> 1번</div>
        <div class="ta-option" onclick="selectOption(2)"><div style="width:24px">②</div> 2번</div>
        <div class="ta-option" onclick="selectOption(3)"><div style="width:24px">③</div> 3번</div>
        <div class="ta-option" onclick="selectOption(4)"><div style="width:24px">④</div> 4번</div>
        <div class="ta-option" onclick="selectOption(5)"><div style="width:24px">⑤</div> 5번</div>
      </div>
      <button class="ta-next-btn" id="ta-next-btn" onclick="nextQuestion()">다음 문제 →</button>
    </div>
  </div>

  <div id="ta-result" style="display:none">
    <div class="ta-result-card">
      <div class="ta-result-hero">
        <div class="ta-result-score" id="res-score">0점</div>
        <div style="color:white; margin-top:10px;" id="res-msg">테스트가 완료되었습니다!</div>
      </div>
      <div style="padding:2rem">
        <p style="color:#666; margin-bottom:1.5rem">점수가 원장님께 전송되었습니다.</p>
        <button class="ta-btn-primary" onclick="location.reload()">처음으로</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { db } from './firebase-config.js';
  import { doc, getDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  let currentTest = null;
  let currentQ = 0;
  let userAnswers = [];
  let selectedOption = null;

  // 테스트 시작
  window.startTest = async function() {
    const code = document.getElementById('ta-test-code').value.trim();
    const name = document.getElementById('ta-name').value.trim();
    const grade = document.getElementById('ta-grade').value;

    if(!code || !name || !grade) { alert('모든 정보를 입력해주세요.'); return; }

    try {
      const docRef = doc(db, "tests", code);
      const docSnap = await getDoc(docRef);

      if (docSnap.exists()) {
        currentTest = docSnap.data();
        currentTest.fireId = docSnap.id;
        document.getElementById('ta-login').style.display = 'none';
        document.getElementById('ta-test').style.display = 'block';
        document.getElementById('ta-student-info').textContent = `${grade} ${name}`;
        renderQuestion();
      } else {
        alert('존재하지 않는 테스트 코드입니다.');
      }
    } catch (e) {
      console.error(e);
      alert('데이터를 불러오는 중 오류가 발생했습니다.');
    }
  }

  // 보기 선택
  window.selectOption = function(num) {
    selectedOption = num;
    const opts = document.querySelectorAll('.ta-option');
    opts.forEach(opt => opt.classList.remove('selected'));
    opts[num-1].classList.add('selected');
  }

  // 문제 출력
  function renderQuestion() {
    const qData = currentTest.questions[currentQ];
    document.getElementById('ta-q-counter').textContent = `${currentQ + 1} / ${currentTest.questions.length}`;
    document.getElementById('ta-q-text').textContent = qData.question || `${currentQ + 1}번 문제입니다.`;
    document.getElementById('ta-prog').style.width = `${((currentQ) / currentTest.questions.length) * 100}%`;
    
    // 초기화
    selectedOption = null;
    document.querySelectorAll('.ta-option').forEach(opt => opt.classList.remove('selected'));
    document.getElementById('ta-next-btn').textContent = (currentQ === currentTest.questions.length - 1) ? "제출하기" : "다음 문제 →";
  }

  // 다음 문제 또는 제출
  window.nextQuestion = function() {
    if(selectedOption === null) { alert('답을 선택해주세요.'); return; }
    
    userAnswers.push(selectedOption);

    if (currentQ < currentTest.questions.length - 1) {
      currentQ++;
      renderQuestion();
    } else {
      submitTest();
    }
  }

  // 최종 제출 및 채점
  async function submitTest() {
    let correctCount = 0;
    currentTest.questions.forEach((q, idx) => {
      if(String(q.answer) === String(userAnswers[idx])) {
        correctCount++;
      }
    });

    const score = Math.round((correctCount / currentTest.questions.length) * 100);
    const name = document.getElementById('ta-name').value.trim();
    const grade = document.getElementById('ta-grade').value;

    try {
      // 파이어베이스 'grades' 컬렉션에 성적 저장
      await addDoc(collection(db, "grades"), {
        testId: currentTest.fireId,
        testUnit: currentTest.unitName || currentTest.unit,
        studentName: name,
        grade: grade,
        score: score,
        date: new Date().toLocaleDateString('ko-KR')
      });

      document.getElementById('ta-test').style.display = 'none';
      document.getElementById('ta-result').style.display = 'block';
      document.getElementById('res-score').textContent = score + '점';
    } catch (e) {
      console.error(e);
      alert('성적 저장 중 오류가 발생했습니다.');
    }
  }
</script>
</body>
</html>

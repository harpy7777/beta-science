<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>테스트 생성 - 베타과학</title>
<style>
  /* 원장님 학원 전용 디자인 틀 유지 */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --primary: #2563eb; --primary-light: #eff6ff; --primary-dark: #1d4ed8; --max-width: 1200px; --bg: #f5f6fa; --white: #ffffff; --text: #1e293b; --text-muted: #64748b; --border: #e2e8f0; --danger: #ef4444; --success: #10b981; --radius: 10px; }
  body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .app-wrapper { max-width: var(--max-width); margin: 0 auto; display: flex; flex-direction: column; min-height: 100vh; }
  .topbar { background: var(--white); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; gap: 32px; height: 56px; position: sticky; top: 0; z-index: 100; }
  .logo-area { display: flex; flex-direction: column; align-items: center; line-height: 1.1; }
  .logo-area .brand { font-size: 15px; font-weight: 800; color: var(--primary); }
  .logo-area .brand-sub { font-size: 10px; font-weight: 600; color: var(--primary); text-transform: uppercase; }
  .nav-tabs { display: flex; gap: 2px; list-style: none; }
  .nav-tabs a { display: block; padding: 8px 14px; font-size: 14px; color: var(--text-muted); text-decoration: none; border-radius: 6px; }
  .nav-tabs a.active { background: var(--primary-light); color: var(--primary); font-weight: 600; }
  .main-content { padding: 28px 24px; flex: 1; }
  
  .section-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; margin-bottom: 20px; }
  .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 7px; }
  .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; outline: none; font-family: inherit; }
  
  /* 대형 문제 카드 */
  .question-input-card { background: var(--white); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 15px; }
  .q-label { font-size: 16px; font-weight: 800; color: var(--primary); margin-bottom: 10px; }
  .q-textarea { width: 100%; min-height: 100px; padding: 15px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px; line-height: 1.6; resize: vertical; margin-bottom: 15px; background: #fcfcfc; }
  .a-area { display: flex; align-items: center; gap: 10px; padding-top: 10px; border-top: 1px solid var(--border); }

  /* 하단 등록된 테스트 테이블 스타일 */
  .registered-section { margin-top: 40px; padding-top: 30px; border-top: 2px solid var(--border); }
  .table-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-top: 15px; }
  table { width: 100%; border-collapse: collapse; }
  thead th { font-size: 13px; font-weight: 600; color: var(--text-muted); text-align: left; padding: 12px 16px; border-bottom: 1px solid var(--border); background: #f8fafc; }
  tbody td { font-size: 14px; padding: 14px 16px; border-bottom: 1px solid var(--border); }
  .badge-grade { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; color: white; background: var(--success); }

  .save-bar { position: sticky; bottom: 0; background: var(--white); border-top: 1px solid var(--border); padding: 14px 24px; z-index: 50; margin: 0 -24px -28px; }
  .btn-save { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; }
</style>
</head>
<body>
<div class="app-wrapper">
  <header class="topbar">
    <div class="logo-area"><span class="brand">BETA</span><span class="brand-sub">SCIENCE</span></div>
    <nav style="margin-left:20px"><ul class="nav-tabs">
      <li><a href="dashboard.html">대시보드</a></li>
      <li><a href="students.html">학생 관리</a></li>
      <li><a href="test-create.html" class="active">테스트 생성</a></li>
      <li><a href="test-manage.html">테스트 관리</a></li>
      <li><a href="grades.html">성적 조회</a></li>
    </ul></nav>
  </header>

  <main class="main-content">
    <div class="section-card">
      <div style="font-size: 18px; font-weight: 700; margin-bottom: 20px;">1. 기본 정보</div>
      <div class="form-row-3">
        <div class="form-group"><label>테스트 ID</label><input type="text" id="testId" readonly></div>
        <div class="form-group"><label>과목</label>
          <select id="subject">
            <option value="">과목 선택</option>
            <option>중등과학</option><option>통합과학</option><option>화학</option>
            <option>생명과학</option><option>물리</option><option>지구과학</option>
          </select>
        </div>
        <div class="form-group"><label>학년</label>
          <select id="grade">
            <option value="">학년 선택</option>
            <option>중등1학년</option><option>중등2학년</option><option>중등3학년</option>
            <option>고등1학년</option><option>고등2학년</option><option>고등3학년</option>
          </select>
        </div>
      </div>
      <div class="form-group"><label>단원명</label><input type="text" id="unitName" placeholder="예: 알칼리 금속의 성질"></div>
    </div>

    <div style="font-size: 18px; font-weight: 700; margin: 30px 0 15px;">2. 문항 입력 (Q1-Q10)</div>
    <div id="question-area"></div>

    <div class="registered-section">
      <div style="display:flex; justify-content:space-between; align-items:center">
        <div style="font-size: 18px; font-weight: 700;">3. 등록된 테스트 목록</div>
        <span id="regCount" style="background:var(--danger); color:white; padding:2px 10px; border-radius:10px; font-size:12px;">0개</span>
      </div>
      <div class="table-card">
        <table>
          <thead><tr><th>테스트 ID</th><th>단원명</th><th>과목</th><th>학년</th><th>관리</th></tr></thead>
          <tbody id="regTestBody"></tbody>
        </table>
      </div>
    </div>

    <div class="save-bar"><button class="btn-save" onclick="saveTest()">테스트 저장 및 배포 준비</button></div>
  </main>
</div>

<script type="module">
  import { db } from './firebase-config.js';
  import { collection, addDoc, query, orderBy, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // 문제 카드 생성
  const qArea = document.getElementById('question-area');
  for (let i = 1; i <= 10; i++) {
    const card = document.createElement('div');
    card.className = 'question-input-card';
    card.innerHTML = `
      <div class="q-label">Q${i}</div>
      <textarea class="q-text" data-qno="${i}" placeholder="${i}번 문제를 입력하세요..."></textarea>
      <div class="a-area">
        <span style="font-size:13px; font-weight:600;">정답 (A${i}) : </span>
        <select class="q-ans" style="width:100px; padding:5px; border-radius:5px;">
          <option value="1">1번</option><option value="2">2번</option>
          <option value="3">3번</option><option value="4">4번</option><option value="5">5번</option>
        </select>
      </div>`;
    qArea.appendChild(card);
  }

  document.getElementById('testId').value = 'BETA-' + Math.random().toString(36).substr(2, 5).toUpperCase();

  // 실시간 목록 불러오기 (하단 목록 복구!)
  onSnapshot(query(collection(db, "tests"), orderBy("regDate", "desc")), (snapshot) => {
    const tests = snapshot.docs.map(doc => ({ fireId: doc.id, ...doc.data() }));
    const tbody = document.getElementById('regTestBody');
    document.getElementById('regCount').textContent = tests.length + '개';
    tbody.innerHTML = tests.map(t => `
      <tr>
        <td style="font-family:monospace; font-size:12px;">${t.testId || t.id}</td>
        <td style="font-weight:600;">${t.unitName || t.unit}</td>
        <td>${t.subject}</td>
        <td><span class="badge-grade">${t.grade}</span></td>
        <td><button onclick="deleteTest('${t.fireId}')" style="border:none; background:none; color:var(--danger); cursor:pointer;">✕ 삭제</button></td>
      </tr>`).join('');
  });

  window.deleteTest = async (id) => { if(confirm('삭제하시겠습니까?')) await deleteDoc(doc(db, "tests", id)); };

  window.saveTest = async function() {
    const sub = document.getElementById('subject').value, grd = document.getElementById('grade').value;
    if(!sub || !grd) { alert('과목과 학년을 선택해주세요.'); return; }
    const questions = [];
    document.querySelectorAll('.question-input-card').forEach(card => {
      questions.push({
        qNo: card.querySelector('.q-text').dataset.qno,
        question: card.querySelector('.q-text').value.trim() || "문제 내용 없음",
        answer: card.querySelector('.q-ans').value
      });
    });
    try {
      await addDoc(collection(db, "tests"), {
        testId: document.getElementById('testId').value, subject: sub, grade: grd,
        unitName: document.getElementById('unitName').value || "미지정 단원",
        questions, regDate: new Date().toISOString()
      });
      alert('성공적으로 저장되었습니다!');
      location.reload();
    } catch(e) { alert('저장 실패'); }
  }
</script>
</body>
</html>

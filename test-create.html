<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>테스트 생성 - 베타과학 (Senior Ver.)</title>
<style>
  /* 기본 변수 및 초기화 유지 */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { 
    --primary: #2563eb; --primary-light: #eff6ff; --primary-dark: #1d4ed8; 
    --max-width: 1200px; --bg: #f5f6fa; --white: #ffffff; 
    --text: #1e293b; --text-muted: #64748b; --border: #e2e8f0; 
    --danger: #ef4444; --success: #10b981; --radius: 10px; 
  }
  body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  
  .app-wrapper { max-width: var(--max-width); margin: 0 auto; display: flex; flex-direction: column; min-height: 100vh; }
  .topbar { background: var(--white); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; gap: 32px; height: 56px; position: sticky; top: 0; z-index: 100; }
  .logo-area { display: flex; flex-direction: column; align-items: center; line-height: 1.1; }
  .logo-area .brand { font-size: 15px; font-weight: 800; color: var(--primary); }
  
  .main-content { padding: 28px 24px; flex: 1; }
  .section-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; margin-bottom: 20px; }
  
  /* 문제 입력 그리드 커스텀 */
  .part-section { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; margin-bottom: 20px; }
  .part-title { font-size: 20px; font-weight: 700; margin-bottom: 20px; color: var(--text); border-left: 4px solid var(--primary); padding-left: 12px; }
  
  .answer-grid { display: flex; flex-direction: column; gap: 16px; }
  
  /* 개별 문제 아이템 스타일링 */
  .answer-item { 
    display: grid; 
    grid-template-columns: 80px 120px 1fr; /* 문항번호 | 정답선택 | 지문입력 */
    gap: 15px; 
    align-items: center; 
    background: #f8fafc; 
    padding: 15px; 
    border-radius: 12px; 
    border: 1px solid var(--border);
  }
  
  /* Q1, Q2 글씨 크기 확대 */
  .answer-item label { 
    font-size: 22px; 
    font-weight: 900; 
    color: var(--primary); 
    text-align: center;
    border-right: 2px solid var(--border);
  }

  /* 정답 선택박스 강조 */
  .q-ans { 
    padding: 10px; 
    border: 2px solid var(--primary); 
    border-radius: 8px; 
    font-weight: 700; 
    color: var(--primary);
    cursor: pointer;
  }

  .q-text { 
    padding: 12px; 
    border: 1px solid var(--border); 
    border-radius: 8px; 
    font-size: 15px; 
    width: 100%;
  }

  .save-bar { position: sticky; bottom: 0; background: var(--white); border-top: 1px solid var(--border); padding: 14px 24px; z-index: 50; }
  .btn-save { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.2s; }
  .btn-save:hover { background: var(--primary-dark); transform: translateY(-2px); }

  /* 나머지 기존 스타일 유지... */
  .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 7px; }
  .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; }
  .table-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-top: 20px; }
  table { width: 100%; border-collapse: collapse; }
  th { background: #f8fafc; padding: 12px; text-align: left; font-size: 13px; }
  td { padding: 12px; border-top: 1px solid var(--border); font-size: 14px; }
</style>
</head>
<body>

<div class="app-wrapper">
  <header class="topbar">
    <div class="logo-area"><span class="brand">BETA</span><span class="brand-sub">SCIENCE</span></div>
    <nav>
        <ul style="display:flex; list-style:none; gap:15px; margin-left:20px;">
            <li style="font-size: 14px; font-weight: bold; color: var(--primary);">테스트 생성 모드</li>
        </ul>
    </nav>
  </header>

  <main class="main-content">
    <div class="section-card">
      <div class="part-title">기본 정보 설정</div>
      <div class="form-row-3">
        <div class="form-group"><label>테스트 ID</label><input type="text" id="testId" readonly></div>
        <div class="form-group"><label>과목</label>
          <select id="subject"><option value="">선택</option><option>통합과학</option><option>물리</option><option>화학</option></select>
        </div>
        <div class="form-group"><label>학년</label>
          <select id="grade"><option value="">선택</option><option>고등1</option><option>고등2</option><option>고등3</option></select>
        </div>
      </div>
      <div class="form-group"><label>단원명</label><input type="text" id="unitName" placeholder="단원명을 입력하세요"></div>
    </div>

    <div class="part-section">
      <div class="part-title">테스트 문항 입력 (1~30번)</div>
      <div class="answer-grid" id="main-answer-grid">
        </div>
    </div>

    <div class="save-bar">
      <button class="btn-save" onclick="saveTest()">테스트 저장 및 전체 배포</button>
    </div>

    <div class="table-card">
        <table>
            <thead><tr><th>ID</th><th>단원명</th><th>과목/학년</th><th>관리</th></tr></thead>
            <tbody id="regTestBody"></tbody>
        </table>
    </div>
  </main>
</div>

<script type="module">
  import { db } from './firebase-config.js';
  import { collection, addDoc, doc, deleteDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // 문항 생성 (1~30번)
  const grid = document.getElementById('main-answer-grid');
  for (let i = 1; i <= 30; i++) {
    const div = document.createElement('div');
    div.className = 'answer-item';
    div.innerHTML = `
      <label>Q${i}</label>
      <select class="q-ans" data-qno="${i}">
        <option value="">정답 선택</option>
        <option value="1">1번</option><option value="2">2번</option>
        <option value="3">3번</option><option value="4">4번</option>
        <option value="5">5번</option>
      </select>
      <input type="text" class="q-text" data-qno="${i}" placeholder="Q${i} 문항 지문을 입력하세요">
    `;
    grid.appendChild(div);
  }

  // 초기화 및 ID 생성
  document.getElementById('testId').value = 'BETA-' + Math.random().toString(36).substr(2, 5).toUpperCase();

  // 저장 함수
  window.saveTest = async function() {
    const sub = document.getElementById('subject').value;
    const grd = document.getElementById('grade').value;
    const unit = document.getElementById('unitName').value;

    if(!sub || !grd) { alert('과목과 학년은 필수입니다.'); return; }

    const questions = [];
    document.querySelectorAll('.answer-item').forEach(item => {
      const text = item.querySelector('.q-text').value;
      const ans = item.querySelector('.q-ans').value;
      
      // 입력된 내용이 있는 경우에만 저장하거나, 30개 전체 구조 유지
      questions.push({
        qNo: item.querySelector('.q-text').dataset.qno,
        question: text || "",
        answer: ans || "0"
      });
    });

    try {
      await addDoc(collection(db, "tests"), {
        testId: document.getElementById('testId').value,
        subject: sub,
        grade: grd,
        unitName: unit || "미지정 단원",
        questions: questions,
        regDate: new Date().toISOString()
      });
      alert('30문항 저장 완료!');
      location.reload();
    } catch(e) { console.error(e); }
  }

  // 목록 렌더링 (실시간)
  onSnapshot(query(collection(db, "tests"), orderBy("regDate", "desc")), (snapshot) => {
    const tbody = document.getElementById('regTestBody');
    tbody.innerHTML = snapshot.docs.map(doc => {
      const t = doc.data();
      return `
        <tr>
          <td>${t.testId}</td>
          <td>${t.unitName}</td>
          <td>${t.subject} / ${t.grade}</td>
          <td><button onclick="deleteTest('${doc.id}')">삭제</button></td>
        </tr>
      `;
    }).join('');
  });

  window.deleteTest = async function(id) {
    if(confirm('삭제하시겠습니까?')) await deleteDoc(doc(db, "tests", id));
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>테스트 생성 - 베타과학</title>
<style>
  /* 원장님 원본 스타일 100% 유지 */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --primary: #2563eb; --primary-light: #eff6ff; --primary-dark: #1d4ed8; --max-width: 1200px; --bg: #f5f6fa; --white: #ffffff; --text: #1e293b; --text-muted: #64748b; --border: #e2e8f0; --danger: #ef4444; --success: #10b981; --radius: 10px; }
  body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .app-wrapper { max-width: var(--max-width); margin: 0 auto; display: flex; flex-direction: column; min-height: 100vh; }
  .topbar { background: var(--white); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; gap: 32px; height: 56px; position: sticky; top: 0; z-index: 100; }
  .logo-area { display: flex; flex-direction: column; align-items: center; line-height: 1.1; }
  .logo-area .brand { font-size: 15px; font-weight: 800; color: var(--primary); }
  .logo-area .brand-sub { font-size: 10px; font-weight: 600; color: var(--primary); text-transform: uppercase; }
  .nav-tabs { display: flex; gap: 2px; list-style: none; }
  .nav-tabs a { display: block; padding: 8px 14px; font-size: 14px; color: var(--text-muted); text-decoration: none; border-radius: 6px; }
  .nav-tabs a.active { background: var(--primary-light); color: var(--primary); font-weight: 600; }
  .main-content { padding: 28px 24px; flex: 1; }
  .section-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; margin-bottom: 20px; }
  .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 7px; }
  .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; outline: none; font-family: inherit; }
  
  .part-section { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; margin-bottom: 20px; }
  .part-title { font-size: 20px; font-weight: 700; margin-bottom: 20px; color: var(--text); }
  
  /* 핵심 내용 및 섹션 입력 디자인 */
  .sub-label { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 10px; margin-top: 20px; }

  /* 문항 레이아웃 수정: 세로로 길게 배치해서 문제를 잘 보이게 함 */
  .question-item-row { 
    display: grid; 
    grid-template-columns: 80px 1fr 120px; 
    gap: 15px; 
    align-items: center; 
    margin-bottom: 12px; 
    padding: 10px; 
    background: #f8fafc; 
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .q-label { font-weight: 800; color: var(--primary); font-size: 14px; }
  .a-label { font-size: 12px; font-weight: 600; color: var(--text-muted); display: block; margin-bottom: 4px; }

  .save-bar { position: sticky; bottom: 0; background: var(--white); border-top: 1px solid var(--border); padding: 14px 24px; z-index: 50; margin: 0 -24px -28px; }
  .btn-save { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; }
</style>
</head>
<body>
<div class="app-wrapper">
  <header class="topbar">
    <div class="logo-area"><span class="brand">BETA</span><span class="brand-sub">SCIENCE</span></div>
    <div style="width:1px; height:28px; background:var(--border); margin:0 15px;"></div>
    <nav><ul class="nav-tabs">
      <li><a href="dashboard.html">대시보드</a></li>
      <li><a href="students.html">학생 관리</a></li>
      <li><a href="test-create.html" class="active">테스트 생성</a></li>
      <li><a href="test-manage.html">테스트 관리</a></li>
      <li><a href="grades.html">성적 조회</a></li>
    </ul></nav>
  </header>

  <main class="main-content">
    <div class="section-card">
      <div style="font-size: 18px; font-weight: 700; margin-bottom: 20px;">기본 정보</div>
      <div class="form-row-3">
        <div class="form-group"><label>테스트 ID</label><input type="text" id="testId" readonly></div>
        <div class="form-group"><label>과목</label>
          <select id="subject">
            <option value="">과목 선택</option>
            <option>중등과학</option><option>통합과학</option><option>화학</option>
            <option>생명과학</option><option>물리</option><option>지구과학</option>
          </select>
        </div>
        <div class="form-group"><label>학년</label>
          <select id="grade">
            <option value="">학년 선택</option>
            <option>중등1학년</option><option>중등2학년</option><option>중등3학년</option>
            <option>고등1학년</option><option>고등2학년</option><option>고등3학년</option>
          </select>
        </div>
      </div>
      <div class="form-group"><label>단원명</label><input type="text" id="unitName" placeholder="예: 알칼리 금속과 할로젠"></div>
    </div>

    <div class="part-section">
      <div class="part-title">1부: 문항 1-10</div>
      <div class="form-group"><label>섹션명</label><input type="text" placeholder="예: 알칼리금속"></div>
      <div class="form-group" style="margin-top:16px"><label>핵심 내용</label><textarea placeholder="핵심 개념 입력..."></textarea></div>
      
      <div class="sub-label">문항 및 정답 입력 (Q1-Q10)</div>
      <div id="q-list-part1"></div>
    </div>

    <div class="part-section">
      <div class="part-title">2부: 문항 11-20</div>
      <div class="form-group"><label>섹션명</label><input type="text" placeholder="예: 할로젠원소"></div>
      <div class="form-group" style="margin-top:16px"><label>핵심 내용</label><textarea placeholder="핵심 개념 입력..."></textarea></div>
      
      <div class="sub-label">문항 및 정답 입력 (Q11-Q20)</div>
      <div id="q-list-part2"></div>
    </div>

    <div class="save-bar">
      <button class="btn-save" onclick="saveTest()">테스트 저장 및 배포 준비</button>
    </div>
  </main>
</div>

<script type="module">
  import { db } from './firebase-config.js';
  import { collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // 문항 자동 생성 함수 (Q1, A1 형식)
  function createQFields(targetId, start) {
    const container = document.getElementById(targetId);
    for (let i = start; i < start + 10; i++) {
      const div = document.createElement('div');
      div.className = 'question-item-row';
      div.innerHTML = `
        <div class="q-label">Q${i}</div>
        <div><input type="text" class="q-text" data-qno="${i}" placeholder="${i}번 문제 내용을 입력하세요"></div>
        <div>
          <span class="a-label">정답 (A${i})</span>
          <select class="q-ans" data-qno="${i}">
            <option value="1">1번</option><option value="2">2번</option>
            <option value="3">3번</option><option value="4">4번</option><option value="5">5번</option>
          </select>
        </div>
      `;
      container.appendChild(div);
    }
  }

  // 1부(1-10), 2부(11-20) 생성
  createQFields('q-list-part1', 1);
  createQFields('q-list-part2', 11);

  document.getElementById('testId').value = 'BETA-' + Math.random().toString(36).substr(2, 5).toUpperCase();

  window.saveTest = async function() {
    const sub = document.getElementById('subject').value;
    const grd = document.getElementById('grade').value;
    if(!sub || !grd) { alert('과목과 학년을 선택해주세요.'); return; }

    const questions = [];
    document.querySelectorAll('.q-text').forEach((input, idx) => {
      const qNo = input.dataset.qno;
      const ansSelect = document.querySelector(`.q-ans[data-qno="${qNo}"]`);
      questions.push({
        qNo: qNo,
        question: input.value || `${qNo}번 문제`,
        answer: ansSelect.value
      });
    });

    try {
      await addDoc(collection(db, "tests"), {
        testId: document.getElementById('testId').value,
        subject: sub,
        grade: grd,
        unitName: document.getElementById('unitName').value || "미지정 단원",
        questions: questions,
        regDate: new Date().toISOString()
      });
      alert('테스트가 성공적으로 저장되었습니다!');
      location.href = "test-manage.html";
    } catch(e) { alert('저장 실패'); }
  }
</script>
</body>
</html>

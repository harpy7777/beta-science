<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>테스트 생성 - 베타과학</title>
<style>
  /* 원본 CSS 그대로 유지 */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --primary: #2563eb; --primary-light: #eff6ff; --primary-dark: #1d4ed8; --max-width: 1200px; --bg: #f5f6fa; --white: #ffffff; --text: #1e293b; --text-muted: #64748b; --border: #e2e8f0; --danger: #ef4444; --success: #10b981; --radius: 10px; }
  body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .app-wrapper { max-width: var(--max-width); margin: 0 auto; display: flex; flex-direction: column; min-height: 100vh; }
  .topbar { background: var(--white); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; gap: 32px; height: 56px; position: sticky; top: 0; z-index: 100; }
  .logo-area { display: flex; flex-direction: column; align-items: center; line-height: 1.1; flex-shrink: 0; min-width: 80px; }
  .logo-area .brand { font-size: 15px; font-weight: 800; letter-spacing: 0.08em; color: var(--primary); }
  .logo-area .brand-sub { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; color: var(--primary); text-transform: uppercase; }
  .topbar-divider { width: 1px; height: 28px; background: var(--border); flex-shrink: 0; }
  .nav-tabs { display: flex; gap: 2px; list-style: none; }
  .nav-tabs a { display: block; padding: 8px 14px; font-size: 14px; color: var(--text-muted); text-decoration: none; border-radius: 6px; white-space: nowrap; transition: background 0.15s, color 0.15s; }
  .nav-tabs a:hover { background: var(--bg); color: var(--text); }
  .nav-tabs a.active { background: var(--primary-light); color: var(--primary); font-weight: 600; }
  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  .academy-name { font-size: 13px; font-weight: 600; }
  .badge-admin { font-size: 11px; padding: 2px 8px; background: #f1f5f9; border-radius: 20px; color: var(--text-muted); }
  .main-content { padding: 28px 24px; flex: 1; }
  .page-header { margin-bottom: 24px; }
  .page-header h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
  .page-header p { font-size: 14px; color: var(--text-muted); }
  .section-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; margin-bottom: 20px; }
  .section-card-title { font-size: 18px; font-weight: 700; margin-bottom: 24px; color: var(--text); }
  .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .form-row-1 { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 7px; }
  .form-group label .req { color: var(--danger); margin-left: 2px; }
  .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; color: var(--text); background: var(--white); outline: none; transition: border 0.15s; font-family: inherit; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--primary); }
  .form-group textarea { resize: vertical; min-height: 100px; line-height: 1.6; }
  .part-section { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; margin-bottom: 20px; }
  .part-title { font-size: 20px; font-weight: 700; margin-bottom: 20px; color: var(--text); }
  .sub-label { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 10px; margin-top: 20px; }
  
  /* 문제 입력 그리드 수정 */
  .answer-grid { display: flex; flex-direction: column; gap: 12px; margin-bottom: 4px; }
  .answer-item { display: grid; grid-template-columns: 50px 1fr 100px; gap: 10px; align-items: center; background: #f8fafc; padding: 10px; border-radius: 8px; }
  .answer-item label { font-size: 14px; font-weight: 700; color: var(--primary); }
  .answer-item input { padding: 8px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; }
  .answer-item select { padding: 8px; border: 1px solid var(--border); border-radius: 6px; font-weight: 600; }

  .save-bar { position: sticky; bottom: 0; background: var(--white); border-top: 1px solid var(--border); padding: 14px 24px; z-index: 50; margin: 0 -24px -28px; }
  .btn-save { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background 0.15s; }
  .btn-save:hover { background: var(--primary-dark); }
  .registered-section { margin-top: 40px; padding-top: 36px; border-top: 2px solid var(--border); }
  .registered-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .registered-header h2 { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .count-badge { background: var(--danger); color: white; font-size: 12px; font-weight: 700; padding: 2px 9px; border-radius: 20px; }
  .filter-row { display: flex; gap: 10px; margin-bottom: 14px; align-items: center; flex-wrap: wrap; }
  .filter-select-sm { padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; color: var(--text); background: var(--white); cursor: pointer; outline: none; min-width: 130px; }
  .btn-reset-sm { padding: 8px 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--white); font-size: 13px; color: var(--text-muted); cursor: pointer; margin-left: auto; }
  .btn-reset-sm:hover { background: #f1f5f9; }
  .table-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .table-card table { width: 100%; border-collapse: collapse; }
  .table-card thead th { font-size: 13px; font-weight: 600; color: var(--text-muted); text-align: left; padding: 11px 16px; border-bottom: 1px solid var(--border); background: #f8fafc; }
  .table-card tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  .table-card tbody tr:hover { background: #f8fafc; }
  .table-card tbody td { font-size: 14px; padding: 13px 16px; color: var(--text); }
  .subject-pill { display: inline-block; padding: 3px 10px; background: #f1f5f9; border-radius: 20px; font-size: 12px; color: var(--text-muted); font-weight: 500; }
  .grade-badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; white-space: nowrap; }
  .grade-high1 { background: #10b981; color: white; } .grade-high2 { background: #f59e0b; color: white; } .grade-high3 { background: #ef4444; color: white; }
  .grade-mid1 { background: #8b5cf6; color: white; } .grade-mid2 { background: #2563eb; color: white; } .grade-mid3 { background: #0891b2; color: white; }
  .action-icons { display: flex; gap: 6px; }
  .action-btn { width: 30px; height: 30px; border-radius: 6px; border: 1px solid var(--border); background: var(--white); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.1s; color: var(--text-muted); }
  .action-btn:hover { background: #f1f5f9; } .action-btn.del:hover { background: #fef2f2; border-color: #fca5a5; color: var(--danger); }
  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px); background: #1e293b; color: white; padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: 500; opacity: 0; transition: opacity 0.3s, transform 0.3s; z-index: 999; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="app-wrapper">
  <header class="topbar">
    <div class="logo-area"><span class="brand">BETA</span><span class="brand-sub">SCIENCE</span></div>
    <div class="topbar-divider"></div>
    <nav><ul class="nav-tabs">
      <li><a href="dashboard.html">대시보드</a></li>
      <li><a href="students.html">학생 관리</a></li>
      <li><a href="test-create.html" class="active">테스트 생성</a></li>
      <li><a href="test-manage.html">테스트 관리</a></li>
      <li><a href="grades.html">성적 조회</a></li>
      <li><a href="analysis.html">학생별 분석</a></li>
      <li><a href="special.html">특별관리</a></li>
      <li><a href="sms.html">SMS설정</a></li>
    </ul></nav>
    <div class="topbar-right"><span class="academy-name">베타과학학원</span><span class="badge-admin">관리자 모드</span></div>
  </header>
  <main class="main-content">
    <div class="page-header"><h1>테스트 생성</h1><p>문항별 지문을 입력하고 파이어베이스에 저장하세요</p></div>
    
    <div class="section-card">
      <div class="section-card-title">기본 정보</div>
      <div class="form-row-3">
        <div class="form-group"><label>테스트 ID</label><input type="text" id="testId" readonly></div>
        <div class="form-group"><label>과목 <span class="req">*</span></label>
          <select id="subject"><option value="">과목 선택</option><option>통합과학</option><option>물리</option><option>화학</option><option>생물</option><option>내신대비</option></select>
        </div>
        <div class="form-group"><label>학년 <span class="req">*</span></label>
          <select id="grade"><option value="">학년 선택</option><option>중등1학년</option><option>중등2학년</option><option>중등3학년</option><option>고등1학년</option><option>고등2학년</option><option>고등3학년</option></select>
        </div>
      </div>
      <div class="form-row-1"><div class="form-group"><label>단원명</label><input type="text" id="unitName" placeholder="예: 알칼리금속과 할로젠"></div></div>
    </div>

    <div class="part-section">
      <div class="part-title">테스트 문항 입력 (1~10번)</div>
      <div class="answer-grid" id="main-answer-grid">
        </div>
    </div>

    <div class="save-bar">
      <button class="btn-save" onclick="saveTest()">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        테스트 저장 및 배포 준비
      </button>
    </div>

    <div class="registered-section">
      <div class="registered-header"><h2>등록된 테스트 목록 <span class="count-badge" id="regCount">0개</span></h2></div>
      <div class="table-card">
        <table><thead><tr><th>테스트 ID</th><th>단원명</th><th>과목/학년</th><th>배포용 ID</th><th>관리</th></tr></thead><tbody id="regTestBody"></tbody></table>
      </div>
    </div>
  </main>
</div>
<div class="toast" id="toast"></div>

<script type="module">
  import { db } from './firebase-config.js';
  import { collection, addDoc, doc, deleteDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // 1. 문항 입력 그리드 생성 (번호 | 문제지문 | 정답)
  const grid = document.getElementById('main-answer-grid');
  for (let i = 1; i <= 10; i++) {
    const div = document.createElement('div');
    div.className = 'answer-item';
    div.innerHTML = `
      <label>Q${i}</label>
      <input type="text" class="q-text" data-qno="${i}" placeholder="문제 지문을 입력하세요 (예: 알칼리 금속의 성질로 옳은 것은?)">
      <select class="q-ans" data-qno="${i}">
        <option value="1">1번</option><option value="2">2번</option><option value="3">3번</option><option value="4">4번</option><option value="5">5번</option>
      </select>
    `;
    grid.appendChild(div);
  }

  document.getElementById('testId').value = 'BETA-' + Math.random().toString(36).substr(2, 5).toUpperCase();

  let allTests = [];

  // 실시간 목록 불러오기
  onSnapshot(query(collection(db, "tests"), orderBy("regDate", "desc")), (snapshot) => {
    allTests = snapshot.docs.map(doc => ({ fireId: doc.id, ...doc.data() }));
    renderTests();
  });

  // 테스트 저장
  window.saveTest = async function() {
    const sub = document.getElementById('subject').value;
    const grd = document.getElementById('grade').value;
    const unit = document.getElementById('unitName').value;

    if(!sub || !grd) { alert('과목과 학년을 선택해주세요.'); return; }

    const questions = [];
    document.querySelectorAll('.answer-item').forEach(item => {
      questions.push({
        qNo: item.querySelector('.q-text').dataset.qno,
        question: item.querySelector('.q-text').value || "문제 내용 없음",
        answer: item.querySelector('.q-ans').value
      });
    });

    try {
      await addDoc(collection(db, "tests"), {
        testId: document.getElementById('testId').value,
        subject: sub,
        grade: grd,
        unitName: unit || "미지정 단원",
        questions: questions,
        regDate: new Date().toLocaleString()
      });
      alert('테스트가 성공적으로 저장되었습니다!');
      location.reload(); 
    } catch(e) { console.error(e); alert('저장 실패'); }
  }

  function renderTests() {
    const tbody = document.getElementById('regTestBody');
    document.getElementById('regCount').textContent = allTests.length + '개';
    tbody.innerHTML = allTests.map(t => `
      <tr>
        <td class="test-id-sm">${t.testId}</td>
        <td style="font-weight:600">${t.unitName}</td>
        <td><span class="subject-pill">${t.subject} / ${t.grade}</span></td>
        <td style="font-family:monospace; color:var(--primary)">${t.fireId}</td>
        <td>
          <button class="action-btn del" onclick="deleteTest('${t.fireId}')">✕</button>
        </td>
      </tr>
    `).join('');
  }

  window.deleteTest = async function(id) {
    if(confirm('삭제하시겠습니까?')) await deleteDoc(doc(db, "tests", id));
  }
</script>
</body>
</html>

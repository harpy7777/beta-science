<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>테스트 생성 - 베타과학</title>
<style>
  /* [중요] 원장님의 원본 디자인과 색상을 절대적으로 보존합니다 */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --primary: #2563eb; --primary-light: #eff6ff; --primary-dark: #1d4ed8; --max-width: 1200px; --bg: #f5f6fa; --white: #ffffff; --text: #1e293b; --text-muted: #64748b; --border: #e2e8f0; --radius: 10px; }
  body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); }
  .app-wrapper { max-width: var(--max-width); margin: 0 auto; display: flex; flex-direction: column; min-height: 100vh; }
  .topbar { background: var(--white); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; gap: 32px; height: 56px; position: sticky; top: 0; z-index: 100; }
  .logo-area { display: flex; flex-direction: column; align-items: center; line-height: 1.1; }
  .logo-area .brand { font-size: 15px; font-weight: 800; color: var(--primary); }
  .logo-area .brand-sub { font-size: 10px; font-weight: 600; color: var(--primary); text-transform: uppercase; }
  .nav-tabs { display: flex; gap: 2px; list-style: none; }
  .nav-tabs a { display: block; padding: 8px 14px; font-size: 14px; color: var(--text-muted); text-decoration: none; border-radius: 6px; }
  .nav-tabs a.active { background: var(--primary-light); color: var(--primary); font-weight: 600; }
  
  .main-content { padding: 28px 24px; }
  .section-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; margin-bottom: 20px; }
  
  /* 스크린샷과 동일한 문항 입력 한 줄 디자인 */
  .question-row { display: flex; align-items: center; gap: 20px; margin-bottom: 12px; padding: 12px 20px; background: #fff; border-radius: 8px; border: 1px solid #f1f5f9; }
  .q-label { font-size: 14px; font-weight: 800; color: var(--primary); width: 40px; }
  .q-input { flex: 1; padding: 10px 14px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; color: var(--text); outline: none; }
  .q-input:focus { border-color: var(--primary); }
  .a-select { width: 100px; padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; outline: none; }

  .section-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; color: var(--text); }
  .save-bar { position: sticky; bottom: 0; background: var(--white); border-top: 1px solid var(--border); padding: 14px 24px; z-index: 50; margin: 0 -24px -28px; }
  .btn-save { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; }
</style>
</head>
<body>
<div class="app-wrapper">
  <header class="topbar">
    <div class="logo-area"><span class="brand">BETA</span><span class="brand-sub">SCIENCE</span></div>
    <nav style="margin-left:20px"><ul class="nav-tabs">
      <li><a href="dashboard.html">대시보드</a></li>
      <li><a href="students.html">학생 관리</a></li>
      <li><a href="test-create.html" class="active">테스트 생성</a></li>
      <li><a href="test-manage.html">테스트 관리</a></li>
      <li><a href="grades.html">성적 조회</a></li>
    </ul></nav>
  </header>

  <main class="main-content">
    <div class="section-card">
      <div class="section-title">기본 정보</div>
      <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:15px; margin-bottom:15px;">
        <div><label style="font-size:12px; font-weight:700;">과목</label><select id="subject" style="width:100%; padding:10px; border:1px solid var(--border); border-radius:6px;"><option value="">과목 선택</option><option>중등과학</option><option>통합과학</option><option>화학</option><option>생명과학</option><option>물리</option><option>지구과학</option></select></div>
        <div><label style="font-size:12px; font-weight:700;">학년</label><select id="grade" style="width:100%; padding:10px; border:1px solid var(--border); border-radius:6px;"><option value="">학년 선택</option><option>중등1학년</option><option>중등2학년</option><option>중등3학년</option><option>고등1학년</option><option>고등2학년</option><option>고등3학년</option></select></div>
        <div><label style="font-size:12px; font-weight:700;">단원명</label><input type="text" id="unitName" style="width:100%; padding:10px; border:1px solid var(--border); border-radius:6px;" placeholder="예: 알칼리 금속"></div>
      </div>
    </div>

    <div class="section-card">
      <div class="section-title">테스트 문항 입력 (1~10번)</div>
      <div id="q-group-1"></div>
    </div>

    <div class="section-card">
      <div class="section-title">테스트 문항 입력 (11~20번)</div>
      <div id="q-group-2"></div>
    </div>

    <div class="section-card">
      <div class="section-title">테스트 문항 입력 (21~30번)</div>
      <div id="q-group-3"></div>
    </div>

    <div class="save-bar"><button class="btn-save" onclick="saveTest()">테스트 저장 및 배포 준비</button></div>
  </main>
</div>

<script type="module">
  import { db } from './firebase-config.js';
  import { collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // 문항 생성 로직 (디자인 훼손 방지용)
  function makeRows(containerId, start) {
    const container = document.getElementById(containerId);
    for (let i = start; i < start + 10; i++) {
      const row = document.createElement('div');
      row.className = 'question-row';
      row.innerHTML = `
        <div class="q-label">Q${i}</div>
        <input type="text" class="q-input" data-qno="${i}" placeholder="문제 지문을 입력하세요 (예: 알칼리 금속의 성질로 옳은 것은?)">
        <select class="a-select" data-qno="${i}">
          <option value="1">1번</option><option value="2">2번</option>
          <option value="3">3번</option><option value="4">4번</option><option value="5">5번</option>
        </select>`;
      container.appendChild(row);
    }
  }

  makeRows('q-group-1', 1);
  makeRows('q-group-2', 11);
  makeRows('q-group-3', 21);

  window.saveTest = async function() {
    const sub = document.getElementById('subject').value, grd = document.getElementById('grade').value;
    if(!sub || !grd) { alert('과목과 학년을 선택해주세요.'); return; }
    
    const questions = [];
    document.querySelectorAll('.q-input').forEach(input => {
      const qNo = input.dataset.qno;
      const ans = document.querySelector(`.a-select[data-qno="${qNo}"]`).value;
      questions.push({ qNo, question: input.value.trim() || `${qNo}번 문제`, answer: ans });
    });

    try {
      await addDoc(collection(db, "tests"), {
        subject: sub, grade: grd, unitName: document.getElementById('unitName').value || "미지정 단원",
        questions, regDate: new Date().toISOString()
      });
      alert('성공적으로 저장되었습니다!');
      location.href = "test-manage.html";
    } catch(e) { alert('저장 실패'); }
  }
</script>
</body>
</html>

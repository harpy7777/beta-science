<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>테스트 생성 - 베타과학</title>
<style>
  /* 원본 CSS 및 틀 100% 유지 */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --primary: #2563eb; --primary-light: #eff6ff; --primary-dark: #1d4ed8; --max-width: 1200px; --bg: #f5f6fa; --white: #ffffff; --text: #1e293b; --text-muted: #64748b; --border: #e2e8f0; --danger: #ef4444; --success: #10b981; --radius: 10px; }
  body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .app-wrapper { max-width: var(--max-width); margin: 0 auto; display: flex; flex-direction: column; min-height: 100vh; }
  .topbar { background: var(--white); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; gap: 32px; height: 56px; position: sticky; top: 0; z-index: 100; }
  .main-content { padding: 28px 24px; flex: 1; }
  
  /* 사진 반영: 섹션 타이틀 크게 */
  .part-section { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; margin-bottom: 24px; }
  .part-title { font-size: 24px; font-weight: 800; margin-bottom: 24px; color: var(--text); }
  
  /* 입력 폼 옹졸하지 않게 100% 너비 적용 */
  .form-group { margin-bottom: 20px; }
  .form-group label { display: block; font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
  .form-group input, .form-group textarea { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; background: #fcfdfe; }
  .form-group textarea { min-height: 80px; resize: none; }

  /* 한 줄에 문제 한 개씩 + 정답 입력 박스 */
  .answer-grid { display: flex; flex-direction: column; gap: 12px; margin-top: 24px; }
  .answer-item { display: flex; flex-direction: column; gap: 6px; }
  .answer-item label { font-size: 16px; font-weight: 800; color: var(--text); padding-left: 2px; }
  
  .answer-input-group { display: flex; gap: 12px; width: 100%; }
  .q-text { flex: 1; padding: 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px; }
  .q-ans { width: 120px; padding: 14px; border: 1px solid var(--border); border-radius: 8px; font-weight: 700; background: #fff; cursor: pointer; text-align: center; }

  /* 추가 과제 섹션 - 사진 디자인 반영 */
  .homework-title { font-size: 18px; font-weight: 700; margin: 30px 0 16px; color: var(--text); }
  .homework-group { margin-bottom: 16px; }
  .homework-group label { font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; display: block; }
  .hw-input { width: 100%; padding: 14px; background: #f8fafc; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; }

  /* 저장 버튼 */
  .save-bar { position: sticky; bottom: 0; background: var(--white); border-top: 1px solid var(--border); padding: 16px 24px; z-index: 50; margin: 0 -24px -28px; }
  .btn-save { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; }
</style>
</head>
<body>
<div class="app-wrapper">
  <header class="topbar">
    <div class="logo-area"><span class="brand">BETA</span><span class="brand-sub">SCIENCE</span></div>
    <div class="topbar-right"><span class="academy-name">베타과학학원</span><span class="badge-admin">관리자 모드</span></div>
  </header>

  <main class="main-content">
    <div class="part-section">
      <div class="part-title">1부: 문항 1-10</div>
      <div class="form-group"><label>섹션명</label><input type="text" id="secName1" placeholder="예: 알칼리금속"></div>
      <div class="form-group"><label>핵심 내용</label><textarea id="secCore1" placeholder="이 섹션의 핵심 개념을 입력하세요..."></textarea></div>
      
      <div class="homework-title">정답 입력 (1-10번)</div>
      <div class="answer-grid" id="grid1">
        </div>

      <div class="homework-title">추가 과제 (오답별)</div>
      <div class="homework-group"><label>0-2개 오답</label><input type="text" class="hw-input" value="시험지에 오답문제 정리해오기"></div>
      <div class="homework-group"><label>3-4개 오답</label><input type="text" class="hw-input" value="수업노트 필기 다시하고 오답문제 정리하기"></div>
      <div class="homework-group"><label>5개 이상 오답</label><input type="text" class="hw-input" value="동영상 수업 내용복습, 수업노트 필기, 오답정리해오기"></div>
    </div>

    <div class="part-section">
      <div class="part-title">2부: 문항 11-20</div>
      <div class="form-group"><label>섹션명</label><input type="text" id="secName2" placeholder="예: 할로젠원소"></div>
      <div class="form-group"><label>핵심 내용</label><textarea id="secCore2" placeholder="이 섹션의 핵심 개념을 입력하세요..."></textarea></div>
      <div class="homework-title">정답 입력 (11-20번)</div>
      <div class="answer-grid" id="grid2"></div>
      <div class="homework-title">추가 과제 (오답별)</div>
      <div class="homework-group"><label>0-2개 오답</label><input type="text" class="hw-input" value="시험지에 오답문제 정리해오기"></div>
      <div class="homework-group"><label>3-4개 오답</label><input type="text" class="hw-input" value="수업노트 필기 다시하고 오답문제 정리하기"></div>
      <div class="homework-group"><label>5개 이상 오답</label><input type="text" class="hw-input" value="동영상 수업 내용복습, 수업노트 필기, 오답정리해오기"></div>
    </div>

    <div class="part-section">
      <div class="part-title">3부: 문항 21-30</div>
      <div class="form-group"><label>섹션명</label><input type="text" id="secName3" placeholder="예: 주기적성질"></div>
      <div class="form-group"><label>핵심 내용</label><textarea id="secCore3" placeholder="이 섹션의 핵심 개념을 입력하세요..."></textarea></div>
      <div class="homework-title">정답 입력 (21-30번)</div>
      <div class="answer-grid" id="grid3"></div>
      <div class="homework-title">추가 과제 (오답별)</div>
      <div class="homework-group"><label>0-2개 오답</label><input type="text" class="hw-input" value="시험지에 오답문제 정리해오기"></div>
      <div class="homework-group"><label>3-4개 오답</label><input type="text" class="hw-input" value="수업노트 필기 다시하고 오답문제 정리하기"></div>
      <div class="homework-group"><label>5개 이상 오답</label><input type="text" class="hw-input" value="동영상 수업 내용복습, 수업노트 필기, 오답정리해오기"></div>
    </div>

    <div class="save-bar">
      <button class="btn-save" onclick="saveTest()">테스트 저장 및 배포</button>
    </div>
  </main>
</div>

<script>
  function renderItems(containerId, start, end) {
    const container = document.getElementById(containerId);
    for (let i = start; i <= end; i++) {
      const div = document.createElement('div');
      div.className = 'answer-item';
      div.innerHTML = `
        <label>Q${i}</label>
        <div class="answer-input-group">
          <input type="text" class="q-text" data-qno="${i}" placeholder="지문 입력">
          <select class="q-ans">
            <option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option>
          </select>
        </div>
      `;
      container.appendChild(div);
    }
  }

  renderItems('grid1', 1, 10);
  renderItems('grid2', 11, 20);
  renderItems('grid3', 21, 30);
</script>
</body>
</html>
